/* per-tool runtime state */
const toolState = {};
TOOL_IDS.forEach(id=>toolState[id]={raw:'',running:false,abort:null,t0:0,savedId:null,undo:null});

function getFormValues(id){
  const v={};
  for(const f of TOOLS[id].fields){
    const el=$(`#f-${id}-${f.id}`);
    if(!el) continue;
    if(f.type==='chips') v[f.id]=$$('.chip.on',el).map(c=>c.dataset.v);
    else if(f.type==='seg') v[f.id]=el.dataset.val;
    else v[f.id]=el.value.trim();
  }
  return v;
}
function saveFormValues(id){
  const v=getFormValues(id);
  const forms=Store.get().forms;
  for(const k in v) forms[`${id}.${k}`]=v[k];
  Store.persist();
}
function setFormValues(id,vals){
  for(const f of TOOLS[id].fields){
    if(!(f.id in vals)) continue;
    const el=$(`#f-${id}-${f.id}`); if(!el) continue;
    const val=vals[f.id];
    if(f.type==='chips'){ $$('.chip',el).forEach(c=>c.classList.toggle('on',(val||[]).includes(c.dataset.v))); }
    else if(f.type==='seg'){
      const v=f.opts.includes(val)?val:f.def; /* never leave a seg with no active option */
      el.dataset.val=v; $$('button',el).forEach(b=>b.classList.toggle('on',b.dataset.v===v));
    }
    else if(f.type==='select'){
      /* guard: assigning a value not in the option list would silently keep the old selection */
      el.value = f.opts.includes(val)?val:'';
      if(el.selectedIndex<0) el.selectedIndex=0;
    }
    else el.value=val??'';
  }
}

/* ---- tool actions, split out of the event wiring for testability ---- */
function markPreset(id,index){ /* highlight which preset the form came from; -1 clears */
  $$(`#presets-${id} .preset-chip`).forEach((b,i)=>b.classList.toggle('on',i===index));
}
function loadSurprise(id){
  setFormValues(id,TOOLS[id].surprise());
  saveFormValues(id);
  markPreset(id,-1);
  toast('Random inspiration loaded','info');
}
function loadPreset(id,index){
  const preset=TOOLS[id].presets?.[index]; if(!preset) return;
  setFormValues(id,preset.vals);
  saveFormValues(id);
  markPreset(id,index);
  toast(`Preset loaded: ${preset.name.replace(/^\S+\s/,'')}`,'info');
}
function clearForm(id){
  const blank={};
  TOOLS[id].fields.forEach(f=>blank[f.id]=f.type==='chips'?[]:f.type==='seg'?f.def:'');
  setFormValues(id,blank);
  TOOLS[id].fields.filter(f=>f.type==='select').forEach(f=>{ $(`#f-${id}-${f.id}`).selectedIndex=0; });
  saveFormValues(id);
  markPreset(id,-1);
  toast('Form cleared','info');
}
function runStudio(id){
  if(toolState[id].running) return;
  const opt=TOOLS[id].studio.find(o=>o.v===$(`#studio-sel-${id}`).value);
  if(opt) generate(id,'studio',opt.instr);
}
function undoRewrite(id){
  const st=toolState[id];
  if(st.undo==null) return;
  [st.raw,st.undo]=[st.undo,st.raw]; /* swap — undo is redo-able */
  st.savedId=null;
  $(`#body-${id}`).innerHTML=`<div class="prose">${renderMD(st.raw)}</div>`;
  updateMeta(id);
  toast('Swapped with previous version','info');
}
function applyRefinement(id){
  if(toolState[id].running) return;
  const input=$(`#refine-input-${id}`);
  const instr=input.value.trim();
  if(!instr){ toast('Type a refinement instruction first','err'); input.focus(); return; }
  generate(id,'custom',instr);
  input.value='';
}

function initTool(id){
  const view=$(`#view-${id}`);
  const autosave=debounce(()=>saveFormValues(id),CONFIG.AUTOSAVE_DEBOUNCE_MS);

  /* single delegated click handler for the whole tool view */
  view.addEventListener('click',e=>{
    const segBtn=e.target.closest('.seg button');
    if(segBtn){
      const seg=segBtn.parentElement;
      seg.dataset.val=segBtn.dataset.v;
      $$('button',seg).forEach(b=>b.classList.toggle('on',b===segBtn));
      autosave(); return;
    }
    const chip=e.target.closest('.chip');
    if(chip){ chip.classList.toggle('on'); autosave(); return; }
    const preset=e.target.closest('[data-preset]');
    if(preset){ loadPreset(id,Number(preset.dataset.preset)); return; }
    if(e.target.closest('[data-surprise]')){ loadSurprise(id); return; }
    if(e.target.closest('[data-clear]')){ clearForm(id); return; }
    if(e.target.closest(`[data-studio="${id}"]`)){ runStudio(id); return; }
    const pipe=e.target.closest('[data-pipe]');
    if(pipe){ Pipe.sendOutput(id,pipe.dataset.pipe); return; }
    const r=e.target.closest('[data-refine]');
    if(r){
      if(toolState[id].running) return;
      if(r.dataset.refine==='undo') undoRewrite(id);
      else if(r.dataset.refine==='continue') generate(id,'continue');
      else applyRefinement(id);
      return;
    }
  });
  $(`#gen-${id}`).addEventListener('click',()=>generate(id));
  $(`#stop-${id}`).addEventListener('click',()=>toolState[id].abort?.abort());
  // ⌘/Ctrl+Enter generates; Enter in refine input applies
  view.addEventListener('keydown',e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){ e.preventDefault(); generate(id); }
    else if(e.key==='Enter'&&e.target.id===`refine-input-${id}`){ e.preventDefault(); applyRefinement(id); }
  });
  // autosave typed input (debounced) so nothing is lost on reload;
  // manual edits also mean the form no longer matches a loaded preset
  view.addEventListener('input',e=>{ if(e.target.closest('.form-grid')) markPreset(id,-1); autosave(); });
}

/* ============================================================
   GENERATION ENGINE
============================================================ */
function setRunning(id,on){
  const st=toolState[id];
  st.running=on;
  $(`#gen-${id}`).classList.toggle('loading',on);
  $(`#gen-${id}`).disabled=on;
  $(`#stop-${id}`).style.display=on?'inline-flex':'none';
  $(`#pulse-${id}`).classList.toggle('live',on);
}
/* cached per-tool DOM refs — these are queried on every streamed paint (~8/s),
   so resolve them once instead of hitting querySelector each time */
const toolEls={};
function els(id){
  return toolEls[id]||(toolEls[id]={
    words:$(`#meta-words-${id}`), chars:$(`#meta-chars-${id}`),
    status:$(`#status-${id}`), body:$(`#body-${id}`)
  });
}
function updateMeta(id){
  const st=toolState[id], e=els(id);
  const words=wc(st.raw);
  e.words.textContent=`${words} words`;
  e.chars.textContent=words?`~${Math.max(1,Math.round(words/230))} min read`:'0 chars';
}

/* Compose the user prompt for each generation mode.
   fresh    — the tool's own prompt from form values
   continue — seamless continuation of existing text
   custom   — full rewrite applying a user instruction
   studio   — canon-consistent new section appended to existing text */
function buildUserPrompt(id,mode,instruction,raw){
  const base=TOOLS[id].prompt(getFormValues(id));
  switch(mode){
    case 'continue':
      return `${base}\n\n---\nHere is the text so far:\n\n${raw}\n\n---\nContinue this text seamlessly from exactly where it stops. Do not repeat any existing text, do not add a new title, do not summarize — just keep writing in the same voice and format.`;
    case 'custom':
      return `${base}\n\n---\nHere is the previous version:\n\n${raw}\n\n---\nRewrite/revise the full piece applying this instruction: "${instruction}". Output the complete revised piece (with title), not just the changed parts.`;
    case 'studio':
      return `Here is the established canon so far — treat every named person, place, faction and rule in it as fixed truth:\n\n${raw}\n\n---\nTask: ${instruction}\nOutput ONLY the new section, starting with an appropriate ## heading. Stay rigorously consistent with the canon above (names, naming flavor, tone, tech/magic rules). Do not repeat or summarize existing sections.`;
    default:
      return base;
  }
}

/* Stream a completion, rotating to the next healthy key on key-level
   failures (401/403/429) as long as nothing has streamed yet.
   Calls onChunk per token batch; returns {usedKey}. Throws on failure. */
async function streamWithFailover(pv,{sys,user,signal,onChunk,onRetry}){
  const s=Store.get();
  const maxAttempts=Math.max(1,KeyManager.list(pv).filter(k=>k.key).length);
  const tried=new Set();
  let lastErr=null, usedKey=null, streamed=false;
  for(let attempt=0; attempt<maxAttempts; attempt++){
    const keyEntry=KeyManager.pick(pv);
    if(!keyEntry||tried.has(keyEntry.id)) break;
    tried.add(keyEntry.id);
    usedKey=keyEntry;
    if(attempt>0) onRetry?.(keyEntry);
    try{
      for await(const chunk of PROVIDERS[pv].stream(s.models[pv],sys,user,{key:keyEntry.key,temperature:s.temperature,maxTokens:s.maxTokens},signal)){
        streamed=true;
        onChunk(chunk);
      }
      lastErr=null;
      break;
    }catch(err){
      if(err.name==='AbortError') throw err;
      lastErr=err;
      const info=KeyManager.markFailure(pv,keyEntry.id,err)||{};
      /* only fail over if nothing streamed yet AND it's a key-level problem */
      if(streamed || !(info.rateLimited||info.badKey)) throw err;
    }
  }
  if(lastErr) throw lastErr;
  return {usedKey};
}

async function generate(id,mode='fresh',instruction=''){
  const st=toolState[id];
  if(st.running) return;
  const s=Store.get();
  const pv=s.provider;
  if(!KeyManager.hasAny(pv)){ toast(`Add a ${PROVIDERS[pv].name} API key first`,'err'); navigate('settings'); return; }

  saveFormValues(id);
  const isAppend = mode==='continue'||mode==='studio';
  const user=buildUserPrompt(id,mode,instruction,st.raw);
  const body=els(id).body;
  const base=isAppend?st.raw+'\n\n':'';
  const prevRaw=st.raw; /* kept so a failed refine/rewrite never destroys the current output */
  st.raw=base; st.t0=performance.now(); st.savedId=null;
  $(`#meta-time-${id}`).textContent='';
  updateMeta(id); /* reset word/char counters immediately, not at first paint */
  st.abort=new AbortController();
  setRunning(id,true);
  $(`#refine-${id}`).style.display='none';
  $(`#studio-${id}`)?.classList.remove('show');
  $(`#pipe-${id}`).classList.remove('show');
  $(`#status-${id}`).textContent=`Contacting ${PROVIDERS[pv].name}…`;
  if(!isAppend) body.innerHTML='<div class="skel"><div style="width:45%"></div><div style="width:92%"></div><div style="width:88%"></div><div style="width:95%"></div><div style="width:60%"></div></div>';

  /* throttled + incremental paint: blocks before the last blank line are
     stable in this renderer (blank lines close lists/tables), so parse them
     once and only re-parse the small streaming tail on each frame.
     Keeps paint cost O(tail) instead of O(document) on long outputs. */
  let lastPaint=0, paintTimer=null, stableLen=0, stableHTML='';
  const doPaint=(final)=>{
    lastPaint=performance.now();
    if(!final && document.hidden) return; /* don't burn CPU painting a hidden tab */
    let html;
    if(final){
      html=renderMD(st.raw); /* authoritative full parse at the end */
    }else{
      if(stableLen>st.raw.length){ stableLen=0; stableHTML=''; } /* raw shrank (retry) — invalidate cache */
      const cut=st.raw.lastIndexOf('\n\n');
      if(cut>stableLen){ stableHTML+=renderMD(st.raw.slice(stableLen,cut)); stableLen=cut; }
      html=stableHTML+renderMD(st.raw.slice(stableLen));
    }
    const stick = body.scrollHeight-body.scrollTop-body.clientHeight<80;
    body.innerHTML=`<div class="prose">${html}${final?'':'<span class="caret"></span>'}</div>`;
    if(stick) body.scrollTop=body.scrollHeight;
    updateMeta(id);
  };
  const paint=(final=false)=>{
    if(final){ clearTimeout(paintTimer); paintTimer=null; doPaint(true); return; }
    const wait=Math.max(0,CONFIG.PAINT_INTERVAL_MS-(performance.now()-lastPaint));
    if(paintTimer) return;
    paintTimer=setTimeout(()=>{ paintTimer=null; doPaint(false); },wait);
  };

  try{
    let first=true;
    const {usedKey}=await streamWithFailover(pv,{
      sys:TOOLS[id].sys, user, signal:st.abort.signal,
      onChunk:chunk=>{
        if(first){ first=false; $(`#status-${id}`).textContent='Streaming…'; }
        st.raw+=chunk;
        paint();
      },
      onRetry:keyEntry=>{
        $(`#status-${id}`).textContent=`Retrying with “${keyEntry.label}”…`;
        toast(`Switched to key “${keyEntry.label}”`,'info');
      }
    });
    if(st.raw===base||!st.raw.trim()) throw new Error('Empty response from model.');
    if(usedKey) KeyManager.markSuccess(pv,usedKey.id);
    /* rewrites are undoable — keep the version they replaced */
    st.undo = mode==='custom' ? prevRaw : null;
    const undoBtn=$(`#undo-${id}`); if(undoBtn) undoBtn.style.display=st.undo!=null?'inline-flex':'none';
    paint(true);
    const secs=Math.max(0.1,(performance.now()-st.t0)/1000);
    const newWords=wc(st.raw.slice(base.length));
    $(`#status-${id}`).textContent='Done';
    $(`#meta-time-${id}`).textContent=`${secs.toFixed(1)}s · ${Math.round(newWords/secs)} w/s · ${s.models[pv]}${usedKey&&KeyManager.list(pv).filter(k=>k.key).length>1?` · ${usedKey.label}`:''}`;
    $(`#refine-${id}`).style.display='flex';
    $(`#studio-${id}`)?.classList.add('show');
    $(`#pipe-${id}`).classList.add('show');
    Store.set(prev=>({stats:{gens:prev.stats.gens+1,words:prev.stats.words+newWords}}));
    updateChips();
    updateProviderPill();
    toast('Generation complete');
  }catch(err){
    const showOutput=()=>{ paint(true); $(`#refine-${id}`).style.display='flex'; $(`#studio-${id}`)?.classList.add('show'); $(`#pipe-${id}`).classList.add('show'); };
    if(err.name==='AbortError'){
      $(`#status-${id}`).textContent='Stopped';
      if(st.raw.trim()) showOutput();
      else if(prevRaw.trim()){ st.raw=prevRaw; showOutput(); } /* stopped before anything streamed — restore previous */
      else body.innerHTML=`<div class="out-empty"><span class="oe-title">Generation stopped</span></div>`;
      toast('Generation stopped','info');
    }else{
      $(`#status-${id}`).textContent='Error';
      if(st.raw===base && prevRaw.trim()){
        /* failed before any new content — restore previous output instead of wiping it */
        st.raw=prevRaw; showOutput();
        toast('Failed — previous output kept: '+err.message.slice(0,70),'err');
      }else if(st.raw.trim()){
        /* failed mid-stream — keep the partial text visible */
        showOutput();
        toast('Stream interrupted: '+err.message.slice(0,70),'err');
      }else{
        body.innerHTML=`<div class="out-empty"><span style="color:var(--err)">${ic('x',34)}</span><span class="oe-title" style="color:var(--err)">Generation failed</span><span class="oe-sub">${esc(err.message)}</span></div>`;
        toast(err.message.slice(0,90),'err');
      }
    }
  }finally{
    setRunning(id,false);
  }
}

/* output actions */
function extractTitle(md,fallback){
  const m=md.match(/^#\s+(.+)$/m);
  return (m?m[1]:'').replace(/[*_`]/g,'').trim()||fallback;
}
function flashBtn(btn){ if(!btn) return; btn.classList.add('done'); setTimeout(()=>btn.classList.remove('done'),1200); }
function handleOutputAction(act,id,btn){
  const st=toolState[id];
  if(act==='regen'){
    if(st.running){ toast('Already generating…','info'); return; }
    generate(id); return;
  }
  if(!st.raw){ toast('Nothing to '+act+' yet','err'); return; }
  const title=extractTitle(st.raw,TOOLS[id].short+' output');
  if(act==='copy'){ copyText(st.raw).then(()=>{ toast('Copied to clipboard'); flashBtn(btn); }); }
  if(act==='download'){ download(title.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,50)+'.md',st.raw); toast('Downloaded .md'); flashBtn(btn); }
  if(act==='save'){
    /* prevent accidental duplicate saves of the same output */
    if(st.savedId && Store.get().library.some(i=>i.id===st.savedId && i.content===st.raw)){
      toast('Already saved to library','info'); flashBtn(btn); return;
    }
    const item={id:'sf_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),tool:id,title,content:st.raw,words:wc(st.raw),created:Date.now(),model:Store.get().models[Store.get().provider]};
    Store.set(prev=>({library:[item,...prev.library].slice(0,CONFIG.LIBRARY_CAP)}));
    st.savedId=item.id;
    toast('Saved to library'); flashBtn(btn);
  }
}

        ${TOOL_IDS.map(id=>`<button data-f="${id}" class="${libFilter===id?'on':''}">${TOOLS[id].short.replace(' Generator','').replace(' Builder','')}</button>`).join('')}
      </div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" id="lib-export" title="Export library as JSON backup" ${s.library.length?'':'disabled'}>${ic('dl',13)} Export</button>
        <button class="btn btn-ghost btn-sm" id="lib-import" title="Import a JSON backup">${ic('save',13)} Import</button>
        ${s.library.length?`<button class="btn btn-danger btn-sm" id="lib-clear">${ic('trash',13)} Clear all</button>`:''}
      </div>
    </div>
    <div id="lib-results"></div>
    <input type="file" id="lib-file" accept="application/json,.json" style="display:none">`;

  renderLibraryGrid();
  /* re-render only the grid on search/filter so the input never loses focus;
     debounced so fast typing does one render, not one per keystroke */
  const debouncedGrid=debounce(renderLibraryGrid,150);
  $('#lib-search').addEventListener('input',e=>{ libQuery=e.target.value; debouncedGrid(); });
  $('#lib-sort').addEventListener('change',e=>{ libSort=e.target.value; renderLibraryGrid(); });
  $('#lib-filter').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    libFilter=b.dataset.f;
    $$('#lib-filter button').forEach(x=>x.classList.toggle('on',x===b));
    renderLibraryGrid();
  });
  $('#lib-clear')?.addEventListener('click',()=>{
    if(confirm('Delete ALL saved items? This cannot be undone.')){ Store.set({library:[]}); libCache.clear(); renderLibrary(); toast('Library cleared','info'); }
  });
  $('#lib-export').addEventListener('click',()=>{
    const lib=Store.get().library;
    if(!lib.length) return;
    download(`storyforge-library-${new Date().toISOString().slice(0,10)}.json`,JSON.stringify({app:'storyforge',version:1,exported:Date.now(),items:lib},null,2),'application/json');
    toast(`Exported ${lib.length} items`);
  });
  $('#lib-import').addEventListener('click',()=>$('#lib-file').click());
  $('#lib-file').addEventListener('change',e=>{
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const j=JSON.parse(reader.result);
        /* sanitize: only accept well-formed items and coerce fields to expected types */
        const items=(Array.isArray(j)?j:j.items||[])
          .filter(i=>i && typeof i.id==='string' && typeof i.content==='string' && typeof i.tool==='string')
          .map(i=>({
            id:i.id, tool:i.tool,
            title:String(i.title||'Untitled').slice(0,200),
            content:i.content,
            words:Number(i.words)||wc(i.content),
            created:Number(i.created)||Date.now(),
            model:typeof i.model==='string'?i.model:''
          }));
        if(!items.length) throw new Error('No valid items found');
        Store.set(prev=>{
          const have=new Set(prev.library.map(i=>i.id));
          const added=items.filter(i=>!have.has(i.id));
          return {library:[...added,...prev.library].slice(0,CONFIG.LIBRARY_CAP)};
        });
        renderLibrary();
        toast('Import complete');
      }catch(err){ toast('Import failed: '+err.message,'err'); }
    };
    reader.readAsText(file);
    e.target.value='';
  });
}

/* per-item derived-data cache (search haystack + preview) so filtering and
   re-renders don't re-run regex/toLowerCase over full contents every keystroke */
const libCache=new Map(); // id -> {hay, preview}
function libDerived(item){
  let d=libCache.get(item.id);
  if(!d){
    d={
      hay:(item.title+' '+item.content).toLowerCase(),
      preview:esc(item.content.replace(/^#.+$/m,'').replace(/[#*>`|-]/g,'').trim().slice(0,180))
    };
    libCache.set(item.id,d);
    /* keep the cache bounded to the library cap */
    if(libCache.size>CONFIG.LIBRARY_CAP+50){ libCache.delete(libCache.keys().next().value); }
  }
  return d;
}
function renderLibraryGrid(){
  const s=Store.get();
  let items=s.library;
  if(libFilter!=='all') items=items.filter(i=>i.tool===libFilter);
  if(libQuery){ const q=libQuery.toLowerCase(); items=items.filter(i=>libDerived(i).hay.includes(q)); }
  if(libSort!=='new'){
    items=[...items].sort(
      libSort==='old'?(a,b)=>a.created-b.created
      :libSort==='words'?(a,b)=>(b.words||0)-(a.words||0)
      :(a,b)=>a.title.localeCompare(b.title));
  }
  $('#lib-results').innerHTML=items.length?`<div class="lib-grid">${items.map(item=>`
      <article class="lib-card" data-open-item="${item.id}" style="--tc:${TOOLS[item.tool]?.color||'var(--ac)'}" tabindex="0" role="button" aria-label="Open ${esc(item.title)}">
        <span class="lib-badge">${ic(TOOLS[item.tool]?.icon||'story',11)} ${TOOLS[item.tool]?.short||item.tool}</span>
        <h4>${esc(item.title)}</h4>
        <p class="lc-preview">${libDerived(item).preview}</p>
        <div class="lc-meta"><span>${item.words||0} words</span><span>${timeAgo(item.created)}</span></div>
      </article>`).join('')}</div>`
    :`<div class="empty-state">${ic('lib',44)}<h3>${s.library.length?'No matches':'Your library is empty'}</h3><p>${s.library.length?'Try a different search or filter.':'Generate something with any tool, then hit the save icon.'}</p></div>`;
}

function openItem(itemId){
  const item=Store.get().library.find(i=>i.id===itemId);
  if(!item) return;
  const t=TOOLS[item.tool];
  const root=$('#modal-root');
  root.innerHTML=`
  <div class="modal-bg" id="modal-bg">

  const close=()=>{ root.innerHTML=''; document.body.classList.remove('modal-open'); document.removeEventListener('keydown',escH); returnFocus?.focus?.(); };

  /* pipe this item into another tool via the shared pipeline (field-aware mapping) */
  $$('[data-use-in]',root).forEach(b=>b.addEventListener('click',()=>{
    close();

  }));
  $('#m-close').onclick=close;

    Store.set(prev=>({library:prev.library.filter(i=>i.id!==itemId)}));
    libCache.delete(itemId);
    close(); toast('Deleted','info');
    if(currentRoute==='library') renderLibrary();
    if(currentRoute==='dashboard') renderDashboard();
  };
}

function populateModelSelect(){
  const s=Store.get(), pv=s.provider;
  const sel=$('#set-model'); if(!sel) return;
  const opts=ModelHub.options(pv,!showFilteredModels);
  const current=s.models[pv];
  const inList=opts.some(m=>m.id===current);
  sel.innerHTML=opts.map(m=>`<option value="${esc(m.id)}"${m.id===current?' selected':''}>${esc(m.label)}${m.compatible?'':' ⚠ '+m.tag}</option>`).join('')
    +`<option value="__custom"${inList?'':' selected'}>Custom model ID…</option>`;
  const custom=$('#set-model-custom');
  if(!inList){ custom.style.display='block'; custom.value=current; }
  updateModelNote();
}
function updateModelNote(){
  const s=Store.get(), pv=s.provider;
  const note=$('#model-note'); if(!note) return;
  const cache=ModelHub.cached(pv);
  const m=cache?.models.find(x=>x.id===s.models[pv]);
  if(m&&!m.compatible) note.innerHTML=`⚠️ <b style="color:var(--warn)">${esc(m.id)}</b> is classified as a <b>${m.tag}</b> model — story generation will likely fail. Pick a text model instead.`;
  else if(m) note.textContent=`✓ ${m.id}${m.ctx?` · ${ModelHub.fmtCtx(m.ctx)} context`:''} · text-generation compatible`;
  else note.textContent='';
}

/* silently refresh stale model catalogs in the background */
let autoUpdating=false;
async function autoUpdateModels(){
  if(autoUpdating) return;
  autoUpdating=true;
  try{
    for(const pv of Object.keys(PROVIDERS)){
      if(!ModelHub.isStale(pv)) continue;
      const key=KeyManager.peek(pv)?.key||'';
      if(pv!=='openrouter'&&!key) continue; // Gemini/Groq need a key to list models
      try{
        await ModelHub.fetch(pv,key);
        if(currentRoute==='settings'&&Store.get().provider===pv) renderProviderConfig();
      }catch(e){ /* silent — manual refresh surfaces errors */ }
    }
  }finally{ autoUpdating=false; }
}

async function refreshModels(pv,btn){
  const keyEntry=KeyManager.peek(pv);
  btn.classList.add('loading'); btn.disabled=true;
  try{
    const models=await ModelHub.fetch(pv,keyEntry?.key||'');
    const n=models.filter(m=>m.compatible).length;
    toast(`${PROVIDERS[pv].name}: ${models.length} models found, ${n} text-compatible`);
    renderProviderConfig();
  }catch(err){
    toast('Model update failed: '+err.message.slice(0,80),'err');
    btn.classList.remove('loading'); btn.disabled=false;
  }
}

async function testSingleKey(pv,kid,btn){
  const k=KeyManager.list(pv).find(x=>x.id===kid); if(!k) return;
  const sp=btn.querySelector('.spinner'), icn=btn.querySelector('.ktest-ic');
  sp.style.display='inline-block'; icn.style.display='none'; btn.disabled=true;
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),CONFIG.KEY_TEST_TIMEOUT_MS);
    let got='';
    for await(const c of PROVIDERS[pv].stream(Store.get().models[pv],'You are a test.','Reply with exactly: OK',{key:k.key,temperature:0,maxTokens:10},ctrl.signal)){
      got+=c; if(got.length>1) break;
    }
    clearTimeout(timer);
    KeyManager.markSuccess(pv,kid);
    toast(`"${k.label}" is working ✓`);
  }catch(err){
    KeyManager.markFailure(pv,kid,err);
    toast(`"${k.label}" failed: ${err.message.slice(0,60)}`,'err');
  }finally{
    renderProviderConfig(); updateProviderPill();
  }
}

  sync();

  max.addEventListener('input',()=>{ Store.set({maxTokens:Number(max.value)}); sync(); });

    if(currentRoute!=='settings'||document.hidden) return;
    const pv=Store.get().provider;
    $$('#key-list [data-kid]').forEach(item=>{
      const k=KeyManager.list(pv).find(x=>x.id===item.dataset.kid); if(!k) return;
      const si=KeyManager.statusInfo(k);
      const badge=item.querySelector('.ki-status');
      if(badge&&badge.textContent!==si.txt){ badge.textContent=si.txt; badge.style.color=si.c; item.classList.toggle('cooling',k.cooldownUntil>Date.now()); }
    });
  },1000);
}

function updateProviderPill(){
  const s=Store.get();
  $('#pv-name').textContent=PROVIDERS[s.provider].name;
  $('#pv-model').textContent=s.models[s.provider];
  $('#pv-status').classList.toggle('on',KeyManager.healthy(s.provider).length>0);
}
function updateChips(){
  const s=Store.get();
  $('#chip-words').textContent=fmtNum(s.stats.words);
  $('#chip-gens').textContent=fmtNum(s.stats.gens);
}

/* ============================================================
   GLOBAL EVENTS + BOOT
============================================================ */
function closeDrawer(){ $('#sidebar').classList.remove('open'); $('#scrim').classList.remove('show'); }
function openDrawer(){ $('#sidebar').classList.add('open'); $('#scrim').classList.add('show'); }

/* delegated global clicks: navigation, output actions, library items */
document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-nav]');
  if(nav){ e.preventDefault(); navigate(nav.dataset.nav); return; }
  const act=e.target.closest('[data-act]');
  if(act){ handleOutputAction(act.dataset.act,act.dataset.tool,act); return; }
  const open=e.target.closest('[data-open-item]');
  if(open){ openItem(open.dataset.openItem); return; }
  const wfStart=e.target.closest('[data-wf-start]');
  if(wfStart){ Flow.start(wfStart.dataset.wfStart); return; }
  if(e.target.closest('[data-wf-next]')){ Flow.next(); return; }
  if(e.target.closest('[data-wf-cancel]')){ Flow.cancel(); return; }
});

/* single global keydown: Esc drawer, Enter on cards, 1–8 view shortcuts (derived from ROUTES) */
const VIEW_SHORTCUTS=Object.fromEntries(ROUTES.map((r,i)=>[String(i+1),r]));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeDrawer();
    /* Esc also stops a stream on the tool page you're looking at */
    if(TOOLS[currentRoute]&&toolState[currentRoute].running&&!document.body.classList.contains('modal-open')) toolState[currentRoute].abort?.abort();
    return;
  }
  if(e.key==='Enter'&&e.target.matches?.('[data-open-item]')){ openItem(e.target.dataset.openItem); return; }
  if(e.target.matches('input,textarea,select')||document.body.classList.contains('modal-open')) return;
  if(VIEW_SHORTCUTS[e.key]&&!e.metaKey&&!e.ctrlKey&&!e.altKey) navigate(VIEW_SHORTCUTS[e.key]);
});

$('#menu-btn').addEventListener('click',openDrawer);
$('#scrim').addEventListener('click',closeDrawer);
/* warn before leaving while a generation is streaming */
window.addEventListener('beforeunload',e=>{
  if(Object.values(toolState).some(st=>st.running)){ e.preventDefault(); e.returnValue=''; }
});

buildNav();
buildViews();
updateProviderPill();
updateChips();
Flow.render(); /* restore any in-progress workflow from storage */
/* deep-linkable views: restore from URL hash, react to back/forward */
window.addEventListener('hashchange',()=>{
  const r=location.hash.slice(1);
  if(r!==currentRoute) navigate(r,true);
});
navigate(location.hash.slice(1)||'dashboard',true);
</script>
</body>
</html>
