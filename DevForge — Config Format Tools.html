<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevForge — Developer Toolkit</title>
<meta name="description" content="Fast, 100% client-side developer toolkit: JSON, YAML, XML, TOML & INI formatters/validators plus Base64/URL, JWT and hash utilities. No backend, no tracking.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
<!-- Parsing libraries -->
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script type="module">
  // Load a browser-bundled TOML parser and expose it globally + signal readiness
  import('https://esm.run/toml@3.0.0')
    .then(m=>{window.TOML=(m&&m.default&&m.default.parse)?m.default:m;document.dispatchEvent(new Event('toml-ready'));})
    .catch(err=>{console.warn('TOML parser failed to load',err);document.dispatchEvent(new Event('toml-failed'));});
</script>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  /* color — dark neutral */
  --bg-0:#0b0d10;
  --bg-1:#101317;
  --bg-2:#161a20;
  --bg-3:#1d222a;
  --bg-4:#252b35;
  --surface:#13171c;
  --border:#262c36;
  --border-2:#323a47;
  --txt-0:#eef1f5;
  --txt-1:#aeb6c2;
  --txt-2:#6b7480;
  --txt-3:#4a525e;
  --accent:#5b9dff;
  --accent-2:#3a7ce0;
  --accent-soft:rgba(91,157,255,.12);
  --ok:#46c98b;
  --ok-soft:rgba(70,201,139,.12);
  --warn:#e6b450;
  --warn-soft:rgba(230,180,80,.12);
  --err:#f0616d;
  --err-soft:rgba(240,97,109,.12);
  --purple:#b07cf0;
  --cyan:#4fd1d9;

  /* semantic color roles (alias the palette so components reference intent) */
  --c-primary:var(--accent); --c-primary-2:var(--accent-2); --c-primary-soft:var(--accent-soft);
  --c-success:var(--ok); --c-success-soft:var(--ok-soft);
  --c-warning:var(--warn); --c-warning-soft:var(--warn-soft);
  --c-danger:var(--err); --c-danger-soft:var(--err-soft);
  --c-info:var(--cyan);
  --border-focus:var(--accent);
  --focus-ring:0 0 0 3px var(--accent-soft);

  /* radius */
  --r-xs:5px; --r-sm:7px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-pill:999px; --r-full:50%;
  /* spacing scale (0..8) */
  --sp-0:0; --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px; --sp-12:48px;
  /* type */
  --fs-xs:11px; --fs-sm:12.5px; --fs-md:13.5px; --fs-lg:15px; --fs-xl:18px; --fs-2xl:22px; --fs-3xl:28px;
  --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
  --lh-tight:1.25; --lh-normal:1.5; --lh-loose:1.7;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  /* shadow */
  --sh-0:none;
  --sh-1:0 1px 2px rgba(0,0,0,.4);
  --sh-2:0 4px 16px rgba(0,0,0,.4);
  --sh-3:0 12px 40px rgba(0,0,0,.55);
  --sh-glow:0 0 12px var(--accent-soft);
  /* motion */
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --dur-fast:.12s; --dur:.18s; --dur-slow:.32s;
  /* layering */
  --z-base:1; --z-sticky:20; --z-overlay:100; --z-toast:1000;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--bg-0);
  color:var(--txt-0);
  font-size:var(--fs-md);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
::selection{background:var(--accent-soft);color:#fff}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:10px;border:2px solid var(--bg-1)}
::-webkit-scrollbar-thumb:hover{background:#3f4856}

/* ============================================================
   DESIGN SYSTEM — reusable component patterns + utilities
   ------------------------------------------------------------
   Naming conventions:
   • Components:  .ds-card, .ds-panel, .btn, .input, .slider …
   • Element parts (BEM-ish):  .ds-card__head, .ds-panel__body
   • Modifiers:   --primary --success --sm --lg --block (state: .is-on .is-active)
   • Utilities:   .u-<group>-<value>  (e.g. .u-mt-4, .u-text-1, .u-bg-2)
   All values reference design tokens — never hard-coded.
   ============================================================ */

/* ---------- Typography ---------- */
.h1,.h2,.h3,.h4{font-family:var(--sans);font-weight:var(--fw-semibold);line-height:var(--lh-tight);color:var(--txt-0);letter-spacing:-.01em}
.h1{font-size:var(--fs-3xl)} .h2{font-size:var(--fs-2xl)} .h3{font-size:var(--fs-xl)} .h4{font-size:var(--fs-lg)}
.lead{font-size:var(--fs-lg);color:var(--txt-1);line-height:var(--lh-normal)}
.body{font-size:var(--fs-md);color:var(--txt-0)}
.caption{font-size:var(--fs-sm);color:var(--txt-2)}
.label{font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.08em;color:var(--txt-2);font-weight:var(--fw-semibold)}
.mono{font-family:var(--mono)}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* font-size / weight utilities */
.u-fs-xs{font-size:var(--fs-xs)} .u-fs-sm{font-size:var(--fs-sm)} .u-fs-md{font-size:var(--fs-md)}
.u-fs-lg{font-size:var(--fs-lg)} .u-fs-xl{font-size:var(--fs-xl)} .u-fs-2xl{font-size:var(--fs-2xl)}
.u-fw-regular{font-weight:var(--fw-regular)} .u-fw-medium{font-weight:var(--fw-medium)}
.u-fw-semibold{font-weight:var(--fw-semibold)} .u-fw-bold{font-weight:var(--fw-bold)}

/* ---------- Color utilities ---------- */
.u-text-0{color:var(--txt-0)} .u-text-1{color:var(--txt-1)} .u-text-2{color:var(--txt-2)} .u-text-3{color:var(--txt-3)}
.u-text-primary{color:var(--c-primary)} .u-text-success{color:var(--c-success)}
.u-text-warning{color:var(--c-warning)} .u-text-danger{color:var(--c-danger)} .u-text-info{color:var(--c-info)}
.u-bg-0{background:var(--bg-0)} .u-bg-1{background:var(--bg-1)} .u-bg-2{background:var(--bg-2)}
.u-bg-3{background:var(--bg-3)} .u-bg-4{background:var(--bg-4)} .u-bg-surface{background:var(--surface)}

/* ---------- Spacing utilities (scale 0,1,2,3,4,5,6,8) ---------- */
.u-m-0{margin:var(--sp-0)} .u-m-1{margin:var(--sp-1)} .u-m-2{margin:var(--sp-2)} .u-m-3{margin:var(--sp-3)} .u-m-4{margin:var(--sp-4)} .u-m-5{margin:var(--sp-5)} .u-m-6{margin:var(--sp-6)} .u-m-8{margin:var(--sp-8)}
.u-mt-1{margin-top:var(--sp-1)} .u-mt-2{margin-top:var(--sp-2)} .u-mt-3{margin-top:var(--sp-3)} .u-mt-4{margin-top:var(--sp-4)} .u-mt-6{margin-top:var(--sp-6)}
.u-mb-1{margin-bottom:var(--sp-1)} .u-mb-2{margin-bottom:var(--sp-2)} .u-mb-3{margin-bottom:var(--sp-3)} .u-mb-4{margin-bottom:var(--sp-4)} .u-mb-6{margin-bottom:var(--sp-6)}
.u-p-0{padding:var(--sp-0)} .u-p-1{padding:var(--sp-1)} .u-p-2{padding:var(--sp-2)} .u-p-3{padding:var(--sp-3)} .u-p-4{padding:var(--sp-4)} .u-p-5{padding:var(--sp-5)} .u-p-6{padding:var(--sp-6)}
.u-gap-1{gap:var(--sp-1)} .u-gap-2{gap:var(--sp-2)} .u-gap-3{gap:var(--sp-3)} .u-gap-4{gap:var(--sp-4)} .u-gap-6{gap:var(--sp-6)}
/* layout helpers */
.u-flex{display:flex} .u-inline-flex{display:inline-flex} .u-grid{display:grid} .u-hidden{display:none}
.u-items-center{align-items:center} .u-items-start{align-items:flex-start} .u-justify-between{justify-content:space-between} .u-justify-center{justify-content:center}
.u-flex-col{flex-direction:column} .u-flex-wrap{flex-wrap:wrap} .u-flex-1{flex:1} .u-spacer{flex:1}
.u-w-full{width:100%}

/* ---------- Shadow utilities ---------- */
.u-shadow-0{box-shadow:var(--sh-0)} .u-shadow-1{box-shadow:var(--sh-1)} .u-shadow-2{box-shadow:var(--sh-2)} .u-shadow-3{box-shadow:var(--sh-3)} .u-shadow-glow{box-shadow:var(--sh-glow)}
/* radius utilities */
.u-round-sm{border-radius:var(--r-sm)} .u-round-md{border-radius:var(--r-md)} .u-round-lg{border-radius:var(--r-lg)} .u-round-pill{border-radius:var(--r-pill)} .u-round-full{border-radius:var(--r-full)}

/* ---------- Focus ring (accessibility, shared) ---------- */
.btn:focus-visible,.input:focus-visible,.slider:focus-visible,.switch:focus-visible,
select:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--focus-ring)}

/* ---------- Card ---------- */
.ds-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-1);overflow:hidden;transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease)}
.ds-card--hover:hover{border-color:var(--border-2);box-shadow:var(--sh-2);transform:translateY(-2px)}
.ds-card--flat{box-shadow:var(--sh-0);background:var(--bg-2)}
.ds-card--accent{border-color:var(--c-primary);box-shadow:var(--sh-glow)}
.ds-card__head{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--border);font-weight:var(--fw-semibold);font-size:var(--fs-md)}
.ds-card__body{padding:var(--sp-4)}
.ds-card__foot{padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--border);display:flex;align-items:center;gap:var(--sp-2)}

/* ---------- Panel (surface region with header / body) ---------- */
.ds-panel{display:flex;flex-direction:column;background:var(--bg-0);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;min-width:0}
.ds-panel__head{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-2) var(--sp-4);background:var(--bg-1);border-bottom:1px solid var(--border);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--txt-2);font-weight:var(--fw-semibold);min-height:34px}
.ds-panel__body{flex:1;position:relative;overflow:auto;min-height:0;padding:var(--sp-3) var(--sp-4)}

/* ---------- Input ---------- */
.input{background:var(--bg-2);border:1px solid var(--border-2);color:var(--txt-0);border-radius:var(--r-sm);padding:6px 9px;font-size:var(--fs-sm);font-family:var(--sans);outline:none;transition:border-color var(--dur),box-shadow var(--dur);width:auto}
.input:hover{border-color:#3d4654}
.input:focus{border-color:var(--border-focus);box-shadow:var(--focus-ring)}
.input::placeholder{color:var(--txt-3)}
.input--sm{padding:4px 7px;font-size:var(--fs-xs)}
.input--lg{padding:9px 12px;font-size:var(--fs-md)}
.input--block{display:block;width:100%}
.input--mono{font-family:var(--mono)}
.input.is-invalid{border-color:var(--c-danger)} .input.is-valid{border-color:var(--c-success)}

/* ---------- Slider (range input) ---------- */
.slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:var(--r-pill);background:var(--bg-4);outline:none;cursor:pointer;margin:8px 0}
.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:var(--r-full);background:var(--c-primary);border:2px solid var(--bg-0);box-shadow:var(--sh-1);transition:transform var(--dur) var(--ease),box-shadow var(--dur)}
.slider::-moz-range-thumb{width:16px;height:16px;border-radius:var(--r-full);background:var(--c-primary);border:2px solid var(--bg-0);box-shadow:var(--sh-1);cursor:pointer}
.slider::-webkit-slider-thumb:hover{transform:scale(1.15);box-shadow:var(--sh-glow)}
.slider:active::-webkit-slider-thumb{transform:scale(.95)}
.slider:focus-visible::-webkit-slider-thumb{box-shadow:var(--focus-ring)}
.slider--sm{height:3px} .slider--sm::-webkit-slider-thumb{width:12px;height:12px}

/* ---------- Badge / Pill ---------- */
.ds-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--r-pill);font-weight:var(--fw-semibold);font-size:var(--fs-xs);background:var(--bg-3);color:var(--txt-2)}
.ds-badge--primary{background:var(--c-primary-soft);color:var(--c-primary)}
.ds-badge--success{background:var(--c-success-soft);color:var(--c-success)}
.ds-badge--warning{background:var(--c-warning-soft);color:var(--c-warning)}
.ds-badge--danger{background:var(--c-danger-soft);color:var(--c-danger)}

/* ---------- Animations (keyframes + utilities) ---------- */
@keyframes ds-fade{from{opacity:0}to{opacity:1}}
@keyframes ds-fade-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes ds-slide-in{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes ds-pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
@keyframes ds-spin{to{transform:rotate(360deg)}}
@keyframes ds-pulse{0%,100%{opacity:1}50%{opacity:.45}}
.anim-fade{animation:ds-fade var(--dur-slow) var(--ease)}
.anim-fade-up{animation:ds-fade-up .25s var(--ease)}
.anim-slide-in{animation:ds-slide-in var(--dur-slow) var(--ease)}
.anim-pop{animation:ds-pop var(--dur-slow) var(--ease-out)}
.anim-spin{animation:ds-spin 1s linear infinite}
.anim-pulse{animation:ds-pulse 1.5s var(--ease) infinite}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{display:grid;grid-template-columns:228px 1fr;grid-template-rows:48px 1fr;height:100vh;grid-template-areas:"side top" "side main"}

/* Top bar */
.topbar{grid-area:top;display:flex;align-items:center;gap:var(--sp-4);padding:0 var(--sp-5);background:var(--bg-1);border-bottom:1px solid var(--border);z-index:var(--z-sticky)}
.topbar .crumb{display:flex;align-items:center;gap:var(--sp-2);font-weight:600;font-size:var(--fs-lg)}
.topbar .crumb i{color:var(--accent)}
.topbar .crumb .sub{color:var(--txt-2);font-weight:400;font-size:var(--fs-sm)}
.topbar .spacer{flex:1}
.topbar .meta{display:flex;align-items:center;gap:var(--sp-3);color:var(--txt-2);font-size:var(--fs-xs)}
.statusdot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);transition:background var(--dur),box-shadow var(--dur)}
.statusdot.err{background:var(--err);box-shadow:0 0 8px var(--err)}
.statusdot.warn{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.statusdot.idle{background:var(--txt-3);box-shadow:none}
.topbar kbd{font-family:var(--mono);font-size:10px;background:var(--bg-3);border:1px solid var(--border-2);border-radius:4px;padding:1px 5px;color:var(--txt-1)}
.hint-kbd{display:flex;align-items:center;gap:5px;color:var(--txt-3)}

/* Sidebar */
.sidebar{grid-area:side;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.brand{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-4) var(--sp-5);border-bottom:1px solid var(--border)}
.brand .logo{width:30px;height:30px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center;color:#fff;font-size:15px;box-shadow:var(--sh-2)}
.brand .name{font-weight:700;font-size:var(--fs-lg);letter-spacing:-.2px}
.brand .name span{color:var(--accent)}
.nav{flex:1;overflow-y:auto;padding:var(--sp-3) var(--sp-3)}
.nav-label{font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.08em;color:var(--txt-3);padding:var(--sp-3) var(--sp-3) var(--sp-2);font-weight:600}
.nav-item{display:flex;align-items:center;gap:var(--sp-3);padding:9px var(--sp-3);border-radius:var(--r-sm);color:var(--txt-1);cursor:pointer;font-size:var(--fs-md);font-weight:500;transition:background var(--dur) var(--ease),color var(--dur) var(--ease);position:relative;user-select:none}
.nav-item .ico{width:26px;height:26px;border-radius:var(--r-xs);display:grid;place-items:center;font-size:13px;background:var(--bg-3);color:var(--txt-1);transition:all var(--dur) var(--ease)}
.nav-item:hover{background:var(--bg-2);color:var(--txt-0)}
.nav-item.active{background:var(--accent-soft);color:#fff}
.nav-item.active .ico{background:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-soft)}
.nav-item.active::before{content:"";position:absolute;left:-3px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}
.nav-item .kbd{margin-left:auto;font-size:10px;color:var(--txt-3);font-family:var(--mono)}
.sidebar-foot{padding:var(--sp-3) var(--sp-5);border-top:1px solid var(--border);font-size:var(--fs-xs);color:var(--txt-3);display:flex;align-items:center;gap:var(--sp-2)}

/* Main */
.main{grid-area:main;overflow:hidden;position:relative}
.tool{display:none;flex-direction:column;height:100%;animation:ds-fade-up .25s var(--ease)}
.tool.active{display:flex}

/* Toolbar inside tool */
.toolbar{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-3) var(--sp-5);border-bottom:1px solid var(--border);background:var(--bg-1);flex-wrap:wrap}
.toolbar .grp{display:flex;align-items:center;gap:var(--sp-1);padding:3px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 var(--sp-1)}
.toolbar .spacer{flex:1}
/* Grouped option cluster (e.g. CSS output toggles) — keeps related switches visually together */
.opt-grp{display:inline-flex;align-items:center;gap:var(--sp-3);padding:4px 10px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm)}
.opt-grp .field{gap:5px;white-space:nowrap}

/* Buttons — base + size/variant/state modifiers (supports both `.btn.primary` and `.btn--primary`) */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;border-radius:var(--r-sm);border:1px solid var(--border-2);background:var(--bg-3);color:var(--txt-0);font-size:var(--fs-sm);font-weight:var(--fw-medium);cursor:pointer;font-family:var(--sans);transition:background var(--dur) var(--ease),border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease),color var(--dur) var(--ease);white-space:nowrap;user-select:none}
.btn i{font-size:12px}
.btn:hover{background:var(--bg-4);border-color:#3d4654;transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.98)}
.btn:disabled,.btn.is-disabled{opacity:.45;pointer-events:none}
/* variants */
.btn.primary,.btn--primary{background:linear-gradient(180deg,var(--accent),var(--accent-2));border-color:var(--accent-2);color:#fff;box-shadow:0 2px 8px var(--accent-soft)}
.btn.primary:hover,.btn--primary:hover{box-shadow:0 4px 14px var(--accent-soft)}
.btn.ghost,.btn--ghost{background:transparent;border-color:transparent;color:var(--txt-1)}
.btn.ghost:hover,.btn--ghost:hover{background:var(--bg-3);color:var(--txt-0)}
.btn.danger,.btn--danger{color:var(--c-danger)}
.btn.danger:hover,.btn--danger:hover{background:var(--c-danger-soft);border-color:var(--c-danger)}
.btn.success,.btn--success{color:var(--c-success)}
.btn.success:hover,.btn--success:hover{background:var(--c-success-soft);border-color:var(--c-success)}
.btn.warn,.btn--warn{color:var(--c-warning)}
.btn.warn:hover,.btn--warn:hover{background:var(--c-warning-soft);border-color:var(--c-warning)}
/* sizes */
.btn.sm,.btn--sm{padding:5px 9px;font-size:var(--fs-xs)}
.btn.lg,.btn--lg{padding:10px 18px;font-size:var(--fs-md)}
.btn.icon,.btn--icon{padding:7px 9px}
.btn--block{display:flex;width:100%}
/* state: active toggle */
.btn.toggle.on,.btn.is-on,.btn--toggle.is-on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

/* Editor grid */
.editor-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);overflow:hidden;min-height:0}
.editor-grid.three{grid-template-columns:1fr 1fr 1fr}
.pane{display:flex;flex-direction:column;background:var(--bg-0);overflow:hidden;min-width:0}
.pane-head{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-2) var(--sp-4);background:var(--bg-1);border-bottom:1px solid var(--border);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--txt-2);font-weight:600;min-height:34px}
.pane-head .dot{width:7px;height:7px;border-radius:2px;background:var(--accent)}
.pane-head .dot.out{background:var(--ok)}
.pane-head .dot.tree{background:var(--purple)}
.pane-head .spacer{flex:1}
.pane-head .mini{font-size:10px;color:var(--txt-3);text-transform:none;letter-spacing:0;font-family:var(--mono)}
.pane-body{flex:1;position:relative;overflow:hidden;min-height:0}

/* Code editor with line numbers — gutter overlaid, single scroll container (textarea) */
.code-wrap{position:absolute;inset:0;overflow:hidden}
.gutter{position:absolute;top:0;left:0;width:46px;height:100%;padding:var(--sp-3) 8px 0 0;text-align:right;color:var(--txt-3);font-family:var(--mono);font-size:12.5px;line-height:1.6;user-select:none;background:var(--bg-1);border-right:1px solid var(--border);overflow:hidden;pointer-events:none;z-index:1}
.gutter .gutter-inner{will-change:transform}
.code-area{position:absolute;inset:0;border:none;outline:none;resize:none;background:transparent;color:var(--txt-0);font-family:var(--mono);font-size:12.5px;line-height:1.6;padding:var(--sp-3) var(--sp-4) var(--sp-4) 54px;white-space:pre;tab-size:2;caret-color:var(--accent);overflow:auto}
.code-area.wrap{white-space:pre-wrap;word-break:break-word}
.code-area::placeholder{color:var(--txt-3)}
.code-wrap.dragover{outline:2px dashed var(--accent);outline-offset:-4px;background:var(--accent-soft)}
.code-output{position:absolute;inset:0;overflow:auto;padding:var(--sp-3) var(--sp-4);font-family:var(--mono);font-size:12.5px;line-height:1.6;white-space:pre;color:var(--txt-0)}
.code-output.wrap{white-space:pre-wrap;word-break:break-word}
.code-output:empty::after{content:attr(data-empty);color:var(--txt-3);white-space:pre-wrap}
.code-output .err-line{display:block;color:var(--err);background:var(--err-soft);padding:0 6px;border-radius:4px;white-space:pre-wrap}
.code-output .err-jump{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 10px;border:1px solid var(--err);border-radius:var(--r-sm);background:var(--err-soft);color:var(--err);cursor:pointer;font-family:var(--sans);font-size:var(--fs-xs);font-weight:600;white-space:normal;transition:background var(--dur)}
.code-output .err-jump:hover{background:rgba(240,97,109,.22)}

/* JWT decoder output */
.jwt-part{margin-bottom:var(--sp-4)}
.jwt-part__h{font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.08em;color:var(--txt-2);font-weight:700;margin-bottom:6px}
.jwt-json{margin:0;font-family:var(--mono);font-size:12.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--sp-3)}
.jwt-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.jwt-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.jwt-claim{font-family:var(--mono);color:var(--cyan);font-weight:600;width:64px}
.jwt-claimname{color:var(--txt-2);width:120px}
.jwt-claimval{font-family:var(--mono);color:var(--txt-0);word-break:break-word}
.jwt-claimrel{display:block;font-family:var(--font,inherit);font-size:var(--fs-xs);color:var(--txt-2);margin-top:2px}
.jwt-claim-time .jwt-claimval{color:var(--cyan)}
.jwt-claim-warn .jwt-claimval{color:var(--warn)}
/* alg / typ chips at top of decoded view */
.jwt-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:var(--sp-4)}
.jwt-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;border:1px solid var(--border);background:var(--bg-1);color:var(--txt-1)}
.jwt-chip i{color:var(--accent)}
.jwt-chip.alg{border-color:var(--accent-soft);color:var(--accent)}
/* prominent expiry status badge */
.jwt-badge{display:inline-flex;align-items:center;gap:7px;font-size:var(--fs-sm);font-weight:600;padding:5px 11px;border-radius:999px;margin-bottom:var(--sp-4)}
.jwt-badge.ok{background:rgba(70,201,139,.13);color:var(--ok);border:1px solid rgba(70,201,139,.3)}
.jwt-badge.warn{background:rgba(230,180,80,.13);color:var(--warn);border:1px solid rgba(230,180,80,.3)}
.jwt-badge.err{background:rgba(240,97,109,.13);color:var(--err);border:1px solid rgba(240,97,109,.3)}
.jwt-badge.muted{background:var(--bg-1);color:var(--txt-2);border:1px solid var(--border)}
/* per-section copy header */
.jwt-part__h{display:flex;align-items:center;gap:8px}
.jwt-part__copy{margin-left:auto;cursor:pointer;color:var(--txt-2);background:none;border:none;padding:2px 5px;border-radius:var(--r-xs);font-size:11px;transition:color var(--dur),background var(--dur)}
.jwt-part__copy:hover{color:var(--accent);background:var(--accent-soft)}

/* Hash — all-algorithms list */
.hash-row{display:flex;gap:var(--sp-3);align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12.5px}
.hash-algo{flex:0 0 84px;color:var(--purple);font-weight:700}
/* Hash — verify-against bar (below the editor grid) */
.hash-verify{display:flex;align-items:center;flex-wrap:wrap;gap:var(--sp-2) var(--sp-3);padding:var(--sp-2) var(--sp-5);background:var(--bg-1);border-top:1px solid var(--border);font-size:var(--fs-sm)}
.hash-verify__lbl{color:var(--txt-2);white-space:nowrap}
.hash-verify input{flex:1;min-width:160px;font-family:var(--mono);font-size:12px}
.hash-verify__badge{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:var(--fs-sm);white-space:nowrap;min-width:0}
.hash-verify__badge.ok{color:var(--ok)}
.hash-verify__badge.err{color:var(--err)}
/* Click-to-copy hint for hash digests */
.copyable{cursor:copy;border-radius:var(--r-xs);transition:background var(--dur)}
.copyable:hover{background:var(--accent-soft)}

/* syntax highlight tokens */
.tk-key{color:var(--cyan)}
.tk-str{color:#9ece6a}
.tk-num{color:#e0af68}
.tk-bool{color:var(--purple)}
.tk-null{color:var(--err)}
.tk-punct{color:var(--txt-2)}
.tk-comment{color:var(--txt-3);font-style:italic}
.tk-tag{color:var(--accent)}
.tk-attr{color:var(--cyan)}
.tk-sect{color:var(--purple);font-weight:600}

/* Status / message bar */
.statusbar{display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-2) var(--sp-5);background:var(--bg-1);border-top:1px solid var(--border);font-size:var(--fs-xs);min-height:32px;flex-wrap:wrap}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-weight:600;font-size:var(--fs-xs)}
.status-pill.ok{background:var(--ok-soft);color:var(--ok)}
.status-pill.err{background:var(--err-soft);color:var(--err)}
.status-pill.warn{background:var(--warn-soft);color:var(--warn)}
.status-pill.idle{background:var(--bg-3);color:var(--txt-2)}
.status-stat{color:var(--txt-2);display:flex;align-items:center;gap:5px}
.status-stat b{color:var(--txt-0);font-family:var(--mono);font-weight:600}
.statusbar .spacer{flex:1}

/* Tree view */
.tree{position:absolute;inset:0;overflow:auto;padding:var(--sp-3) var(--sp-4);font-family:var(--mono);font-size:12.5px;line-height:1.7}
.tree ul{list-style:none;margin:0;padding-left:16px;border-left:1px dashed var(--border-2)}
.tree li{position:relative}
.tree .row{display:flex;align-items:center;gap:6px;cursor:default;border-radius:var(--r-xs);padding:0 4px}
.tree .row:hover{background:var(--bg-2)}
.tree .tw{width:14px;color:var(--txt-2);cursor:pointer;font-size:10px;flex-shrink:0;text-align:center}
.tree .tw.empty{visibility:hidden}
.tree .k{color:var(--cyan)}
.tree .badge{font-size:9px;padding:0 5px;border-radius:8px;background:var(--bg-3);color:var(--txt-3);margin-left:4px}
.tree li.collapsed>ul{display:none}
.tree .row [data-path]{cursor:copy;border-radius:var(--r-xs);padding:0 3px}
.tree .row [data-path]:hover{background:var(--accent-soft)}

/* Inputs / selects — bare element selectors share the .input pattern (single source of truth) */
.field{display:flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:var(--txt-1)}
select,input[type=text],input[type=number]{background:var(--bg-2);border:1px solid var(--border-2);color:var(--txt-0);border-radius:var(--r-sm);padding:6px 9px;font-size:var(--fs-sm);font-family:var(--sans);outline:none;transition:border-color var(--dur),box-shadow var(--dur)}
select:focus,input:focus{border-color:var(--accent);box-shadow:var(--focus-ring)}
input.search{background:var(--bg-2);border:1px solid var(--border-2);min-width:200px;font-family:var(--mono);font-size:12px}
/* Switch — toggle control (.switch.on / .switch.is-on) */
.switch{position:relative;width:34px;height:19px;background:var(--bg-4);border-radius:var(--r-pill);cursor:pointer;transition:background var(--dur);flex-shrink:0}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:var(--r-full);background:#fff;transition:transform var(--dur) var(--ease)}
.switch.on,.switch.is-on{background:var(--accent)}
.switch.on::after,.switch.is-on::after{transform:translateX(15px)}

/* XPath / search results */
.results{position:absolute;inset:0;overflow:auto;padding:var(--sp-3) var(--sp-4);font-family:var(--mono);font-size:12px;line-height:1.6}
.result-item{padding:6px 10px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;background:var(--bg-1)}
.result-item .path{color:var(--accent);font-size:10px;margin-bottom:2px}
.result-item .val{color:var(--txt-0);word-break:break-all;white-space:pre-wrap}

/* diff */
.diff{position:absolute;inset:0;overflow:auto;font-family:var(--mono);font-size:12px;line-height:1.7;padding:var(--sp-2) 0}
.diff-line{display:flex;padding:0 var(--sp-4)}
.diff-line .ln{width:34px;color:var(--txt-3);text-align:right;padding-right:10px;flex-shrink:0;user-select:none}
.diff-line .tx{white-space:pre-wrap;word-break:break-all;flex:1}
.diff-line.add{background:var(--ok-soft)}
.diff-line.add .tx{color:var(--ok)}
.diff-line.add .tx::before{content:"+ "}
.diff-line.del{background:var(--err-soft)}
.diff-line.del .tx{color:var(--err)}
.diff-line.del .tx::before{content:"- "}
.diff-line.same .tx::before{content:"  "}
.diff-line.same .tx{color:var(--txt-2)}

/* toast (uses shared ds-slide-in keyframe) */
.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:var(--z-toast)}
.toast{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg-3);border:1px solid var(--border-2);border-radius:var(--r-md);box-shadow:var(--sh-3);font-size:var(--fs-sm);min-width:200px;animation:ds-slide-in var(--dur-slow) var(--ease);color:var(--txt-0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.err{border-left:3px solid var(--err)}
.toast.info{border-left:3px solid var(--accent)}
.toast i{font-size:14px}
.toast.ok i{color:var(--ok)} .toast.err i{color:var(--err)} .toast.info i{color:var(--accent)}

/* problems list */
.problems{position:absolute;inset:0;overflow:auto;padding:var(--sp-2)}
.problem{display:flex;gap:10px;padding:8px 12px;border-radius:var(--r-sm);font-size:var(--fs-sm);cursor:pointer;transition:background var(--dur)}
.problem:hover{background:var(--bg-2)}
.problem i{margin-top:2px}
.problem.err i{color:var(--err)} .problem.warn i{color:var(--warn)} .problem.ok i{color:var(--ok)}
.problem .msg{flex:1}
.problem .loc{color:var(--txt-3);font-family:var(--mono);font-size:11px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--txt-3);gap:10px;font-size:var(--fs-sm)}
.empty-state i{font-size:30px;opacity:.5}

/* responsive */
@media(max-width:1180px){.editor-grid.three{grid-template-columns:1fr 1fr}.editor-grid.three .pane:nth-child(3){grid-column:1 / -1}.hint-kbd{display:none}}
@media(max-width:1080px){.app{grid-template-columns:64px 1fr}.brand .name,.nav-label,.nav-item .kbd,.nav-item span.lbl{display:none}.nav-item{justify-content:center;padding:9px}.nav-item.active::before{display:none}.sidebar-foot{display:none}.brand{justify-content:center;padding:var(--sp-4) 0}}
@media(max-width:820px){.editor-grid,.editor-grid.three{grid-template-columns:1fr!important;grid-auto-rows:minmax(220px,1fr)}.editor-grid.three .pane:nth-child(3){grid-column:auto}.editor-grid{overflow-y:auto}}
@media(max-width:760px){.toolbar{padding:var(--sp-2) var(--sp-3);gap:var(--sp-1)}.btn .lbl{display:none}.topbar .meta .lbl{display:none}.toolbar .field{font-size:11px}input.search{min-width:130px}.statusbar{gap:var(--sp-3)}.hash-verify{padding:var(--sp-2) var(--sp-3)}.hash-verify__lbl{display:none}.hash-verify input{min-width:120px}}
@media(max-width:520px){.topbar .crumb .sub{display:none}.statusbar .status-stat:nth-child(n+4){display:none}}
</style>
</head>

<div class="app">
  <!-- SIDEBAR -->

      <div class="nav-item" data-tool="yaml" title="YAML Formatter & Validator (Alt+2)"><span class="ico" style="color:#9ece6a"><i class="fa-solid fa-stream"></i></span><span class="lbl">YAML</span><span class="kbd">2</span></div>
      <div class="nav-item" data-tool="xml" title="XML Formatter, Validator & XPath (Alt+3)"><span class="ico" style="color:var(--accent)"><i class="fa-solid fa-file-code"></i></span><span class="lbl">XML</span><span class="kbd">3</span></div>
      <div class="nav-item" data-tool="toml" title="TOML Formatter (Alt+4)"><span class="ico" style="color:var(--warn)"><i class="fa-solid fa-gears"></i></span><span class="lbl">TOML</span><span class="kbd">4</span></div>
      <div class="nav-item" data-tool="ini" title="INI Editor, Validator & Diff (Alt+5)"><span class="ico" style="color:var(--purple)"><i class="fa-solid fa-sliders"></i></span><span class="lbl">INI</span><span class="kbd">5</span></div>
      <div class="nav-label">Encode &amp; Crypto</div>
      <div class="nav-item" data-tool="base64" title="Base64 / URL Encoder & Decoder (Alt+6)"><span class="ico" style="color:#7dcfff"><i class="fa-solid fa-right-left"></i></span><span class="lbl">Base64 / URL</span><span class="kbd">6</span></div>

      <div class="nav-item" data-tool="hash" title="Hash Generator — SHA-1/256/384/512 (Alt+8)"><span class="ico" style="color:#bb9af7"><i class="fa-solid fa-fingerprint"></i></span><span class="lbl">Hash</span><span class="kbd">8</span></div>
      <div class="nav-label">Web &amp; DB</div>
      <div class="nav-item" data-tool="sql" title="SQL Formatter & Minifier (Alt+9)"><span class="ico" style="color:#7dcfff"><i class="fa-solid fa-database"></i></span><span class="lbl">SQL</span><span class="kbd">9</span></div>
      <div class="nav-item" data-tool="css" title="CSS Formatter & Minifier (Alt+0)"><span class="ico" style="color:#9ece6a"><i class="fa-brands fa-css3-alt"></i></span><span class="lbl">CSS</span><span class="kbd">0</span></div>
    </nav>
    <div class="sidebar-foot"><i class="fa-solid fa-shield-halved"></i> 100% local · v1.22</div>
  </aside>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="crumb"><i id="crumb-icon" class="fa-solid fa-code"></i><span id="crumb-title">JSON Formatter & Validator</span><span class="sub" id="crumb-sub">— Format, validate, query & convert</span></div>
    <div class="spacer"></div>
    <div class="meta">
      <button class="btn ghost sm" id="open-file" title="Open a file into the input editor"><i class="fa-solid fa-folder-open"></i><span class="lbl">Open</span></button>
      <button class="btn ghost sm" id="share-link" title="Copy a shareable link with the current content"><i class="fa-solid fa-share-nodes"></i><span class="lbl">Share</span></button>
      <span class="hint-kbd"><kbd>⌘/Ctrl+↵</kbd> run · drag &amp; drop files</span>
      <div class="status-stat" id="global-status"><span class="statusdot" id="global-dot"></span> <span id="global-status-text">Ready</span></div>
    </div>
    <input type="file" id="file-input" accept=".yaml,.yml,.xml,.toml,.ini,.cfg,.conf,.txt,.json,.sql,.css" hidden>
  </header>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<script>
/* TOML parser loads asynchronously as an ES module (see <head>). Code reads
   window.TOML at call time; re-render the TOML tool once load resolves. */
document.addEventListener('toml-ready',()=>{if(Store.getActive()==='toml')App.render();});
document.addEventListener('toml-failed',()=>{if(Store.getActive()==='toml')App.render();});

/* ============================================================
   CENTRALIZED STATE STORE
   ------------------------------------------------------------
   Design principles:
   • Single source of truth: one frozen-ish `state` tree lives here only.
   • Predictable updates: the ONLY way to change state is setActive()/update()/
     patch()/reset(). Each produces a brand-new tool slice (immutable update),
     never a deep in-place mutation — so changes are easy to trace & debug.
   • Reduced side effects: persistence + notifications happen in ONE place
     (commit()). Callers never touch localStorage or the DOM through the store.
   • Reactive flow: subscribers are notified with (newState, change) after every
     commit. The UI layer (App) subscribes to drive rendering; persistence is
     just another subscriber. State knows nothing about the DOM.
   ============================================================ */
const Store = (()=>{
  const KEY='devforge.state.v2';

  // Default shape — the schema/contract of the whole app state.
  const defaults=()=>({
    active:'json',
    json:{input:'',indent:2,sortKeys:false,query:'',view:'output'},  // view: output | tree
    yaml:{input:'',indent:2,sortKeys:false,flowLevel:-1,lineWidth:80,query:'',view:'output'},  // view: output | tree
    xml :{input:'',indent:2,collapse:false,xpath:''},
    toml:{input:'',indent:2,query:'',view:'output'},  // view: output | tree
    ini :{input:'',inputB:'',lowercase:false,sortSections:false,sortKeys:false,mode:'format',view:'output',query:''},  // view: output | tree (format mode only)
    base64:{input:'',mode:'encode',kind:'b64',detect:false},   // mode: encode | decode ; kind: b64 | b64url | url | hex | html ; detect = auto-detect on decode
    jwt :{input:'',tz:'utc'},   // tz: utc | local — display timezone for timestamp claims
    hash:{input:'',algo:'SHA-256',casing:'lower',encoding:'hex',inputMode:'text',hmac:false,hmacKey:'',expected:''},
    // encoding: hex|base64|base64url (hex respects casing) · inputMode: text|hex (raw bytes)
    // hmac + hmacKey: HMAC mode with a secret key · expected: digest to compare/verify against
    sql :{input:'',indent:2,uppercase:true,keywordCase:'upper'},   // SQL formatter — keywordCase: upper | lower | preserve (uppercase kept for back-compat)
    css :{input:'',indent:2,styleMode:'expanded',sortProps:false,lowerHex:true,shortHex:false}  // CSS formatter / minifier
  });
  const TOOLS_LIST=['json','yaml','xml','toml','ini','base64','jwt','hash','sql','css'];
  const clone=o=>JSON.parse(JSON.stringify(o));

  // Build initial state by merging persisted values onto fresh defaults.
  // Each tool slice is rebuilt from defaults so missing/new keys are filled and
  // no default object is ever aliased (fixes shared-reference mutation bugs).
  function hydrate(){
    const base=defaults();
    let saved=null;
    try{saved=JSON.parse(localStorage.getItem(KEY))||JSON.parse(localStorage.getItem('devforge.state.v1'));}catch(e){}
    if(!saved)return base;
    const next=clone(base);
    if(TOOLS_LIST.includes(saved.active))next.active=saved.active;
    TOOLS_LIST.forEach(t=>{ if(saved[t]&&typeof saved[t]==='object') next[t]=Object.assign({},base[t],saved[t]); });
    return next;
  }

  let state=hydrate();
  const subscribers=new Set();

  // The single mutation gateway: swap in a new state object, persist, notify.
  function commit(next,change){
    state=next;
    try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}
    subscribers.forEach(fn=>{try{fn(state,change);}catch(err){console.error('subscriber error',err);}});
  }

  return {
    /* ---- reads (always return immutable copies to prevent DOM-as-state / outside mutation) ---- */
    getState(){return clone(state);},
    getActive(){return state.active;},
    getTool(name){return clone(state[name]);},

    /* ---- writes (each creates a fresh slice; no deep mutation chains) ---- */
    setActive(name){
      if(!TOOLS_LIST.includes(name)||name===state.active)return;
      commit(Object.assign({},state,{active:name}),{type:'active',tool:name});
    },
    // Merge a partial patch into a tool slice: update('yaml',{indent:4})
    update(tool,patch){
      if(!state[tool])return;
      const slice=Object.assign({},state[tool],patch);
      commit(Object.assign({},state,{[tool]:slice}),{type:'tool',tool,patch});
    },
    // Convenience for a single field: patch('yaml','input',value)
    patch(tool,key,value){ this.update(tool,{[key]:value}); },
    // Reset one tool (or all) back to defaults.
    reset(tool){
      const base=defaults();
      if(tool){commit(Object.assign({},state,{[tool]:base[tool]}),{type:'reset',tool});}
      else{commit(Object.assign(base,{active:state.active}),{type:'reset',tool:'*'});}
    },

    /* ---- reactivity ---- */
    subscribe(fn){subscribers.add(fn);return ()=>subscribers.delete(fn);},

    tools:TOOLS_LIST
  };
})();

const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const el=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const debounce=(fn,ms=250)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};

/* ============================================================
   UI — component factories (JS mirror of the CSS design system)
   ------------------------------------------------------------
   Lightweight builders so new features compose UI consistently
   without re-typing markup. Each returns a DOM node.
     UI.button({label,icon,variant,size,onClick})
     UI.card({title,body,foot,hover,variant})
     UI.panel({title,actions,body})
     UI.input({value,placeholder,type,size,oninput,mono})
     UI.slider({min,max,step,value,oninput})
     UI.switch({on,onChange})
     UI.badge({text,variant,icon})
   ============================================================ */
const UI=(()=>{
  const icon=name=>name?el('i','fa-solid '+name):null;
  const append=(parent,child)=>{ if(child==null)return; if(typeof child==='string')parent.insertAdjacentHTML('beforeend',child); else parent.appendChild(child); };
  return {
    button({label='',icon:ic,variant='',size='',block=false,title='',onClick}={}){
      const cls=['btn',variant&&('btn--'+variant),size&&('btn--'+size),block&&'btn--block'].filter(Boolean).join(' ');
      const b=el('button',cls);
      if(title)b.title=title;
      if(ic)b.appendChild(icon(ic));
      if(label)b.appendChild(el('span','lbl',label));
      if(onClick)b.addEventListener('click',onClick);
      return b;
    },
    card({title,body,foot,hover=false,variant=''}={}){
      const cls=['ds-card',hover&&'ds-card--hover',variant&&('ds-card--'+variant)].filter(Boolean).join(' ');
      const c=el('div',cls);
      const section=(part,content)=>{const s=el('div','ds-card__'+part);append(s,content);c.appendChild(s);};
      if(title!=null)section('head',title); // title may be a string or a DOM node
      if(body!=null)section('body',body);
      if(foot!=null)section('foot',foot);
      return c;
    },
    panel({title='',actions,body}={}){
      const p=el('div','ds-panel');
      const head=el('div','ds-panel__head');
      append(head,el('span',null,title));
      head.appendChild(el('span','u-spacer'));
      if(actions)append(head,actions);
      p.appendChild(head);
      const bd=el('div','ds-panel__body');append(bd,body);p.appendChild(bd);
      return p;
    },
    input({value='',placeholder='',type='text',size='',mono=false,block=false,oninput}={}){
      const cls=['input',size&&('input--'+size),mono&&'input--mono',block&&'input--block'].filter(Boolean).join(' ');
      const i=el('input',cls);i.type=type;i.value=value;i.placeholder=placeholder;
      if(oninput)i.addEventListener('input',e=>oninput(e.target.value,e));
      return i;
    },
    slider({min=0,max=100,step=1,value=0,size='',oninput}={}){
      const cls=['slider',size&&('slider--'+size)].filter(Boolean).join(' ');
      const s=el('input',cls);s.type='range';s.min=min;s.max=max;s.step=step;s.value=value;
      if(oninput)s.addEventListener('input',e=>oninput(+e.target.value,e));
      return s;
    },
    switch({on=false,onChange}={}){
      const sw=el('span','switch'+(on?' is-on':''));sw.setAttribute('role','switch');sw.setAttribute('aria-checked',String(on));sw.tabIndex=0;
      const toggle=()=>{const next=!sw.classList.contains('is-on');sw.classList.toggle('is-on',next);sw.setAttribute('aria-checked',String(next));onChange&&onChange(next);};
      sw.addEventListener('click',toggle);
      sw.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle();}});
      return sw;
    },
    badge({text='',variant='',icon:ic}={}){
      const b=el('span','ds-badge'+(variant?' ds-badge--'+variant:''));
      if(ic)b.appendChild(icon(ic));
      b.appendChild(document.createTextNode(text));
      return b;
    }
  };
})();

function toast(msg,type='info'){
  const t=el('div',`toast ${type}`);
  const ic={ok:'fa-circle-check',err:'fa-circle-xmark',info:'fa-circle-info'}[type];
  t.innerHTML=`<i class="fa-solid ${ic}"></i><span>${esc(msg)}</span>`;
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(40px)';t.style.transition='.3s';setTimeout(()=>t.remove(),300);},2600);
}
function copy(text){
  if(!text){toast('Nothing to copy','info');return;}
  const done=()=>toast('Copied to clipboard','ok');
  const fail=()=>{ // fallback for non-secure contexts
    try{const ta=el('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();done();}
    catch(e){toast('Copy failed','err');}
  };
  if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(text).then(done).catch(fail);
  else fail();
}
// Render a parse error into an output <pre>, with an optional clickable "jump to line" button
function renderError(out,message,inputWrap,line,col){
  out.classList.remove('wrap');

  if(line!=null&&line>0){
    html+=`<span class="err-jump" data-goto="${line}"${col!=null?` data-col="${col}"`:''}><i class="fa-solid fa-location-crosshairs"></i> Go to line ${line}${col!=null&&col>0?`, col ${col}`:''}</span>`;
  }
  out.innerHTML=html;
  const jump=out.querySelector('.err-jump');
  if(jump&&inputWrap&&inputWrap._gotoLine){
    jump.addEventListener('click',()=>inputWrap._gotoLine(+jump.dataset.goto, jump.dataset.col!=null?+jump.dataset.col:undefined));
  }
}

function download(text,name){

function stats(text){

/* ============================================================
   SYNTAX HIGHLIGHTERS
   ============================================================ */
function hlJSONlike(str){ // generic for yaml/json output coloring
  return esc(str)
    .replace(/(&quot;[^&]*?&quot;|"[^"]*")(\s*:)/g,'<span class="tk-key">$1</span>$2')
    .replace(/: (&quot;.*?&quot;|".*?"|'.*?')/g,': <span class="tk-str">$1</span>')
    .replace(/\b(true|false)\b/g,'<span class="tk-bool">$1</span>')
    .replace(/\b(null|~)\b/g,'<span class="tk-null">$1</span>')
    .replace(/: (-?\d+\.?\d*)/g,': <span class="tk-num">$1</span>');
}
// Dedicated JSON highlighter: tokenises strings (key vs value), numbers,
// booleans, null and punctuation. Works on already-formatted/minified JSON.
function hlJSON(str){
  return esc(str).replace(
    /("(?:\\.|[^"\\])*")(\s*:)?|\b(true|false)\b|\b(null)\b|(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g,
    (m,s,colon,bool,nul,num)=>{
      if(s!=null)return colon!=null
        ? `<span class="tk-key">${s}</span>${colon}`   // string followed by ":" → key
        : `<span class="tk-str">${s}</span>`;          // otherwise a string value
      if(bool!=null)return `<span class="tk-bool">${bool}</span>`;
      if(nul!=null)return `<span class="tk-null">${nul}</span>`;
      if(num!=null)return `<span class="tk-num">${num}</span>`;
      return m;
    });
}
function hlYAML(str){
  return str.split('\n').map(line=>{
    let m;
    if(/^\s*#/.test(line)) return `<span class="tk-comment">${esc(line)}</span>`;
    // key:
    line=esc(line);
    line=line.replace(/^(\s*-?\s*)([^\s:][^:]*?)(:)(\s|$)/,(_,a,k,c,e)=>`${a}<span class="tk-key">${k}</span><span class="tk-punct">${c}</span>${e}`);
    line=line.replace(/(:\s+)(&quot;.*?&quot;|&#39;.*?&#39;|'.*?'|".*?")/,'$1<span class="tk-str">$2</span>');
    line=line.replace(/(:\s+)(-?\d+\.?\d*)(\s*$)/,'$1<span class="tk-num">$2</span>$3');
    line=line.replace(/(:\s+)(true|false|null|~)(\s*$)/,'$1<span class="tk-bool">$2</span>$3');
    return line;
  }).join('\n');
}
function hlXML(str){
  return esc(str)
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="tk-comment">$1</span>')
    .replace(/(&lt;\/?)([\w:.-]+)/g,'$1<span class="tk-tag">$2</span>')
    .replace(/([\w:.-]+)(=)(&quot;.*?&quot;)/g,'<span class="tk-attr">$1</span>$2<span class="tk-str">$3</span>');
}
function hlTOML(str){
  return str.split('\n').map(line=>{
    if(/^\s*#/.test(line))return `<span class="tk-comment">${esc(line)}</span>`;
    let l=esc(line);
    l=l.replace(/^(\s*\[+[^\]]*\]+)/,'<span class="tk-sect">$1</span>');
    l=l.replace(/^(\s*)([\w".-]+)(\s*=\s*)/,'$1<span class="tk-key">$2</span><span class="tk-punct">$3</span>');
    l=l.replace(/(=\s*)(&quot;.*?&quot;|&#39;.*?&#39;|'.*?'|".*?")/,'$1<span class="tk-str">$2</span>');
    l=l.replace(/(=\s*)(-?\d+\.?\d*)(\s*$)/,'$1<span class="tk-num">$2</span>$3');
    l=l.replace(/(=\s*)(true|false)(\s*$)/,'$1<span class="tk-bool">$2</span>$3');
    return l;
  }).join('\n');
}
function hlINI(str){
  return str.split('\n').map(line=>{
    if(/^\s*[;#]/.test(line))return `<span class="tk-comment">${esc(line)}</span>`;
    let l=esc(line);
    l=l.replace(/^(\s*\[[^\]]*\])/,'<span class="tk-sect">$1</span>');
    l=l.replace(/^(\s*)([^=;#]+?)(=)(.*)$/,'$1<span class="tk-key">$2</span><span class="tk-punct">$3</span><span class="tk-str">$4</span>');
    return l;
  }).join('\n');
}
// SQL keyword set (uppercased for matching); reused by the formatter + highlighter.
const SQL_KEYWORDS=['SELECT','FROM','WHERE','AND','OR','NOT','NULL','IS','IN','LIKE','BETWEEN','EXISTS','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','ALTER','DROP','TABLE','VIEW','INDEX','DATABASE','SCHEMA','JOIN','INNER','LEFT','RIGHT','FULL','OUTER','CROSS','ON','USING','GROUP','BY','ORDER','HAVING','LIMIT','OFFSET','UNION','ALL','DISTINCT','AS','ASC','DESC','CASE','WHEN','THEN','ELSE','END','PRIMARY','FOREIGN','KEY','REFERENCES','DEFAULT','UNIQUE','CHECK','CONSTRAINT','AUTO_INCREMENT','CASCADE','WITH','RETURNING','COUNT','SUM','AVG','MIN','MAX','COALESCE','LEFT','RIGHT','TRUE','FALSE'];
function hlSQL(str){
  // Escape, then colour comments, strings, numbers and keywords (word-boundary, case-insensitive).
  let s=esc(str);
  // line + block comments
  s=s.replace(/(--[^\n]*)/g,'<span class="tk-comment">$1</span>');
  s=s.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="tk-comment">$1</span>');
  // single-quoted strings (SQL uses '' for escaping)
  s=s.replace(/('(?:''|[^'])*')/g,'<span class="tk-str">$1</span>');
  // numbers
  s=s.replace(/\b(\d+\.?\d*)\b/g,'<span class="tk-num">$1</span>');
  // keywords
  const kw=new RegExp('\\b('+SQL_KEYWORDS.join('|')+')\\b','gi');
  s=s.replace(kw,m=>`<span class="tk-bool">${m}</span>`);
  return s;
}
function hlCSS(str){
  let s=esc(str);
  s=s.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="tk-comment">$1</span>'); // comments
  s=s.replace(/(@[\w-]+)/g,'<span class="tk-sect">$1</span>');            // at-rules
  // property: value;  → highlight property name and string/number values
  s=s.replace(/(^|[{;]\s*)([\w-]+)(\s*:\s*)/g,'$1<span class="tk-key">$2</span>$3');
  s=s.replace(/(#[0-9a-fA-F]{3,8})\b/g,'<span class="tk-num">$1</span>'); // hex colors
  s=s.replace(/\b(-?\d+\.?\d*(?:px|em|rem|%|vh|vw|s|ms|deg|fr|pt|ex|ch|vmin|vmax)?)\b/g,'<span class="tk-num">$1</span>');
  return s;
}

/* ============================================================
   REUSABLE EDITOR COMPONENT (textarea + gutter + highlighted output)
   ============================================================ */
function buildCodeInput(value,onInput,placeholder,opts={}){
  const wrap=el('div','code-wrap');
  const gutter=el('div','gutter');
  const gInner=el('div','gutter-inner');
  gutter.appendChild(gInner);
  const ta=el('textarea','code-area');
  ta.spellcheck=false;ta.autocapitalize='off';ta.autocomplete='off';ta.setAttribute('autocorrect','off');
  ta.value=value||'';ta.placeholder=placeholder||'';
  let lastCount=-1;
  function updGutter(){
    const n=Math.max(1,ta.value.split('\n').length);
    if(n!==lastCount){
      let g='';for(let i=1;i<=n;i++)g+=i+'\n';
      gInner.textContent=g;lastCount=n;
    }
  }
  function syncScroll(){gInner.style.transform=`translateY(${-ta.scrollTop}px)`;}
  ta.addEventListener('input',()=>{updGutter();onInput(ta.value);syncScroll();});
  ta.addEventListener('scroll',syncScroll,{passive:true});
  ta.addEventListener('keydown',e=>{
    if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart,en=ta.selectionEnd;ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en);ta.selectionStart=ta.selectionEnd=s+2;updGutter();onInput(ta.value);}
  });
  // Drag & drop file import
  if(opts.dnd!==false){
    wrap.addEventListener('dragover',e=>{e.preventDefault();wrap.classList.add('dragover');});
    wrap.addEventListener('dragleave',()=>wrap.classList.remove('dragover'));
    wrap.addEventListener('drop',e=>{
      e.preventDefault();wrap.classList.remove('dragover');
      const f=e.dataTransfer.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=()=>{ta.value=r.result;updGutter();onInput(ta.value);syncScroll();toast('Loaded '+f.name,'ok');};
      r.readAsText(f);
    });
  }
  // Jump to a 1-based line[,col], focus the textarea and select that line
  wrap._gotoLine=(line,col)=>{
    const lines=ta.value.split('\n');
    const li=Math.min(Math.max(1,line||1),lines.length);
    let start=0;for(let i=0;i<li-1;i++)start+=lines[i].length+1;
    const lineLen=lines[li-1].length;
    const caret=col&&col>0?Math.min(start+col-1,start+lineLen):start;
    ta.focus();
    ta.setSelectionRange(start,start+lineLen); // highlight whole line
    if(col&&col>0)ta.setSelectionRange(caret,caret); // collapse to col if known
    // scroll the target line roughly into the middle of the viewport
    const lh=parseFloat(getComputedStyle(ta).lineHeight)||20;
    ta.scrollTop=Math.max(0,(li-1)*lh - ta.clientHeight/2 + lh);
    syncScroll();
  };
  updGutter();
  wrap.appendChild(gutter);wrap.appendChild(ta);
  wrap._ta=ta;wrap._upd=()=>{updGutter();syncScroll();};
  wrap._setWrap=on=>ta.classList.toggle('wrap',on);
  return wrap;
}

      <span class="status-stat"><i class="fa-solid fa-keyboard"></i> <b data-slot="chars">0</b> chars</span>
      <span class="status-stat"><i class="fa-solid fa-database"></i> <b data-slot="bytes">0</b> B</span>
      <span class="status-stat" data-slot="depth"></span>
      <div class="spacer"></div>
      <span class="status-stat" data-slot="info"></span>
    </div>`;

  const out=$('[data-slot=output]',root), outLabel=$('[data-outlabel]',root);
  const treeEl=$('[data-slot=tree]',root);
  let lastOut='', lastData, lastValid=false;
  const setStatus=makeStatusSetter(root);
  const updStats=text=>updateStats(root,text);
  const indentStr=n=>n>0?n:'\t'; // 0 → tab in JSON.stringify
  const runDebounced=debounce(()=>run(),220);

  const input=buildCodeInput(st.input,v=>{Store.patch('json','input',v);updStats(v);runDebounced();},'{\n  "name": "DevForge",\n  "version": "1.0"\n}');
  $('[data-slot=input]',root).appendChild(input);

  // init controls
  $('[data-set=indent]',root).value=st.indent;
  if(st.sortKeys)$('[data-toggle=sortKeys]',root).classList.add('on');

  // Show either the formatted text or the collapsible tree.
  function syncView(){
    const tree=Store.getTool('json').view==='tree';
    out.style.display=tree?'none':'';
    treeEl.style.display=tree?'':'none';
    $('[data-act=treetoggle]',root).classList.toggle('on',tree);
    $$('[data-slot=treebtns]',root).forEach(b=>b.style.display=tree?'':'none');
    $('[data-act=wrap]',root).style.display=tree?'none':'';
  }

  // ---- helpers ----
  function depthOf(o,d=0){if(o&&typeof o==='object'){let m=d;for(const k in o)m=Math.max(m,depthOf(o[k],d+1));return m;}return d;}
  function countNodes(o){let n=1;if(o&&typeof o==='object')for(const k in o)n+=countNodes(o[k]);return n;}
  // Recursively sort object keys (arrays keep their order) for deterministic output.
  function sortDeep(v){
    if(Array.isArray(v))return v.map(sortDeep);
    if(v&&typeof v==='object')return Object.keys(v).sort().reduce((acc,k)=>{acc[k]=sortDeep(v[k]);return acc;},{});
    return v;
  }
  // Map a character position from a JSON SyntaxError to a 1-based line/col.
  function posToLineCol(src,pos){
    if(pos==null||pos<0)return null;
    const upto=src.slice(0,pos);const lines=upto.split('\n');
    return {line:lines.length,col:lines[lines.length-1].length+1};
  }
  // Pull a character offset out of the various browser SyntaxError messages.
  // Engines word these very differently, so we try several known formats.
  function errorPos(src,err){
    const msg=err.message;
    let m=/(?:at\s+)?position\s+(\d+)/i.exec(msg); // V8/Node: "...at position N"
    if(m)return +m[1];
    m=/line\s+(\d+)\s+column\s+(\d+)/i.exec(msg); // Firefox: "line L column C"
    if(m){const ls=src.split('\n');let p=0;for(let i=0;i<+m[1]-1&&i<ls.length;i++)p+=ls[i].length+1;return p+ +m[2]-1;}
    // Modern V8 (e.g. "Unexpected token '}', ...") omits any offset. As a
    // fallback, locate the named unexpected token in the source.
    m=/Unexpected token ['"]?(.)['"]?/i.exec(msg);
    if(m){const i=src.indexOf(m[1]);if(i>=0)return i;}
    if(/Unexpected end of (?:JSON|data|input)/i.test(msg))return Math.max(0,src.length-1); // truncated input → last char
    return null;
  }
  // Safe path query: dot + [index] / ["key"] notation, no eval. Returns {ok,value}.
  function queryPath(obj,path){
    const tokens=[];const re=/\.?([A-Za-z_$][\w$]*)|\[\s*(\d+)\s*\]|\[\s*"((?:\\.|[^"\\])*)"\s*\]|\[\s*'((?:\\.|[^'\\])*)'\s*\]/g;
    let last=0,m;
    while((m=re.exec(path))!==null){
      if(m.index!==last)return {ok:false,err:`Unexpected token at position ${last+1}`};
      tokens.push(m[1]!=null?m[1]:m[2]!=null?+m[2]:m[3]!=null?m[3]:m[4]);
      last=re.lastIndex;
    }
    if(last!==path.length)return {ok:false,err:`Unexpected token at position ${last+1}`};
    let cur=obj;
    for(const t of tokens){
      if(cur==null||typeof cur!=='object')return {ok:false,err:`Cannot read "${t}" — value is ${cur===null?'null':typeof cur}`};
      if(!(t in cur))return {ok:false,err:`Key "${t}" not found`};
      cur=cur[t];
    }
    return {ok:true,value:cur};
  }

  // Lenient repair: best-effort fix of common "almost-JSON" so it parses.
  // Handles // and /* */ comments, trailing commas, single-quoted strings,
  // unquoted object keys, and Python-ish True/False/None. String-aware so it
  // never edits content inside legitimate strings.
  function repairJSON(src){
    let out='',i=0,inStr=false,quote='';
    while(i<src.length){
      const c=src[i],n=src[i+1];
      if(inStr){
        out+=c;
        if(c==='\\'){out+=src[i+1]||'';i+=2;continue;}
        if(c===quote)inStr=false;
        i++;continue;
      }
      // enter a string (normalise single quotes → double quotes)
      if(c==='"'||c==="'"){
        quote=c;inStr=true;
        if(c==="'"){out+='"';i++;
          // re-scan single-quoted body, escaping any inner double quotes
          while(i<src.length){const ch=src[i];if(ch==='\\'){out+=ch+(src[i+1]||'');i+=2;continue;}if(ch==="'"){out+='"';i++;inStr=false;break;}out+=(ch==='"'?'\\"':ch);i++;}
          continue;
        }
        out+=c;i++;continue;
      }
      // strip // line comments
      if(c==='/'&&n==='/'){while(i<src.length&&src[i]!=='\n')i++;continue;}
      // strip /* block comments */
      if(c==='/'&&n==='*'){i+=2;while(i<src.length&&!(src[i]==='*'&&src[i+1]==='/'))i++;i+=2;continue;}
      out+=c;i++;
    }
    // remove trailing commas before } or ]
    out=out.replace(/,(\s*[}\]])/g,'$1');
    // quote unquoted object keys:  {key: ...  → {"key": ...
    out=out.replace(/([{,]\s*)([A-Za-z_$][\w$]*)(\s*:)/g,'$1"$2"$3');

  function toEscapedString(value){return JSON.stringify(JSON.stringify(value));}
  // Parse a stringified JSON value (the inverse of the above, also accepts a
  // raw quoted string or a doubly-encoded one).
  function unescapeString(src){
    const trimmed=src.trim();

    return typeof firstPass==='string'?JSON.parse(firstPass):firstPass; // if it's a string, decode once more
  }

  // Build a collapsible tree (reuses the .tree styles from the XML tool).
  function buildTree(value){
    const root=el('ul');
    const node=(key,val,parentPath)=>{
      const li=el('li');
      const row=el('div','row');
      const isObj=val&&typeof val==='object';
      const path=key==null?'$':(typeof key==='number'?`${parentPath}[${key}]`:parentPath==='$'?key:`${parentPath}.${key}`);
      const tw=el('span','tw'+(isObj&&Object.keys(val).length?'':' empty'),isObj&&Object.keys(val).length?'▸':'');
      row.appendChild(tw);
      let label='';
      if(key!=null)label+=`<span class="k">${esc(typeof key==='number'?key:key)}</span><span class="tk-punct">: </span>`;
      if(isObj){
        const count=Object.keys(val).length;
        label+=`<span class="tk-punct">${Array.isArray(val)?'[':'{'}</span><span class="badge">${count}</span>`;
      }else{
        const cls=val===null?'tk-null':typeof val==='number'?'tk-num':typeof val==='boolean'?'tk-bool':'tk-str';
        const disp=typeof val==='string'?`"${val}"`:String(val);
        label+=`<span class="${cls}">${esc(disp)}</span>`;
      }
      const lab=el('span',null,label);
      lab.dataset.path=path; // click-to-copy path
      row.appendChild(lab);
      li.appendChild(row);
      if(isObj&&Object.keys(val).length){
        const ul=el('ul');
        const entries=Array.isArray(val)?val.map((v,idx)=>[idx,v]):Object.entries(val);
        entries.forEach(([k,v])=>ul.appendChild(node(k,v,path)));
        li.appendChild(ul);
        li.classList.add('collapsed'); // collapsed by default for big trees
        tw.addEventListener('click',()=>{li.classList.toggle('collapsed');tw.textContent=li.classList.contains('collapsed')?'▸':'▾';});
        tw.textContent='▸';
      }
      return li;
    };
    root.appendChild(node(null,value,'$'));
    return root;
  }

  function run(){
    const cfg=Store.getTool('json');const src=cfg.input;updStats(src);
    const setMeta=(depthHtml,info)=>{$('[data-slot=depth]',root).innerHTML=depthHtml;$('[data-slot=info]',root).innerHTML=info;};
    if(!src.trim()){setStatus('idle','Idle');out.innerHTML='';setMeta('','');return;}
    let data;
    try{data=JSON.parse(src);}
    catch(e){
      lastValid=false;
      const pos=errorPos(src,e);const lc=posToLineCol(src,pos);
      setStatus('err',`Invalid JSON${lc?` at line ${lc.line}, col ${lc.col}`:''}`);
      // tree can't render invalid JSON → show the error in the text pane regardless
      out.style.display='';treeEl.style.display='none';treeEl.innerHTML='';
      renderError(out,e.message,input,lc?lc.line:null,lc?lc.col:null);
      setMeta('','');
      return;
    }
    lastData=data;lastValid=true;
    const value=cfg.sortKeys?sortDeep(data):data;
    const result=JSON.stringify(value,null,indentStr(+cfg.indent));
    lastOut=result;
    out.innerHTML=hlJSON(result);
    $('[data-mini=out]',root).textContent=stats(result).lines+' ln';
    if(cfg.view==='tree'){treeEl.innerHTML='';treeEl.appendChild(buildTree(value));}
    syncView();
    const rootType=Array.isArray(data)?`array[${data.length}]`:data===null?'null':typeof data==='object'?`object{${Object.keys(data).length}}`:typeof data;
    setMeta(`<i class="fa-solid fa-sitemap"></i> depth ${depthOf(data)}`,`<i class="fa-solid fa-cube"></i> ${rootType} · ${countNodes(data)} nodes`);
    setStatus('ok','Valid JSON');
  }

  // Run the path query against the current (valid) JSON and show the result.
  function runQuery(){
    const cfg=Store.getTool('json');const path=(cfg.query||'').trim();
    if(!cfg.input.trim()){toast('Nothing to query','info');return;}
    let data;try{data=JSON.parse(cfg.input);}catch(e){setStatus('err','Invalid JSON — fix it before querying');toast('Invalid JSON','err');return;}
    if(!path){run();return;}
    const r=queryPath(data,path);
    if(!r.ok){setStatus('err',r.err);out.innerHTML=`<span class="tk-null">${esc(r.err)}</span>`;outLabel.textContent='Query';toast('Query failed','err');return;}
    lastOut=JSON.stringify(r.value,null,indentStr(+cfg.indent));
    out.innerHTML=hlJSON(lastOut);
    outLabel.textContent='Query result';
    setStatus('ok',`Query → ${Array.isArray(r.value)?'array':r.value===null?'null':typeof r.value}`);
    toast('Query evaluated','ok');
  }

  root.addEventListener('click',e=>{
    const b=e.target.closest('[data-act]');if(!b)return;
    const act=b.dataset.act,cfg=Store.getTool('json');
    if(act==='format'||act==='validate'){run();if(act==='format'){outLabel.textContent='Formatted';toast('Formatted','ok');}}
    else if(act==='minify'){try{const d=JSON.parse(cfg.input);const mn=JSON.stringify(cfg.sortKeys?sortDeep(d):d);lastOut=mn;Store.patch('json','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlJSON(mn);outLabel.textContent='Minified';const saved=cfg.input.length-mn.length;$('[data-mini=out]',root).textContent=mn.length+' ch';setStatus('ok',saved>0?`Minified · saved ${saved} chars`:'Minified');syncView();toast('Minified','ok');}catch(err){setStatus('err','Invalid JSON');toast('Invalid JSON','err');}}
    else if(act==='repair'){
      const fixed=repairJSON(cfg.input);
      try{JSON.parse(fixed);}catch(err){setStatus('err','Could not auto-repair — '+err.message);toast('Repair failed','err');return;}
      Store.patch('json','input',fixed);input._ta.value=fixed;input._upd();run();
      outLabel.textContent='Formatted';toast('Repaired & reformatted','ok');
    }
    else if(act==='toyaml'){try{const d=JSON.parse(cfg.input);lastOut=jsyaml.dump(cfg.sortKeys?sortDeep(d):d,{indent:+cfg.indent||2,noRefs:true,lineWidth:120}).trim();Store.patch('json','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlYAML(lastOut);outLabel.textContent='YAML';setStatus('ok','Converted to YAML');syncView();toast('Converted to YAML','ok');}catch(err){setStatus('err','Invalid JSON');toast('Invalid JSON','err');}}
    else if(act==='tostring'){try{const d=JSON.parse(cfg.input);lastOut=toEscapedString(d);Store.patch('json','view','output');out.style.display='';treeEl.style.display='none';out.textContent=lastOut;outLabel.textContent='Escaped string';$('[data-mini=out]',root).textContent=lastOut.length+' ch';setStatus('ok','Converted to string');syncView();toast('Converted to escaped string','ok');}catch(err){setStatus('err','Invalid JSON');toast('Invalid JSON','err');}}
    else if(act==='unescape'){try{const v=unescapeString(cfg.input);lastOut=JSON.stringify(v,null,indentStr(+cfg.indent));Store.patch('json','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlJSON(lastOut);outLabel.textContent='Unescaped';$('[data-mini=out]',root).textContent=stats(lastOut).lines+' ln';setStatus('ok','Unescaped');syncView();toast('Unescaped','ok');}catch(err){setStatus('err','Not a valid escaped/stringified JSON');toast('Cannot unescape','err');}}
    else if(act==='treetoggle'){const next=cfg.view==='tree'?'output':'tree';Store.patch('json','view',next);if(next==='tree')run();else syncView();}
    else if(act==='expand'){$$('#main .tree li.collapsed').forEach(li=>{li.classList.remove('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▾';});}
    else if(act==='collapse'){$$('#main .tree li').forEach(li=>{if(li.querySelector(':scope>ul')){li.classList.add('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▸';}});}
    else if(act==='query')runQuery();
    else if(act==='copy')copy(cfg.input);
    else if(act==='copyout')copy(lastOut);
    else if(act==='wrap'){out.classList.toggle('wrap');b.classList.toggle('on');}
    else if(act==='download')download(lastOut||cfg.input,'output.json');
    else if(act==='clear'){Store.patch('json','input','');input._ta.value='';input._upd();run();}
    else if(act==='sample'){Store.patch('json','input',JSON_SAMPLE);input._ta.value=JSON_SAMPLE;input._upd();run();}
  });
  // Output click-to-copy is handled by the global delegated handler (copyable).
  // The tree pane copies a node's JSON path instead.
  treeEl.addEventListener('click',e=>{const lab=e.target.closest('[data-path]');if(lab){copy(lab.dataset.path);toast('Path copied: '+lab.dataset.path,'ok');}});
  root.addEventListener('change',e=>{const s=e.target.closest('[data-set]');if(s){Store.patch('json',s.dataset.set,+s.value);run();}});
  root.addEventListener('click',e=>{const t=e.target.closest('[data-toggle]');if(t){t.classList.toggle('on');Store.patch('json',t.dataset.toggle,t.classList.contains('on'));run();}});
  root.addEventListener('input',e=>{const q=e.target.closest('[data-query]');if(q)Store.patch('json','query',q.value);});
  root.addEventListener('keydown',e=>{const q=e.target.closest('[data-query]');if(q&&e.key==='Enter'){e.preventDefault();runQuery();}});
  syncView();           // reflect persisted view state on the toolbar buttons
  setTimeout(run,30);
  return root;
}

  const setStatus=makeStatusSetter(root);
  const updStats=text=>updateStats(root,text);

  function depthOf(o,d=0){if(o&&typeof o==='object'){let m=d;for(const k in o)m=Math.max(m,depthOf(o[k],d+1));return m;}return d;}

  // Show either the formatted text pane or the collapsible tree pane.

  // Safe path query: dot + [index] / ["key"] notation, no eval. Returns {ok,value}.
  function queryPath(obj,path){
    const tokens=[];const re=/\.?([A-Za-z_$][\w$-]*)|\[\s*(\d+)\s*\]|\[\s*"((?:\\.|[^"\\])*)"\s*\]|\[\s*'((?:\\.|[^'\\])*)'\s*\]/g;

      if(cur==null||typeof cur!=='object')return {ok:false,err:`Cannot read "${t}" — value is ${cur===null?'null':typeof cur}`};
      if(!(t in cur))return {ok:false,err:`Key "${t}" not found`};
      cur=cur[t];
    }
    return {ok:true,value:cur};
  }

  // Build a collapsible tree (reuses the .tree styles shared with the JSON/XML tools).
  function buildTree(value){
    const rootUl=el('ul');
    const node=(key,val,parentPath)=>{
      const li=el('li');
      const row=el('div','row');
      const isObj=val&&typeof val==='object';
      const path=key==null?'$':(typeof key==='number'?`${parentPath}[${key}]`:parentPath==='$'?key:`${parentPath}.${key}`);
      const tw=el('span','tw'+(isObj&&Object.keys(val).length?'':' empty'),isObj&&Object.keys(val).length?'▸':'');
      row.appendChild(tw);
      let label='';
      if(key!=null)label+=`<span class="k">${esc(String(key))}</span><span class="tk-punct">: </span>`;
      if(isObj){
        const count=Object.keys(val).length;
        label+=`<span class="tk-punct">${Array.isArray(val)?'[':'{'}</span><span class="badge">${count}</span>`;
      }else{
        const cls=val===null?'tk-null':typeof val==='number'?'tk-num':typeof val==='boolean'?'tk-bool':'tk-str';
        const disp=typeof val==='string'?`"${val}"`:String(val);
        label+=`<span class="${cls}">${esc(disp)}</span>`;
      }
      const lab=el('span',null,label);
      lab.dataset.path=path; // click-to-copy path
      row.appendChild(lab);
      li.appendChild(row);
      if(isObj&&Object.keys(val).length){
        const ul=el('ul');
        const entries=Array.isArray(val)?val.map((v,idx)=>[idx,v]):Object.entries(val);
        entries.forEach(([k,v])=>ul.appendChild(node(k,v,path)));
        li.appendChild(ul);
        li.classList.add('collapsed'); // collapsed by default for big trees
        tw.addEventListener('click',()=>{li.classList.toggle('collapsed');tw.textContent=li.classList.contains('collapsed')?'▸':'▾';});
        tw.textContent='▸';
      }
      return li;
    };
    rootUl.appendChild(node(null,value,'$'));
    return rootUl;
  }

  function run(){
    const cfg=Store.getTool('yaml');const src=cfg.input;updStats(src);
    if(!src.trim()){setStatus('idle','Idle');out.innerHTML='';treeEl.innerHTML='';$('[data-slot=depth]',root).textContent='';$('[data-slot=docs]',root).textContent='';lastData=undefined;return;}
    try{
      const docs=jsyaml.loadAll(src);
      const valid=docs.filter(d=>d!==undefined);
      $('[data-slot=docs]',root).innerHTML=valid.length>1?`<i class="fa-solid fa-layer-group"></i> ${valid.length} documents`:'';
      const result=dumpAll(docs,dumpOpts(cfg));
      lastOut=result;
      out.innerHTML=hlYAML(result);
      const s=stats(result);$('[data-mini=out]',root).textContent=s.lines+' ln';
      // The tree treats a multi-doc stream as an array of documents.
      const obj=docs.length>1?docs:docs[0];
      lastData=obj;
      if(cfg.view==='tree'){treeEl.innerHTML='';treeEl.appendChild(buildTree(obj));}
      syncView();
      $('[data-slot=depth]',root).innerHTML=`<i class="fa-solid fa-sitemap"></i> depth ${depthOf(obj)}`;
      setStatus('ok','Valid YAML');
    }catch(e){
      const m=e.mark;
      setStatus('err',`Error${m?` at line ${m.line+1}, col ${m.column+1}`:''}`);
      // Tree can't render invalid YAML → show the error in the text pane regardless.
      out.style.display='';treeEl.style.display='none';treeEl.innerHTML='';
      renderError(out,e.message,input,m?m.line+1:null,m?m.column+1:null);
      $('[data-slot=depth]',root).textContent='';lastData=undefined;
    }
  }

  // Run the path query against the current (valid) YAML and show the result.
  function runQuery(){
    const cfg=Store.getTool('yaml');const path=(cfg.query||'').trim();
    if(!cfg.input.trim()){toast('Nothing to query','info');return;}
    let data;try{const docs=jsyaml.loadAll(cfg.input);data=docs.length>1?docs:docs[0];}catch(e){setStatus('err','Invalid YAML — fix it before querying');toast('Invalid YAML','err');return;}
    if(!path){run();return;}
    const r=queryPath(data,path);
    if(!r.ok){setStatus('err',r.err);Store.patch('yaml','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=`<span class="tk-null">${esc(r.err)}</span>`;outLabel.textContent='Query';syncView();toast('Query failed','err');return;}
    lastOut=(r.value&&typeof r.value==='object')?jsyaml.dump(r.value,dumpOpts(cfg)).trim():jsyaml.dump(r.value).trim();
    Store.patch('yaml','view','output');out.style.display='';treeEl.style.display='none';
    out.innerHTML=hlYAML(lastOut);outLabel.textContent='Query result';
    setStatus('ok',`Query → ${Array.isArray(r.value)?'array':r.value===null?'null':typeof r.value}`);syncView();
    toast('Query evaluated','ok');
  }
  root.addEventListener('click',e=>{
    const b=e.target.closest('[data-act]');if(!b)return;
    const act=b.dataset.act,cfg=Store.getTool('yaml');

    else if(act==='tojson'){try{const docs=jsyaml.loadAll(cfg.input);const d=docs.length>1?docs:docs[0];lastOut=JSON.stringify(d,null,+cfg.indent);Store.patch('yaml','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlJSONlike(lastOut);outLabel.textContent='JSON';$('[data-mini=out]',root).textContent=stats(lastOut).lines+' ln';setStatus('ok','Converted to JSON');syncView();toast('Converted to JSON','ok');}catch(err){setStatus('err','Invalid YAML');toast('Invalid YAML','err');}}
    else if(act==='toflow'){try{const docs=jsyaml.loadAll(cfg.input);const d=docs.length>1?docs:docs[0];lastOut=jsyaml.dump(d,{flowLevel:0,indent:+cfg.indent,lineWidth:-1,sortKeys:!!cfg.sortKeys,noRefs:true}).trim();Store.patch('yaml','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlYAML(lastOut);outLabel.textContent='Flow style';$('[data-mini=out]',root).textContent=stats(lastOut).lines+' ln';setStatus('ok','Converted to flow style');syncView();toast('Converted to flow style','ok');}catch(err){setStatus('err','Invalid YAML');toast('Invalid YAML','err');}}
    else if(act==='minify'){try{const docs=jsyaml.loadAll(cfg.input);const d=docs.length>1?docs:docs[0];lastOut=jsyaml.dump(d,{flowLevel:0,indent:0,lineWidth:-1,noRefs:true}).trim();Store.patch('yaml','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlYAML(lastOut);outLabel.textContent='Minified (flow)';$('[data-mini=out]',root).textContent=lastOut.length+' ch';setStatus('ok','Minified');syncView();toast('Minified','ok');}catch(err){setStatus('err','Invalid YAML');toast('Invalid YAML','err');}}
    else if(act==='treetoggle'){const next=cfg.view==='tree'?'output':'tree';Store.patch('yaml','view',next);if(next==='tree')run();else syncView();}
    else if(act==='expand'){$$('#main .tree li.collapsed').forEach(li=>{li.classList.remove('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▾';});}
    else if(act==='collapse'){$$('#main .tree li').forEach(li=>{if(li.querySelector(':scope>ul')){li.classList.add('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▸';}});}
    else if(act==='query')runQuery();
    else if(act==='copy')copy(cfg.input);
    else if(act==='copyout')copy(lastOut);
    else if(act==='wrap'){out.classList.toggle('wrap');b.classList.toggle('on');}
    else if(act==='download')download(lastOut||cfg.input,'output.yaml');
    else if(act==='clear'){Store.patch('yaml','input','');input._ta.value='';input._upd();run();}
    else if(act==='sample'){const s=YAML_SAMPLE;Store.patch('yaml','input',s);input._ta.value=s;input._upd();run();}
  });
  // The tree pane copies a node's path on click (output copy is via the global handler).
  treeEl.addEventListener('click',e=>{const lab=e.target.closest('[data-path]');if(lab){copy(lab.dataset.path);toast('Path copied: '+lab.dataset.path,'ok');}});
  root.addEventListener('change',e=>{const s=e.target.closest('[data-set]');if(s){Store.patch('yaml',s.dataset.set,+s.value);run();}});
  root.addEventListener('click',e=>{const t=e.target.closest('[data-toggle]');if(t){t.classList.toggle('on');Store.patch('yaml',t.dataset.toggle,t.classList.contains('on'));run();}});
  root.addEventListener('input',e=>{const q=e.target.closest('[data-query]');if(q)Store.patch('yaml','query',q.value);});
  root.addEventListener('keydown',e=>{const q=e.target.closest('[data-query]');if(q&&e.key==='Enter'){e.preventDefault();runQuery();}});
  syncView();           // reflect persisted view state on the toolbar buttons
  setTimeout(run,30);
  return root;
}

  const out=$('[data-slot=output]',root),treeEl=$('[data-slot=tree]',root),resEl=$('[data-slot=results]',root),outLabel=$('[data-outlabel]',root),rightLabel=$('[data-rightlabel]',root);
  let lastOut='',lastDoc=null,showResults=false;
  const runDebounced=debounce(()=>run(),220);
  const input=buildCodeInput(st.input,v=>{Store.patch('xml','input',v);updStats(v);runDebounced();},'<root>\n  <item id="1">value</item>\n</root>');
