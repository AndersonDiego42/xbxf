<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherLab — Encode / Decode / Cipher Toolbox</title>
<meta name="description" content="A comprehensive client-side toolbox for encoding, decoding, classical ciphers, hashing, text analysis and generators.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg-0:#0a0c0f; --bg-1:#101318; --bg-2:#151a21; --bg-3:#1b212b;
  --border-0:#1f2630; --border-1:#2a3341; --border-focus:#3d4b5f;
  --text-0:#e6ebf2; --text-1:#98a3b3; --text-2:#5f6b7c; --text-3:#414c5c;
  --accent:#2dd4bf; --accent-dim:rgba(45,212,191,.12); --accent-glow:rgba(45,212,191,.35);
  --accent-2:#818cf8; --accent-2-dim:rgba(129,140,248,.12);
  --danger:#f87171; --danger-dim:rgba(248,113,113,.1);
  --warn:#fbbf24; --ok:#4ade80;
  --font-ui:'Inter',system-ui,sans-serif; --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --r-sm:6px; --r-md:9px; --r-lg:13px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px;
  --fs-xs:11px; --fs-sm:12.5px; --fs-md:13.5px; --fs-lg:15px; --fs-xl:18px;
  --shadow-1:0 2px 8px rgba(0,0,0,.35); --shadow-2:0 8px 28px rgba(0,0,0,.5);
  --ease:cubic-bezier(.4,0,.2,1); --t-fast:.13s var(--ease); --t-med:.22s var(--ease);
  --sidebar-w:248px; --header-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{height:100%;background:var(--bg-0);color:var(--text-0);font-family:var(--font-ui);font-size:var(--fs-md);line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent-glow);color:#fff}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-1);border-radius:5px;border:2px solid var(--bg-1)}
::-webkit-scrollbar-thumb:hover{background:var(--border-focus)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
kbd{font-family:var(--font-mono);font-size:10px;background:var(--bg-3);border:1px solid var(--border-1);border-bottom-width:2px;border-radius:4px;padding:1px 5px;color:var(--text-1)}

/* ============ APP SHELL ============ */
#app{display:grid;grid-template-rows:var(--header-h) 1fr;height:100%}
#app-body{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:0}

/* ---- Header ---- */
#topbar{display:flex;align-items:center;gap:var(--sp-4);padding:0 var(--sp-4);background:var(--bg-1);border-bottom:1px solid var(--border-0);z-index:30}
#brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:var(--fs-lg);letter-spacing:-.02em;white-space:nowrap}
#brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-size:13px;color:#06110f;box-shadow:0 0 14px var(--accent-glow)}
#brand .ver{font-size:var(--fs-xs);color:var(--text-2);font-weight:500;background:var(--bg-3);padding:1px 7px;border-radius:20px;border:1px solid var(--border-0)}
#search-wrap{flex:1;max-width:430px;min-width:0;position:relative}
#search-input{width:100%;background:var(--bg-2);border:1px solid var(--border-0);border-radius:var(--r-md);padding:7px 64px 7px 34px;font-size:var(--fs-sm);color:var(--text-0);outline:none;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
#search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
#search-wrap .s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-2);font-size:12px;pointer-events:none}
#search-wrap kbd{position:absolute;right:9px;top:50%;transform:translateY(-50%)}
#topbar-actions{margin-left:auto;display:flex;gap:var(--sp-2);align-items:center}
.icon-btn{width:32px;height:32px;display:grid;place-items:center;border-radius:var(--r-sm);color:var(--text-1);font-size:14px;transition:all var(--t-fast);position:relative}
.icon-btn:hover{background:var(--bg-3);color:var(--text-0)}
.icon-btn.active{color:var(--accent);background:var(--accent-dim)}
.icon-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* ---- Sidebar ---- */
#sidebar{background:var(--bg-1);border-right:1px solid var(--border-0);overflow-y:auto;padding:var(--sp-3) var(--sp-2) 60px;scrollbar-gutter:stable}
.cat-group{margin-bottom:var(--sp-2)}
.cat-head{display:flex;align-items:center;gap:7px;width:100%;padding:6px 10px;font-size:var(--fs-xs);font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text-2);border-radius:var(--r-sm);transition:color var(--t-fast)}
.cat-head:hover{color:var(--text-1)}
.cat-head .chev{margin-left:auto;transition:transform var(--t-med);font-size:9px}
.cat-group.collapsed .chev{transform:rotate(-90deg)}
.cat-group.collapsed .cat-items{display:none}
.cat-head .cnt{font-size:10px;background:var(--bg-3);padding:0 6px;border-radius:8px;color:var(--text-2)}
.tool-item{display:flex;align-items:center;gap:9px;width:100%;padding:6px 10px;border-radius:var(--r-sm);font-size:var(--fs-sm);color:var(--text-1);text-align:left;transition:all var(--t-fast);position:relative}
.tool-item:hover{background:var(--bg-2);color:var(--text-0)}
.tool-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.tool-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2.5px;border-radius:2px;background:var(--accent)}
.tool-item .ti-icon{width:16px;text-align:center;font-size:12px;opacity:.75;flex-shrink:0}
.tool-item .fav-star{margin-left:auto;font-size:10px;color:var(--warn);opacity:0;transition:opacity var(--t-fast)}
.tool-item.faved .fav-star{opacity:1}
.no-results{padding:20px 12px;text-align:center;color:var(--text-2);font-size:var(--fs-sm)}

/* ---- Main ---- */
#main{overflow-y:auto;min-width:0;padding:var(--sp-4) var(--sp-5) 80px;scroll-behavior:smooth}
#tool-head{display:flex;align-items:flex-start;gap:var(--sp-3);margin-bottom:var(--sp-4);animation:fadeUp .25s var(--ease)}
#tool-head .th-icon{width:40px;height:40px;flex-shrink:0;border-radius:var(--r-md);background:var(--bg-2);border:1px solid var(--border-0);display:grid;place-items:center;font-size:17px;color:var(--accent)}
#tool-title{font-size:var(--fs-xl);font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#tool-desc{color:var(--text-1);font-size:var(--fs-sm);max-width:70ch}
#fav-btn{font-size:15px;color:var(--text-3);transition:all var(--t-fast)}
#fav-btn:hover{color:var(--warn);transform:scale(1.15)}
#fav-btn.on{color:var(--warn)}
.badge{font-size:var(--fs-xs);padding:1px 8px;border-radius:20px;border:1px solid var(--border-1);color:var(--text-1);font-weight:500}

/* ---- Cards / panels ---- */
.panel{background:var(--bg-1);border:1px solid var(--border-0);border-radius:var(--r-lg);overflow:hidden;margin-bottom:var(--sp-4);animation:fadeUp .3s var(--ease)}
.panel-bar{display:flex;align-items:center;gap:var(--sp-2);padding:8px 12px;background:var(--bg-2);border-bottom:1px solid var(--border-0);min-height:40px;flex-wrap:wrap}
.panel-bar .pb-label{font-size:var(--fs-xs);font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-2);margin-right:auto;display:flex;align-items:center;gap:7px}
.pb-label .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.pb-label .dot.out{background:var(--accent-2)}
.mini-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r-sm);font-size:var(--fs-xs);font-weight:500;color:var(--text-1);background:var(--bg-3);border:1px solid var(--border-0);transition:all var(--t-fast)}
.mini-btn:hover{color:var(--text-0);border-color:var(--border-1);transform:translateY(-1px)}
.mini-btn:active{transform:translateY(0) scale(.97)}
.mini-btn.accent{color:var(--accent);border-color:transparent;background:var(--accent-dim)}
.mini-btn.accent:hover{box-shadow:0 0 12px var(--accent-glow)}
.mini-btn.flash{background:var(--ok);color:#04140a;border-color:transparent}
textarea.io{display:block;width:100%;min-height:150px;max-height:420px;resize:vertical;background:transparent;border:none;outline:none;padding:12px 14px;font-family:var(--font-mono);font-size:13px;line-height:1.65;color:var(--text-0)}
textarea.io::placeholder{color:var(--text-3)}
#output-area{white-space:pre-wrap;word-break:break-all;min-height:110px;max-height:420px;overflow-y:auto;padding:12px 14px;font-family:var(--font-mono);font-size:13px;line-height:1.65}
#output-area:empty::before{content:'Output appears here…';color:var(--text-3)}
#output-area.err{color:var(--danger)}
#output-area .hl{color:var(--accent)}
.stat-strip{display:flex;gap:var(--sp-4);padding:6px 14px;border-top:1px solid var(--border-0);font-size:var(--fs-xs);color:var(--text-2);font-family:var(--font-mono);flex-wrap:wrap}
.stat-strip b{color:var(--text-1);font-weight:500}

/* ---- Mode switch & options ---- */
#controls-row{display:flex;gap:var(--sp-3);align-items:center;flex-wrap:wrap;margin-bottom:var(--sp-4);animation:fadeUp .28s var(--ease)}
.seg{display:inline-flex;background:var(--bg-2);border:1px solid var(--border-0);border-radius:var(--r-md);padding:3px;gap:3px}
.seg button{padding:5px 16px;border-radius:6px;font-size:var(--fs-sm);font-weight:500;color:var(--text-1);transition:all var(--t-fast)}
.seg button:hover{color:var(--text-0)}
.seg button.on{background:var(--accent);color:#04110e;font-weight:600;box-shadow:0 1px 6px var(--accent-glow)}
.seg button:disabled{opacity:.35;cursor:not-allowed}
/* single-action tools: not a real toggle, so style as a static, non-interactive label */
.seg.single{background:transparent;border-color:var(--border-0);padding:0;gap:0}
.seg.single button{background:var(--bg-2);color:var(--text-1);cursor:default;box-shadow:none;display:flex;align-items:center;gap:6px;pointer-events:none;padding:5px 14px 5px 10px}
.seg.single button::before{content:'▶';font-size:8px;color:var(--accent)}
.seg.single button:hover{color:var(--text-1)}
#opts{display:flex;gap:var(--sp-3);align-items:flex-end;flex-wrap:wrap}
.opt{display:flex;flex-direction:column;gap:4px}
.opt>label{font-size:var(--fs-xs);font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em}
.opt input[type=text],.opt input[type=number],.opt select{background:var(--bg-2);border:1px solid var(--border-0);border-radius:var(--r-sm);padding:5px 9px;font-size:var(--fs-sm);font-family:var(--font-mono);color:var(--text-0);outline:none;min-width:90px;max-width:100%;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.opt input:focus,.opt select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.opt input[type=number]{width:78px}
.opt.chk{flex-direction:row;align-items:center;gap:8px;padding-bottom:5px;cursor:pointer;user-select:none}
.opt.chk .chk-txt{font-size:var(--fs-sm);color:var(--text-1);transition:color var(--t-fast)}
.opt.chk:hover .chk-txt{color:var(--text-0)}
.switch{position:relative;display:inline-block;width:34px;height:19px;flex-shrink:0;cursor:pointer}
.switch input{opacity:0;width:0;height:0;position:absolute}
.switch .tr{position:absolute;inset:0;background:var(--bg-3);border:1px solid var(--border-1);border-radius:20px;transition:all var(--t-med)}
.switch .tr::after{content:'';position:absolute;left:2px;top:2px;width:13px;height:13px;border-radius:50%;background:var(--text-2);transition:all var(--t-med)}
.switch input:checked+.tr{background:var(--accent-dim);border-color:var(--accent)}
.switch input:checked+.tr::after{transform:translateX(15px);background:var(--accent)}
.range-wrap{display:flex;align-items:center;gap:9px}
.range-wrap input[type=range]{width:120px;accent-color:var(--accent);cursor:pointer}
.range-wrap .rv{font-family:var(--font-mono);font-size:var(--fs-sm);color:var(--accent);min-width:26px;text-align:center;background:var(--bg-2);border-radius:5px;padding:2px 4px;border:1px solid var(--border-0)}

/* ---- Analysis / results extras ---- */
#analysis-panel{padding:var(--sp-4)}
.freq-row{display:flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:var(--fs-xs);margin-bottom:3px}
.freq-row .fl{width:16px;color:var(--accent);font-weight:600}
.freq-row{max-width:420px}
.freq-row .fbar{height:9px;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:3px;min-width:2px;flex:0 1 auto;transition:width .4s var(--ease)}
.freq-row .fv{white-space:nowrap}
.freq-row .fv{color:var(--text-2)}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--sp-2)}
.rg-item{background:var(--bg-2);border:1px solid var(--border-0);border-radius:var(--r-md);padding:8px 11px;cursor:pointer;transition:all var(--t-fast)}
.rg-item:hover{border-color:var(--accent);transform:translateY(-1px)}
.rg-item .k{font-size:var(--fs-xs);color:var(--text-2);text-transform:uppercase;letter-spacing:.05em}
.rg-item .v{font-family:var(--font-mono);font-size:var(--fs-sm);word-break:break-all;color:var(--text-0)}

/* ---- History drawer ---- */
#drawer{position:fixed;top:var(--header-h);right:0;bottom:0;width:320px;background:var(--bg-1);border-left:1px solid var(--border-0);transform:translateX(100%);transition:transform var(--t-med);z-index:40;display:flex;flex-direction:column;box-shadow:var(--shadow-2)}
#drawer.open{transform:translateX(0)}
#drawer header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border-0);font-weight:600;font-size:var(--fs-md)}
#history-list{flex:1;overflow-y:auto;padding:var(--sp-2)}
.hist-item{padding:9px 11px;border-radius:var(--r-md);border:1px solid var(--border-0);background:var(--bg-2);margin-bottom:var(--sp-2);cursor:pointer;transition:all var(--t-fast)}
.hist-item:hover{border-color:var(--accent)}
.hist-item .hi-top{display:flex;justify-content:space-between;font-size:var(--fs-xs);color:var(--accent);font-weight:600;margin-bottom:2px}
.hist-item .hi-top time{color:var(--text-2);font-weight:400}
.hist-item .hi-txt{font-family:var(--font-mono);font-size:11px;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-note{color:var(--text-2);font-size:var(--fs-sm);text-align:center;padding:26px 10px}

/* ---- Toast ---- */
#toast-zone{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--bg-3);border:1px solid var(--border-1);color:var(--text-0);padding:8px 16px;border-radius:var(--r-md);font-size:var(--fs-sm);display:flex;gap:9px;align-items:center;box-shadow:var(--shadow-2);animation:toastIn .25s var(--ease)}
.toast.out{animation:toastOut .25s var(--ease) forwards}
.toast i{color:var(--accent)}
.toast.error i{color:var(--danger)}
.toast.warn i{color:var(--warn)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px) scale(.95)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.pulse{animation:pulse .35s var(--ease)}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-glow)}100%{box-shadow:0 0 0 9px transparent}}

/* ---- Responsive ---- */
#menu-btn{display:none}
#scrim{display:none;position:fixed;inset:var(--header-h) 0 0 0;background:rgba(0,0,0,.55);z-index:34;opacity:0;transition:opacity var(--t-med)}
@media(max-width:900px){
  #app-body{grid-template-columns:1fr}
  #sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);z-index:35;transform:translateX(-100%);transition:transform var(--t-med);box-shadow:var(--shadow-2)}
  #sidebar.open{transform:translateX(0)}
  #scrim.show{display:block;opacity:1}
  #menu-btn{display:grid}
  #main{padding:var(--sp-3) var(--sp-3) 90px}
  #search-wrap kbd{display:none}
  #drawer{width:min(320px,92vw)}
}
@media(max-width:560px){
  #brand span.bname{display:none}
  .seg button{padding:5px 11px}
}
@media(max-width:360px){
  #topbar{gap:var(--sp-2);padding:0 var(--sp-2)}
  #brand .ver{display:none}
  #topbar-actions{gap:2px}
}
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <button id="menu-btn" class="icon-btn" aria-label="Toggle navigation">☰</button>
    <div id="brand"><div class="logo">⌘</div><span class="bname">CipherLab</span><span class="ver">v1.0</span></div>
    <div id="search-wrap">
      <span class="s-icon">⌕</span>
      <input id="search-input" type="text" placeholder="Search tools…" autocomplete="off" aria-label="Search tools">
      <kbd>/</kbd>
    </div>
    <div id="topbar-actions">
      <button id="chain-btn" class="icon-btn" title="Send output back to input (chain)" aria-label="Chain output to input">⇄</button>
      <button id="hist-btn" class="icon-btn" title="History" aria-label="Toggle history drawer" aria-expanded="false" aria-controls="drawer">🕘</button>
    </div>
  </header>
  <div id="app-body">
    <nav id="sidebar" aria-label="Tool navigation"></nav>
    <main id="main">
      <section id="tool-head">
        <div class="th-icon" id="th-icon">⚙</div>
        <div>
          <h1 id="tool-title"><span id="tool-title-txt"></span><button id="fav-btn" title="Pin to favorites" aria-label="Toggle favorite" aria-pressed="false">★</button><span class="badge" id="tool-cat-badge"></span></h1>
          <p id="tool-desc"></p>
        </div>
      </section>
      <section id="controls-row">
        <div class="seg" id="mode-seg" role="tablist">
          <button data-mode="encode" class="on">Encode</button>
          <button data-mode="decode">Decode</button>
        </div>
        <div id="opts"></div>
      </section>
      <section class="panel" id="input-panel">
        <div class="panel-bar">
          <span class="pb-label"><span class="dot"></span>Input</span>
          <button class="mini-btn" id="btn-paste" title="Paste from clipboard">📋 Paste</button>
          <button class="mini-btn" id="btn-sample" title="Insert sample text">✦ Sample</button>
          <button class="mini-btn" id="btn-file" title="Load a text file">📂 File</button>
          <input type="file" id="file-input" hidden>
          <button class="mini-btn" id="btn-clear" title="Clear input">✕ Clear</button>
        </div>
        <textarea id="input" class="io" placeholder="Type or paste text here…" spellcheck="false" aria-label="Input text"></textarea>
        <div class="stat-strip" id="in-stats"></div>
      </section>
      <section class="panel" id="output-panel">
        <div class="panel-bar">
          <span class="pb-label"><span class="dot out"></span>Output</span>
          <button class="mini-btn accent" id="btn-regen" title="Generate again" hidden>↻ Regenerate</button>
          <button class="mini-btn accent" id="btn-copy" title="Copy output">⧉ Copy</button>
          <button class="mini-btn" id="btn-swap" title="Move output to input">↑ Use as input</button>
          <button class="mini-btn" id="btn-dl" title="Download output as a file">⬇ Save</button>
        </div>
        <div id="output-area" aria-live="polite"></div>
        <div class="stat-strip" id="out-stats"></div>
      </section>
      <section class="panel" id="extra-panel" hidden>
        <div class="panel-bar"><span class="pb-label" id="extra-label"><span class="dot out"></span>Details</span></div>
        <div id="analysis-panel"></div>
      </section>
    </main>
  </div>
</div>
<aside id="drawer" aria-label="History">
  <header>History <button class="mini-btn" id="hist-clear">Clear</button></header>
  <div id="history-list"></div>
</aside>
<div id="scrim"></div>
<div id="toast-zone"></div>
<script>
'use strict';
/* ================= UTILITIES ================= */
const $=s=>document.querySelector(s), $$=(s,c=document)=>[...c.querySelectorAll(s)];
const enc=new TextEncoder(), dec=new TextDecoder();
const U={
  bytes:s=>enc.encode(s),
  str:b=>dec.decode(b instanceof Uint8Array?b:new Uint8Array(b)),
  hex:(b,sep='')=>[...b].map(x=>x.toString(16).padStart(2,'0')).join(sep),

function shiftAlpha(text,fn){
  let i=0,out='';
  for(const ch of text){
    const c=ch.charCodeAt(0);

    else if(c>=97&&c<=122){out+=String.fromCharCode(97+U.mod(fn(c-97,i),26));i++}

function guessExt(tool,mode,text){
  // explicit per-tool/per-mode override wins
  if(tool.ext){const e=typeof tool.ext==='function'?tool.ext(mode):tool.ext;if(e)return e}
  const s=text.trim();
  if((s[0]==='{'||s[0]==='[')){try{JSON.parse(s);return'json'}catch(e){}}
  if(/^<\?xml|^<[a-zA-Z!][\s\S]*>$/.test(s)&&/<\/[a-zA-Z]+>\s*$/.test(s))return'xml';
  return'txt';
}
function toast(msg,variant=false){
  // variant: false=success, true|'error'=error, 'warn'=caution (non-failure)
  const kind=variant===true?'error':variant==='warn'?'warn':'';
  const icon=kind==='error'?'✕':kind==='warn'?'⚠':'✓';
  const t=document.createElement('div');
  t.className='toast'+(kind?' '+kind:'');
  t.innerHTML=`<i>${icon}</i>${U.esc(msg)}`;
  $('#toast-zone').append(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),260)},2600);
}

const ENGLISH_FREQ={E:12.7,T:9.06,A:8.17,O:7.51,I:6.97,N:6.75,S:6.33,H:6.09,R:5.99,D:4.25,L:4.03,C:2.78,U:2.76,M:2.41,W:2.36,F:2.23,G:2.02,Y:1.97,P:1.93,B:1.49,V:0.98,K:0.77,J:0.15,X:0.15,Q:0.1,Z:0.07};
function letterCounts(t){const c={};for(const ch of t.toUpperCase())if(ch>='A'&&ch<='Z')c[ch]=(c[ch]||0)+1;return c}
function chiSquared(t){
  const c=letterCounts(t),n=Object.values(c).reduce((a,b)=>a+b,0);
  if(!n)return Infinity;let chi=0;
  for(const L of U.A){const e=n*ENGLISH_FREQ[L]/100,o=c[L]||0;chi+=(o-e)**2/e}
  return chi;
}
function indexOfCoincidence(t){
  const c=letterCounts(t),n=Object.values(c).reduce((a,b)=>a+b,0);
  if(n<2)return 0;
  return Object.values(c).reduce((s,f)=>s+f*(f-1),0)/(n*(n-1));
}
function shannonEntropy(bytes){
  const f={};for(const b of bytes)f[b]=(f[b]||0)+1;
  let H=0;for(const k in f){const p=f[k]/bytes.length;H-=p*Math.log2(p)}
  return H;
}

T({id:'punycode',name:'Punycode (IDN)',cat:'encode',icon:'xn',desc:'Internationalised domain names: Unicode ⇆ xn-- ASCII form (RFC 3492).',
  sample:'bücher.example',
  run(t,{mode}){
    // RFC 3492 decoder for one label (without xn-- prefix)
    const punyDecode=input=>{
      const base=36,tmin=1,tmax=26,skew=38,damp=700,initialBias=72,initialN=128;
      const adapt=(delta,numPoints,first)=>{
        delta=first?Math.floor(delta/damp):delta>>1;
        delta+=Math.floor(delta/numPoints);let k=0;
        while(delta>((base-tmin)*tmax)>>1){delta=Math.floor(delta/(base-tmin));k+=base}
        return k+Math.floor((base-tmin+1)*delta/(delta+skew));
      };
      const output=[];let n=initialN,i=0,bias=initialBias;
      const lastDelim=input.lastIndexOf('-');
      if(lastDelim>0)for(const c of input.slice(0,lastDelim)){if(c.charCodeAt(0)>=128)throw Error('Non-ASCII in Punycode basic part');output.push(c.charCodeAt(0))}
      let idx=lastDelim>0?lastDelim+1:0;
      while(idx<input.length){
        const oldi=i;let w=1;
        for(let k=base;;k+=base){
          if(idx>=input.length)throw Error('Invalid Punycode (truncated)');
          const cp=input.charCodeAt(idx++);
          const digit=cp-48<10?cp-22:cp-65<26?cp-65:cp-97<26?cp-97:base;
          if(digit>=base)throw Error('Invalid Punycode digit');
          i+=digit*w;
          const tval=k<=bias?tmin:k>=bias+tmax?tmax:k-bias;
          if(digit<tval)break;
          w*=base-tval;
        }
        bias=adapt(i-oldi,output.length+1,oldi===0);
        n+=Math.floor(i/(output.length+1));i%=output.length+1;
        output.splice(i,0,n);i++;
      }
      return String.fromCodePoint(...output);
    };
    try{
      if(mode==='encode')return new URL('http://'+t.trim()).hostname;
      return t.trim().toLowerCase().split('.').map(label=>
        label.startsWith('xn--')?punyDecode(label.slice(4)):label).join('.');
    }catch(e){throw Error(e.message.includes('Punycode')?e.message:'Invalid domain name')}
  }});

T({id:'uuencode',name:'Uuencode',cat:'encode',icon:'uu',desc:'Classic Unix-to-Unix encoding with per-line length prefix characters.',
  sample:'retro mail attachment',
  run(t,{mode}){
    if(mode==='encode'){
      const b=U.bytes(t);let out='begin 644 file.txt\n';
      for(let i=0;i<b.length;i+=45){
        const chunk=b.subarray(i,i+45);
        let line=String.fromCharCode(32+chunk.length);
        for(let j=0;j<chunk.length;j+=3){
          const a=chunk[j],x=chunk[j+1]||0,c=chunk[j+2]||0;
          const n=(a<<16)|(x<<8)|c;
          for(let s=18;s>=0;s-=6){const v=(n>>s)&63;line+=String.fromCharCode(v?v+32:96)}
        }

      }

    }

    const out=[];
    for(const line of lines){
      const len=(line.charCodeAt(0)-32)&63;const data=line.slice(1);

T({id:'base45',name:'Base45',cat:'encode',icon:'45',desc:'RFC 9285 Base45 — the alphanumeric encoding used inside EU COVID QR codes.',
  sample:'Hello!!',

      for(let i=0;i<b.length;i+=2){
        if(i+1<b.length){const n=b[i]*256+b[i+1];out+=AL[n%45]+AL[(n/45|0)%45]+AL[n/2025|0]}
        else{const n=b[i];out+=AL[n%45]+AL[n/45|0]}
      }
      return out;
    }
    const s=t.trim();const vals=[...s].map(c=>{const v=AL.indexOf(c.toUpperCase());if(v<0)throw Error(`Invalid Base45 char "${c}"`);return v});
    if(vals.length%3===1)throw Error('Invalid Base45 length');
    const out=[];
    for(let i=0;i<vals.length;i+=3){
      if(i+2<vals.length){const n=vals[i]+vals[i+1]*45+vals[i+2]*2025;if(n>65535)throw Error('Base45 triple out of range');out.push(n>>8,n&255)}
      else{const n=vals[i]+vals[i+1]*45;if(n>255)throw Error('Base45 pair out of range');out.push(n)}
    }
    return U.str(new Uint8Array(out));
  }});
T({id:'base62',name:'Base62',cat:'encode',icon:'62',desc:'Base62 (0-9 A-Z a-z) — URL-shortener style encoding of UTF-8 bytes via BigInt.',
  sample:'hello world',
  run(t,{mode}){
    const AL='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
    if(mode==='encode'){
      const b=U.bytes(t);if(!b.length)return'';
      let n=0n;for(const x of b)n=n*256n+BigInt(x);
      let out='';while(n>0n){out=AL[Number(n%62n)]+out;n/=62n}
      // preserve leading zero bytes
      let z=0;while(z<b.length&&b[z]===0)z++;
      return '0'.repeat(z)+(out||(b.length?'':'0'));
    }
    const s=t.trim();if(!s)return'';
    let n=0n;for(const c of s){const v=AL.indexOf(c);if(v<0)throw Error(`Invalid Base62 char "${c}"`);n=n*62n+BigInt(v)}
    const bytes=[];while(n>0n){bytes.unshift(Number(n%256n));n/=256n}
    let z=0;while(z<s.length&&s[z]==='0')z++;
    for(let i=0;i<z;i++)bytes.unshift(0);
    return U.str(new Uint8Array(bytes));
  }});
T({id:'braille',name:'Braille',cat:'encode',icon:'⠃',desc:'Text ⇆ Unicode Braille patterns (Grade 1, letters/digits/basic punctuation).',
  sample:'braille 123',
  run(t,{mode}){
    const L={a:'⠁',b:'⠃',c:'⠉',d:'⠙',e:'⠑',f:'⠋',g:'⠛',h:'⠓',i:'⠊',j:'⠚',k:'⠅',l:'⠇',m:'⠍',n:'⠝',o:'⠕',p:'⠏',q:'⠟',r:'⠗',s:'⠎',t:'⠞',u:'⠥',v:'⠧',w:'⠺',x:'⠭',y:'⠽',z:'⠵',
      ' ':'⠀',',':'⠂',';':'⠆',':':'⠒','.':'⠲','!':'⠖','?':'⠦','\'':'⠄','-':'⠤','(':'⠐⠣',')':'⠐⠜','"':'⠐⠦','/':'⠌'};
    const CAP='⠠',NUM='⠼';
    const digits='1234567890',dletters='abcdefghij';
    if(mode==='encode'){
      let out='',innum=false;
      for(const ch of t){
        const lo=ch.toLowerCase();
        if(digits.includes(ch)){if(!innum){out+=NUM;innum=true}out+=L[dletters[digits.indexOf(ch)]];continue}
        innum=false;
        if(ch>='A'&&ch<='Z'){out+=CAP+L[lo];continue}
        if(L[lo]!==undefined){out+=L[lo];continue}
        out+=ch;
      }
      return out;
    }
    const R={};for(const[k,v]of Object.entries(L))if(v.length===1)R[v]=k;
    let out='',cap=false,num=false;
    for(const ch of t){
      if(ch===CAP){cap=true;continue}
      if(ch===NUM){num=true;continue}
      const r=R[ch];
      if(r===undefined){out+=ch;num=false;cap=false;continue}
      if(num&&dletters.includes(r)){out+=digits[dletters.indexOf(r)];continue}
      if(r===' '){num=false;out+=' ';continue}
      num=false;
      out+=cap?r.toUpperCase():r;cap=false;
    }
    return out;
  }});

T({id:'scytale',name:'Scytale',cat:'cipher',icon:'🌀',desc:'Ancient Spartan rod cipher — a columnar transposition with N “turns”.',
  opts:[{k:'d',t:'range',l:'Diameter',d:4,min:2,max:12}],

T({id:'hill',name:'Hill cipher (2×2)',cat:'cipher',icon:'[ ]',desc:'Matrix cipher: letter pairs multiplied by a 2×2 key matrix mod 26. Determinant must be coprime with 26.',
  opts:[{k:'m',t:'txt',l:'Matrix a b c d',d:'3 3 2 5',w:110}],
  sample:'HELP',
  run(t,{mode,o}){
    const m=(o.m||'').trim().split(/[\s,]+/).map(Number);
    if(m.length!==4||m.some(isNaN))throw Error('Matrix needs 4 numbers: a b c d');
    let[a,b,c,d]=m.map(x=>U.mod(x,26));
    const det=U.mod(a*d-b*c,26);
    if(U.gcd(det,26)!==1)throw Error(`det=${det} is not coprime with 26 — matrix not invertible`);
    if(mode==='decode'){
      let inv=0;for(let i=1;i<26;i++)if(det*i%26===1){inv=i;break}
      [a,b,c,d]=[d*inv,U.mod(-b,26)*inv,U.mod(-c,26)*inv,a*inv].map(x=>U.mod(x,26));
    }
    let s=U.clean(t);
    if(!s)return'';
    if(s.length%2)s+='X';
    let out='';
    for(let i=0;i<s.length;i+=2){
      const x=s.charCodeAt(i)-65,y=s.charCodeAt(i+1)-65;
      out+=String.fromCharCode(65+U.mod(a*x+b*y,26))+String.fromCharCode(65+U.mod(c*x+d*y,26));
    }
    return out;
  },
  extra(t,{o}){
    const m=(o.m||'').trim().split(/[\s,]+/).map(Number);
    if(m.length!==4||m.some(isNaN))return null;
    const det=U.mod(U.mod(m[0],26)*U.mod(m[3],26)-U.mod(m[1],26)*U.mod(m[2],26),26);
    return['Key matrix',`<div style="font-family:var(--font-mono);font-size:13px">⎡ ${U.mod(m[0],26)}  ${U.mod(m[1],26)} ⎤<br>⎣ ${U.mod(m[2],26)}  ${U.mod(m[3],26)} ⎦ &nbsp; det = ${det} ${U.gcd(det,26)===1?'✓ invertible':'✗ NOT invertible'}</div>`];
  }});
T({id:'adfgvx',name:'ADFGVX',cat:'cipher',icon:'AX',desc:'WWI German field cipher: 6×6 Polybius substitution (letters+digits) followed by columnar transposition.',
  opts:[{k:'sq',t:'txt',l:'Square key',d:'CIPHER'},{k:'tr',t:'txt',l:'Transposition key',d:'GERMAN'}],
  sample:'ATTACK AT 1200',
  run(t,{mode,o}){
    const LBL='ADFGVX';
    // build 6×6 square from keyword
    const seen=new Set(),sq=[];
    for(const c of (U.clean(o.sq)+'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'))
      if(/[A-Z0-9]/.test(c)&&!seen.has(c)){seen.add(c);sq.push(c)}
    for(const c of '0123456789')if(!seen.has(c)){seen.add(c);sq.push(c)}
    const tkey=U.clean(o.tr);
    if(!tkey)throw Error('Transposition key must contain letters');
    const order=[...tkey].map((c,i)=>[c,i]).sort((x,y)=>x[0]<y[0]?-1:x[0]>y[0]?1:x[1]-y[1]).map(x=>x[1]);
    if(mode==='encode'){
      const clean=t.toUpperCase().replace(/[^A-Z0-9]/g,'');
      let pairs='';
      for(const c of clean){const i=sq.indexOf(c);pairs+=LBL[i/6|0]+LBL[i%6]}
      // columnar transposition
      const cols=tkey.length,rows=Math.ceil(pairs.length/cols);
      let out='';
      for(const c of order){for(let r=0;r<rows;r++){const ch=pairs[r*cols+c];if(ch)out+=ch}}
      return out.replace(/(.{5})/g,'$1 ').trim();
    }
    const s=t.toUpperCase().replace(/[^ADFGVX]/g,'');
    if(s.length%2)throw Error('Ciphertext length must be even');
    const cols=tkey.length,rows=Math.ceil(s.length/cols),longCols=s.length%cols||cols;
    // rebuild grid
    const grid=Array(rows).fill().map(()=>Array(cols).fill(''));
    let pos=0;
    for(const c of order){
      const len=(c<longCols||s.length%cols===0)?rows:rows-1;
      for(let r=0;r<len;r++)grid[r][c]=s[pos++];
    }
    const pairs=grid.flat().join('');
    let out='';
    for(let i=0;i+1<pairs.length;i+=2){
      const r=LBL.indexOf(pairs[i]),cc=LBL.indexOf(pairs[i+1]);
      if(r<0||cc<0)throw Error('Invalid ADFGVX symbols');
      out+=sq[r*6+cc];
    }
    return out;
  },
  extra(t,{o}){
    const seen=new Set(),sq=[];
    for(const c of (U.clean(o.sq)+'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'))
      if(/[A-Z0-9]/.test(c)&&!seen.has(c)){seen.add(c);sq.push(c)}
    for(const c of '0123456789')if(!seen.has(c)){seen.add(c);sq.push(c)}
    let html='<div style="font-family:var(--font-mono);font-size:12px;line-height:1.9">&nbsp;&nbsp;&nbsp;'+[...'ADFGVX'].join(' ')+'<br>';
    for(let r=0;r<6;r++)html+='ADFGVX'[r]+' | '+sq.slice(r*6,r*6+6).join(' ')+'<br>';
    return['6×6 square',html+'</div>'];
  }});
T({id:'enigma',name:'Enigma M3',cat:'cipher',icon:'⚙E',desc:'WWII Enigma machine simulator: rotors I–V, reflector B/C, ring settings, plugboard. Self-inverse — same settings encrypt and decrypt.',
  modes:['encode'],modeLabels:['Encrypt / Decrypt'],
  opts:[
    {k:'rotors',t:'txt',l:'Rotors L-M-R',d:'I II III',w:90},
    {k:'ring',t:'txt',l:'Rings (AAA)',d:'AAA',w:60},
    {k:'pos',t:'txt',l:'Positions (AAZ)',d:'AAA',w:60},
    {k:'refl',t:'sel',l:'Reflector',d:'B',vals:[['B','UKW-B'],['C','UKW-C']]},
    {k:'plug',t:'txt',l:'Plugboard (AB CD…)',d:'',w:110}],
  sample:'ENIGMA REVEALED',
  run(t,{o}){
    const ROT={I:['EKMFLGDQVZNTOWYHXUSPAIBRCJ','Q'],II:['AJDKSIRUXBLHWTMCQGZNPYFVOE','E'],III:['BDFHJLCPRTXVZNYEIWGAKMUSQO','V'],IV:['ESOVPZJAYQUIRHXLNFTGKDCMWB','J'],V:['VZBRGITYUPSDNHLXAWMJQOFECK','Z']};
    const REF={B:'YRUHQSLDPXNGOKMIEBFZCWVJAT',C:'FVPZBJAXTNGRKICMSHDQOLWYEU'};
    const names=(o.rotors||'').trim().toUpperCase().split(/[\s,-]+/).filter(Boolean);
    if(names.length!==3||names.some(n=>!ROT[n]))throw Error('Rotors must be 3 of: I II III IV V');
    const ring=U.clean(o.ring),pos=U.clean(o.pos);
    if(ring.length!==3||pos.length!==3)throw Error('Rings and positions need exactly 3 letters each');
    // plugboard
    const plug={};
    for(const pair of (o.plug||'').toUpperCase().split(/[\s,]+/).filter(Boolean)){
      if(!/^[A-Z]{2}$/.test(pair))throw Error(`Bad plug pair "${pair}"`);
      const[a,b]=pair;
      if(a===b||plug[a]||plug[b])throw Error(`Conflicting plug pair "${pair}"`);
      plug[a]=b;plug[b]=a;
    }
    const wir=names.map(n=>ROT[n][0]),notch=names.map(n=>ROT[n][1].charCodeAt(0)-65);
    const rg=[...ring].map(c=>c.charCodeAt(0)-65),ps=[...pos].map(c=>c.charCodeAt(0)-65);
    const fwd=(w,x,off)=>U.mod(w.charCodeAt(U.mod(x+off,26))-65-off,26);
    const bwd=(w,x,off)=>{const y=U.mod(x+off,26);return U.mod(w.indexOf(String.fromCharCode(65+y))-off,26)};
    let out='';
    for(const ch of t.toUpperCase()){
      if(ch<'A'||ch>'Z'){out+=ch;continue}
      // stepping (with double-step)
      if(ps[1]===notch[1]){ps[1]=U.mod(ps[1]+1,26);ps[0]=U.mod(ps[0]+1,26)}
      else if(ps[2]===notch[2])ps[1]=U.mod(ps[1]+1,26);
      ps[2]=U.mod(ps[2]+1,26);
      let x=ch.charCodeAt(0)-65;
      x=plug[String.fromCharCode(65+x)]?plug[String.fromCharCode(65+x)].charCodeAt(0)-65:x;
      for(let i=2;i>=0;i--)x=fwd(wir[i],x,ps[i]-rg[i]);
      x=REF[o.refl].charCodeAt(x)-65;
      for(let i=0;i<3;i++)x=bwd(wir[i],x,ps[i]-rg[i]);
      const px=String.fromCharCode(65+x);
      out+=plug[px]||px;
    }
    return out;
  }});

/* Keccak-f[1600] (BigInt) for SHA-3 */
function keccakHash(bytes,rateBytes,outLen,padByte){
  const RC=[0x1n,0x8082n,0x800000000000808an,0x8000000080008000n,0x808bn,0x80000001n,0x8000000080008081n,0x8000000000008009n,0x8an,0x88n,0x80008009n,0x8000000an,0x8000808bn,0x800000000000008bn,0x8000000000008089n,0x8000000000008003n,0x8000000000008002n,0x8000000000000080n,0x800an,0x800000008000000an,0x8000000080008081n,0x8000000000008080n,0x80000001n,0x8000000080008008n];
  const ROTL=(x,n)=>((x<<BigInt(n))|(x>>BigInt(64-n)))&0xFFFFFFFFFFFFFFFFn;
  const RHO=[1,3,6,10,15,21,28,36,45,55,2,14,27,41,56,8,25,43,62,18,39,61,20,44];
  const PI=[10,7,11,17,18,3,5,16,8,21,24,4,15,23,19,13,12,2,20,14,22,9,6,1];
  const S=Array(25).fill(0n);
  const f=()=>{
    for(let r=0;r<24;r++){
      const C=Array(5),D=Array(5);
      for(let x=0;x<5;x++)C[x]=S[x]^S[x+5]^S[x+10]^S[x+15]^S[x+20];
      for(let x=0;x<5;x++)D[x]=C[(x+4)%5]^ROTL(C[(x+1)%5],1);
      for(let i=0;i<25;i++)S[i]^=D[i%5];
      // rho + pi
      let last=S[1];
      for(let i=0;i<24;i++){const j=PI[i];const tmp=S[j];S[j]=ROTL(last,RHO[i]);last=tmp}
      // chi
      for(let y=0;y<25;y+=5){
        const row=S.slice(y,y+5);
        for(let x=0;x<5;x++)S[y+x]=row[x]^((~row[(x+1)%5]&0xFFFFFFFFFFFFFFFFn)&row[(x+2)%5]);
      }
      S[0]^=RC[r];
    }
  };
  // absorb
  const padded=new Uint8Array(Math.ceil((bytes.length+1)/rateBytes)*rateBytes);
  padded.set(bytes);padded[bytes.length]=padByte;padded[padded.length-1]|=0x80;
  for(let off=0;off<padded.length;off+=rateBytes){
    for(let i=0;i<rateBytes/8;i++){
      let lane=0n;
      for(let b=7;b>=0;b--)lane=(lane<<8n)|BigInt(padded[off+i*8+b]);
      S[i]^=lane;
    }
    f();
  }
  // squeeze
  const out=new Uint8Array(outLen);let got=0;
  while(got<outLen){
    for(let i=0;i<rateBytes/8&&got<outLen;i++){
      let lane=S[i];
      for(let b=0;b<8&&got<outLen;b++){out[got++]=Number(lane&0xFFn);lane>>=8n}
    }
    if(got<outLen)f();
  }
  return out;
}
T({id:'sha3',name:'SHA-3 / Keccak',cat:'hash',icon:'K3',desc:'SHA-3 (FIPS 202) and original Keccak digests — 224/256/384/512 bits, computed in pure JS.',

T({id:'fasthash',name:'Fast hashes (FNV/djb2)',cat:'hash',icon:'ƒh',desc:'Non-cryptographic hashes used in hash tables & fingerprinting: FNV-1a (32/64), djb2, sdbm, Java hashCode, MurmurHash3 (32-bit).',
  modes:['encode'],modeLabels:['Digest'],
  sample:'hello',
  run(t){
    const b=U.bytes(t);
    // FNV-1a 32
    let f32=0x811c9dc5;for(const x of b){f32^=x;f32=Math.imul(f32,0x01000193)>>>0}
    // FNV-1a 64 (BigInt)
    let f64=0xcbf29ce484222325n;for(const x of b){f64^=BigInt(x);f64=(f64*0x100000001b3n)&0xFFFFFFFFFFFFFFFFn}
    // djb2
    let d=5381;for(const x of b)d=(Math.imul(d,33)+x)>>>0;
    // sdbm
    let s=0;for(const x of b)s=(x+(s<<6)+(s<<16)-s)>>>0;
    // Java String.hashCode (UTF-16)
    let j=0;for(let i=0;i<t.length;i++)j=(Math.imul(j,31)+t.charCodeAt(i))|0;
    // MurmurHash3 x86 32-bit, seed 0
    let h=0;const n=b.length&~3;
    for(let i=0;i<n;i+=4){
      let k=b[i]|b[i+1]<<8|b[i+2]<<16|b[i+3]<<24;
      k=Math.imul(k,0xcc9e2d51);k=k<<15|k>>>17;k=Math.imul(k,0x1b873593);
      h^=k;h=h<<13|h>>>19;h=(Math.imul(h,5)+0xe6546b64)|0;
    }
    let k=0;
    for(let i=b.length-1;i>=n;i--)k=(k<<8)|b[i];
    if(b.length&3){k=Math.imul(k,0xcc9e2d51);k=k<<15|k>>>17;k=Math.imul(k,0x1b873593);h^=k}
    h^=b.length;h^=h>>>16;h=Math.imul(h,0x85ebca6b);h^=h>>>13;h=Math.imul(h,0xc2b2ae35);h^=h>>>16;
    const hx=x=>(x>>>0).toString(16).padStart(8,'0');
    return['FNV-1a/32   '+hx(f32),'FNV-1a/64   '+f64.toString(16).padStart(16,'0'),'djb2        '+hx(d),'sdbm        '+hx(s),'Java hash   '+hx(j)+' ('+j+')','Murmur3/32  '+hx(h)].join('\n');
  }});

T({id:'case',name:'Case converter',cat:'text',icon:'Aa',desc:'UPPER, lower, Title, Sentence, camelCase, PascalCase, snake_case, kebab-case, CONSTANT_CASE and aLtErNaTiNg.',

T({id:'lines',name:'Line tools',cat:'text',icon:'≡',desc:'Sort, deduplicate, shuffle, number or reverse lines; natural & case-insensitive sorting.',
  modes:['encode'],modeLabels:['Apply'],
  opts:[{k:'op',t:'sel',l:'Operation',d:'sort',vals:[['sort','Sort A→Z'],['sortd','Sort Z→A'],['natural','Natural sort'],['dedupe','Deduplicate'],['shuffle','Shuffle'],['number','Number lines'],['lenasc','By length ↑'],['lendesc','By length ↓']]},{k:'ci',t:'chk',l:'Ignore case',d:false}],
  sample:'banana\nApple\ncherry\napple\nitem10\nitem2',
  run(t,{o}){
    let L=t.split('\n');
    const key=s=>o.ci?s.toLowerCase():s;
    switch(o.op){
      case'sort':L.sort((a,b)=>key(a)<key(b)?-1:key(a)>key(b)?1:0);break;
      case'sortd':L.sort((a,b)=>key(a)<key(b)?1:key(a)>key(b)?-1:0);break;
      case'natural':L.sort((a,b)=>key(a).localeCompare(key(b),undefined,{numeric:true}));break;
      case'dedupe':{const seen=new Set();L=L.filter(l=>{const k=key(l);if(seen.has(k))return false;seen.add(k);return true})}break;
      case'shuffle':for(let i=L.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[L[i],L[j]]=[L[j],L[i]]}break;
      case'number':L=L.map((l,i)=>`${String(i+1).padStart(String(L.length).length)}  ${l}`);break;
      case'lenasc':L.sort((a,b)=>a.length-b.length);break;
      case'lendesc':L.sort((a,b)=>b.length-a.length);break;
    }
    return L.join('\n');
  }});

T({id:'numbase',name:'Number base converter',cat:'text',icon:'≠',desc:'Convert numbers between bases 2–36 (BigInt — arbitrary precision).',
  modes:['encode'],modeLabels:['Convert'],
  opts:[{k:'from',t:'num',l:'From base',d:10},{k:'to',t:'num',l:'To base',d:16}],
  sample:'255 1024 3735928559',
  run(t,{o}){
    const from=+o.from,to=+o.to;
    if(from<2||from>36||to<2||to>36)throw Error('Bases must be between 2 and 36');
    return t.trim().split(/\s+/).map(tok=>{
      const neg=tok.startsWith('-');const s=tok.replace(/^-/,'').toLowerCase();
      let n=0n;
      for(const c of s){
        const v=parseInt(c,36);
        if(isNaN(v)||v>=from)throw Error(`"${tok}" is not valid in base ${from}`);
        n=n*BigInt(from)+BigInt(v);
      }
      const D='0123456789abcdefghijklmnopqrstuvwxyz';
      let out=n===0n?'0':'';
      while(n>0n){out=D[Number(n%BigInt(to))]+out;n/=BigInt(to)}
      return(neg?'-':'')+out;
    }).join(' ');
  }});

/* shared diff engine: LCS over lines with normalisation, plus word-level inline diff */
const Diff={
  split(t){
    const ix=t.split('\n').findIndex(l=>l.trim()==='---');
    if(ix<0)throw Error('Separate the two texts with a line containing only ---');
    const lines=t.split('\n');
    return[lines.slice(0,ix),lines.slice(ix+1)];
  },
  norm(o){return s=>{let x=s;if(o.iw)x=x.replace(/\s+/g,' ').trim();if(o.ci)x=x.toLowerCase();return x}},
  // generic LCS diff over arrays of comparable keys → ops [' ',i,j] | ['-',i] | ['+',j]
  ops(A,B,key=x=>x){
    const m=A.length,n=B.length;
    if(m*n>4e6)throw Error('Texts too long to diff (limit ~2000×2000 lines)');
    const ka=A.map(key),kb=B.map(key);
    const L=Array(m+1).fill().map(()=>new Uint32Array(n+1));
    for(let i=m-1;i>=0;i--)for(let j=n-1;j>=0;j--)
      L[i][j]=ka[i]===kb[j]?L[i+1][j+1]+1:Math.max(L[i+1][j],L[i][j+1]);
    const out=[];let i=0,j=0;
    while(i<m&&j<n){
      if(ka[i]===kb[j]){out.push([' ',i,j]);i++;j++}
      else if(L[i+1][j]>=L[i][j+1])out.push(['-',i++]);
      else out.push(['+',,j++]);
    }
    while(i<m)out.push(['-',i++]);
    while(j<n)out.push(['+',,j++]);
    return out;
  },
  // word-level inline diff of two lines → [oldHTML,newHTML] with <del>/<ins> marks
  inline(a,b,norm){
    const ta=a.split(/(\s+)/).filter(x=>x!==''),tb=b.split(/(\s+)/).filter(x=>x!=='');
    const ops=Diff.ops(ta,tb,norm);
    let oh='',nh='';
    for(const[op,i,j]of ops){
      if(op===' '){oh+=U.esc(ta[i]);nh+=U.esc(tb[j])}
      else if(op==='-')oh+=`<del>${U.esc(ta[i])}</del>`;
      else nh+=`<ins>${U.esc(tb[j])}</ins>`;
    }
    return[oh,nh];
  }
};
T({id:'diff',name:'Line diff',cat:'text',icon:'±',desc:'Compare two texts line-by-line (LCS algorithm) with unified output, context folding and a side-by-side visual diff with word-level highlights. Separate the two versions with a line containing only ---',
  modes:['encode'],modeLabels:['Compare'],
  opts:[
    {k:'ci',t:'chk',l:'Ignore case',d:false},
    {k:'iw',t:'chk',l:'Ignore whitespace',d:false},
    {k:'ctx',t:'sel',l:'Context',d:'all',vals:[['all','Full text'],['3','3 lines'],['1','1 line'],['0','Changes only']]},
    {k:'nums',t:'chk',l:'Line numbers',d:false}],
  sample:'the quick brown fox\njumps over\nthe lazy dog\nsame here\nunchanged line\nanother same one\nthe end\n---\nthe quick red fox\njumps over\nthe lazy cat\nsame here\nunchanged line\nanother same one\nthe finish',
  run(t,{o}){
    const[A,B]=Diff.split(t);
    const ops=Diff.ops(A,B,Diff.norm(o));
    const add=ops.filter(x=>x[0]==='+').length,del=ops.filter(x=>x[0]==='-').length;
    if(!add&&!del)return`@@ texts are identical${(o.ci||o.iw)?' (with current ignore options)':''} @@\n`+A.map(l=>'  '+l).join('\n');
    const w=Math.max(String(A.length).length,String(B.length).length);
    const fmt=(op,i,j)=>{
      const line=op==='+'?B[j]:A[i];
      const num=o.nums?`${op==='+'?' '.repeat(w):String(i+1).padStart(w)}|${op==='-'?' '.repeat(w):String(j+1).padStart(w)} `:'';
      return num+op+' '+line;
    };
    const ctx=o.ctx==='all'?Infinity:+o.ctx;
    const out=[];
    for(let k=0;k<ops.length;k++){
      const[op,i,j]=ops[k];
      if(op!==' '){out.push(fmt(op==='+'?'+':'-',i,j));continue}
      // context folding: find length of this unchanged run
      let e=k;while(e<ops.length&&ops[e][0]===' ')e++;
      const runLen=e-k,head=k===0?0:ctx,tail=e===ops.length?0:ctx;
      if(runLen<=head+tail+1){for(let x=k;x<e;x++)out.push(fmt(' ',ops[x][1],ops[x][2]))}
      else{
        for(let x=k;x<k+head;x++)out.push(fmt(' ',ops[x][1],ops[x][2]));
        out.push(`⋯ ${runLen-head-tail} unchanged line${runLen-head-tail>1?'s':''} ⋯`);
        for(let x=e-tail;x<e;x++)out.push(fmt(' ',ops[x][1],ops[x][2]));
      }
      k=e-1;
    }
    const same=ops.length-add-del,sim=ops.length?((same/Math.max(A.length,B.length))*100).toFixed(1):100;
    return`@@ ${del} removed, ${add} added, ${same} unchanged · ${sim}% similar @@\n`+out.join('\n');
  },
  extra(t,{o}){
    let A,B,ops;
    try{[A,B]=Diff.split(t);ops=Diff.ops(A,B,Diff.norm(o))}catch(e){return null}
    if(ops.length>800)return['Visual diff','<div style="color:var(--text-2);font-size:12.5px">Too many lines for the visual view — see unified output above.</div>'];
    const norm=Diff.norm(o);
    // pair up adjacent -/+ runs for word-level inline highlighting
    const rows=[];
    for(let k=0;k<ops.length;k++){
      const[op,i,j]=ops[k];
      if(op===' '){rows.push(['eq',U.esc(A[i]),U.esc(B[j])]);continue}
      const dels=[],adds=[];
      while(k<ops.length&&ops[k][0]!==' '){ops[k][0]==='-'?dels.push(ops[k][1]):adds.push(ops[k][2]);k++}
      k--;
      const pairs=Math.max(dels.length,adds.length);
      for(let p=0;p<pairs;p++){
        const di=dels[p],aj=adds[p];
        if(di!==undefined&&aj!==undefined){const[oh,nh]=Diff.inline(A[di],B[aj],norm);rows.push(['ch',oh,nh])}
        else if(di!==undefined)rows.push(['del',U.esc(A[di]),'']);
        else rows.push(['add','',U.esc(B[aj])]);
      }
    }
    const cell=(kind,html,side)=>{
      const bg=kind==='eq'?'transparent':kind==='del'||(kind==='ch'&&side===0)?'var(--danger-dim)':kind==='add'||(kind==='ch'&&side===1)?'var(--accent-dim)':'transparent';
      const empty=html===''&&kind!=='eq';
      return`<td style="padding:1px 8px;background:${empty?'var(--bg-2)':bg};border-left:2px solid ${side?'var(--border-0)':'transparent'};white-space:pre-wrap;word-break:break-all;width:50%">${html||''}</td>`;
    };
    const body=rows.map(([kind,l,r])=>`<tr>${cell(kind,l,0)}${cell(kind,r,1)}</tr>`).join('');
    return['Side-by-side diff',
      `<style>#analysis-panel del{background:var(--danger-dim);color:var(--danger);text-decoration:line-through}#analysis-panel ins{background:var(--accent-dim);color:var(--accent);text-decoration:none}</style>`+
      `<table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px;line-height:1.7;table-layout:fixed">`+
      `<tr><th style="text-align:left;padding:2px 8px;color:var(--text-2);font-size:11px;text-transform:uppercase;letter-spacing:.06em">Original</th><th style="text-align:left;padding:2px 8px;color:var(--text-2);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-left:2px solid var(--border-0)">Changed</th></tr>${body}</table>`];
  }});
T({id:'csv-json',name:'CSV ⇆ JSON',cat:'text',icon:'⊞j',desc:'Convert CSV (quoted fields, custom delimiter, header row) to a JSON array of objects and back.',
  modeLabels:['CSV → JSON','JSON → CSV'],ext:mode=>mode==='encode'?'json':'csv',
  opts:[{k:'delim',t:'sel',l:'Delimiter',d:',',vals:[[',','comma'],[';','semicolon'],['\t','tab'],['|','pipe']]},{k:'hdr',t:'chk',l:'First row = header',d:true}],
  sample:'name,age,city\n"Doe, Jane",32,Berlin\nBob,25,"New York"',
  run(t,{mode,o}){
    const D=o.delim;
    if(mode==='encode'){
      // CSV parse (RFC 4180-ish)
      const rows=[];let row=[],field='',inQ=false;
      for(let i=0;i<t.length;i++){
        const c=t[i];
        if(inQ){
          if(c==='"'){if(t[i+1]==='"'){field+='"';i++}else inQ=false}
          else field+=c;
        }else if(c==='"')inQ=true;
        else if(c===D){row.push(field);field=''}
        else if(c==='\n'||c==='\r'){
          if(c==='\r'&&t[i+1]==='\n')i++;
          row.push(field);field='';
          if(row.length>1||row[0]!=='')rows.push(row);
          row=[];
        }else field+=c;
      }
      if(field!==''||row.length){row.push(field);rows.push(row)}
      if(!rows.length)throw Error('No CSV rows found');
      const conv=v=>{if(v==='')return'';if(!isNaN(v)&&v.trim()!=='')return+v;if(v==='true')return true;if(v==='false')return false;return v};
      if(o.hdr){
        const hdr=rows[0];
        return JSON.stringify(rows.slice(1).map(r=>Object.fromEntries(hdr.map((h,i)=>[h,conv(r[i]??'')]))),null,2);
      }
      return JSON.stringify(rows.map(r=>r.map(conv)),null,2);
    }
    // JSON → CSV
    let data;
    try{data=JSON.parse(t)}catch(e){throw Error('Input is not valid JSON')}
    if(!Array.isArray(data))throw Error('JSON must be an array');
    if(!data.length)return'';
    const q=v=>{const s=v==null?'':String(v);return /[",\n\r]/.test(s)||s.includes(D)?'"'+s.replace(/"/g,'""')+'"':s};
    if(typeof data[0]==='object'&&!Array.isArray(data[0])){
      const keys=[...new Set(data.flatMap(r=>Object.keys(r)))];
      const lines=data.map(r=>keys.map(k=>q(r[k])).join(D));
      return(o.hdr?keys.map(q).join(D)+'\n':'')+lines.join('\n');
    }
    return data.map(r=>Array.isArray(r)?r.map(q).join(D):q(r)).join('\n');
  }});

T({id:'freq',name:'Frequency analysis',cat:'analyze',icon:'📶',desc:'Letter frequency histogram, index of coincidence, chi-squared vs English, entropy, n-grams.',
  modes:['encode'],modeLabels:['Analyse'],
  sample:'WKH TXLFN EURZQ IRA MXPSV RYHU WKH ODCB GRJ',
  run(t){
    const counts=letterCounts(t),n=Object.values(counts).reduce((a,b)=>a+b,0)||1;
    const ic=indexOfCoincidence(t),H=shannonEntropy(U.bytes(t));
    const grams=(k)=>{const g={};const s=U.clean(t);for(let i=0;i<=s.length-k;i++){const x=s.substr(i,k);g[x]=(g[x]||0)+1}return Object.entries(g).filter(([,v])=>v>1).sort((a,b)=>b[1]-a[1]).slice(0,8)};
    let out=`Letters: ${n}   IC: ${ic.toFixed(4)} (English ≈ 0.0667, random ≈ 0.0385)\nχ² vs English: ${chiSquared(t).toFixed(1)}   Entropy: ${H.toFixed(3)} bits/byte\n\nTop bigrams:  ${grams(2).map(([g,c])=>`${g}(${c})`).join(' ')||'—'}\nTop trigrams: ${grams(3).map(([g,c])=>`${g}(${c})`).join(' ')||'—'}`;
    return out;
  },
  extra(t){
    const counts=letterCounts(t),n=Object.values(counts).reduce((a,b)=>a+b,0);
    if(!n)return null;
    const max=Math.max(...Object.values(counts));
    const rows=U.A.split('').map(L=>{
      const c=counts[L]||0,pct=(c/n*100).toFixed(1);
      return`<div class="freq-row"><span class="fl">${L}</span><div class="fbar" style="width:${c/max*260}px"></div><span class="fv">${c} · ${pct}%</span></div>`;
    }).join('');
    return['Letter histogram',rows];
  }});
T({id:'caesar-crack',name:'Caesar brute-force',cat:'analyze',icon:'🔨',desc:'Try all 25 shifts and rank them by chi-squared fit against English letter frequencies.',
  modes:['encode'],modeLabels:['Crack'],
  sample:'WKH VHFUHW PHHWLQJ LV DW QRRQ',
  run(t){
    const results=[];
    for(let k=1;k<26;k++){const p=Ciphers.caesar(t,k,true);results.push([k,chiSquared(p),p])}
    results.sort((a,b)=>a[1]-b[1]);
    return results.map(([k,chi,p],i)=>`${i===0?'★':' '} shift ${String(k).padStart(2)}  χ²=${chi.toFixed(0).padStart(5)}  ${p.slice(0,60)}${p.length>60?'…':''}`).join('\n');
  }});
T({id:'vig-keylen',name:'Vigenère key length',cat:'analyze',icon:'📏',desc:'Estimate a Vigenère key length via average index of coincidence per candidate period (Friedman method).',
  modes:['encode'],modeLabels:['Estimate'],
  sample:'LXFOPVEFRNHRWEEWFYFIQVMHWEBQFXLIXENIQVMHWDNVBROOMWSVIWETVBQGWMDLZHNSDIEXHMSGZW',
  run(t){
    const s=U.clean(t);
    if(s.length<20)throw Error('Need ≥ 20 letters for a meaningful estimate');
    const rows=[];
    for(let k=1;k<=Math.min(20,Math.floor(s.length/2));k++){
      let sum=0;
      for(let i=0;i<k;i++){let col='';for(let j=i;j<s.length;j+=k)col+=s[j];sum+=indexOfCoincidence(col)}
      rows.push([k,sum/k]);
    }
    const best=[...rows].sort((a,b)=>b[1]-a[1])[0][0];
    return rows.map(([k,ic])=>`${k===best?'★':' '} len ${String(k).padStart(2)}  IC=${ic.toFixed(4)}  ${'▇'.repeat(Math.round(ic*300))}`).join('\n')+`\n\nBest candidate: ${best} (English-like IC ≈ 0.0667)`;
  }});
T({id:'detect',name:'Format detector',cat:'analyze',icon:'🔎',desc:'Heuristically identify what encoding/cipher an unknown string might be.',
  modes:['encode'],modeLabels:['Detect'],
  sample:'SGVsbG8sIENpcGhlckxhYiE=',
  run(t){
    const s=t.trim(),hits=[];
    const add=(name,conf,note='')=>hits.push([conf,name,note]);
    if(/^[01\s]+$/.test(s)&&s.replace(/\s/g,'').length%8===0)add('Binary',95);
    if(/^[0-9a-fA-F\s:]+$/.test(s)&&s.replace(/[\s:]/g,'').length%2===0&&s.replace(/[\s:]/g,'').length>3)add('Hexadecimal',85);
    if(/^[A-Za-z0-9+/\s]+={0,2}$/.test(s)&&s.replace(/\s/g,'').length%4===0&&/[a-z]/.test(s)&&/[A-Z]/.test(s))add('Base64',80,'try Base64 decode');
    if(/^[A-Z2-7\s]+=*$/.test(s)&&s.replace(/[\s=]/g,'').length%8===0)add('Base32',70);
    if(/^[.\-·−\s/]+$/.test(s))add('Morse code',95);
    if(/^(\d{1,2}[\s\-.,/]*)+$/.test(s)&&s.split(/[^0-9]+/).filter(Boolean).every(n=>+n>=1&&+n<=26))add('A1Z26',65);
    if(/^[15][1-5\s]+$/.test(s.replace(/\s/g,''))&&/^[1-5\s]+$/.test(s))add('Polybius square',55);
    if(/^%[0-9A-Fa-f]{2}/.test(s)||/%[0-9A-Fa-f]{2}/.test(s))add('URL encoding',75);
    if(/&[a-z]+;|&#\d+;/.test(s))add('HTML entities',80);
    if(/^e[yj][A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.?/.test(s))add('JWT',90,'use JWT decoder');
    if(/^<~.*~>$/s.test(s))add('Ascii85 (Adobe)',95);
    if(/\\u[0-9a-fA-F]{4}/.test(s))add('Unicode escapes',85);
    if(/^[A-HJ-NP-Za-km-z1-9]+$/.test(s)&&s.length>15)add('Base58',50);
    if(/^[a-fA-F0-9]{32}$/.test(s))add('MD5 hash',70,'hashes cannot be reversed');
    if(/^[a-fA-F0-9]{40}$/.test(s))add('SHA-1 hash',70);
    if(/^[a-fA-F0-9]{64}$/.test(s))add('SHA-256 hash',70);
    if(/^[AB\s]+$/.test(U.clean(s))&&U.clean(s).length%5===0&&U.clean(s).length>0&&new Set(U.clean(s)).size<=2)add('Baconian',60);
    const letters=U.clean(s);
    if(letters.length>15&&hits.length===0){
      const ic=indexOfCoincidence(s);
      if(ic>0.06)add('Transposition cipher or plaintext',45,`IC=${ic.toFixed(4)} looks language-like`);
      else if(ic>0.045)add('Polyalphabetic cipher (e.g. Vigenère)',50,`IC=${ic.toFixed(4)}`);
      else add('Random / strong cipher',40,`IC=${ic.toFixed(4)}`);
      const chi=chiSquared(s);
      if(chi<150&&ic>0.06)add('Possibly plain English',60,`χ²=${chi.toFixed(0)}`);
      else if(ic>0.06)add('Monoalphabetic substitution (try Caesar brute-force)',55,`χ²=${chi.toFixed(0)}`);
    }
    if(!hits.length)return'No confident match. Try Frequency Analysis for statistics.';
    hits.sort((a,b)=>b[0]-a[0]);
    return hits.map(([c,n,note])=>`${String(c).padStart(3)}%  ${n}${note?'  — '+note:''}`).join('\n');
  }});
T({id:'stats',name:'Text statistics',cat:'analyze',icon:'Σn',desc:'Characters, bytes, words, sentences, lines, reading time, unique words and more.',
  modes:['encode'],modeLabels:['Count'],

    return[`Characters      ${chars}`,`— without space ${[...t.replace(/\s/g,'')].length}`,`UTF-8 bytes     ${bytes}`,`Words           ${words.length}`,`Unique words    ${uniq}`,`Avg word length ${avgW}`,`Sentences       ${sentences}`,`Lines           ${lines}`,`Paragraphs      ${t.split(/\n\s*\n/).filter(p=>p.trim()).length}`,`Reading time    ~${Math.max(1,Math.round(words.length/225))} min`,`Speaking time   ~${Math.max(1,Math.round(words.length/150))} min`].join('\n');

T({id:'vig-solve',name:'Vigenère auto-solver',cat:'analyze',icon:'🔓',desc:'Full automatic Vigenère key recovery: estimates key length via index of coincidence, then cracks each column as a Caesar shift using χ² analysis.',
  modes:['encode'],modeLabels:['Crack'],
  opts:[{k:'maxlen',t:'range',l:'Max key length',d:12,min:2,max:20}],
  sample:'LXFOPVEFRNHRWEEWFYFIQVMHWEBQFXLIXENIQVMHWDNVBROOMWSVIWETVBQGWMDLZHNSDIEXHMSGZW',
  run(t,{o}){
    const s=U.clean(t);
    if(s.length<20)throw Error('Need at least ~20 letters of ciphertext for reliable analysis');
    const EF=ENGLISH_FREQ;
    // crack a column: best Caesar shift by frequency correlation (Σ f·E — robust on short columns)
    const crackCol=col=>{
      const f=new Array(26).fill(0);
      for(const ch of col)f[ch.charCodeAt(0)-65]++;
      let best=0,bestScore=-1;
      for(let k=0;k<26;k++){
        let score=0;
        for(let i=0;i<26;i++)score+=f[U.mod(i+k,26)]*EF[U.A[i]];
        if(score>bestScore){bestScore=score;best=k}
      }
      return best;
    };
    const decrypt=key=>shiftAlpha(s,(x,i)=>x-(key.charCodeAt(i%key.length)-65));
    // bigram log-likelihood fitness (counts per 10 000, Norvig corpus) — far more
    // discriminating than unigram χ² on short texts
    const BG={TH:356,HE:307,IN:243,ER:205,AN:199,RE:185,ON:176,AT:149,EN:145,ND:135,TI:134,ES:134,OR:128,TE:120,OF:117,ED:117,IS:113,IT:112,AL:109,AR:107,ST:105,TO:105,NT:104,NG:95,SE:93,HA:93,AS:87,OU:87,IO:83,LE:83,VE:83,CO:79,ME:79,DE:76,HI:76,RI:73,RO:73,IC:70,NE:69,EA:69,RA:69,CE:65,LI:62,CH:60,LL:58,BE:58,MA:57,SI:55,OM:55,UR:54,CA:54,EL:53,TA:53,LA:53,NS:51,DI:50,FO:50,HO:49,PE:49,EC:48,PR:47,NO:46,CT:46,US:45,AC:45,OT:44,IL:43,TR:43,LY:42,NC:42,ET:41,UT:41,SS:41,SO:40,RS:39,UN:39,LO:38,WA:38,GE:38,IE:37,WH:36,EE:36,WI:36,EM:36,AD:36,OL:35,RT:35,PO:34,WE:34,NA:34,UL:34,NI:33,TS:33,MO:33,OW:33,PA:32,IM:32,MI:32,AI:32,SH:32};
    const fit=txt=>{let sc=0;for(let i=0;i<txt.length-1;i++)sc+=Math.log((BG[txt[i]+txt[i+1]]||0.3)/10000);return sc};
    // crack every candidate length, then hill-climb each key position on bigram fitness
    const maxL=Math.max(2,Math.min(+o.maxlen,Math.floor(s.length/3)));
    const results=[];
    for(let len=1;len<=maxL;len++){
      let key='';
      for(let c=0;c<len;c++){
        let col='';for(let i=c;i<s.length;i+=len)col+=s[i];
        key+=U.A[crackCol(col)];
      }
      let best=fit(decrypt(key)),improved=true;
      while(improved){
        improved=false;
        for(let c=0;c<len;c++){
          for(let k=0;k<26;k++){
            const cand=key.slice(0,c)+U.A[k]+key.slice(c+1);
            const f=fit(decrypt(cand));
            if(f>best){best=f;key=cand;improved=true}
          }
        }
      }
      results.push([len,key,decrypt(key),best/s.length]);
    }
    // higher per-letter fitness wins; shorter keys win ties (repeated key decrypts identically)
    results.sort((a,b)=>b[3]-a[3]||a[0]-b[0]);
    // dedupe identical plaintexts (e.g. LEMON vs LEMONLEMON)
    const seen=new Set(),top=[];
    for(const r of results){if(seen.has(r[2]))continue;seen.add(r[2]);top.push(r);if(top.length===3)break}
    return top.map(([len,key,plain,f],i)=>`${i===0?'★':' '} len=${len}  key=${key}  fitness=${f.toFixed(3)}  χ²=${chiSquared(plain).toFixed(1)}\n  ${plain.slice(0,200)}${plain.length>200?'…':''}`).join('\n\n');
  }});
T({id:'kasiski',name:'Kasiski examination',cat:'analyze',icon:'📐',desc:'Find repeated trigrams+ in ciphertext, factor the distances between repeats to reveal likely Vigenère key lengths.',
  modes:['encode'],modeLabels:['Examine'],
  opts:[{k:'glen',t:'range',l:'Gram length',d:3,min:3,max:6}],
  sample:'CSASTPKVSIQUTGQUCSASTPIUAQJB',
  run(t,{o}){
    const s=U.clean(t),g=+o.glen;
    if(s.length<g*2)throw Error('Text too short');
    const pos={};
    for(let i=0;i<=s.length-g;i++){const gram=s.substr(i,g);(pos[gram]=pos[gram]||[]).push(i)}
    const reps=Object.entries(pos).filter(([,p])=>p.length>1);
    if(!reps.length)return`No repeated ${g}-grams found. Try a shorter gram length or longer ciphertext.`;
    const factorCount={};const lines=[];
    for(const[gram,p]of reps){
      const dists=[];
      for(let i=1;i<p.length;i++)dists.push(p[i]-p[i-1]);
      lines.push(`${gram} @ ${p.join(', ')}  Δ ${dists.join(', ')}`);
      for(const d of dists)for(let f=2;f<=Math.min(d,24);f++)if(d%f===0)factorCount[f]=(factorCount[f]||0)+1;
    }
    const ranked=Object.entries(factorCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
    return`Repeated ${g}-grams (${reps.length}):\n${lines.slice(0,20).join('\n')}${lines.length>20?'\n…':''}\n\nLikely key lengths (factor votes):\n${ranked.map(([f,c])=>`  ${f}: ${'█'.repeat(Math.min(c,30))} ${c}`).join('\n')}`;
  }});
T({id:'similarity',name:'Text similarity',cat:'analyze',icon:'≈',desc:'Compare two texts: Levenshtein edit distance, similarity %, Jaccard word overlap, and shared-word list. Separate inputs with a --- line.',
  modes:['encode'],modeLabels:['Compare'],
  sample:'the quick brown fox\n---\nthe quiet brown cat',
  run(t){
    const ix=t.split('\n').findIndex(l=>l.trim()==='---');
    if(ix<0)throw Error('Separate the two texts with a line containing only ---');
    const lines=t.split('\n');
    const a=lines.slice(0,ix).join('\n').trim(),b=lines.slice(ix+1).join('\n').trim();
    if(!a||!b)throw Error('Both texts must be non-empty');
    // Levenshtein (two-row)
    const la=[...a],lb=[...b];
    if(la.length*lb.length>4e6)throw Error('Texts too long for edit-distance (limit ~2000×2000 chars)');
    let prev=Array.from({length:lb.length+1},(_,i)=>i);
    for(let i=1;i<=la.length;i++){
      const cur=[i];
      for(let j=1;j<=lb.length;j++)
        cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(la[i-1]===lb[j-1]?0:1));
      prev=cur;
    }
    const dist=prev[lb.length],maxLen=Math.max(la.length,lb.length);
    const sim=maxLen?((1-dist/maxLen)*100):100;
    // Jaccard on words
    const wa=new Set(a.toLowerCase().match(/[\p{L}\p{N}']+/gu)||[]),wb=new Set(b.toLowerCase().match(/[\p{L}\p{N}']+/gu)||[]);
    const inter=[...wa].filter(w=>wb.has(w));
    const union=new Set([...wa,...wb]).size;
    return`Levenshtein distance: ${dist} edits\nCharacter similarity: ${sim.toFixed(1)}%\nJaccard word overlap: ${union?((inter.length/union)*100).toFixed(1):0}% (${inter.length}/${union} words)\n\nShared words: ${inter.slice(0,40).join(', ')||'—'}${inter.length>40?'…':''}`;
  }});

T({id:'password',name:'Password generator',cat:'gen',icon:'•••',desc:'Cryptographically secure random passwords (crypto.getRandomValues). Input is ignored.',
  modes:['encode'],modeLabels:['Generate'],noInput:true,
  opts:[{k:'len',t:'range',l:'Length',d:20,min:6,max:64},{k:'lower',t:'chk',l:'a-z',d:true},{k:'upper',t:'chk',l:'A-Z',d:true},{k:'digits',t:'chk',l:'0-9',d:true},{k:'symbols',t:'chk',l:'!@#$',d:true},{k:'noamb',t:'chk',l:'No ambiguous (0O1lI)',d:false},{k:'count',t:'num',l:'Count',d:5}],
  run(t,{o}){
    let pool='';
    if(o.lower)pool+='abcdefghijklmnopqrstuvwxyz';
    if(o.upper)pool+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if(o.digits)pool+='0123456789';
    if(o.symbols)pool+='!@#$%^&*()-_=+[]{};:,.<>?';
    if(o.noamb)pool=[...pool].filter(c=>!'0O1lI|'.includes(c)).join('');
    if(!pool)throw Error('Select at least one character set');
    const gen=()=>{const r=new Uint32Array(+o.len);crypto.getRandomValues(r);return[...r].map(x=>pool[x%pool.length]).join('')};

T({id:'randkey',name:'Cipher key generator',cat:'gen',icon:'🔑',desc:'Random keys for classical ciphers: substitution alphabets, Vigenère keywords, XOR hex keys.',

    switch(o.type){
      case'alphabet':{const a=U.A.split('');const r=secure(26);for(let i=25;i>0;i--){const j=r[i]%(i+1);[a[i],a[j]]=[a[j],a[i]]}return a.join('')}
      case'keyword':{const V='AEIOU',C='BCDFGHJKLMNPQRSTVWXYZ';const r=secure(+o.len);return[...r].slice(0,+o.len).map((x,i)=>i%2?V[x%5]:C[x%21]).join('')}
      case'xorhex':{const b=new Uint8Array(+o.len);crypto.getRandomValues(b);return U.hex(b)}

T({id:'randnum',name:'Random numbers',cat:'gen',icon:'#?',desc:'Cryptographically secure random integers in a range — dice rolls, lottery picks, unique draws.',
  modes:['encode'],modeLabels:['Generate'],noInput:true,
  opts:[{k:'min',t:'num',l:'Min',d:1},{k:'max',t:'num',l:'Max',d:100},{k:'count',t:'num',l:'Count',d:10},{k:'uniq',t:'chk',l:'Unique (no repeats)',d:false},{k:'sort',t:'chk',l:'Sort ascending',d:false}],
  run(t,{o}){
    const min=Math.floor(+o.min),max=Math.floor(+o.max);
    if(isNaN(min)||isNaN(max)||min>max)throw Error('Min must be ≤ Max');
    const span=max-min+1;
    const n=Math.min(1000,Math.max(1,+o.count||1));
    if(o.uniq&&n>span)throw Error(`Cannot draw ${n} unique values from a range of ${span}`);
    // rejection sampling for unbiased draws
    const draw=()=>{
      const lim=Math.floor(0x100000000/span)*span;
      const r=new Uint32Array(1);
      do{crypto.getRandomValues(r)}while(r[0]>=lim);
      return min+r[0]%span;
    };
    let out;
    if(o.uniq){
      const set=new Set();
      while(set.size<n)set.add(draw());
      out=[...set];
    }else out=Array.from({length:n},draw);
    if(o.sort)out.sort((a,b)=>a-b);
    return out.join('\n');
  }});

T({id:'urlparse',name:'URL parser',cat:'encode',icon:'🔗',desc:'Break a URL into its parts (scheme, host, port, path, query, fragment) and list decoded query parameters. Reverse mode rebuilds a URL from a "key: value" list.',
  modeLabels:['Parse','Build'],
  sample:'https://user:pw@example.com:8443/path/to/page?q=hello%20world&lang=en&tag=a&tag=b#section-2',
  run(t,{mode}){
    if(mode==='encode'){
      let u;try{u=new URL(t.trim())}catch(e){throw Error('Not a valid absolute URL (include the scheme, e.g. https://)')}
      const rows=[
        ['Protocol',u.protocol.replace(/:$/,'')],
        ['Username',u.username||'—'],['Password',u.password?'•'.repeat(u.password.length):'—'],
        ['Host',u.hostname],['Port',u.port||'(default)'],
        ['Path',u.pathname||'/'],['Fragment',u.hash.replace(/^#/,'')||'—']
      ];
      let out=rows.map(([k,v])=>k.padEnd(10)+' '+v).join('\n');
      const params=[...u.searchParams.entries()];
      out+='\n\n── Query parameters ('+params.length+') ──\n';
      out+=params.length?params.map(([k,v])=>`${k} = ${v}`).join('\n'):'(none)';
      return out;
    }
    // build: lines of key: value  (first "url:" or scheme//host defines base)
    const map={};
    t.split('\n').forEach(l=>{const m=l.match(/^\s*([^:=]+?)\s*[:=]\s*(.*)$/);if(m)map[m[1].trim().toLowerCase()]=m[2]});
    const base=map.url||map.base;
    if(!base)throw Error('Provide a "url: https://…" line, then extra "key: value" query params to append');
    let u;try{u=new URL(base.trim())}catch(e){throw Error('The url: line is not a valid absolute URL')}
    for(const[k,v]of Object.entries(map)){if(k==='url'||k==='base')continue;u.searchParams.append(k,v)}
    return u.toString();
  }});
T({id:'cesc',name:'C / JS string escape',cat:'encode',icon:'\\n',desc:'Escape text into a C/Java/JS/JSON-style double-quoted string literal (\\n, \\t, \\", \\xFF, \\uXXXX), or unescape one back to raw text.',
  sample:'Tab\there\nNew line, quote " and emoji 🚀',
  run(t,{mode}){
    if(mode==='encode'){
      const map={'\\':'\\\\','"':'\\"','\n':'\\n','\r':'\\r','\t':'\\t','\b':'\\b','\f':'\\f','\v':'\\v','\0':'\\0'};
      let out='';
      for(const ch of t){
        const cp=ch.codePointAt(0);
        if(map[ch]!==undefined)out+=map[ch];
        else if(cp<0x20)out+='\\x'+cp.toString(16).padStart(2,'0');
        else if(cp>0xFFFF)out+='\\u{'+cp.toString(16)+'}';
        else out+=ch;
      }
      return out;
    }
    return t.replace(/\\(u\{([0-9a-fA-F]+)\}|u([0-9a-fA-F]{4})|x([0-9a-fA-F]{2})|[0-7]{1,3}|.)/g,(m,g,u1,u2,hx)=>{
      if(u1!==undefined)return String.fromCodePoint(parseInt(u1,16));
      if(u2!==undefined)return String.fromCodePoint(parseInt(u2,16));
      if(hx!==undefined)return String.fromCharCode(parseInt(hx,16));
      const c=g;
      if(/^[0-7]+$/.test(c))return String.fromCharCode(parseInt(c,8));
      return{n:'\n',r:'\r',t:'\t',b:'\b',f:'\f',v:'\v','0':'\0','\\':'\\','"':'"',"'":"'",'`':'`'}[c]??c;
    });
  }});
T({id:'b91',name:'basE91',cat:'encode',icon:'91',desc:'basE91 encoding — even denser than Base64 (~23% overhead vs 33%), using 91 printable ASCII characters.',
  sample:'Denser than Base64!',
  run(t,{mode}){
    const A="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!#$%&()*+,./:;<=>?@[]^_`{|}~\"";
    if(mode==='encode'){
      const b=U.bytes(t);let out='',n=0,v=0;
      for(const byte of b){
        v|=byte<<n;n+=8;
        if(n>13){let ev=v&8191;if(ev>88){v>>=13;n-=13}else{ev=v&16383;v>>=14;n-=14}out+=A[ev%91]+A[(ev/91|0)]}
      }
      if(n){out+=A[v%91];if(n>7||v>90)out+=A[(v/91|0)]}
      return out;
    }
    const s=t.replace(/\s+/g,'');const out=[];let n=0,v=0,b=-1;
    for(const ch of s){
      const c=A.indexOf(ch);if(c<0)throw Error(`Invalid basE91 char "${ch}"`);
      if(b<0){b=c;continue}
      b+=c*91;v|=b<<n;n+=(b&8191)>88?13:14;
      while(n>7){out.push(v&255);v>>=8;n-=8}
      b=-1;
    }
    if(b>-1){out.push((v|b<<n)&255)}
    return U.str(new Uint8Array(out));
  }});

T({id:'runningkey',name:'Running-key Vigenère',cat:'cipher',icon:'V∞',desc:'Vigenère using a long text as the key instead of a repeating word — as long as the message, so no periodicity to exploit.',
  opts:[{k:'key',t:'txt',l:'Key text',d:'THE QUICK BROWN FOX JUMPS OVER THE LAZY DOG AGAIN AND AGAIN',w:280}],

T({id:'nihilist',name:'Nihilist',cat:'cipher',icon:'N#',desc:'19th-century Russian cipher: Polybius-square coordinates (as two-digit numbers) added to a repeating numeric keyword.',
  opts:[{k:'sqkey',t:'txt',l:'Square keyword',d:'RUSSIAN'},{k:'key',t:'txt',l:'Additive keyword',d:'LENIN'}],
  sample:'DYNAMITE WINTER PALACE',
  run(t,{mode,o}){
    const grid=Ciphers.playfairGrid(o.sqkey),pos={};
    grid.forEach((c,i)=>pos[c]=(Math.floor(i/5)+1)*10+(i%5+1));
    const key=U.clean(o.key).replace(/J/g,'I');if(!key)throw Error('Additive keyword must contain letters');
    const kn=[...key].map(c=>pos[c]);
    if(mode==='encode'){
      const letters=U.clean(t).replace(/J/g,'I');
      return[...letters].map((c,i)=>pos[c]+kn[i%kn.length]).join(' ');
    }
    const nums=t.trim().split(/\s+/).filter(Boolean).map(Number);
    if(nums.some(isNaN))throw Error('Ciphertext must be space-separated numbers');
    const rev={};grid.forEach((c,i)=>rev[(Math.floor(i/5)+1)*10+(i%5+1)]=c);
    return nums.map((v,i)=>{const p=v-kn[i%kn.length];const c=rev[p];if(!c)throw Error(`Value ${v} decodes to an invalid square coordinate`);return c}).join('');
  }});
T({id:'foursquare',name:'Four-square',cat:'cipher',icon:'⊞⊞',desc:'Digraph cipher using four 5×5 grids (two plaintext, two keyed). Stronger than Playfair — no self-encrypting letters.',
  opts:[{k:'key1',t:'txt',l:'Key 1 (top-right)',d:'EXAMPLE'},{k:'key2',t:'txt',l:'Key 2 (bottom-left)',d:'KEYWORD'}],
  sample:'Help me obiwan kenobi',
  run(t,{mode,o}){
    const plain=U.A.replace('J','');// 25-letter plaintext square (row major)
    const mk=k=>Ciphers.playfairGrid(k).join('');
    const q1=mk(o.key1),q2=mk(o.key2);
    const rc=i=>[Math.floor(i/5),i%5];
    let s=U.clean(t).replace(/J/g,'I');
    if(s.length%2)s+='X';
    let out='';
    for(let i=0;i<s.length;i+=2){
      const a=s[i],b=s[i+1];
      if(!mode||mode==='encode'){
        const[ra,ca]=rc(plain.indexOf(a)),[rb,cb]=rc(plain.indexOf(b));
        out+=q1[ra*5+cb]+q2[rb*5+ca];
      }else{
        const[ra,ca]=rc(q1.indexOf(a)),[rb,cb]=rc(q2.indexOf(b));
        out+=plain[ra*5+cb]+plain[rb*5+ca];
      }
    }
    return out;
  },
  extra(t,{o}){
    const plain=U.A.replace('J','');const q1=Ciphers.playfairGrid(o.key1).join(''),q2=Ciphers.playfairGrid(o.key2).join('');
    const box=(a,b)=>{let h='';for(let r=0;r<5;r++)h+=`<div>${a.slice(r*5,r*5+5).split('').join(' ')}&nbsp;&nbsp;${b.slice(r*5,r*5+5).split('').join(' ')}</div>`;return h};
    const html=`<div style="font-family:var(--font-mono);line-height:1.8">${box(plain,q1)}<div style="height:8px"></div>${box(q2,plain)}</div>`;
    return['Four squares (plain | key1 / key2 | plain)',html];
  }});

T({id:'sha2',name:'SHA-2 family',cat:'hash',icon:'∑2',desc:'SHA-224, SHA-256, SHA-384 and SHA-512 digests via the native Web Crypto API. Output as hex or Base64.',
  modes:['encode'],modeLabels:['Digest'],
  opts:[{k:'bits',t:'sel',l:'Size',d:'256',vals:[['224','SHA-224'],['256','SHA-256'],['384','SHA-384'],['512','SHA-512']]},{k:'fmt',t:'sel',l:'Output',d:'hex',vals:[['hex','Hex'],['HEX','HEX (upper)'],['b64','Base64']]}],
  sample:'The quick brown fox jumps over the lazy dog',
  async run(t,{o}){
    const b=U.bytes(t);let digest;
    // WebCrypto provides 256/384/512; SHA-224 uses our pure-JS SHA-256 core with the SHA-224 IV.
    if(o.bits==='224')digest=sha224(b);
    else digest=new Uint8Array(await crypto.subtle.digest('SHA-'+o.bits,b));

T({id:'fletcher',name:'Fletcher checksum',cat:'hash',icon:'Fl',desc:'Fletcher-16 and Fletcher-32 position-dependent checksums — faster than CRC, catch more errors than a simple sum.',
  modes:['encode'],modeLabels:['Checksum'],
  sample:'abcde',
  run(t){
    const b=U.bytes(t);
    // Fletcher-16
    let s1=0,s2=0;for(const x of b){s1=(s1+x)%255;s2=(s2+s1)%255}
    const f16=(s2<<8)|s1;
    // Fletcher-32 (16-bit words, little-endian pad)
    let a=0,bb=0;
    for(let i=0;i<b.length;i+=2){const word=b[i]|((b[i+1]||0)<<8);a=(a+word)%65535;bb=(bb+a)%65535}
    const f32=((bb<<16)>>>0)+a;
    const hx=(v,n)=>(v>>>0).toString(16).padStart(n,'0');
    return['Fletcher-16   0x'+hx(f16,4)+'  ('+f16+')','Fletcher-32   0x'+hx(f32,8)+'  ('+(f32>>>0)+')'].join('\n');
  }});
T({id:'luhn',name:'Luhn (mod-10)',cat:'hash',icon:'✓#',desc:'Validate a number with the Luhn algorithm (credit cards, IMEI, etc.) or compute the check digit that makes a partial number valid.',
  modeLabels:['Validate','Add check digit'],
  sample:'4539 1488 0343 6467',
  run(t,{mode}){
    const digits=t.replace(/[\s-]/g,'');
    if(!/^\d+$/.test(digits))throw Error('Input must contain only digits (spaces and dashes allowed)');
    const luhn=s=>{let sum=0,alt=false;for(let i=s.length-1;i>=0;i--){let d=+s[i];if(alt){d*=2;if(d>9)d-=9}sum+=d;alt=!alt}return sum};
    if(mode==='encode'){
      const valid=luhn(digits)%10===0;
      return(valid?'✓ VALID':'✗ INVALID')+` — Luhn checksum of "${digits}" is ${luhn(digits)%10===0?'0 (mod 10)':luhn(digits)%10+' (mod 10, should be 0)'}`;
    }
    // append check digit
    const check=(10-(luhn(digits+'0')%10))%10;
    return digits+check;
  }});

T({id:'repeat',name:'Repeat & pad',cat:'text',icon:'××',desc:'Repeat the text N times with a separator, or pad each line to a target width. Handy for test data and alignment.',

T({id:'wrap',name:'Word wrap',cat:'text',icon:'↵',desc:'Hard-wrap text to a maximum line width (word-aware), or unwrap paragraphs back into single lines.',
  modeLabels:['Wrap','Unwrap'],
  opts:[{k:'width',t:'num',l:'Max width',d:60}],
  sample:'This is a long paragraph that will be wrapped to a fixed column width so it fits nicely inside terminals, emails and code comments without overflowing.',
  run(t,{mode,o}){
    if(mode==='decode'){
      // unwrap: join lines within a paragraph, keep blank-line paragraph breaks
      return t.split(/\n{2,}/).map(p=>p.replace(/\s*\n\s*/g,' ').trim()).join('\n\n');
    }
    const width=Math.max(1,+o.width||60);
    return t.split('\n').map(line=>{
      if(line.length<=width)return line;
      const words=line.split(/(\s+)/);let out='',cur='';
      for(const w of words){
        if(/^\s+$/.test(w)){cur+=w;continue}
        if((cur+w).replace(/\s+$/,'').length>width&&cur.trim()){out+=cur.replace(/\s+$/,'')+'\n';cur=''}
        // handle single word longer than width
        if(w.length>width){let rem=w;while(rem.length>width){out+=(cur?cur.replace(/\s+$/,'')+'\n':'')+rem.slice(0,width)+'\n';cur='';rem=rem.slice(width)}cur=rem;continue}
        cur+=w;
      }
      return out+cur.replace(/\s+$/,'');
    }).join('\n');
  }});
T({id:'texttable',name:'Column aligner',cat:'text',icon:'▤',desc:'Align delimited rows into a neat monospace table with padded columns. Great for tidying CSV/TSV or ASCII tables.',
  modes:['encode'],modeLabels:['Align'],
  opts:[{k:'delim',t:'sel',l:'Input delimiter',d:'auto',vals:[['auto','Auto (comma/tab/pipe)'],[',','comma'],['\t','tab'],['|','pipe'],[';','semicolon']]},{k:'align',t:'sel',l:'Align',d:'left',vals:[['left','Left'],['right','Right']]},{k:'sep',t:'txt',l:'Column gap',d:'  '}],
  sample:'name,age,city\nAlice,30,Berlin\nBob,5,New York\nCharlotte,28,LA',
  run(t,{o}){
    const lines=t.split('\n').filter(l=>l.trim().length);
    if(!lines.length)return'';
    let D=o.delim;
    if(D==='auto'){const first=lines[0];D=first.includes('\t')?'\t':first.includes('|')?'|':first.includes(';')?';':',';}
    const rows=lines.map(l=>l.split(D).map(c=>c.trim()));
    const cols=Math.max(...rows.map(r=>r.length));
    const w=Array(cols).fill(0);
    rows.forEach(r=>r.forEach((c,i)=>{w[i]=Math.max(w[i],[...c].length)}));
    const gap=(o.sep||'  ').replace(/\\t/g,'\t');
    return rows.map(r=>r.map((c,i)=>o.align==='right'?c.padStart(w[i]):(i===r.length-1?c:c.padEnd(w[i]))).join(gap)).join('\n');
  }});
