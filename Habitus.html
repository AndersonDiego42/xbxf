<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Habitus — a clean, offline daily habit tracker. Build better routines, track streaks, and visualize your progress.">
<meta name="theme-color" content="#7c5cff">
<title>Habitus — Daily Habit Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-primary: #0f0f17;
    --bg-secondary: #1a1a26;
    --bg-tertiary: #242436;
    --bg-hover: #2d2d42;
    --border: #2d2d42;
    --text-primary: #f0f0f5;
    --text-secondary: #a0a0b8;
    --text-muted: #6b6b85;
    --accent: #7c5cff;
    --accent-hover: #9579ff;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #f87171;
    --shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  [data-theme="light"] {
    --bg-primary: #f5f5fa;
    --bg-secondary: #ffffff;
    --bg-tertiary: #f0f0f7;
    --bg-hover: #e5e5f0;
    --border: #e0e0eb;
    --text-primary: #1a1a26;
    --text-secondary: #4a4a5e;
    --text-muted: #8a8aa0;
    --shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    line-height: 1.5;
  }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), #5b3df0);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 12px rgba(124, 92, 255, 0.3);
  }

  .logo-text h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-text p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    background: var(--bg-secondary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    background: var(--bg-hover);
    transform: translateY(-1px);
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    padding: 0;
    justify-content: center;
  }

  /* Stats Overview */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 14px;
    transition: transform 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-2px);
  }

  .stat-label {
    font-size: 12px;
    text-transform: uppercase;
    color: var(--text-secondary);
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .stat-sublabel {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--bg-secondary);
    padding: 6px;
    border-radius: 12px;
    border: 1px solid var(--border);
    width: fit-content;
    flex-wrap: wrap;
  }

  .tab {
    background: transparent;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }

  .tab:hover:not(.active) {
    color: var(--text-primary);
  }

  /* View Container */
  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  /* All Habits toolbar */
  .all-toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .all-toolbar #habitSearch { flex: 2; min-width: 200px; }
  .all-toolbar #habitSort { flex: 1; min-width: 160px; cursor: pointer; }
  .all-toolbar #toggleArchived { white-space: nowrap; }
  .all-toolbar #toggleArchived[aria-pressed="true"] {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Habits List */
  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .habit-card.archived { opacity: 0.6; }
  .habit-card.dragging { opacity: 0.4; }
  .archived-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 6px;
  }
  .drag-handle {
    cursor: grab;
    color: var(--text-muted);
    padding: 8px 4px;
    font-size: 16px;
    user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }

  .habit-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.2s;
  }

  .habit-card:hover {
    border-color: var(--accent);
  }

  .habit-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    gap: 12px;
  }

  .habit-info {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-width: 0;
  }

  .habit-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .habit-details {
    flex: 1;
    min-width: 0;
  }

  .habit-name {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .habit-meta {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .habit-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .habit-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    transition: all 0.2s;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  .check-btn {
    background: var(--bg-tertiary);
    border: 2px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    transition: all 0.2s;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .check-btn:hover {
    border-color: var(--accent);
    transform: scale(1.05);
  }

  .check-btn.completed {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }

  /* Streak Display */
  .streak-grid {
    display: flex;
    gap: 3px;
    overflow-x: auto;
    padding: 4px 0;
    scrollbar-width: thin;
  }

  .streak-grid::-webkit-scrollbar {
    height: 6px;
  }

  .streak-grid::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .streak-day {
    min-width: 22px;
    height: 22px;
    border-radius: 5px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .streak-day:hover {
    transform: scale(1.2);
    z-index: 2;
  }

  .streak-day.completed {
    background: var(--accent);
    border-color: var(--accent);
  }

  .streak-day.completed.intensity-1 { opacity: 0.4; }
  .streak-day.completed.intensity-2 { opacity: 0.6; }
  .streak-day.completed.intensity-3 { opacity: 0.8; }
  .streak-day.completed.intensity-4 { opacity: 1; }

  .streak-day.today {
    box-shadow: 0 0 0 2px var(--accent);
  }

  .streak-day.future,
  .streak-day.before-created {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .streak-day .tooltip {
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-primary);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .streak-day:hover .tooltip {
    opacity: 1;
  }

  /* Habit Footer */
  .habit-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
    flex-wrap: wrap;
    gap: 8px;
  }

  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--bg-tertiary);
    border-radius: 20px;
    font-weight: 500;
  }

  .streak-badge.fire {
    background: linear-gradient(135deg, #ff6b35, #f7931e);
    color: white;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 500px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text-secondary);
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-textarea {
    resize: vertical;
    min-height: 60px;
  }

  /* Icon Picker */
  .icon-picker, .color-picker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
    gap: 8px;
    padding: 8px;
    background: var(--bg-tertiary);
    border-radius: 10px;
  }

  .icon-option {
    width: 100%;
    aspect-ratio: 1;
    background: var(--bg-secondary);
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .icon-option:hover {
    transform: scale(1.1);
  }

  .icon-option.selected {
    border-color: var(--accent);
  }

  .color-option {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }

  .color-option:hover {
    transform: scale(1.1);
  }

  .color-option.selected {
    border-color: var(--text-primary);
    box-shadow: 0 0 0 2px var(--accent);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  /* Frequency Days */
  .day-selector {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .day-btn {
    flex: 1;
    min-width: 40px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .day-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .empty-state h3 {
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  /* Calendar View */
  .calendar-container {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }

  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .calendar-month {
    font-size: 18px;
    font-weight: 700;
  }

  .calendar-nav {
    display: flex;
    gap: 8px;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .calendar-day-header {
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
    padding: 8px;
    text-transform: uppercase;
  }

  .calendar-cell {
    aspect-ratio: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    position: relative;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: all 0.2s;
  }

  .calendar-cell:hover {
    border-color: var(--accent);
  }

  .calendar-cell.empty {
    background: transparent;
    border: none;
    cursor: default;
  }

  .calendar-cell.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .calendar-date {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .calendar-progress {
    margin-top: auto;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .calendar-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  .calendar-count {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .calendar-cell.full { box-shadow: inset 0 0 0 1px var(--success); }
  .calendar-cell.future-day { opacity: 0.45; cursor: not-allowed; }
  .calendar-dot-row {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .calendar-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* Day detail rows */
  .day-habit-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    margin-bottom: 8px;
  }
  .day-habit-row .habit-icon { width: 36px; height: 36px; font-size: 18px; }
  .day-habit-name { flex: 1; font-weight: 500; }
  .day-check {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .day-check.completed { color: white; }

  /* Analytics */
  .analytics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
  }

  .analytics-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }

  .analytics-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  .progress-bar {
    height: 8px;
    background: var(--bg-tertiary);
    border-radius: 4px;
    overflow: hidden;
    margin: 8px 0;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.5s;
  }

  .habit-stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .habit-stat-row:last-child {
    border-bottom: none;
  }

  .habit-stat-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .heatmap {
    display: grid;
    grid-template-columns: repeat(53, 1fr);
    gap: 2px;
    overflow-x: auto;
  }

  .heatmap-cell {
    aspect-ratio: 1;
    background: var(--bg-tertiary);
    border-radius: 2px;
    min-width: 10px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 12px;
    box-shadow: var(--shadow);
    transition: transform 0.3s;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }

  /* Add Habit Button */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 24px;
    box-shadow: 0 8px 24px rgba(124, 92, 255, 0.4);
    transition: all 0.2s;
    display: none;
  }

  .fab:hover {
    transform: scale(1.1);
    background: var(--accent-hover);
  }

  /* Date Header */
  .date-header {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .date-info h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .date-info p {
    color: var(--text-secondary);
    font-size: 14px;
  }

  .daily-progress {
    text-align: right;
  }

  .daily-progress-circle {
    position: relative;
    width: 70px;
    height: 70px;
  }

  .daily-progress-circle svg {
    transform: rotate(-90deg);
  }

  .daily-progress-circle text {
    transform: rotate(90deg);
    font-size: 14px;
    font-weight: 700;
    fill: var(--text-primary);
  }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .calendar-container { padding: 16px; }
    .calendar-grid { gap: 4px; }
    .calendar-day-header { padding: 4px; font-size: 10px; }
    .calendar-cell { padding: 5px; border-radius: 8px; }
    .calendar-date { font-size: 12px; }
  }

  @media (max-width: 640px) {
    .container { padding: 16px; }
    .header { gap: 12px; }
    .header-actions { flex-wrap: wrap; }
    .logo-text h1 { font-size: 20px; }
    .stat-value { font-size: 24px; }
    .stats-grid { gap: 12px; }
    .tabs { width: 100%; justify-content: space-between; }
    .tab { flex: 1; text-align: center; padding: 8px 6px; }
    .habit-header { flex-direction: column; align-items: stretch; }
    .habit-actions { justify-content: flex-end; }
    .all-toolbar { flex-direction: column; }
    .all-toolbar #habitSearch,
    .all-toolbar #habitSort,
    .all-toolbar #toggleArchived { flex: none; width: 100%; min-width: 0; }
    .fab { display: flex; align-items: center; justify-content: center; }

    .calendar-count, .calendar-dot-row { display: none; }
    .drag-handle { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">

    <div class="header-actions">
      <button class="btn btn-icon" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
      <button class="btn btn-icon" id="exportBtn" title="Export data" aria-label="Export data">↓</button>
      <button class="btn btn-icon" id="importBtn" title="Import data" aria-label="Import data">↑</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none" aria-hidden="true">

  <!-- Date Header -->

    <div class="daily-progress">

          <circle id="progressCircle" cx="35" cy="35" r="30" stroke="var(--accent)" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="188.5" style="transition: stroke-dashoffset 0.5s;"/>
          <text x="35" y="40" text-anchor="middle" id="progressText">0%</text>

  <!-- Stats Overview -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">🔥 Current Streak</div>
      <div class="stat-value" id="currentStreak">0</div>
      <div class="stat-sublabel">days in a row</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🏆 Best Streak</div>
      <div class="stat-value" id="bestStreak">0</div>
      <div class="stat-sublabel">all-time record</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">✓ Completed Today</div>
      <div class="stat-value" id="completedToday">0</div>
      <div class="stat-sublabel">habits done</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📊 Total Habits</div>
      <div class="stat-value" id="totalHabits">0</div>
      <div class="stat-sublabel">active routines</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⭐ Completion Rate</div>
      <div class="stat-value" id="completionRate">0%</div>
      <div class="stat-sublabel">last 30 days</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-view="today">Today</button>
    <button class="tab" data-view="all">All Habits</button>
    <button class="tab" data-view="calendar">Calendar</button>
    <button class="tab" data-view="analytics">Analytics</button>
  </div>

  <!-- Today View -->
  <div class="view active" id="todayView">
    <div class="habits-list" id="todayHabitsList"></div>
  </div>

  <!-- All Habits View -->
  <div class="view" id="allView">
    <div class="all-toolbar">
      <input type="search" class="form-input" id="habitSearch" placeholder="🔍 Search habits..." aria-label="Search habits">
      <select class="form-select" id="habitSort" aria-label="Sort habits">
        <option value="manual">Sort: Custom order</option>
        <option value="name">Sort: Name (A–Z)</option>
        <option value="streak">Sort: Current streak</option>
        <option value="rate">Sort: Completion rate</option>
      </select>
      <button class="btn" id="toggleArchived" aria-pressed="false">Show archived</button>
    </div>
    <div class="habits-list" id="allHabitsList"></div>
  </div>

  <!-- Calendar View -->
  <div class="view" id="calendarView">
    <div class="calendar-container">
      <div class="calendar-header">
        <div class="calendar-month" id="calendarMonth"></div>
        <div class="calendar-nav">
          <button class="btn btn-icon" id="prevMonth">‹</button>
          <button class="btn" id="todayCalBtn">Today</button>
          <button class="btn btn-icon" id="nextMonth">›</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <!-- Analytics View -->
  <div class="view" id="analyticsView">
    <div class="analytics-grid" id="analyticsGrid"></div>
  </div>
</div>

<!-- Floating Action Button -->

<!-- Modal -->

    <form id="habitForm">

      </div>

        <label class="form-label">Description (optional)</label>
        <textarea class="form-textarea" id="habitDescription" maxlength="200" placeholder="Why is this important to you?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Icon</label>
        <div class="icon-picker" id="iconPicker"></div>

      <div class="form-group">
        <label class="form-label">Color</label>

        <label class="form-label">Frequency</label>
        <div class="day-selector" id="daySelector">

        <div style="margin-top: 8px; display: flex; gap: 6px;">
          <button type="button" class="btn" id="selectAllDays" style="font-size: 12px; padding: 6px 12px;">Every day</button>
          <button type="button" class="btn" id="selectWeekdays" style="font-size: 12px; padding: 6px 12px;">Weekdays</button>
          <button type="button" class="btn" id="selectWeekends" style="font-size: 12px; padding: 6px 12px;">Weekends</button>

        <button type="button" class="btn" id="cancelBtn">Cancel</button>

<!-- Day Detail Modal -->

<!-- Confirm Dialog -->

      <button type="button" class="btn" id="confirmCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="confirmOk">Confirm</button>
    </div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ========== STATE ==========
  const STORAGE_KEY = 'habitus_data_v1';
  const THEME_KEY = 'habitus_theme';
  
  const ICONS = ['💧','🏃','📚','🧘','💪','🥗','😴','📝','🎯','🎨','🎵','🌱','☀️','🌙','🧠','❤️','✨','🔥','⭐','🚀','☕','🍎','🚶','🚴','🏋️','💊','🦷','🧹','💰','📞','🌍','🎓','🛌','🤝','🎮','📷','✏️','🎭'];
  const COLORS = ['#7c5cff','#4ade80','#fbbf24','#f87171','#60a5fa','#f472b6','#a78bfa','#34d399','#fb923c','#22d3ee','#e879f9','#facc15'];

  let state = {
    habits: [],
    currentEditId: null,
    selectedIcon: ICONS[0],
    selectedColor: COLORS[0],
    selectedDays: [0,1,2,3,4,5,6],
    calendarDate: new Date(),
    currentView: 'today',
    searchQuery: '',
    sortBy: 'manual',
    showArchived: false
  };

  // ========== STORAGE ==========
  function loadData() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        const parsed = JSON.parse(data);
        state.habits = (parsed.habits || []).map(h => ({
          ...h,
          completions: h.completions || {},
          archived: !!h.archived,
          days: Array.isArray(h.days) ? h.days : [0,1,2,3,4,5,6],
          createdAt: h.createdAt || today()
        }));
      }
    } catch(e) {
      console.error('Load error', e);
    }
  }

  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ habits: state.habits }));
    } catch(e) {
      showToast('Failed to save data', 'error');
    }
  }

  // ========== DATE UTILS ==========
  function dateKey(date) {
    const d = date instanceof Date ? date : new Date(date);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function today() {
    return dateKey(new Date());
  }

  // Parse a 'YYYY-MM-DD' key as a LOCAL date (avoids UTC off-by-one bug).
  function parseDate(key) {
    if (key instanceof Date) return key;
    const [y, m, d] = key.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function daysBetween(d1, d2) {
    const a = parseDate(d1);
    const b = parseDate(d2);
    return Math.round((b - a) / 86400000);
  }

  function addDays(dateStr, n) {
    const d = parseDate(dateStr);
    d.setDate(d.getDate() + n);
    return dateKey(d);
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  // ========== HABIT LOGIC ==========
  function createHabit(data) {
    return {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2,5),
      name: data.name,
      description: data.description || '',
      icon: data.icon,
      color: data.color,
      days: data.days,
      goal: data.goal || '',
      createdAt: today(),
      completions: {} // { '2024-01-15': true }
    };
  }

  function isHabitScheduledToday(habit, date) {
    const d = date ? new Date(date) : new Date();
    return habit.days.includes(d.getDay());
  }

  function toggleCompletion(habitId, date) {
    const habit = state.habits.find(h => h.id === habitId);
    if (!habit) return;
    const key = date || today();
    if (habit.completions[key]) {
      delete habit.completions[key];
    } else {
      habit.completions[key] = true;
    }
    saveData();
    render();
  }

  function calculateStreak(habit) {
    let streak = 0;
    let date = new Date();
    // Start from today, walk backwards
    while (true) {
      const key = dateKey(date);
      const dayOfWeek = date.getDay();
      const isScheduled = habit.days.includes(dayOfWeek);
      
      if (isScheduled) {
        if (habit.completions[key]) {
          streak++;
        } else {
          // Check if it's today and not completed yet, don't break the streak
          if (key === today()) {
            date.setDate(date.getDate() - 1);
            continue;
          }
          break;
        }
      }
      date.setDate(date.getDate() - 1);
      // Safety limit
      if (streak > 10000) break;
      // Stop if before habit creation
      if (dateKey(date) < habit.createdAt) break;
    }
    return streak;
  }

  function calculateBestStreak(habit) {
    const dates = Object.keys(habit.completions).sort();
    if (dates.length === 0) return 0;
    
    let best = 0;
    let current = 0;
    let lastDate = null;
    
    // Walk from creation to today
    let d = new Date(habit.createdAt);
    const end = new Date();
    
    while (d <= end) {
      const key = dateKey(d);
      const isScheduled = habit.days.includes(d.getDay());
      
      if (isScheduled) {
        if (habit.completions[key]) {
          current++;
          if (current > best) best = current;
        } else {
          current = 0;
        }
      }
      d.setDate(d.getDate() + 1);
    }
    return best;
  }

  function calculateCompletionRate(habit, days = 30) {
    let scheduled = 0;
    let completed = 0;
    const end = new Date();
    
    for (let i = 0; i < days; i++) {
      const d = new Date(end);
      d.setDate(d.getDate() - i);
      const key = dateKey(d);
      if (key < habit.createdAt) continue;
      if (habit.days.includes(d.getDay())) {
        scheduled++;
        if (habit.completions[key]) completed++;
      }
    }
    return scheduled === 0 ? 0 : Math.round((completed / scheduled) * 100);
  }

  // ========== RENDER ==========
  function render() {
    renderDateHeader();
    renderStats();
    renderTodayView();
    renderAllView();
    renderCalendarView();
    renderAnalyticsView();
  }

  function renderDateHeader() {
    const now = new Date();
    document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('currentDay').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
    
    const scheduled = state.habits.filter(h => !h.archived && isHabitScheduledToday(h));
    const completed = scheduled.filter(h => h.completions[today()]).length;
    const total = scheduled.length;
    const pct = total === 0 ? 0 : (completed / total) * 100;
    
    const circle = document.getElementById('progressCircle');
    const circumference = 188.5;
    circle.style.strokeDashoffset = circumference - (pct / 100) * circumference;
    document.getElementById('progressText').textContent = Math.round(pct) + '%';
  }

  function renderStats() {
    const active = state.habits.filter(h => !h.archived);

    // Best overall streak
    let best = 0;
    active.forEach(h => {
      const b = calculateBestStreak(h);
      if (b > best) best = b;
    });
    
    // Current best streak across habits
    let current = 0;
    active.forEach(h => {
      const c = calculateStreak(h);
      if (c > current) current = c;
    });
    
    const scheduled = active.filter(h => isHabitScheduledToday(h));
    const completed = scheduled.filter(h => h.completions[today()]).length;
    
    // Average completion rate
    let avgRate = 0;
    if (active.length > 0) {
      const sum = active.reduce((a, h) => a + calculateCompletionRate(h), 0);
      avgRate = Math.round(sum / active.length);
    }
    
    document.getElementById('currentStreak').textContent = current;
    document.getElementById('bestStreak').textContent = best;
    document.getElementById('completedToday').textContent = `${completed}/${scheduled.length}`;
    document.getElementById('totalHabits').textContent = active.length;
    document.getElementById('completionRate').textContent = avgRate + '%';
  }

  function renderHabitCard(habit, showOnlyIfScheduled = false, draggable = false) {
    const isScheduled = isHabitScheduledToday(habit) && !habit.archived;
    if (showOnlyIfScheduled && !isScheduled) return '';
    
    const completed = habit.completions[today()];
    const streak = calculateStreak(habit);
    const best = calculateBestStreak(habit);
    const rate = calculateCompletionRate(habit);
    
    // Generate last 60 days streak grid
    const days = [];
    const todayDate = new Date();
    for (let i = 59; i >= 0; i--) {
      const d = new Date(todayDate);
      d.setDate(d.getDate() - i);
      const key = dateKey(d);
      const isSch = habit.days.includes(d.getDay());
      const isComp = habit.completions[key];
      const isToday = key === today();
      const beforeCreated = key < habit.createdAt;
      
      let classes = 'streak-day';
      if (isComp) classes += ' completed intensity-4';
      if (isToday) classes += ' today';
      if (beforeCreated) classes += ' before-created';
      
      const bg = isComp ? `style="background:${habit.color};border-color:${habit.color};"` : 
                 (!isSch && !beforeCreated ? 'style="opacity:0.4;"' : '');
      
      days.push(`<div class="${classes}" ${bg} data-habit="${habit.id}" data-date="${key}">
        <div class="tooltip">${parseDate(key).toLocaleDateString('en-US',{month:'short',day:'numeric'})}${isComp?' ✓':''}</div>
      </div>`);
    }
    
    return `
      <div class="habit-card ${habit.archived?'archived':''}" data-id="${habit.id}" ${draggable?'draggable="true"':''}>
        <div class="habit-header">
          <div class="habit-info">
            ${draggable ? '<span class="drag-handle" title="Drag to reorder" aria-hidden="true">⠿</span>' : ''}
            <div class="habit-icon" style="background:${habit.color}33;color:${habit.color};">${habit.icon}</div>
            <div class="habit-details">
              <div class="habit-name">${escapeHtml(habit.name)} ${habit.archived?'<span class="archived-tag">Archived</span>':''}</div>
              <div class="habit-meta">
                ${habit.goal ? `<span>🎯 ${escapeHtml(habit.goal)}</span>` : ''}
                <span>📅 ${getFrequencyText(habit.days)}</span>
                ${!habit.archived && !isHabitScheduledToday(habit) ? '<span style="color:var(--text-muted);">Not scheduled today</span>' : ''}
              </div>
            </div>
          </div>
          <div class="habit-actions">
            <button class="icon-btn archive-btn" data-id="${habit.id}" title="${habit.archived?'Unarchive':'Archive'}">${habit.archived?'📤':'📥'}</button>
            <button class="icon-btn edit-btn" data-id="${habit.id}" title="Edit">✎</button>
            ${isScheduled ? `<button class="check-btn ${completed?'completed':''}" data-id="${habit.id}" title="${completed?'Mark incomplete':'Mark complete'}" ${completed?`style="background:${habit.color};border-color:${habit.color};"`:''}>${completed?'✓':''}</button>` : ''}
          </div>
        </div>
        <div class="streak-grid">${days.join('')}</div>
        <div class="habit-footer">
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <span class="streak-badge ${streak >= 7 ? 'fire':''}">${streak >= 7 ? '🔥':'⚡'} ${streak} day streak</span>
            <span class="streak-badge">🏆 Best: ${best}</span>
            <span class="streak-badge">📊 ${rate}%</span>
          </div>
        </div>
      </div>
    `;
  }

  function renderTodayView() {
    const todaysHabits = state.habits.filter(h => !h.archived && isHabitScheduledToday(h));
    const container = document.getElementById('todayHabitsList');
    
    if (state.habits.length === 0) {
      container.innerHTML = emptyState('No habits yet', 'Create your first habit to start building routines!', '🌱');
      return;
    }
    
    if (todaysHabits.length === 0) {
      container.innerHTML = emptyState('Rest day!', 'No habits scheduled for today. Enjoy your break!', '😌');
      return;
    }
    
    // Sort: incomplete first, then completed
    todaysHabits.sort((a, b) => {
      const aDone = a.completions[today()] ? 1 : 0;
      const bDone = b.completions[today()] ? 1 : 0;
      return aDone - bDone;
    });
    
    container.innerHTML = todaysHabits.map(h => renderHabitCard(h)).join('');
  }

  function renderAllView() {
    const container = document.getElementById('allHabitsList');
    if (state.habits.length === 0) {
      container.innerHTML = emptyState('No habits yet', 'Create your first habit to start building routines!', '🌱');
      return;
    }

    let list = state.habits.filter(h => state.showArchived ? true : !h.archived);

    const q = state.searchQuery.trim().toLowerCase();
    if (q) {
      list = list.filter(h =>
        h.name.toLowerCase().includes(q) ||
        (h.description || '').toLowerCase().includes(q) ||
        (h.goal || '').toLowerCase().includes(q)
      );
    }

    switch (state.sortBy) {
      case 'name': list.sort((a, b) => a.name.localeCompare(b.name)); break;
      case 'streak': list.sort((a, b) => calculateStreak(b) - calculateStreak(a)); break;
      case 'rate': list.sort((a, b) => calculateCompletionRate(b) - calculateCompletionRate(a)); break;
      // 'manual' keeps stored order
    }

    if (list.length === 0) {
      container.innerHTML = emptyState('No matches', 'No habits match your search or filters.', '🔍');
      return;
    }

    const draggable = state.sortBy === 'manual' && !q;
    container.innerHTML = list.map(h => renderHabitCard(h, false, draggable)).join('');
  }

  function renderCalendarView() {
    const date = state.calendarDate;
    const year = date.getFullYear();
    const month = date.getMonth();
    
    document.getElementById('calendarMonth').textContent = 
      date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    const grid = document.getElementById('calendarGrid');
    let html = '';
    
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
      html += `<div class="calendar-day-header">${d}</div>`;
    });
    
    for (let i = 0; i < firstDay; i++) {
      html += '<div class="calendar-cell empty"></div>';
    }
    
    const activeHabits = state.habits.filter(h => !h.archived);
    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(year, month, day);
      const key = dateKey(d);
      const isToday = key === today();
      const isFuture = key > today();
      
      const scheduled = activeHabits.filter(h => h.days.includes(d.getDay()) && key >= h.createdAt);
      const completedHabits = scheduled.filter(h => h.completions[key]);
      const completed = completedHabits.length;
      const total = scheduled.length;
      const pct = total === 0 ? 0 : (completed / total) * 100;
      const isFull = total > 0 && completed === total;
      
      const dots = completedHabits.slice(0, 6).map(h =>
        `<span class="calendar-dot" style="background:${h.color};"></span>`
      ).join('');
      
      html += `
        <div class="calendar-cell ${isToday?'today':''} ${isFull?'full':''} ${isFuture?'future-day':''}" data-date="${key}">
          <div class="calendar-date">${day}</div>
          ${total > 0 ? `
            <div class="calendar-count">${completed}/${total}</div>
            ${dots ? `<div class="calendar-dot-row">${dots}</div>` : ''}
            <div class="calendar-progress">
              <div class="calendar-progress-fill" style="width:${pct}%"></div>
            </div>
          ` : ''}
        </div>
      `;
    }
    
    grid.innerHTML = html;
  }

  function renderAnalyticsView() {
    const grid = document.getElementById('analyticsGrid');
    const active = state.habits.filter(h => !h.archived);
    
    if (active.length === 0) {
      grid.innerHTML = `<div class="analytics-card">${emptyState('No data yet','Start tracking habits to see analytics','📊')}</div>`;
      return;
    }
    
    // Top performers
    const sorted = [...active].sort((a,b) => calculateCompletionRate(b) - calculateCompletionRate(a));
    
    let html = '';
    
    // Performance overview
    html += `
      <div class="analytics-card">
        <div class="analytics-title">📈 Habit Performance (30 days)</div>
        ${sorted.map(h => {
          const rate = calculateCompletionRate(h);
          return `
            <div class="habit-stat-row">
              <div class="habit-stat-name">
                <span style="font-size:18px;">${h.icon}</span>
                <span>${escapeHtml(h.name)}</span>
              </div>
              <div style="text-align:right;min-width:120px;">
                <div style="font-weight:600;">${rate}%</div>
                <div class="progress-bar" style="width:100px;">
                  <div class="progress-bar-fill" style="width:${rate}%;background:${h.color};"></div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    
    // Streaks
    html += `
      <div class="analytics-card">
        <div class="analytics-title">🔥 Streak Leaderboard</div>
        ${[...active].sort((a,b) => calculateStreak(b) - calculateStreak(a)).map(h => {
          const current = calculateStreak(h);
          const best = calculateBestStreak(h);
          return `
            <div class="habit-stat-row">
              <div class="habit-stat-name">
                <span style="font-size:18px;">${h.icon}</span>
                <span>${escapeHtml(h.name)}</span>
              </div>
              <div style="text-align:right;font-size:13px;">
                <div><strong style="color:${h.color};">${current}</strong> current</div>
                <div style="color:var(--text-secondary);">${best} best</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    
    // Year heatmap for most active habit
    const mostActive = sorted[0];
    if (mostActive) {
      html += `
        <div class="analytics-card" style="grid-column: 1 / -1;">
          <div class="analytics-title">📅 Year Overview — ${escapeHtml(mostActive.name)}</div>
          <div class="heatmap" id="yearHeatmap"></div>
          <div style="margin-top:12px;display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);">
            <span>Less</span>
            <div style="display:flex;gap:3px;">
              <div class="heatmap-cell" style="width:12px;height:12px;background:var(--bg-tertiary);"></div>
              <div class="heatmap-cell" style="width:12px;height:12px;background:${mostActive.color}40;"></div>
              <div class="heatmap-cell" style="width:12px;height:12px;background:${mostActive.color}80;"></div>
              <div class="heatmap-cell" style="width:12px;height:12px;background:${mostActive.color};"></div>
            </div>
            <span>More</span>
          </div>
        </div>
      `;
    }
    
    // Totals
    const totalCompletions = active.reduce((a, h) => a + Object.keys(h.completions).length, 0);
    const totalDays = active.reduce((a, h) => {
      return a + Math.max(1, daysBetween(h.createdAt, today()) + 1);
    }, 0);
    
    html += `
      <div class="analytics-card">
        <div class="analytics-title">🏅 Lifetime Stats</div>
        <div class="habit-stat-row">
          <div>Total completions</div>
          <strong>${totalCompletions}</strong>
        </div>
        <div class="habit-stat-row">
          <div>Days tracked</div>
          <strong>${totalDays}</strong>
        </div>
        <div class="habit-stat-row">
          <div>Active habits</div>
          <strong>${active.length}</strong>
        </div>
        <div class="habit-stat-row">
          <div>Average rate</div>
          <strong>${Math.round(active.reduce((a, h) => a + calculateCompletionRate(h), 0) / active.length)}%</strong>
        </div>
      </div>
    `;
    
    grid.innerHTML = html;
    
    // Render heatmap
    if (mostActive) {
      const heatmap = document.getElementById('yearHeatmap');
      let cells = '';
      const endDate = new Date();
      for (let i = 364; i >= 0; i--) {
        const d = new Date(endDate);
        d.setDate(d.getDate() - i);
        const key = dateKey(d);
        const isComp = mostActive.completions[key];
        const bg = isComp ? mostActive.color : 'var(--bg-tertiary)';
        cells += `<div class="heatmap-cell" style="background:${bg};" title="${d.toLocaleDateString()}${isComp?' ✓':''}"></div>`;
      }
      heatmap.innerHTML = cells;
    }
  }

  function emptyState(title, msg, icon) {
    return `
      <div class="empty-state">
        <div class="empty-state-icon">${icon}</div>
        <h3>${title}</h3>
        <p>${msg}</p>
      </div>
    `;
  }

  function getFrequencyText(days) {
    if (days.length === 7) return 'Every day';
    if (days.length === 5 && !days.includes(0) && !days.includes(6)) return 'Weekdays';
    if (days.length === 2 && days.includes(0) && days.includes(6)) return 'Weekends';
    const names = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return days.sort().map(d => names[d]).join(', ');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getDragAfterElement(container, y) {
    const els = [...container.querySelectorAll('.habit-card:not(.dragging)')];
    return els.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset, element: child };
      }
      return closest;
    }, { offset: -Infinity, element: null }).element;
  }

  // ========== DAY DETAIL MODAL ==========
  let dayModalDate = null;

  function openDayModal(key) {
    if (key > today()) {
      showToast("Can't edit a future date", 'error');
      return;
    }
    dayModalDate = key;
    const d = parseDate(key);
    document.getElementById('dayModalTitle').textContent =
      d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    const scheduled = state.habits.filter(h => !h.archived && h.days.includes(d.getDay()) && key >= h.createdAt);
    const body = document.getElementById('dayModalBody');

    if (scheduled.length === 0) {
      body.innerHTML = emptyState('Rest day', 'No habits were scheduled for this day.', '😌');
    } else {
      body.innerHTML = scheduled.map(h => {
        const done = !!h.completions[key];
        return `
          <div class="day-habit-row">
            <div class="habit-icon" style="background:${h.color}33;color:${h.color};">${h.icon}</div>
            <div class="day-habit-name">${escapeHtml(h.name)}</div>
            <button class="day-check ${done?'completed':''}" data-id="${h.id}"
              ${done?`style="background:${h.color};border-color:${h.color};"`:''}
              aria-label="${done?'Mark incomplete':'Mark complete'}">${done?'✓':''}</button>
          </div>`;
      }).join('');
    }
    document.getElementById('dayModalOverlay').classList.add('active');
  }

  function closeDayModal() {
    document.getElementById('dayModalOverlay').classList.remove('active');
    dayModalDate = null;
  }

  // ========== CONFIRM DIALOG ==========
  function confirmDialog(message, { title = 'Confirm', okText = 'Confirm', danger = false } = {}) {
    return new Promise(resolve => {
      const overlay = document.getElementById('confirmOverlay');
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmMessage').textContent = message;
      const ok = document.getElementById('confirmOk');
      const cancel = document.getElementById('confirmCancel');
      ok.textContent = okText;
      ok.style.background = danger ? 'var(--danger)' : '';
      ok.style.borderColor = danger ? 'var(--danger)' : '';
      overlay.classList.add('active');

      const cleanup = (result) => {
        overlay.classList.remove('active');
        ok.removeEventListener('click', onOk);
        cancel.removeEventListener('click', onCancel);
        overlay.removeEventListener('click', onBackdrop);
        resolve(result);
      };
      const onOk = () => cleanup(true);
      const onCancel = () => cleanup(false);
      const onBackdrop = (e) => { if (e.target === overlay) cleanup(false); };
      ok.addEventListener('click', onOk);
      cancel.addEventListener('click', onCancel);
      overlay.addEventListener('click', onBackdrop);
    });
  }

  // ========== MODAL ==========
  function openModal(habit = null) {
    state.currentEditId = habit ? habit.id : null;
    document.getElementById('modalTitle').textContent = habit ? 'Edit Habit' : 'New Habit';
    document.getElementById('habitName').value = habit ? habit.name : '';
    document.getElementById('habitDescription').value = habit ? habit.description : '';
    document.getElementById('habitGoal').value = habit ? habit.goal : '';
    document.getElementById('deleteBtn').style.display = habit ? 'inline-flex' : 'none';
    
    state.selectedIcon = habit ? habit.icon : ICONS[0];
    state.selectedColor = habit ? habit.color : COLORS[0];
    state.selectedDays = habit ? [...habit.days] : [0,1,2,3,4,5,6];
    
    renderIconPicker();
    renderColorPicker();
    renderDaySelector();
    
    document.getElementById('modalOverlay').classList.add('active');
    setTimeout(() => document.getElementById('habitName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    state.currentEditId = null;
  }

  function renderIconPicker() {
    document.getElementById('iconPicker').innerHTML = ICONS.map(icon => 
      `<button type="button" class="icon-option ${icon === state.selectedIcon ? 'selected' : ''}" data-icon="${icon}">${icon}</button>`
    ).join('');
  }

  function renderColorPicker() {
    document.getElementById('colorPicker').innerHTML = COLORS.map(color =>
      `<button type="button" class="color-option ${color === state.selectedColor ? 'selected' : ''}" data-color="${color}" style="background:${color};"></button>`
    ).join('');
  }

  function renderDaySelector() {
    document.querySelectorAll('.day-btn').forEach(btn => {
      const day = parseInt(btn.dataset.day);
      btn.classList.toggle('active', state.selectedDays.includes(day));
    });
  }

  function saveHabit() {
    const name = document.getElementById('habitName').value.trim();
    if (!name) {
      showToast('Habit name is required', 'error');
      return;
    }
    if (state.selectedDays.length === 0) {
      showToast('Select at least one day', 'error');
      return;
    }
    
    const data = {
      name,
      description: document.getElementById('habitDescription').value.trim(),
      icon: state.selectedIcon,
      color: state.selectedColor,
      days: [...state.selectedDays].sort(),
      goal: document.getElementById('habitGoal').value.trim()
    };
    
    if (state.currentEditId) {
      const habit = state.habits.find(h => h.id === state.currentEditId);
      Object.assign(habit, data);
      showToast('Habit updated', 'success');
    } else {
      state.habits.push(createHabit(data));
      showToast('Habit created!', 'success');
    }
    
    saveData();
    render();
    closeModal();
  }

  async function deleteHabit() {
    if (!state.currentEditId) return;
    const ok = await confirmDialog(
      'Delete this habit and all its progress? This cannot be undone.',
      { title: 'Delete habit', okText: 'Delete', danger: true }
    );
    if (!ok) return;
    state.habits = state.habits.filter(h => h.id !== state.currentEditId);
    saveData();
    render();
    closeModal();
    showToast('Habit deleted', 'success');
  }

  // ========== TOAST ==========
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ========== THEME ==========
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('themeToggle').textContent = next === 'light' ? '☀️' : '🌙';
    localStorage.setItem(THEME_KEY, next);
  }

  function loadTheme() {
    const saved = localStorage.getItem(THEME_KEY) || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeToggle').textContent = saved === 'light' ? '☀️' : '🌙';
  }

  // ========== IMPORT / EXPORT ==========
  function exportData() {
    const data = JSON.stringify({ habits: state.habits, exportDate: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `habitus-backup-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Data exported', 'success');
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.habits || !Array.isArray(data.habits)) throw new Error('Invalid format');
        // Basic validation of habit shape
        const valid = data.habits.every(h => h && typeof h.name === 'string' && Array.isArray(h.days));
        if (!valid) throw new Error('Invalid habit structure');
        const ok = await confirmDialog(
          `Import ${data.habits.length} habit(s)? This will replace your current data.`,
          { title: 'Import data', okText: 'Import' }
        );
        if (!ok) return;
        // Normalize: ensure completions object & archived flag exist
        state.habits = data.habits.map(h => ({
          ...h,
          completions: h.completions || {},
          archived: !!h.archived,
          createdAt: h.createdAt || today()
        }));
        saveData();
        render();
        showToast('Data imported successfully', 'success');
      } catch(err) {
        showToast('Invalid file format', 'error');
      }
    };
    reader.readAsText(file);
  }

  // ========== EVENT LISTENERS ==========
  function attachEvents() {
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.view + 'View').classList.add('active');
        state.currentView = tab.dataset.view;
      });
    });
    
    // Add habit
    document.getElementById('addHabitBtn').addEventListener('click', () => openModal());
    document.getElementById('fabBtn').addEventListener('click', () => openModal());
    
    // Modal
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('deleteBtn').addEventListener('click', deleteHabit);
    document.getElementById('habitForm').addEventListener('submit', e => {
      e.preventDefault();
      saveHabit();
    });
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target.id === 'modalOverlay') closeModal();
    });
    
    // Icon/Color picker
    document.getElementById('iconPicker').addEventListener('click', e => {
      if (e.target.dataset.icon) {
        state.selectedIcon = e.target.dataset.icon;
        renderIconPicker();
      }
    });
    document.getElementById('colorPicker').addEventListener('click', e => {
      if (e.target.dataset.color) {
        state.selectedColor = e.target.dataset.color;
        renderColorPicker();
      }
    });
    
    // Day selector
    document.querySelectorAll('.day-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const day = parseInt(btn.dataset.day);
        if (state.selectedDays.includes(day)) {
          state.selectedDays = state.selectedDays.filter(d => d !== day);
        } else {
          state.selectedDays.push(day);
        }
        renderDaySelector();
      });
    });
    
    document.getElementById('selectAllDays').addEventListener('click', () => {
      state.selectedDays = [0,1,2,3,4,5,6];
      renderDaySelector();
    });
    document.getElementById('selectWeekdays').addEventListener('click', () => {
      state.selectedDays = [1,2,3,4,5];
      renderDaySelector();
    });
    document.getElementById('selectWeekends').addEventListener('click', () => {
      state.selectedDays = [0,6];
      renderDaySelector();
    });
    
    // Habit interactions (event delegation)
    document.body.addEventListener('click', e => {
      const checkBtn = e.target.closest('.check-btn');
      if (checkBtn) {
        toggleCompletion(checkBtn.dataset.id);
        return;
      }
      
      const editBtn = e.target.closest('.edit-btn');
      if (editBtn) {
        const habit = state.habits.find(h => h.id === editBtn.dataset.id);
        if (habit) openModal(habit);
        return;
      }

      const archiveBtn = e.target.closest('.archive-btn');
      if (archiveBtn) {
        const habit = state.habits.find(h => h.id === archiveBtn.dataset.id);
        if (habit) {
          habit.archived = !habit.archived;
          saveData();
          render();
          showToast(habit.archived ? 'Habit archived' : 'Habit unarchived', 'success');
        }
        return;
      }
      
      const streakDay = e.target.closest('.streak-day');
      if (streakDay && !streakDay.classList.contains('future') && !streakDay.classList.contains('before-created')) {
        const habitId = streakDay.dataset.habit;
        const date = streakDay.dataset.date;
        const habit = state.habits.find(h => h.id === habitId);
        if (habit && date <= today() && date >= habit.createdAt) {
          toggleCompletion(habitId, date);
        }
        return;
      }
    });
    
    // Theme
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    // Export/Import
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', e => {
      if (e.target.files[0]) importData(e.target.files[0]);
    });
    
    // Calendar nav
    document.getElementById('prevMonth').addEventListener('click', () => {
      state.calendarDate.setMonth(state.calendarDate.getMonth() - 1);
      renderCalendarView();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      state.calendarDate.setMonth(state.calendarDate.getMonth() + 1);
      renderCalendarView();
    });
    document.getElementById('todayCalBtn').addEventListener('click', () => {
      state.calendarDate = new Date();
      renderCalendarView();
    });

    // Calendar cell click -> day detail
    document.getElementById('calendarGrid').addEventListener('click', e => {
      const cell = e.target.closest('.calendar-cell');
      if (!cell || cell.classList.contains('empty') || cell.classList.contains('future-day')) return;
      openDayModal(cell.dataset.date);
    });

    // Day detail modal
    document.getElementById('closeDayModal').addEventListener('click', closeDayModal);
    document.getElementById('dayModalDone').addEventListener('click', closeDayModal);
    document.getElementById('dayModalOverlay').addEventListener('click', e => {
      if (e.target.id === 'dayModalOverlay') closeDayModal();
    });
    document.getElementById('dayModalBody').addEventListener('click', e => {
      const btn = e.target.closest('.day-check');
      if (btn && dayModalDate) {
        toggleCompletion(btn.dataset.id, dayModalDate);
        openDayModal(dayModalDate); // refresh the modal body
      }
    });
    
    // All Habits toolbar: search / sort / archived toggle
    document.getElementById('habitSearch').addEventListener('input', e => {
      state.searchQuery = e.target.value;
      renderAllView();
    });
    document.getElementById('habitSort').addEventListener('change', e => {
      state.sortBy = e.target.value;
      renderAllView();
    });
    document.getElementById('toggleArchived').addEventListener('click', e => {
      state.showArchived = !state.showArchived;
      e.currentTarget.setAttribute('aria-pressed', String(state.showArchived));
      e.currentTarget.textContent = state.showArchived ? 'Hide archived' : 'Show archived';
      renderAllView();
    });

    // Drag-and-drop reordering (only in All view, manual sort)
    let dragId = null;
    const allList = document.getElementById('allHabitsList');
    allList.addEventListener('dragstart', e => {
      const card = e.target.closest('.habit-card');
      if (!card) return;
      dragId = card.dataset.id;
      card.classList.add('dragging');
    });
    allList.addEventListener('dragend', e => {
      const card = e.target.closest('.habit-card');
      if (card) card.classList.remove('dragging');
      dragId = null;
    });
    allList.addEventListener('dragover', e => {
      e.preventDefault();
      const after = getDragAfterElement(allList, e.clientY);
      const dragging = allList.querySelector('.dragging');
      if (!dragging) return;
      if (after == null) allList.appendChild(dragging);
      else allList.insertBefore(dragging, after);
    });
    allList.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragId) return;
      // Rebuild order from DOM
      const orderedIds = [...allList.querySelectorAll('.habit-card')].map(c => c.dataset.id);
      state.habits.sort((a, b) => orderedIds.indexOf(a.id) - orderedIds.indexOf(b.id));
      saveData();
      render();
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeModal();
        closeDayModal();
        document.getElementById('confirmOverlay').classList.remove('active');
      }
    });
  }

  function seedSampleHabits() {
    const samples = [
      { name: 'Drink water', description: 'Stay hydrated', icon: '💧', color: '#60a5fa', days: [0,1,2,3,4,5,6], goal: '8 glasses' },
      { name: 'Read', description: 'Grow your mind', icon: '📚', color: '#a78bfa', days: [1,2,3,4,5], goal: '20 pages' },
      { name: 'Exercise', description: 'Move your body', icon: '💪', color: '#4ade80', days: [1,3,5], goal: '30 min' }
    ];
    state.habits = samples.map(createHabit);
    saveData();
  }

  // ========== INIT ==========
  function init() {
    loadTheme();
    loadData();
    attachEvents();

    // Seed friendly sample habits the very first time only
    if (state.habits.length === 0 && !localStorage.getItem('habitus_initialized')) {
      seedSampleHabits();
      localStorage.setItem('habitus_initialized', 'true');
      showToast('Welcome! Added 3 sample habits to get you started', 'success');
    }

    render();
  }
