<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branchwright — Dialogue Tree Builder</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-panel: #171a23;
    --bg-panel-2: #1d212c;
    --bg-elev: #232838;
    --border: #2b3140;
    --border-light: #353c4d;
    --text: #e4e7ee;
    --text-dim: #9aa2b3;
    --text-faint: #646c7e;
    --accent: #6c8cff;
    --accent-hover: #8aa3ff;
    --accent-dim: #2d3658;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --purple: #c084fc;
    --teal: #2dd4bf;
    --pink: #f472b6;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: 13px; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #444c60; }

  /* ===== Layout ===== */
  #app { display: flex; flex-direction: column; height: 100vh; }
  
  /* Topbar */
  #topbar {
    height: 46px; flex-shrink: 0; display: flex; align-items: center;
    padding: 0 12px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
    gap: 8px; z-index: 50;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; margin-right: 8px; }
  .logo .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .logo .name span { color: var(--accent); }
  .topbar-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
  .topbar-spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 11px;
    border-radius: 6px; font-size: 12.5px; font-weight: 500; color: var(--text-dim);
    transition: all .12s; white-space: nowrap; border: 1px solid transparent;
  }
  .btn:hover { background: var(--bg-elev); color: var(--text); }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.ghost-border { border: 1px solid var(--border-light); }
  .btn.active { background: var(--accent-dim); color: var(--accent-hover); }
  .btn-icon {
    width: 32px; height: 32px; display: inline-flex; align-items: center;
    justify-content: center; border-radius: 6px; color: var(--text-dim); transition: all .12s;
  }
  .btn-icon:hover { background: var(--bg-elev); color: var(--text); }
  .btn-icon.active { background: var(--accent-dim); color: var(--accent-hover); }
  svg.ic { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  svg.ic.sm { width: 14px; height: 14px; }

  /* Main */
  #main { flex: 1; display: flex; min-height: 0; }

  /* Left sidebar */
  #sidebar {
    width: 250px; flex-shrink: 0; background: var(--bg-panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width .15s;
  }
  #sidebar.collapsed { width: 0; overflow: hidden; }
  .side-section { border-bottom: 1px solid var(--border); }
  .side-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--text-faint); cursor: pointer; user-select: none;
  }
  .side-head:hover { color: var(--text-dim); }
  .side-body { padding: 4px 8px 10px; max-height: 280px; overflow-y: auto; }
  .side-body.scenes { max-height: 220px; }

  .scene-item {
    display: flex; align-items: center; gap: 7px; padding: 7px 8px; border-radius: 6px;
    cursor: pointer; font-size: 13px; color: var(--text-dim); transition: all .1s; position: relative;
  }
  .scene-item:hover { background: var(--bg-elev); color: var(--text); }
  .scene-item.active { background: var(--accent-dim); color: var(--text); }
  .scene-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .scene-item .scene-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scene-item .scene-count { font-size: 10px; color: var(--text-faint); background: var(--bg-elev); padding: 1px 6px; border-radius: 8px; }
  .scene-item .scene-del { opacity: 0; transition: opacity .1s; }
  .scene-item:hover .scene-del { opacity: 1; }

  .var-row {
    display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 5px; font-size: 12px;
  }
  .var-row:hover { background: var(--bg-elev); }
  .var-type-badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; text-transform: uppercase;
  }
  .vt-bool { background: rgba(74,222,128,.15); color: var(--green); }
  .vt-int { background: rgba(108,140,255,.15); color: var(--accent); }
  .vt-string { background: rgba(192,132,252,.15); color: var(--purple); }
  .var-name { flex: 1; font-family: ui-monospace, monospace; overflow: hidden; text-overflow: ellipsis; }
  .var-val { color: var(--text-faint); font-family: ui-monospace, monospace; }

  .small-btn {
    width: 100%; padding: 7px; border-radius: 6px; border: 1px dashed var(--border-light);
    color: var(--text-faint); font-size: 12px; display: flex; align-items: center;
    justify-content: center; gap: 5px; transition: all .12s; margin-top: 4px;
  }
  .small-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* Canvas area */
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
  #canvas-grid {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.045) 1px, transparent 1px);
    background-size: 22px 22px;
  }
  #canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    transform-origin: 0 0;
  }
  #edges-svg { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; width: 1px; height: 1px; }
  .edge-path { fill: none; stroke-width: 2; transition: stroke .15s; pointer-events: stroke; cursor: pointer; }
  .edge-hit { fill: none; stroke: transparent; stroke-width: 14px; pointer-events: stroke; cursor: pointer; }
  .edge-label {
    font-size: 10px; fill: var(--text-dim); pointer-events: none;
  }
  .edge-label-bg { fill: var(--bg-panel); rx: 3; }

  /* Node */
  .node {
    position: absolute; width: 240px; background: var(--bg-panel);
    border: 1.5px solid var(--border-light); border-radius: 10px;
    box-shadow: var(--shadow); user-select: none; transition: border-color .12s, box-shadow .12s;
  }
  .node:hover { border-color: #4a5468; }
  .node.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim), var(--shadow); }
  .node.start-node { border-color: var(--green); }
  .node-header {
    display: flex; align-items: center; gap: 7px; padding: 8px 10px;
    border-bottom: 1px solid var(--border); cursor: grab; border-radius: 9px 9px 0 0;
  }
  .node-header:active { cursor: grabbing; }
  .node-type-icon {
    width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 12px;
  }
  .nt-dialogue { background: rgba(108,140,255,.18); color: var(--accent); }
  .nt-choice { background: rgba(251,191,36,.18); color: var(--amber); }
  .nt-condition { background: rgba(45,212,191,.18); color: var(--teal); }
  .nt-action { background: rgba(244,114,182,.18); color: var(--pink); }
  .nt-end { background: rgba(248,113,113,.18); color: var(--red); }
  .node-title { flex: 1; font-weight: 600; font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .node-id { font-size: 9px; color: var(--text-faint); font-family: ui-monospace, monospace; }
  .node-speaker {
    padding: 6px 10px 0; font-size: 11px; font-weight: 600; color: var(--accent-hover);
    display: flex; align-items: center; gap: 5px;
  }
  .node-body {
    padding: 8px 10px; font-size: 12px; color: var(--text-dim); line-height: 1.45;
    max-height: 70px; overflow: hidden; position: relative;
  }
  .node-body.empty { color: var(--text-faint); font-style: italic; }
  .node-tag {
    display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 4px;
    background: var(--bg-elev); color: var(--text-faint); margin: 0 2px 2px 0; font-family: ui-monospace, monospace;
  }
  .node-choices { padding: 4px 8px 8px; }
  .choice-pill {
    display: flex; align-items: center; gap: 6px; padding: 5px 8px; margin-top: 4px;
    background: var(--bg-elev); border-radius: 6px; font-size: 11px; position: relative;
  }
  .choice-pill .choice-txt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .port {
    position: absolute; width: 13px; height: 13px; border-radius: 50%;
    background: var(--bg-panel); border: 2px solid var(--text-faint); cursor: crosshair;
    z-index: 5; transition: all .1s;
  }
  .port:hover { border-color: var(--accent); background: var(--accent); transform: scale(1.25); }
  .port.in { left: -7px; top: 50%; transform: translateY(-50%); }
  .port.in:hover { transform: translateY(-50%) scale(1.25); }
  .port.out { right: -7px; }
  .choice-pill .port.out { top: 50%; transform: translateY(-50%); right: -15px; }
  .node-footer-port { right: -7px; top: 18px; }

  /* Inspector */
  #inspector {
    width: 320px; flex-shrink: 0; background: var(--bg-panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width .15s;
  }
  #inspector.collapsed { width: 0; overflow: hidden; }
  .insp-head {
    padding: 11px 14px; border-bottom: 1px solid var(--border); display: flex;
    align-items: center; gap: 8px; flex-shrink: 0;
  }
  .insp-head .insp-title { font-weight: 700; font-size: 13px; flex: 1; }
  .insp-body { flex: 1; overflow-y: auto; padding: 14px; }
  .insp-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-faint); text-align: center; gap: 10px; padding: 20px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 11px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px;
  }
  .field input[type=text], .field input[type=number], .field select, .field textarea {
    width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border-light);
    border-radius: 6px; color: var(--text); outline: none; transition: border-color .12s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .field .hint { font-size: 10.5px; color: var(--text-faint); margin-top: 4px; }
  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }

  .choice-edit {
    background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
    padding: 9px; margin-bottom: 8px;
  }
  .choice-edit-head { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
  .choice-edit-head .idx { font-size: 10px; color: var(--text-faint); font-weight: 700; }
  .cond-builder { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 9px; margin-bottom: 8px; }

  .seg { display: flex; background: var(--bg); border: 1px solid var(--border-light); border-radius: 6px; padding: 2px; gap: 2px; }
  .seg button { flex: 1; padding: 6px; border-radius: 4px; font-size: 11px; color: var(--text-dim); transition: all .1s; }
  .seg button.active { background: var(--accent); color: #fff; }

  /* Bottom status bar */
  #statusbar {
    height: 26px; flex-shrink: 0; background: var(--bg-panel); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 12px; gap: 14px; font-size: 11px; color: var(--text-faint);
  }
  .status-item { display: flex; align-items: center; gap: 5px; }
  .zoom-ctl { display: flex; align-items: center; gap: 2px; margin-left: auto; }
  .zoom-ctl button { width: 22px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .zoom-ctl button:hover { background: var(--bg-elev); color: var(--text); }

  /* Context menu */
  #ctxmenu {
    position: fixed; background: var(--bg-elev); border: 1px solid var(--border-light);
    border-radius: 8px; box-shadow: var(--shadow); padding: 5px; z-index: 200; min-width: 175px; display: none;
  }
  .ctx-item {
    display: flex; align-items: center; gap: 9px; padding: 8px 11px; border-radius: 6px;
    font-size: 12.5px; color: var(--text-dim); cursor: pointer;
  }
  .ctx-item:hover { background: var(--accent-dim); color: var(--text); }
  .ctx-item.danger:hover { background: rgba(248,113,113,.15); color: var(--red); }
  .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }
  .ctx-dot { width: 9px; height: 9px; border-radius: 3px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 300;
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 12px;
    width: 560px; max-width: 92vw; max-height: 86vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .modal-head {
    padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex;
    align-items: center; gap: 10px;
  }
  .modal-head h2 { font-size: 15px; flex: 1; }
  .modal-body { padding: 18px; overflow-y: auto; }
  .modal-foot { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  pre.export {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
    font-family: ui-monospace, monospace; font-size: 11.5px; line-height: 1.6; overflow: auto;
    max-height: 50vh; color: var(--teal); white-space: pre;
  }

  /* Play mode */
  #player {
    position: absolute; inset: 0; background: linear-gradient(160deg, #0a0c12, #14171f);
    z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
  }
  #player.show { display: flex; }
  .player-stage { width: 100%; max-width: 600px; }
  .player-speaker { font-size: 14px; font-weight: 700; color: var(--accent-hover); margin-bottom: 10px; }
  .player-text {
    font-size: 17px; line-height: 1.6; color: var(--text); min-height: 60px; margin-bottom: 24px;
    background: var(--bg-panel); padding: 20px 24px; border-radius: 12px; border: 1px solid var(--border);
  }
  .player-choices { display: flex; flex-direction: column; gap: 10px; }
  .player-choice {
    text-align: left; padding: 13px 18px; background: var(--bg-panel); border: 1px solid var(--border-light);
    border-radius: 10px; color: var(--text-dim); font-size: 14px; transition: all .12s;
  }
  .player-choice:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); transform: translateX(3px); }
  .player-choice.locked { opacity: .4; cursor: not-allowed; }
  .player-vars {
    position: absolute; top: 60px; right: 30px; width: 200px; background: var(--bg-panel);
    border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 11px;
  }
  .player-bar { position: absolute; top: 0; left: 0; right: 0; height: 50px; display: flex; align-items: center; padding: 0 20px; gap: 12px; }

  .empty-canvas {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center;
    color: var(--text-faint); pointer-events: none;
  }
  .empty-canvas .ec-title { font-size: 16px; font-weight: 600; margin: 10px 0 4px; color: var(--text-dim); }

  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-elev); border: 1px solid var(--border-light); padding: 10px 18px;
    border-radius: 8px; font-size: 12.5px; box-shadow: var(--shadow); opacity: 0; transition: all .2s; z-index: 400; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
  .checkbox-row input { width: 15px; height: 15px; accent-color: var(--accent); }
  .checkbox-row label { font-size: 12.5px; color: var(--text-dim); cursor: pointer; margin: 0; text-transform: none; letter-spacing: 0; }

  .minimap {
    position: absolute; bottom: 12px; right: 12px; width: 180px; height: 120px;
    background: rgba(15,17,23,.85); border: 1px solid var(--border-light); border-radius: 8px;
    overflow: hidden; backdrop-filter: blur(4px);
  }
  .minimap canvas { width: 100%; height: 100%; }
  .icon-btn-sm { padding: 3px; border-radius: 4px; color: var(--text-faint); }
  .icon-btn-sm:hover { background: var(--bg-elev); color: var(--text); }
</style>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <div class="logo">
      <div class="mark">⌥</div>
      <div class="name">Branch<span>wright</span></div>
    </div>
    <div class="topbar-divider"></div>
    <button class="btn-icon" id="toggleSidebar" title="Toggle sidebar (⌘B)">
      <svg class="ic"><use href="#i-panel-left"/></svg>
    </button>
    <button class="btn" id="addNodeBtn"><svg class="ic sm"><use href="#i-plus"/></svg>Add Node</button>
    <div class="topbar-divider"></div>
    <button class="btn-icon" id="undoBtn" title="Undo (⌘Z)"><svg class="ic"><use href="#i-undo"/></svg></button>
    <button class="btn-icon" id="redoBtn" title="Redo (⌘⇧Z)"><svg class="ic"><use href="#i-redo"/></svg></button>
    <div class="topbar-divider"></div>
    <button class="btn-icon" id="autoLayoutBtn" title="Auto layout"><svg class="ic"><use href="#i-layout"/></svg></button>
    <button class="btn-icon" id="fitBtn" title="Fit to view"><svg class="ic"><use href="#i-fit"/></svg></button>

    <div class="topbar-spacer"></div>

    <div style="position:relative;">
      <svg class="ic sm" style="position:absolute;left:9px;top:8px;color:var(--text-faint);"><use href="#i-search"/></svg>
      <input type="text" id="searchInput" placeholder="Search nodes…" style="padding:6px 10px 6px 30px;width:180px;background:var(--bg);border:1px solid var(--border-light);border-radius:6px;color:var(--text);outline:none;">
    </div>
    <div class="topbar-divider"></div>
    <button class="btn ghost-border" id="validateBtn"><svg class="ic sm"><use href="#i-check"/></svg>Validate</button>
    <button class="btn ghost-border" id="exportBtn"><svg class="ic sm"><use href="#i-download"/></svg>Export</button>
    <button class="btn primary" id="playBtn"><svg class="ic sm"><use href="#i-play"/></svg>Playtest</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="side-section">
        <div class="side-head" data-toggle="scenes">
          <span>Scenes / Conversations</span>
          <svg class="ic sm"><use href="#i-chevron-down"/></svg>
        </div>
        <div class="side-body scenes" id="scenesList"></div>
        <div style="padding:0 8px 10px;">
          <button class="small-btn" id="addSceneBtn"><svg class="ic sm"><use href="#i-plus"/></svg>New Scene</button>
        </div>
      </div>
      <div class="side-section">
        <div class="side-head" data-toggle="vars">
          <span>Variables &amp; Flags</span>
          <svg class="ic sm"><use href="#i-chevron-down"/></svg>
        </div>
        <div class="side-body" id="varsList"></div>
        <div style="padding:0 8px 10px;">
          <button class="small-btn" id="addVarBtn"><svg class="ic sm"><use href="#i-plus"/></svg>New Variable</button>
        </div>
      </div>
      <div class="side-section" style="flex:1;">
        <div class="side-head" data-toggle="chars">
          <span>Characters</span>
          <svg class="ic sm"><use href="#i-chevron-down"/></svg>
        </div>
        <div class="side-body" id="charsList"></div>
        <div style="padding:0 8px 10px;">
          <button class="small-btn" id="addCharBtn"><svg class="ic sm"><use href="#i-plus"/></svg>New Character</button>
        </div>
      </div>
    </div>

    <!-- CANVAS -->
    <div id="canvas-wrap">
      <div id="canvas-grid"></div>
      <div id="canvas">
        <svg id="edges-svg"></svg>
      </div>
      <div class="empty-canvas" id="emptyCanvas">
        <svg class="ic" style="width:48px;height:48px;color:var(--border-light);"><use href="#i-tree"/></svg>
        <div class="ec-title">Empty scene</div>
        <div>Double-click the canvas or use “Add Node” to begin.</div>
      </div>
      <div class="minimap" id="minimap"><canvas id="minimapCanvas" width="360" height="240"></canvas></div>

      <!-- PLAYER OVERLAY -->
      <div id="player">
        <div class="player-bar">

    <!-- INSPECTOR -->

  <!-- STATUSBAR -->

    <div class="status-item" id="statScene"></div>
    <div class="status-item" id="statValid" style="color:var(--text-faint);"></div>
    <div class="zoom-ctl">
      <button id="zoomOut"><svg class="ic sm"><use href="#i-minus"/></svg></button>
      <span id="zoomLabel" style="width:42px;text-align:center;">100%</span>
      <button id="zoomIn"><svg class="ic sm"><use href="#i-plus"/></svg></button>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<!-- SVG ICONS -->
<svg style="display:none">

<script>
'use strict';

/* ============================ STATE ============================ */
const NODE_TYPES = {
  dialogue:  { label:'Dialogue',  icon:'i-msg',    cls:'nt-dialogue', color:'#6c8cff' },
  choice:    { label:'Choice',    icon:'i-branch', cls:'nt-choice',   color:'#fbbf24' },
  condition: { label:'Condition', icon:'i-branch', cls:'nt-condition',color:'#2dd4bf' },
  action:    { label:'Action',    icon:'i-flag',   cls:'nt-action',   color:'#f472b6' },
  end:       { label:'End',       icon:'i-stop',   cls:'nt-end',      color:'#f87171' }
};

let state = {
  scenes: {},
  activeScene: null,
  variables: [],     // {id,name,type,value}
  characters: [],    // {id,name,color}
  nextId: 1
};

const view = { x: 60, y: 60, scale: 1 };
let selectedNodeId = null;
let history = [];
let historyIdx = -1;
let suppressHistory = false;

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const uid = p => p + (state.nextId++);
const esc = s => (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ============================ INIT / SAMPLE ============================ */
function seed() {
  const sc1 = { id:'scene1', name:'Tavern Encounter', nodes:{}, startNode:null };
  state.scenes['scene1'] = sc1;
  state.activeScene = 'scene1';
  state.variables = [
    { id:uid('v'), name:'gold', type:'int', value:50 },
    { id:uid('v'), name:'metInnkeeper', type:'bool', value:false },
    { id:uid('v'), name:'playerName', type:'string', value:'Traveler' }
  ];
  state.characters = [
    { id:uid('c'), name:'Innkeeper', color:'#fbbf24' },
    { id:uid('c'), name:'Player', color:'#6c8cff' },
    { id:uid('c'), name:'Narrator', color:'#9aa2b3' }
  ];

  const n1 = makeNode('dialogue', 80, 120);
  n1.title='Greeting'; n1.speaker='Innkeeper'; n1.text='Welcome, weary traveler! What brings you to the Rusty Tankard?';
  const n2 = makeNode('choice', 420, 80);
  n2.title='Response'; n2.choices=[
    {id:uid('ch'), text:'I need a room for the night.', target:null, condition:''},
    {id:uid('ch'), text:'Just passing through.', target:null, condition:''},
    {id:uid('ch'), text:'[Gold ≥ 100] I want your finest ale!', target:null, condition:'gold >= 100'}
  ];
  const n3 = makeNode('action', 780, 60);
  n3.title='Pay for room'; n3.actions=[{op:'sub', variable:'gold', value:'10'}];
  const n4 = makeNode('dialogue', 780, 220);
  n4.title='Farewell'; n4.speaker='Innkeeper'; n4.text='Safe travels then. The road is dangerous after dark.';
  const n5 = makeNode('end', 1100, 140); n5.title='Scene End'; n5.endLabel='Conversation complete';

  n1.next = n2.id;
  n2.choices[0].target = n3.id;
  n2.choices[1].target = n4.id;
  n3.next = n5.id;
  n4.next = n5.id;

  [n1,n2,n3,n4,n5].forEach(n=>sc1.nodes[n.id]=n);
  sc1.startNode = n1.id;
}

function makeNode(type, x, y) {
  const n = { id:uid('n'), type, x, y, title:NODE_TYPES[type].label, text:'', speaker:'', next:null };
  if (type==='choice') n.choices = [];
  if (type==='condition') { n.condition=''; n.trueTarget=null; n.falseTarget=null; }
  if (type==='action') n.actions = [];
  if (type==='end') n.endLabel='';
  if (type==='dialogue') { n.tags=''; }
  return n;
}

/* ============================ HISTORY ============================ */
function snapshot() {
  if (suppressHistory) return;
  const snap = JSON.stringify({ scenes: state.scenes, variables: state.variables, characters: state.characters, nextId: state.nextId });
  history = history.slice(0, historyIdx+1);
  history.push(snap);
  if (history.length>60) history.shift();
  historyIdx = history.length-1;
  persist();
}
function undo(){ if(historyIdx>0){ historyIdx--; restore(history[historyIdx]); } }
function redo(){ if(historyIdx<history.length-1){ historyIdx++; restore(history[historyIdx]); } }
function restore(snap){
  const d = JSON.parse(snap);
  state.scenes=d.scenes; state.variables=d.variables; state.characters=d.characters; state.nextId=d.nextId;
  if(!state.scenes[state.activeScene]) state.activeScene = Object.keys(state.scenes)[0];
  selectedNodeId=null; renderAll();
}
function persist(){
  try { localStorage.setItem('branchwright', JSON.stringify(state)); } catch(e){}
}
function loadPersisted(){
  try {
    const raw = localStorage.getItem('branchwright');
    if(raw){ const d=JSON.parse(raw); Object.assign(state,d); return true; }
  } catch(e){}
  return false;
}

/* ============================ RENDER ============================ */
const canvas = $('#canvas');
const edgesSvg = $('#edges-svg');

function activeScene(){ return state.scenes[state.activeScene]; }

function renderAll(){
  renderScenes(); renderVars(); renderChars();
  renderCanvas(); renderInspector(); updateStatus(); applyTransform();
}

function applyTransform(){
  canvas.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.scale})`;
  $('#zoomLabel').textContent = Math.round(view.scale*100)+'%';
}

function renderScenes(){
  const c = $('#scenesList'); c.innerHTML='';
  Object.values(state.scenes).forEach(sc=>{
    const count = Object.keys(sc.nodes).length;
    const el = document.createElement('div');
    el.className = 'scene-item'+(sc.id===state.activeScene?' active':'');
    el.innerHTML = `<div class="dot" style="background:${sc.id===state.activeScene?'var(--accent)':'var(--text-faint)'}"></div>
      <span class="scene-name">${esc(sc.name)}</span>
      <span class="scene-count">${count}</span>
      <button class="icon-btn-sm scene-del"><svg class="ic sm"><use href="#i-trash"/></svg></button>`;
    el.querySelector('.scene-name').onclick = el.querySelector('.dot').onclick = ()=>{ state.activeScene=sc.id; selectedNodeId=null; renderAll(); };
    el.onclick = e=>{ if(!e.target.closest('.scene-del')){ state.activeScene=sc.id; selectedNodeId=null; renderAll(); } };
    el.querySelector('.scene-del').onclick = e=>{ e.stopPropagation(); deleteScene(sc.id); };
    c.appendChild(el);
  });
}

function renderVars(){
  const c = $('#varsList'); c.innerHTML='';
  if(!state.variables.length){ c.innerHTML='<div style="color:var(--text-faint);font-size:11px;padding:4px 6px;">No variables yet.</div>'; }
  state.variables.forEach(v=>{
    const el = document.createElement('div'); el.className='var-row';
    const tcls = {bool:'vt-bool',int:'vt-int',string:'vt-string'}[v.type];
    el.innerHTML = `<span class="var-type-badge ${tcls}">${v.type}</span>
      <span class="var-name">${esc(v.name)}</span>
      <span class="var-val">${esc(String(v.value))}</span>
      <button class="icon-btn-sm"><svg class="ic sm"><use href="#i-trash"/></svg></button>`;
    el.querySelector('button').onclick = ()=>{ state.variables=state.variables.filter(x=>x.id!==v.id); snapshot(); renderVars(); };
    el.querySelector('.var-name').onclick = ()=>editVar(v);
    c.appendChild(el);
  });
}

function renderChars(){
  const c = $('#charsList'); c.innerHTML='';
  state.characters.forEach(ch=>{
    const el = document.createElement('div'); el.className='var-row';
    el.innerHTML = `<div class="dot" style="width:10px;height:10px;border-radius:50%;background:${ch.color}"></div>
      <span class="var-name" style="font-family:inherit;">${esc(ch.name)}</span>
      <button class="icon-btn-sm"><svg class="ic sm"><use href="#i-trash"/></svg></button>`;
    el.querySelector('button').onclick = ()=>{ state.characters=state.characters.filter(x=>x.id!==ch.id); snapshot(); renderChars(); };
    el.querySelector('.var-name').onclick = ()=>editChar(ch);
    c.appendChild(el);
  });
}

function renderCanvas(){
  const sc = activeScene();
  // remove old nodes

  $$('.node').forEach(n=>n.remove());
  const nodes = Object.values(sc.nodes);
  $('#emptyCanvas').style.display = nodes.length? 'none':'block';
  nodes.forEach(n=>canvas.appendChild(buildNodeEl(n)));
  renderEdges();
  renderMinimap();
}

function buildNodeEl(n){
  const t = NODE_TYPES[n.type];
  const el = document.createElement('div');
  el.className = 'node'+(n.id===selectedNodeId?' selected':'')+(n.id===activeScene().startNode?' start-node':'');
  el.style.left = n.x+'px'; el.style.top = n.y+'px';
  el.dataset.id = n.id;

  let bodyHtml='';
  if(n.type==='dialogue'){
    bodyHtml = `${n.speaker?`<div class="node-speaker"><div class="dot" style="width:7px;height:7px;border-radius:50%;background:${charColor(n.speaker)}"></div>${esc(n.speaker)}</div>`:''}
      <div class="node-body ${n.text?'':'empty'}">${esc(n.text)||'No dialogue text…'}</div>
      ${n.tags?`<div style="padding:0 10px 6px;">${n.tags.split(',').filter(Boolean).map(t=>`<span class="node-tag">#${esc(t.trim())}</span>`).join('')}</div>`:''}`;
  } else if(n.type==='choice'){
    bodyHtml = `<div class="node-choices">${(n.choices||[]).map((ch,i)=>`
      <div class="choice-pill" data-choice="${ch.id}">
        <span style="color:var(--text-faint);font-size:10px;">${i+1}</span>
        <span class="choice-txt">${esc(ch.text)||'(empty choice)'}</span>
        ${ch.condition?`<svg class="ic sm" style="color:var(--teal);width:11px;height:11px;" title="${esc(ch.condition)}"><use href="#i-flag"/></svg>`:''}
        <div class="port out" data-port="choice" data-choice="${ch.id}"></div>
      </div>`).join('')||'<div style="color:var(--text-faint);font-size:11px;padding:4px;">No choices</div>'}</div>`;
  } else if(n.type==='condition'){
    bodyHtml = `<div class="node-body ${n.condition?'':'empty'}" style="font-family:ui-monospace,monospace;font-size:11px;">${esc(n.condition)||'No condition…'}</div>
      <div style="display:flex;justify-content:space-between;padding:0 12px 8px;font-size:10px;">
        <span style="color:var(--green);">▸ TRUE</span><span style="color:var(--red);">FALSE ▸</span>
      </div>`;
  } else if(n.type==='action'){
    bodyHtml = `<div class="node-body ${(n.actions||[]).length?'':'empty'}">${(n.actions||[]).map(a=>`<div class="node-tag">${esc(a.variable)} ${opSym(a.op)} ${esc(a.value)}</div>`).join('')||'No actions…'}</div>`;
  } else if(n.type==='end'){
    bodyHtml = `<div class="node-body ${n.endLabel?'':'empty'}">${esc(n.endLabel)||'End of branch'}</div>`;
  }

  el.innerHTML = `
    <div class="node-header">
      <div class="node-type-icon ${t.cls}"><svg class="ic sm"><use href="#${t.icon}"/></svg></div>
      <div class="node-title">${esc(n.title)}</div>
      <div class="node-id">${n.id}</div>
    </div>
    ${bodyHtml}
    <div class="port in"></div>
    ${n.type==='choice' ? '' :
      n.type==='condition' ? `<div class="port out" data-port="true" style="top:auto;bottom:34px;right:-7px;border-color:var(--green);"></div><div class="port out" data-port="false" style="top:auto;bottom:14px;right:-7px;border-color:var(--red);"></div>` :
      n.type==='end' ? '' :
      `<div class="port out node-footer-port" data-port="next"></div>`}
  `;
  wireNode(el, n);
  return el;
}

function opSym(op){ return {set:'=',add:'+=',sub:'-=',toggle:'⇄'}[op]||op; }
function charColor(name){ const c=state.characters.find(x=>x.name===name); return c?c.color:'var(--text-faint)'; }

/* ============================ EDGES ============================ */
function nodePortPos(node, kind, choiceId){
  // approximate using DOM
  const el = canvas.querySelector(`.node[data-id="${node.id}"]`);
  if(!el) return null;
  const nx = node.x, ny = node.y;
  const w = 240;
  if(kind==='in'){ return {x:nx, y:ny+22}; }
  if(node.type==='choice' && choiceId){
    const pill = el.querySelector(`.choice-pill[data-choice="${choiceId}"]`);
    if(pill){ const top = pill.offsetTop + pill.offsetHeight/2; return {x:nx+w, y:ny+top}; }
  }
  if(node.type==='condition'){
    if(kind==='true') return {x:nx+w, y:ny+el.offsetHeight-34};
    if(kind==='false') return {x:nx+w, y:ny+el.offsetHeight-14};
  }
  return {x:nx+w, y:ny+22};
}

function renderEdges(){
  const sc = activeScene();
  edgesSvg.innerHTML='';
  const links = collectLinks();
  links.forEach(l=>{
    const from = sc.nodes[l.from], to = sc.nodes[l.to];
    if(!from||!to) return;
    const p1 = nodePortPos(from, l.kind, l.choiceId);
    const p2 = nodePortPos(to, 'in');
    if(!p1||!p2) return;
    const dx = Math.max(40, Math.abs(p2.x-p1.x)*0.5);
    const d = `M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`;
    const color = l.kind==='true'?'#4ade80':l.kind==='false'?'#f87171':l.kind==='choice'?'#fbbf24':'#4a5468';
    const hit = mkSvg('path',{class:'edge-hit',d}); 
    const path = mkSvg('path',{class:'edge-path',d,stroke:color});
    hit.onclick = ()=>removeLink(l);
    hit.style.cursor='pointer';
    edgesSvg.appendChild(hit); edgesSvg.appendChild(path);
  });
}
function mkSvg(tag, attrs){ const e=document.createElementNS('http://www.w3.org/2000/svg',tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

function collectLinks(){
  const sc=activeScene(); const out=[];
  Object.values(sc.nodes).forEach(n=>{
    if(n.type==='choice'){ (n.choices||[]).forEach(ch=>{ if(ch.target) out.push({from:n.id,to:ch.target,kind:'choice',choiceId:ch.id}); }); }
    else if(n.type==='condition'){ if(n.trueTarget) out.push({from:n.id,to:n.trueTarget,kind:'true'}); if(n.falseTarget) out.push({from:n.id,to:n.falseTarget,kind:'false'}); }
    else if(n.next) out.push({from:n.id,to:n.next,kind:'next'});
  });
  return out;
}
function removeLink(l){
  const sc=activeScene(); const n=sc.nodes[l.from];
  if(l.kind==='choice'){ const ch=n.choices.find(c=>c.id===l.choiceId); if(ch) ch.target=null; }
  else if(l.kind==='true') n.trueTarget=null;
  else if(l.kind==='false') n.falseTarget=null;
  else n.next=null;
  snapshot(); renderCanvas();
}

/* ============================ NODE INTERACTION ============================ */
let drag=null, linking=null;

function wireNode(el, n){
  const header = el.querySelector('.node-header');
  header.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    selectNode(n.id);
    drag = { id:n.id, sx:e.clientX, sy:e.clientY, ox:n.x, oy:n.y };
    e.preventDefault();
  });
  el.addEventListener('mousedown', e=>{ if(!e.target.closest('.node-header')&&!e.target.closest('.port')) selectNode(n.id); });
  el.addEventListener('contextmenu', e=>{ e.preventDefault(); selectNode(n.id); showNodeCtx(e.clientX,e.clientY,n); });

  el.querySelectorAll('.port.out').forEach(p=>{
    p.addEventListener('mousedown', e=>{
      e.stopPropagation();
      linking = { from:n.id, kind:p.dataset.port, choiceId:p.dataset.choice||null };
      const r = canvasPoint(e.clientX,e.clientY);
      linking.tmp = mkSvg('path',{class:'edge-path',d:'',stroke:'var(--accent)','stroke-dasharray':'5 4'});
      edgesSvg.appendChild(linking.tmp);
      linking.start = nodePortPos(n, linking.kind, linking.choiceId);
    });
  });
  const inPort = el.querySelector('.port.in');
  inPort.addEventListener('mouseup', e=>{
    if(linking){ completeLink(n.id); }
  });
}

function completeLink(toId){
  if(!linking||linking.from===toId){ cancelLink(); return; }
  const sc=activeScene(); const from=sc.nodes[linking.from];
  if(linking.kind==='choice'){ const ch=from.choices.find(c=>c.id===linking.choiceId); if(ch) ch.target=toId; }
  else if(linking.kind==='true') from.trueTarget=toId;
  else if(linking.kind==='false') from.falseTarget=toId;
  else from.next=toId;
  cancelLink(); snapshot(); renderCanvas(); renderInspector();
}
function cancelLink(){ if(linking&&linking.tmp) linking.tmp.remove(); linking=null; }

function canvasPoint(cx,cy){
  const wrap=$('#canvas-wrap').getBoundingClientRect();
  return { x:(cx-wrap.left-view.x)/view.scale, y:(cy-wrap.top-view.y)/view.scale };
}

document.addEventListener('mousemove', e=>{
  if(drag){
    const sc=activeScene(); const n=sc.nodes[drag.id];
    n.x = drag.ox + (e.clientX-drag.sx)/view.scale;
    n.y = drag.oy + (e.clientY-drag.sy)/view.scale;
    const el=canvas.querySelector(`.node[data-id="${n.id}"]`);
    el.style.left=n.x+'px'; el.style.top=n.y+'px';
    renderEdges();
  }
  if(linking){
    const p=canvasPoint(e.clientX,e.clientY); const s=linking.start;
    const dx=Math.max(40,Math.abs(p.x-s.x)*0.5);
    linking.tmp.setAttribute('d',`M${s.x},${s.y} C${s.x+dx},${s.y} ${p.x-dx},${p.y} ${p.x},${p.y}`);
  }
});
document.addEventListener('mouseup', e=>{
  if(drag){ drag=null; snapshot(); renderMinimap(); }
  if(linking){
    const tgt = e.target.closest('.node');
    if(tgt) completeLink(tgt.dataset.id); else cancelLink();
  }
});

function selectNode(id){ selectedNodeId=id; $$('.node').forEach(n=>n.classList.toggle('selected', n.dataset.id===id)); renderInspector(); }

/* ============================ PAN / ZOOM ============================ */
const wrap = $('#canvas-wrap');
let panning=null;
wrap.addEventListener('mousedown', e=>{
  if(e.target===wrap||e.target.id==='canvas'||e.target.id==='canvas-grid'){
    if(e.button===0){ selectedNodeId=null; $$('.node').forEach(n=>n.classList.remove('selected')); renderInspector(); }
    panning={ sx:e.clientX, sy:e.clientY, ox:view.x, oy:view.y };
  }
});
document.addEventListener('mousemove', e=>{ if(panning){ view.x=panning.ox+(e.clientX-panning.sx); view.y=panning.oy+(e.clientY-panning.sy); applyTransform(); } });
document.addEventListener('mouseup', ()=>{ panning=null; });
wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey||true){
    const old=view.scale;
    const delta = -e.deltaY*0.0015;
    view.scale = Math.min(2.5, Math.max(0.25, view.scale*(1+delta)));
    const rect=wrap.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    view.x = mx - (mx-view.x)*(view.scale/old);
    view.y = my - (my-view.y)*(view.scale/old);
    applyTransform();
  }
},{passive:false});
wrap.addEventListener('dblclick', e=>{
  if(e.target===wrap||e.target.id==='canvas'||e.target.id==='canvas-grid'){
    const p=canvasPoint(e.clientX,e.clientY); addNode('dialogue', p.x-120, p.y-30);
  }
});

function setZoom(s){ const rect=wrap.getBoundingClientRect(); const cx=rect.width/2, cy=rect.height/2; const old=view.scale; view.scale=Math.min(2.5,Math.max(0.25,s)); view.x=cx-(cx-view.x)*(view.scale/old); view.y=cy-(cy-view.y)*(view.scale/old); applyTransform(); }

function fitView(){
  const sc=activeScene(); const nodes=Object.values(sc.nodes); if(!nodes.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{ minX=Math.min(minX,n.x); minY=Math.min(minY,n.y); maxX=Math.max(maxX,n.x+240); maxY=Math.max(maxY,n.y+160); });
  const rect=wrap.getBoundingClientRect();
  const sx=(rect.width-100)/(maxX-minX), sy=(rect.height-100)/(maxY-minY);
  view.scale=Math.min(1.2,Math.min(sx,sy));
  view.x = (rect.width-(maxX+minX)*view.scale)/2;
  view.y = (rect.height-(maxY+minY)*view.scale)/2;
  applyTransform();
}

/* ============================ NODE OPS ============================ */
function addNode(type, x, y){
  const sc=activeScene();
  if(x===undefined){ const rect=wrap.getBoundingClientRect(); const p=canvasPoint(rect.width/2,rect.height/2); x=p.x-120; y=p.y-30; }
  const n=makeNode(type,x,y);
  if(type==='choice') n.choices=[{id:uid('ch'),text:'New choice',target:null,condition:''}];
  if(type==='action') n.actions=[{op:'set',variable:state.variables[0]?.name||'',value:''}];
  sc.nodes[n.id]=n;
  if(!sc.startNode) sc.startNode=n.id;
  snapshot(); renderCanvas(); selectNode(n.id);
}
function deleteNode(id){
  const sc=activeScene(); delete sc.nodes[id];
  Object.values(sc.nodes).forEach(n=>{
    if(n.next===id) n.next=null;
    if(n.trueTarget===id) n.trueTarget=null;
    if(n.falseTarget===id) n.falseTarget=null;
    if(n.choices) n.choices.forEach(c=>{ if(c.target===id) c.target=null; });
  });
  if(sc.startNode===id) sc.startNode=Object.keys(sc.nodes)[0]||null;
  if(selectedNodeId===id) selectedNodeId=null;
  snapshot(); renderCanvas(); renderInspector();
}
function duplicateNode(id){
  const sc=activeScene(); const o=sc.nodes[id];
  const n=JSON.parse(JSON.stringify(o)); n.id=uid('n'); n.x+=30; n.y+=30; n.next=null;
  if(n.choices) n.choices.forEach(c=>{c.id=uid('ch');c.target=null;});
  if(n.trueTarget) n.trueTarget=null; if(n.falseTarget) n.falseTarget=null;
  sc.nodes[n.id]=n; snapshot(); renderCanvas(); selectNode(n.id);
}

function wireInspector(n){
  const sc=activeScene();
  const live=(sel,fn)=>{ const e=$(sel); if(e) e.addEventListener('input',()=>{ fn(e.value); suppressHistory=true; renderCanvas(); suppressHistory=false; updateStatus(); }); if(e) e.addEventListener('change',()=>snapshot()); };
  live('#f-title', v=>n.title=v);
  $('#f-type')?.addEventListener('change', e=>{ convertType(n, e.target.value); });
  $('#f-start')?.addEventListener('change', e=>{ if(e.target.checked) sc.startNode=n.id; else if(sc.startNode===n.id) sc.startNode=null; snapshot(); renderCanvas(); });
  live('#f-speaker', v=>n.speaker=v);
  live('#f-text', v=>n.text=v);
  live('#f-tags', v=>n.tags=v);
  live('#f-cond', v=>n.condition=v);
  live('#f-endlabel', v=>n.endLabel=v);

  $('#addChoice')?.addEventListener('click', ()=>{ n.choices.push({id:uid('ch'),text:'New choice',target:null,condition:''}); snapshot(); renderCanvas(); renderInspector(); });

  $$('#choicesEdit .choice-edit').forEach(ce=>{
    const cid=ce.dataset.cid; const ch=n.choices.find(c=>c.id===cid);
    ce.querySelector('.c-text').addEventListener('input',e=>{ch.text=e.target.value; suppressHistory=true;renderCanvas();suppressHistory=false;});
    ce.querySelector('.c-text').addEventListener('change',()=>snapshot());
    ce.querySelector('.c-cond').addEventListener('input',e=>{ch.condition=e.target.value;suppressHistory=true;renderCanvas();suppressHistory=false;});
    ce.querySelector('.c-cond').addEventListener('change',()=>snapshot());
    ce.querySelector('.c-del').addEventListener('click',()=>{ n.choices=n.choices.filter(c=>c.id!==cid); snapshot(); renderCanvas(); renderInspector(); });
  });

  $('#addAction')?.addEventListener('click',()=>{ n.actions.push({op:'set',variable:state.variables[0]?.name||'',value:''}); snapshot(); renderCanvas(); renderInspector(); });

  $$('#actionsEdit .cond-builder').forEach((ae,i)=>{
    const a=n.actions[i];
    ae.querySelector('.a-var').addEventListener('change',e=>{a.variable=e.target.value;snapshot();renderCanvas();});
    ae.querySelector('.a-op').addEventListener('change',e=>{a.op=e.target.value;snapshot();renderCanvas();});
    ae.querySelector('.a-val').addEventListener('input',e=>{a.value=e.target.value;suppressHistory=true;renderCanvas();suppressHistory=false;});
    ae.querySelector('.a-val').addEventListener('change',()=>snapshot());
    ae.querySelector('.a-del').addEventListener('click',()=>{ n.actions.splice(i,1); snapshot(); renderCanvas(); renderInspector(); });
  });

  $('#dupNode')?.addEventListener('click',()=>duplicateNode(n.id));
  $('#delNode')?.addEventListener('click',()=>{ if(confirm('Delete this node?')) deleteNode(n.id); });
}

function convertType(n, newType){
  n.type=newType;
  if(newType==='choice'&&!n.choices) n.choices=[{id:uid('ch'),text:'New choice',target:null,condition:''}];
  if(newType==='condition'){ n.condition=n.condition||''; n.trueTarget=n.trueTarget||null; n.falseTarget=n.falseTarget||null; }
  if(newType==='action'&&!n.actions) n.actions=[{op:'set',variable:state.variables[0]?.name||'',value:''}];
  if(newType==='end') n.endLabel=n.endLabel||'';
  snapshot(); renderCanvas(); renderInspector();
}

/* ============================ VALIDATION ============================ */
function validate(){
  const sc=activeScene(); const nodes=Object.values(sc.nodes); const issues=[];
  if(!sc.startNode) issues.push({lvl:'error',msg:'No start node defined.'});
  nodes.forEach(n=>{
    if(n.type==='dialogue'&&!n.text.trim()) issues.push({lvl:'warn',msg:`"${n.title}" has empty dialogue.`});
    if(n.type==='dialogue'&&!n.next) issues.push({lvl:'warn',msg:`"${n.title}" has no outgoing connection.`});
    if(n.type==='choice'){ if(!n.choices.length) issues.push({lvl:'error',msg:`"${n.title}" has no choices.`});
      n.choices.forEach((c,i)=>{ if(!c.target) issues.push({lvl:'warn',msg:`Choice ${i+1} in "${n.title}" is unlinked.`}); }); }
    if(n.type==='condition'){ if(!n.condition.trim()) issues.push({lvl:'error',msg:`"${n.title}" has empty condition.`});
      if(!n.trueTarget) issues.push({lvl:'warn',msg:`"${n.title}" TRUE branch unlinked.`});
      if(!n.falseTarget) issues.push({lvl:'warn',msg:`"${n.title}" FALSE branch unlinked.`}); }
  });
  // unreachable
  const reachable=new Set(); const stack=sc.startNode?[sc.startNode]:[];
  while(stack.length){ const id=stack.pop(); if(reachable.has(id))continue; reachable.add(id); const n=sc.nodes[id]; if(!n)continue;
    if(n.next)stack.push(n.next); if(n.trueTarget)stack.push(n.trueTarget); if(n.falseTarget)stack.push(n.falseTarget);
    if(n.choices)n.choices.forEach(c=>c.target&&stack.push(c.target)); }
  nodes.forEach(n=>{ if(!reachable.has(n.id)) issues.push({lvl:'warn',msg:`"${n.title}" is unreachable from start.`}); });

  const errs=issues.filter(i=>i.lvl==='error').length;
  $('#statValid').innerHTML = issues.length? `<span style="color:${errs?'var(--red)':'var(--amber)'}">⚠ ${issues.length} issue${issues.length!==1?'s':''}</span>` : `<span style="color:var(--green)">✓ Valid</span>`;
  showModal('Validation Report', `
    <div style="margin-bottom:12px;color:var(--text-dim);">${issues.length?`Found ${issues.length} issue(s) in <b>${esc(sc.name)}</b>.`:'No issues found. This scene is valid! ✓'}</div>
    ${issues.map(i=>`<div style="display:flex;gap:8px;padding:8px 10px;border-radius:6px;background:var(--bg);margin-bottom:6px;align-items:flex-start;">
      <span style="color:${i.lvl==='error'?'var(--red)':'var(--amber)'};font-weight:700;font-size:10px;text-transform:uppercase;padding-top:2px;">${i.lvl}</span>
      <span style="flex:1;color:var(--text-dim);">${esc(i.msg)}</span></div>`).join('')}
  `, [{label:'Close',cls:'primary',fn:closeModal}]);
}

/* ============================ EXPORT ============================ */
function exportData(fmt){
  const data={ project:'Branchwright Export', scenes:state.scenes, variables:state.variables, characters:state.characters };
  let out, name;
  if(fmt==='json'){ out=JSON.stringify(data,null,2); name='dialogue.json'; }
  else if(fmt==='twee'){ out=toTwee(); name='dialogue.twee'; }
  else if(fmt==='yarn'){ out=toYarn(); name='dialogue.yarn'; }
  showModal('Export — '+fmt.toUpperCase(), `
    <div class="seg" style="margin-bottom:12px;">
      ${['json','twee','yarn'].map(f=>`<button class="${f===fmt?'active':''}" data-fmt="${f}">${f.toUpperCase()}</button>`).join('')}
    </div>
    <pre class="export" id="exportPre">${esc(out)}</pre>
  `, [
    {label:'Copy',cls:'ghost-border',fn:()=>{navigator.clipboard.writeText(out);toast('Copied to clipboard','success');}},
    {label:'Download',cls:'primary',fn:()=>{downloadFile(name,out);closeModal();}}
  ]);

  $$('#modal .seg button').forEach(b=>b.onclick=()=>exportData(b.dataset.fmt));
}
function toTwee(){
  let s='';
  Object.values(state.scenes).forEach(sc=>{
    Object.values(sc.nodes).forEach(n=>{
      s+=`:: ${n.id} {"position":"${Math.round(n.x)},${Math.round(n.y)}"}\n`;
      if(n.type==='dialogue'){ s+=(n.speaker?n.speaker+': ':'')+n.text+'\n'; if(n.next)s+=`[[Continue->${n.next}]]\n`; }
      else if(n.type==='choice'){ n.choices.forEach(c=>{ if(c.target)s+=`[[${c.text}->${c.target}]]\n`; }); }
      else if(n.type==='condition'){ s+=`(if: ${n.condition})[[[True->${n.trueTarget}]]](else:)[[[False->${n.falseTarget}]]]\n`; }
      else if(n.type==='action'){ n.actions.forEach(a=>s+=`(set: $${a.variable} ${a.op==='set'?'to':'to it +'} ${a.value})\n`); if(n.next)s+=`[[Continue->${n.next}]]\n`; }
      else if(n.type==='end'){ s+=`THE END. ${n.endLabel||''}\n`; }
      s+='\n';
    });
  });
  return s;
}
function toYarn(){
  let s='';
  Object.values(state.scenes).forEach(sc=>{
    Object.values(sc.nodes).forEach(n=>{
      s+=`title: ${n.id}\n---\n`;
      if(n.type==='dialogue'){ s+=(n.speaker?n.speaker+': ':'')+n.text+'\n'; if(n.next)s+=`<<jump ${n.next}>>\n`; }
      else if(n.type==='choice'){ n.choices.forEach(c=>{ s+=`-> ${c.text}${c.condition?` <<if ${c.condition}>>`:''}\n${c.target?`    <<jump ${c.target}>>`:''}\n`; }); }
      else if(n.type==='action'){ n.actions.forEach(a=>s+=`<<set $${a.variable} ${opSym(a.op)} ${a.value}>>\n`); if(n.next)s+=`<<jump ${n.next}>>\n`; }
      else if(n.type==='condition'){ s+=`<<if ${n.condition}>>\n<<jump ${n.trueTarget}>>\n<<else>>\n<<jump ${n.falseTarget}>>\n<<endif>>\n`; }
      s+='===\n\n';
    });
  });
  return s;
}
function downloadFile(name,content){
  const blob=new Blob([content],{type:'text/plain'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href);
}

/* ============================ PLAYTEST ============================ */
let play=null;
function startPlay(){
  const sc=activeScene();
  if(!sc.startNode){ toast('Set a start node first','error'); return; }
  const vars={}; state.variables.forEach(v=>vars[v.name]= v.type==='int'?Number(v.value): v.type==='bool'? (v.value===true||v.value==='true') : v.value);
  play={ vars, current:sc.startNode };
  $('#player').classList.add('show');
  renderPlay();
}
function evalCond(expr, vars){
  if(!expr||!expr.trim()) return true;
  try{
    let e=expr;
    Object.keys(vars).forEach(k=>{ e=e.replace(new RegExp('\\b'+k+'\\b','g'), JSON.stringify(vars[k])); });
    if(/[^0-9\s<>=!&|."'truefalsenul()+\-*/]/i.test(e.replace(/"[^"]*"/g,''))) return true;
    return !!Function('"use strict";return ('+e+')')();
  }catch(e){ return true; }
}
function applyActions(n, vars){
  (n.actions||[]).forEach(a=>{
    const cur=vars[a.variable];
    if(a.op==='set') vars[a.variable]= isNaN(a.value)? a.value : Number(a.value);
    else if(a.op==='add') vars[a.variable]=(Number(cur)||0)+Number(a.value);
    else if(a.op==='sub') vars[a.variable]=(Number(cur)||0)-Number(a.value);
    else if(a.op==='toggle') vars[a.variable]=!cur;
  });
}
function interp(text, vars){ return (text||'').replace(/\{(\w+)\}/g,(m,k)=> k in vars? vars[k] : m); }
function renderPlay(){
  const sc=activeScene(); let n=sc.nodes[play.current];
  // auto-process action & condition nodes
  let guard=0;
  while(n && guard++<50){
    if(n.type==='action'){ applyActions(n,play.vars); if(n.next){ n=sc.nodes[n.next]; continue;} else break; }
    if(n.type==='condition'){ const r=evalCond(n.condition,play.vars); const t=r?n.trueTarget:n.falseTarget; if(t){ n=sc.nodes[t]; continue;} else break; }
    break;
  }
  play.current = n?n.id:null;
  renderPlayVars();
  if(!n){ $('#pSpeaker').textContent=''; $('#pText').textContent='— end of branch —'; $('#pChoices').innerHTML=''; return; }
  if(n.type==='end'){ $('#pSpeaker').textContent=''; $('#pText').innerHTML=`<span style="color:var(--red)">◆ ${esc(n.endLabel||'THE END')}</span>`; $('#pChoices').innerHTML=`<button class="player-choice" id="pRestart2">↺ Play again</button>`; $('#pRestart2').onclick=startPlay; return; }
  if(n.type==='dialogue'){
    $('#pSpeaker').textContent=n.speaker||''; $('#pSpeaker').style.color=charColor(n.speaker);
    $('#pText').textContent=interp(n.text,play.vars);
    $('#pChoices').innerHTML = n.next? '<button class="player-choice" id="pNext">Continue →</button>' : '<div style="color:var(--text-faint)">No continuation.</div>';
    if(n.next)$('#pNext').onclick=()=>{ play.current=n.next; renderPlay(); };
  } else if(n.type==='choice'){
    $('#pSpeaker').textContent=''; $('#pText').textContent='';
    $('#pChoices').innerHTML='';
    n.choices.forEach(c=>{
      const ok=evalCond(c.condition,play.vars);
      const b=document.createElement('button'); b.className='player-choice'+(ok?'':' locked');
      b.textContent=interp(c.text,play.vars)+(c.condition&&!ok?' 🔒':'');
      if(ok&&c.target) b.onclick=()=>{ play.current=c.target; renderPlay(); };
      $('#pChoices').appendChild(b);
    });
  }
}
function renderPlayVars(){
  $('#playerVars').innerHTML=`<div style="font-weight:700;margin-bottom:8px;color:var(--text-dim);">State</div>`+
    Object.entries(play.vars).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:2px 0;"><span style="color:var(--text-dim)">${esc(k)}</span><span style="color:var(--accent);font-family:ui-monospace,monospace;">${esc(String(v))}</span></div>`).join('');
}

/* ============================ SCENES / VARS / CHARS DIALOGS ============================ */
function addScene(){
  const id=uid('scene'); state.scenes[id]={id,name:'New Scene '+Object.keys(state.scenes).length,nodes:{},startNode:null};
  state.activeScene=id; selectedNodeId=null; snapshot(); renderAll();
}
function deleteScene(id){
  if(Object.keys(state.scenes).length<=1){ toast('Cannot delete the only scene','error'); return; }
  if(!confirm('Delete this scene and all its nodes?')) return;
  delete state.scenes[id];
  if(state.activeScene===id) state.activeScene=Object.keys(state.scenes)[0];
  snapshot(); renderAll();
}
function editVar(v){
  showModal(v?'Edit Variable':'New Variable',`
    <div class="field"><label>Name</label><input type="text" id="vName" value="${v?esc(v.name):''}" placeholder="variableName"></div>
    <div class="field"><label>Type</label><select id="vType">${['int','bool','string'].map(t=>`<option value="${t}" ${v&&v.type===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="field"><label>Default Value</label><input type="text" id="vVal" value="${v?esc(String(v.value)):''}" placeholder="0 / true / text"></div>
  `,[{label:'Cancel',cls:'ghost-border',fn:closeModal},{label:'Save',cls:'primary',fn:()=>{
    const name=$('#vName').value.trim(); if(!name){toast('Name required','error');return;}
    const type=$('#vType').value; let val=$('#vVal').value;
    if(type==='int')val=Number(val)||0; if(type==='bool')val=(val==='true'||val===true);
    if(v){ v.name=name; v.type=type; v.value=val; } else state.variables.push({id:uid('v'),name,type,value:val});
    snapshot(); renderVars(); closeModal();
  }}]);
}
function editChar(ch){
  const colors=['#6c8cff','#fbbf24','#4ade80','#f472b6','#c084fc','#2dd4bf','#f87171','#9aa2b3'];
  showModal(ch?'Edit Character':'New Character',`
    <div class="field"><label>Name</label><input type="text" id="cName" value="${ch?esc(ch.name):''}" placeholder="Character name"></div>
    <div class="field"><label>Color</label><div style="display:flex;gap:8px;flex-wrap:wrap;">${colors.map(c=>`<button class="cColor" data-c="${c}" style="width:30px;height:30px;border-radius:7px;background:${c};border:2px solid ${ch&&ch.color===c?'#fff':'transparent'};"></button>`).join('')}</div></div>
  `,[{label:'Cancel',cls:'ghost-border',fn:closeModal},{label:'Save',cls:'primary',fn:()=>{
    const name=$('#cName').value.trim(); if(!name){toast('Name required','error');return;}
    const sel=$('#modal .cColor.sel'); const color=sel?sel.dataset.c:(ch?ch.color:colors[0]);
    if(ch){ch.name=name;ch.color=color;} else state.characters.push({id:uid('c'),name,color});
    snapshot(); renderChars(); closeModal();
  }}]);

  $$('#modal .cColor').forEach(b=>b.onclick=()=>{ $$('#modal .cColor').forEach(x=>{x.classList.remove('sel');x.style.borderColor='transparent';}); b.classList.add('sel'); b.style.borderColor='#fff'; });
}

/* ============================ MODAL / TOAST / CTX ============================ */
function showModal(title, body, buttons){
  $('#modal').innerHTML=`
    <div class="modal-head"><h2>${esc(title)}</h2><button class="btn-icon" id="modalClose"><svg class="ic"><use href="#i-x"/></svg></button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot">${buttons.map((b,i)=>`<button class="btn ${b.cls}" data-bi="${i}">${b.label}</button>`).join('')}</div>`;
  $('#modalOverlay').classList.add('show');
  $('#modalClose').onclick=closeModal;
  buttons.forEach((b,i)=>$(`#modal [data-bi="${i}"]`).onclick=b.fn);
}
function closeModal(){ $('#modalOverlay').classList.remove('show'); }
$('#modalOverlay').addEventListener('click',e=>{ if(e.target===$('#modalOverlay')) closeModal(); });

let toastTimer;
function toast(msg,type){ const t=$('#toast'); t.textContent=msg; t.className='toast show '+(type||''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200); }

function showNodeCtx(x,y,n){
  const m=$('#ctxmenu');
  m.innerHTML=`
    <div class="ctx-item" data-a="setstart"><svg class="ic sm"><use href="#i-star"/></svg>Set as start node</div>
    <div class="ctx-item" data-a="dup"><svg class="ic sm"><use href="#i-copy"/></svg>Duplicate</div>
    <div class="ctx-sep"></div>
    ${Object.entries(NODE_TYPES).map(([k,v])=>`<div class="ctx-item" data-conv="${k}"><span class="ctx-dot" style="background:${v.color}"></span>Convert to ${v.label}</div>`).join('')}
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" data-a="del"><svg class="ic sm"><use href="#i-trash"/></svg>Delete node</div>`;
  m.style.display='block'; m.style.left=Math.min(x,innerWidth-190)+'px'; m.style.top=Math.min(y,innerHeight-300)+'px';
  m.querySelectorAll('[data-a]').forEach(it=>it.onclick=()=>{ const a=it.dataset.a; hideCtx();
    if(a==='setstart'){activeScene().startNode=n.id;snapshot();renderCanvas();}
    if(a==='dup')duplicateNode(n.id); if(a==='del')deleteNode(n.id); });
  m.querySelectorAll('[data-conv]').forEach(it=>it.onclick=()=>{ hideCtx(); convertType(n,it.dataset.conv); });
}
function hideCtx(){ $('#ctxmenu').style.display='none'; }
document.addEventListener('click',hideCtx);
document.addEventListener('contextmenu',e=>{ if(!e.target.closest('.node')&&!e.target.closest('#ctxmenu')) hideCtx(); });

/* ============================ MINIMAP ============================ */
function renderMinimap(){
  const cv=$('#minimapCanvas'); const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const nodes=Object.values(activeScene().nodes); if(!nodes.length)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+240);maxY=Math.max(maxY,n.y+150);});
  const pad=40; minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const s=Math.min(cv.width/(maxX-minX),cv.height/(maxY-minY));
  nodes.forEach(n=>{ const t=NODE_TYPES[n.type]; ctx.fillStyle=t.color; ctx.globalAlpha=.85;
    ctx.fillRect((n.x-minX)*s,(n.y-minY)*s,240*s,90*s); });
  ctx.globalAlpha=1;
}

/* ============================ EVENTS ============================ */
$('#addNodeBtn').onclick=()=>{ addNode('dialogue'); };
$('#addSceneBtn').onclick=addScene;
$('#addVarBtn').onclick=()=>editVar(null);
$('#addCharBtn').onclick=()=>editChar(null);
$('#undoBtn').onclick=undo; $('#redoBtn').onclick=redo;
$('#fitBtn').onclick=fitView;
$('#autoLayoutBtn').onclick=autoLayout;
$('#validateBtn').onclick=validate;
$('#exportBtn').onclick=()=>exportData('json');
$('#playBtn').onclick=startPlay;
$('#closePlay').onclick=()=>$('#player').classList.remove('show');
$('#restartPlay').onclick=startPlay;
$('#zoomIn').onclick=()=>setZoom(view.scale*1.2);
$('#zoomOut').onclick=()=>setZoom(view.scale/1.2);
$('#zoomReset').onclick=()=>{view.scale=1;view.x=60;view.y=60;applyTransform();};
$('#toggleSidebar').onclick=()=>$('#sidebar').classList.toggle('collapsed');
$('#toggleInspector').onclick=()=>$('#inspector').classList.toggle('collapsed');

$$('.side-head').forEach(h=>h.onclick=()=>{ const b=h.nextElementSibling; b.style.display=b.style.display==='none'?'':'none'; h.querySelector('.ic').style.transform=b.style.display==='none'?'rotate(-90deg)':''; });

$('#searchInput').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();

  $$('.node').forEach(el=>{ const n=activeScene().nodes[el.dataset.id]; const hit=!q||((n.title+(n.text||'')+(n.speaker||'')).toLowerCase().includes(q));
    el.style.opacity=hit?'1':'0.2'; el.style.outline=q&&hit?'2px solid var(--accent)':''; });
});

function autoLayout(){
  const sc=activeScene(); if(!sc.startNode)return;
  const levels={}; const visited=new Set(); const q=[[sc.startNode,0]];
  while(q.length){ const [id,d]=q.shift(); if(visited.has(id))continue; visited.add(id); const n=sc.nodes[id]; if(!n)continue;
    (levels[d]=levels[d]||[]).push(id);
    const nx=[]; if(n.next)nx.push(n.next); if(n.trueTarget)nx.push(n.trueTarget); if(n.falseTarget)nx.push(n.falseTarget); if(n.choices)n.choices.forEach(c=>c.target&&nx.push(c.target));
    nx.forEach(t=>q.push([t,d+1])); }
  // unvisited
  let maxd=Math.max(0,...Object.keys(levels).map(Number));
  Object.values(sc.nodes).forEach(n=>{ if(!visited.has(n.id)){ (levels[maxd+1]=levels[maxd+1]||[]).push(n.id); } });
  Object.entries(levels).forEach(([d,ids])=>{ ids.forEach((id,i)=>{ const n=sc.nodes[id]; n.x=80+Number(d)*320; n.y=80+i*200; }); });
  snapshot(); renderCanvas(); fitView(); toast('Auto-layout applied','success');
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  const mod=e.metaKey||e.ctrlKey;
  if(mod&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  else if(mod&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
  else if(mod&&e.key==='b'){e.preventDefault();$('#sidebar').classList.toggle('collapsed');}
  else if((e.key==='Delete'||e.key==='Backspace')&&selectedNodeId){e.preventDefault();deleteNode(selectedNodeId);}
  else if(e.key==='Escape'){closeModal();$('#player').classList.remove('show');}
  else if(mod&&e.key==='d'&&selectedNodeId){e.preventDefault();duplicateNode(selectedNodeId);}
});

/* ============================ BOOT ============================ */
if(!loadPersisted()) seed();
if(!state.activeScene||!state.scenes[state.activeScene]) state.activeScene=Object.keys(state.scenes)[0];
snapshot();
renderAll();
setTimeout(fitView,100);
</script>
