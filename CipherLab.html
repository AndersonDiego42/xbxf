T({id:'hashid',name:'Hash identifier',cat:'analyze',icon:'?#',desc:'Guess which algorithm produced a hash based on its length and character set (MD5, SHA-1/256/512, CRC32, bcrypt, and more).',
  modes:['encode'],modeLabels:['Identify'],
  sample:'5d41402abc4b2a76b9719d911017c592',
  run(t){
    const s=t.trim();
    if(!s)return'(paste a hash)';
    const hexLen=/^[0-9a-fA-F]+$/.test(s)?s.length:0;
    const guesses=[];
    const hexMap={8:['CRC-32','Adler-32','FNV-1a (32-bit)'],16:['CRC-64','FNV-1a (64-bit)'],32:['MD5','MD4','NTLM','MD2'],40:['SHA-1','RIPEMD-160'],56:['SHA-224','SHA3-224'],64:['SHA-256','SHA3-256','BLAKE2s','Keccak-256'],96:['SHA-384','SHA3-384'],128:['SHA-512','SHA3-512','BLAKE2b','Whirlpool']};
    if(hexLen&&hexMap[hexLen])guesses.push(...hexMap[hexLen].map(a=>`${a}  (${hexLen*4}-bit hex)`));
    if(/^\$2[aby]\$\d\d\$[./A-Za-z0-9]{53}$/.test(s))guesses.unshift('bcrypt');
    if(/^\$1\$/.test(s))guesses.unshift('md5crypt (Unix)');
    if(/^\$5\$/.test(s))guesses.unshift('sha256crypt (Unix)');
    if(/^\$6\$/.test(s))guesses.unshift('sha512crypt (Unix)');
    if(/^\$argon2(id|i|d)\$/.test(s))guesses.unshift('Argon2');
    if(/^[0-9a-fA-F]{32}:[0-9a-fA-F]+$/.test(s))guesses.unshift('salted MD5 (hash:salt)');
    if(/^[A-Za-z0-9+/]+={0,2}$/.test(s)&&s.length%4===0){const bits=(s.replace(/=+$/,'').length*6);guesses.push(`Base64-encoded digest (~${Math.round(bits/8)} bytes)`);}
    if(!guesses.length)return'Unrecognised format.\nLength: '+s.length+' chars'+(hexLen?' (valid hex)':' (not pure hex)');
    return'Likely algorithm(s):\n'+guesses.map(g=>'  • '+g).join('\n');
  }});
T({id:'pwstrength',name:'Password strength',cat:'analyze',icon:'🛡',desc:'Estimate password strength: character-set entropy, estimated crack time, and practical warnings. Runs entirely in your browser.',
  modes:['encode'],modeLabels:['Analyse'],
  sample:'Tr0ub4dor&3',
  run(t){
    if(!t)return'';
    const len=t.length;
    let pool=0;
    if(/[a-z]/.test(t))pool+=26;
    if(/[A-Z]/.test(t))pool+=26;
    if(/[0-9]/.test(t))pool+=10;
    if(/[^A-Za-z0-9]/.test(t))pool+=33;
    const entropy=len*Math.log2(pool||1);
    const guessesPerSec=1e10; // offline fast attacker
    const human=s=>{
      if(s<1)return'instantly';
      const u=[['second',60],['minute',60],['hour',24],['day',365],['year',100],['century',1e9]];
      let v=s,i=0;for(;i<u.length-1&&v>=u[i][1];i++)v/=u[i][1];
      return `${v<10?v.toFixed(1):Math.round(v)} ${u[i][0]}${v>=2?'s':''}`;
    };
    const warns=[];
    if(len<8)warns.push('Shorter than 8 characters');
    if(pool<=36)warns.push('Limited character variety — add symbols/case');
    if(/^[a-z]+$/i.test(t))warns.push('Letters only');
    if(/(.)\1{2,}/.test(t))warns.push('Contains repeated characters');
    if(/^\d+$/.test(t))warns.push('Digits only (very predictable)');
    const commonWord=/1234|abcd|qwerty|password|passw0rd|letmein|welcome|admin|iloveyou|dragon|monkey|master/i.test(t);
    if(commonWord)warns.push('Contains a common sequence/word');
    // effective entropy: penalise predictable passwords so dictionary words never read as "Reasonable"
    let eff=entropy;
    if(commonWord)eff=Math.min(eff,20);
    if(/^\d+$/.test(t))eff=Math.min(eff,len*3);
    const label=eff<28?'Very weak':eff<36?'Weak':eff<60?'Reasonable':eff<128?'Strong':'Very strong';
    const bar='█'.repeat(Math.min(20,Math.round(eff/7)))+'░'.repeat(Math.max(0,20-Math.round(eff/7)));
    const secs=Math.pow(2,eff-1)/guessesPerSec;
    return [
      `Rating       ${label}`,
      `Strength     ${bar}`,
      `Length       ${len} chars`,
      `Charset pool ${pool} symbols`,
      `Entropy      ${entropy.toFixed(1)} bits${eff<entropy?` (effective ~${eff.toFixed(0)})`:''}`,
      `Crack time   ~${human(secs)} (offline, 10 B guesses/s)`,
      warns.length?'\nWarnings:\n'+warns.map(x=>'  ⚠ '+x).join('\n'):'\n✓ No obvious weaknesses detected.'
    ].join('\n');
  }});
T({id:'charinspect',name:'Character inspector',cat:'analyze',icon:'🔬',desc:'List every character with its Unicode code point, name category, UTF-8 byte length and HTML entity — great for spotting invisible or look-alike characters.',
  modes:['encode'],modeLabels:['Inspect'],

T({id:'epoch',name:'Unix timestamp',cat:'analyze',icon:'⏱',desc:'Convert between Unix timestamps (seconds or milliseconds) and human-readable dates (UTC + local). Type "now" for the current time.',
  modes:['encode'],modeLabels:['Convert'],
  sample:'1700000000',
  run(t){
    const s=t.trim();
    let date;
    if(/^now$/i.test(s))date=new Date();
    else if(/^-?\d{1,11}$/.test(s))date=new Date(+s*1000);          // seconds
    else if(/^-?\d{12,}$/.test(s))date=new Date(+s);                 // milliseconds
    else{const p=Date.parse(s);if(isNaN(p))throw Error('Enter a Unix timestamp, an ISO date, or "now"');date=new Date(p);}
    if(isNaN(date.getTime()))throw Error('Invalid timestamp');
    const secs=Math.floor(date.getTime()/1000);
    const rel=(()=>{const diff=(date.getTime()-Date.now())/1000,a=Math.abs(diff);
      const u=[[31536000,'year'],[2592000,'month'],[86400,'day'],[3600,'hour'],[60,'minute'],[1,'second']];
      for(const[sz,n]of u)if(a>=sz){const v=Math.round(a/sz);return`${v} ${n}${v>1?'s':''} ${diff<0?'ago':'from now'}`}return'just now'})();
    return[
      `Unix (s)     ${secs}`,
      `Unix (ms)    ${date.getTime()}`,
      `ISO 8601     ${date.toISOString()}`,
      `UTC          ${date.toUTCString()}`,
      `Local        ${date.toString()}`,
      `Relative     ${rel}`
    ].join('\n');
  }});
T({id:'color',name:'Color converter',cat:'text',icon:'🎨',desc:'Convert a color between HEX, RGB(A) and HSL. Accepts #hex, rgb()/rgba(), hsl() or a CSS color name.',
  modes:['encode'],modeLabels:['Convert'],
  sample:'#3b82f6',
  run(t){
    const s=t.trim();if(!s)return'';
    // resolve via canvas to normalise names/rgb/hsl/hex
    const cv=document.createElement('canvas').getContext('2d');
    cv.fillStyle='#000';cv.fillStyle=s;
    const norm=cv.fillStyle; // returns #rrggbb or rgba(...)
    let r,g,b,a=1;
    let m=norm.match(/^#([0-9a-f]{6})$/i);
    if(m){const n=parseInt(m[1],16);r=n>>16;g=(n>>8)&255;b=n&255}
    else{m=norm.match(/rgba?\(([^)]+)\)/);if(!m)throw Error('Unrecognised color');const p=m[1].split(',').map(x=>parseFloat(x));[r,g,b]=p;a=p[3]??1}
    // sanity: if input was clearly invalid, canvas keeps previous #000; detect by comparing a fresh context
    const test=document.createElement('canvas').getContext('2d');test.fillStyle='#010203';test.fillStyle=s;
    if(test.fillStyle==='#010203'&&!/^(#|rgb|hsl|black)/i.test(s)&&s.toLowerCase()!=='black')throw Error(`"${s}" is not a valid CSS color`);
    // to HSL
    const rn=r/255,gn=g/255,bn=b/255,max=Math.max(rn,gn,bn),min=Math.min(rn,gn,bn);
    let h=0,sl=0,l=(max+min)/2;
    if(max!==min){const dd=max-min;sl=l>0.5?dd/(2-max-min):dd/(max+min);
      h=max===rn?(gn-bn)/dd+(gn<bn?6:0):max===gn?(bn-rn)/dd+2:(rn-gn)/dd+4;h*=60}
    const hex='#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    const H=Math.round(h),S=Math.round(sl*100),L=Math.round(l*100);
    return[
      `HEX    ${hex.toUpperCase()}`,
      `RGB    rgb(${r}, ${g}, ${b})`,
      `RGBA   rgba(${r}, ${g}, ${b}, ${a})`,
      `HSL    hsl(${H}, ${S}%, ${L}%)`,
      `CSS    ${r} ${g} ${b}`
    ].join('\n');
  },
  extra(t){
    const s=t.trim();if(!s)return null;
    const cv=document.createElement('canvas').getContext('2d');cv.fillStyle='#000';cv.fillStyle=s;
    return['Swatch',`<div style="display:flex;gap:12px;align-items:center"><div style="width:64px;height:64px;border-radius:10px;border:1px solid var(--border);background:${U.esc(cv.fillStyle)}"></div><code style="font-size:13px">${U.esc(cv.fillStyle)}</code></div>`];
  }});
T({id:'creditcard',name:'Test card numbers',cat:'gen',icon:'💳',desc:'Generate fake but Luhn-valid test card numbers for common brands. For software testing only — these are not real accounts.',
  modes:['encode'],modeLabels:['Generate'],noInput:true,
  opts:[{k:'brand',t:'sel',l:'Brand',d:'visa',vals:[['visa','Visa'],['mc','Mastercard'],['amex','American Express'],['disc','Discover'],['any','Random mix']]},{k:'count',t:'num',l:'Count',d:5},{k:'fmt',t:'chk',l:'Group in 4s',d:true}],
  run(t,{o}){
    const n=Math.min(50,Math.max(1,+o.count||1));
    const rnd=max=>{const r=new Uint32Array(1);crypto.getRandomValues(r);return r[0]%max};
    const luhnComplete=partial=>{
      let sum=0,alt=true;
      for(let i=partial.length-1;i>=0;i--){let d=+partial[i];if(alt){d*=2;if(d>9)d-=9}sum+=d;alt=!alt}
      return partial+((10-sum%10)%10);
    };
    const brands={
      visa:{prefix:['4'],len:16},
      mc:{prefix:['51','52','53','54','55','2221','2720'],len:16},
      amex:{prefix:['34','37'],len:15},
      disc:{prefix:['6011','65','644','645','646','647','648','649'],len:16}
    };
    const gen1=key=>{
      const b=brands[key];const pre=b.prefix[rnd(b.prefix.length)];
      let body=pre;while(body.length<b.len-1)body+=rnd(10);
      const num=luhnComplete(body);
      if(!o.fmt)return num;
      return key==='amex'?num.replace(/(\d{4})(\d{6})(\d{5})/,'$1 $2 $3'):num.replace(/(.{4})/g,'$1 ').trim();
    };
    const keys=Object.keys(brands);
    return Array.from({length:n},()=>gen1(o.brand==='any'?keys[rnd(keys.length)]:o.brand)).join('\n');
  }});

/* ================= APP ENGINE ================= */
const App={
  tool:null,mode:'encode',opts:{},runSeq:0,
  el:{sidebar:$('#sidebar'),input:$('#input'),output:$('#output-area'),opts:$('#opts'),seg:$('#mode-seg'),
      title:$('#tool-title-txt'),desc:$('#tool-desc'),icon:$('#th-icon'),badge:$('#tool-cat-badge'),
      inStats:$('#in-stats'),outStats:$('#out-stats'),extra:$('#extra-panel'),extraBody:$('#analysis-panel'),extraLabel:$('#extra-label')},

  init(){
    $('#search-input').placeholder=`Search ${TOOLS.length} tools…`;
    this.renderSidebar();
    // deep-link: #tool-id overrides saved state
    const hashId=location.hash.slice(1);
    const fromHash=TOOLS.find(t=>t.id===hashId);
    const saved=TOOLS.find(t=>t.id===Store.state.tool);
    this.el.input.value=Store.state.input||'';
    this.select(fromHash?fromHash.id:(saved?saved.id:'base64'),false);
    this.bind();
    addEventListener('hashchange',()=>{
      const t=TOOLS.find(x=>x.id===location.hash.slice(1));
      if(t&&t.id!==this.tool.id)this.select(t.id,false);
    });
  },

  /* ---- sidebar ---- */
  renderSidebar(filter=''){
    const q=filter.toLowerCase().trim();
    const favs=Store.state.favs;
    let html='';
    const item=t=>`<button class="tool-item${t.id===(this.tool&&this.tool.id)?' active':''}${favs.includes(t.id)?' faved':''}" data-tool="${t.id}" role="link">
      <span class="ti-icon">${t.icon}</span>${U.esc(t.name)}<span class="fav-star">★</span></button>`;
    if(!q&&favs.length){
      const ft=favs.map(id=>TOOLS.find(t=>t.id===id)).filter(Boolean);
      if(ft.length)html+=`<div class="cat-group"><button class="cat-head">★ Pinned<span class="cnt">${ft.length}</span></button><div class="cat-items">${ft.map(item).join('')}</div></div>`;
    }
    let any=false;
    for(const[cid,cname,cicon]of CATS){
      const tools=TOOLS.filter(t=>t.cat===cid&&(!q||t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||t.id.includes(q)));
      if(!tools.length)continue;
      any=true;
      const collapsed=!q&&Store.state.collapsed.includes(cid);
      html+=`<div class="cat-group${collapsed?' collapsed':''}" data-cat="${cid}">
        <button class="cat-head">${cicon} ${cname}<span class="cnt">${tools.length}</span><span class="chev">▼</span></button>
        <div class="cat-items">${tools.map(item).join('')}</div></div>`;
    }
    if(!any)html+='<div class="no-results">No tools match “'+U.esc(filter)+'”</div>';
    this.el.sidebar.innerHTML=html;
  },

  /* ---- tool selection ---- */
  select(id,focus=true){
    const t=TOOLS.find(x=>x.id===id);if(!t)return;
    this.tool=t;
    const modes=t.modes||['encode','decode'];
    const savedMode=(Store.state.toolModes||{})[t.id];
    this.mode=modes.includes(savedMode)?savedMode:modes[0];
    // restore per-tool opts
    this.opts={};
    (t.opts||[]).forEach(op=>{
      const saved=(Store.state.opts[t.id]||{})[op.k];
      this.opts[op.k]=saved!==undefined?saved:op.d;
    });
    Store.state.toolModes=Store.state.toolModes||{};
    Store.state.toolModes[t.id]=this.mode;
    Store.set({tool:id});
    // header
    this.el.title.textContent=t.name;
    this.el.desc.textContent=t.desc;
    this.el.icon.textContent=t.icon;
    const cat=CATS.find(c=>c[0]===t.cat);
    this.el.badge.textContent=cat?cat[1]:'';
    $('#fav-btn').classList.toggle('on',Store.state.favs.includes(id));
    $('#fav-btn').setAttribute('aria-pressed',String(Store.state.favs.includes(id)));
    // mode segment — single-action tools get a static label instead of a fake toggle
    const labels=t.modeLabels||['Encode','Decode'];
    const single=modes.length<2;
    this.el.seg.classList.toggle('single',single);
    this.el.seg.setAttribute('role',single?'note':'tablist');
    this.el.seg.innerHTML=modes.map((m,i)=>`<button data-mode="${m}" class="${m===this.mode?'on':''}" role="${single?'presentation':'tab'}" aria-selected="${m===this.mode}"${single?' tabindex="-1"':''}>${labels[i]||m}</button>`).join('');
    // options
    this.renderOpts();
    // update active state in-place (avoids full re-render + scroll jump)
    $$('.tool-item',this.el.sidebar).forEach(b=>b.classList.toggle('active',b.dataset.tool===id));
    $('#input-panel').style.display=t.noInput?'none':'';
    $('#btn-regen').hidden=!t.noInput;
    $('#btn-swap').hidden=!!t.noInput;
    $('#chain-btn').disabled=!!t.noInput;
    $('#chain-btn').title=t.noInput?'No input to chain into (generator tool)':'Send output back to input (chain)';
    document.title=`${t.name} — CipherLab`;
    if(location.hash.slice(1)!==id)history.replaceState(null,'','#'+id);
    if(focus&&!t.noInput)this.el.input.focus();
    this.run();
  },

  renderOpts(){
    const t=this.tool;
    this.el.opts.innerHTML=(t.opts||[]).map(op=>{
      const v=this.opts[op.k];
      switch(op.t){
        case'chk':return`<label class="opt chk"><span class="switch"><input type="checkbox" data-opt="${op.k}" ${v?'checked':''}><span class="tr"></span></span><span class="chk-txt">${op.l}</span></label>`;
        case'num':return`<div class="opt"><label>${op.l}</label><input type="number" data-opt="${op.k}" value="${U.esc(String(v))}"></div>`;
        case'txt':return`<div class="opt"><label>${op.l}</label><input type="text" data-opt="${op.k}" value="${U.esc(String(v))}" spellcheck="false"${op.w?` style="width:${op.w}px"`:''}></div>`;
        case'sel':return`<div class="opt"><label>${op.l}</label><select data-opt="${op.k}">${op.vals.map(([val,lab])=>`<option value="${U.esc(val)}"${String(v)===String(val)?' selected':''}>${lab}</option>`).join('')}</select></div>`;
        case'range':return`<div class="opt"><label>${op.l}</label><div class="range-wrap"><input type="range" data-opt="${op.k}" min="${op.min}" max="${op.max}" value="${v}"><span class="rv">${v}</span></div></div>`;
      }
    }).join('');
  },

  /* ---- execution ---- */
  async run(){
    const t=this.tool;if(!t)return;
    const seq=++this.runSeq;
    const text=this.el.input.value;
    this.updateStats(this.el.inStats,text);
    if(!text&&!t.noInput){
      this.el.output.textContent='';this.el.output.classList.remove('err');
      this.el.extra.hidden=true;this.updateStats(this.el.outStats,'');return;
    }
    try{
      const ctx={mode:this.mode,o:this.opts};
      let out=t.run(text,ctx);
      if(out instanceof Promise)out=await out;
      if(seq!==this.runSeq)return; // stale async result
      this.el.output.classList.remove('err');
      this.el.output.textContent=out;
      this.updateStats(this.el.outStats,out);
      this.pushHistory(text,out);
      // extra panel
      if(t.extra){
        let ex=t.extra(text,ctx);
        if(ex instanceof Promise)ex=await ex;
        if(seq!==this.runSeq)return;
        if(ex){this.el.extraLabel.innerHTML=`<span class="dot out"></span>${U.esc(ex[0])}`;this.el.extraBody.innerHTML=ex[1];this.el.extra.hidden=false}
        else this.el.extra.hidden=true;
      }else this.el.extra.hidden=true;
    }catch(e){
      if(seq!==this.runSeq)return;
      this.el.output.classList.add('err');
      this.el.output.textContent='⚠ '+(e.message||String(e));
      this.updateStats(this.el.outStats,'');
      this.el.extra.hidden=true;
    }
  },

  updateStats(el,s){
    if(!s){el.innerHTML='<span>—</span>';return}
    const b=U.bytes(s).length;
    el.innerHTML=`<span>chars <b>${[...s].length}</b></span><span>bytes <b>${b}</b></span><span>words <b>${(s.match(/\S+/g)||[]).length}</b></span><span>lines <b>${s.split('\n').length}</b></span>`;
  },

  /* ---- history ---- */
  pushHistory(inp,out){
    clearTimeout(this._ht);
    this._ht=setTimeout(()=>{
      const h=Store.state.history;
      const entry={tool:this.tool.id,name:this.tool.name,mode:this.mode,in:inp.slice(0,400),out:String(out).slice(0,400),ts:Date.now(),truncated:inp.length>400};
      if(h[0]&&h[0].tool===entry.tool&&h[0].in===entry.in&&h[0].mode===entry.mode)return;
      h.unshift(entry);if(h.length>60)h.length=60;
      Store.save();this.renderHistory();
    },900);
  },
  renderHistory(){
    const h=Store.state.history;
    $('#history-list').innerHTML=h.length?h.map((e,i)=>`
      <div class="hist-item" data-hi="${i}" title="${e.truncated?'Input was longer than the 400-char preview — restoring will only recover this truncated portion':'Click to restore'}">
        <div class="hi-top"><span>${U.esc(e.name)} · ${e.mode}${e.truncated?' <span style="color:var(--warn)" aria-label="truncated">✂</span>':''}</span><time>${new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</time></div>
        <div class="hi-txt">→ ${U.esc(e.in)}</div>
        <div class="hi-txt" style="color:var(--text-2)">← ${U.esc(e.out)}</div>
      </div>`).join(''):'<div class="empty-note">Run a tool to build history.<br>Click an entry to restore it.</div>';
  },

  /* ---- events ---- */
  bind(){
    const deb=(fn,ms)=>{let id;return(...a)=>{clearTimeout(id);id=setTimeout(()=>fn(...a),ms)}};
    // input
    this.el.input.addEventListener('input',deb(()=>{Store.set({input:this.el.input.value.slice(0,20000)});this.run()},120));
    // sidebar
    this.el.sidebar.addEventListener('click',e=>{
      const ti=e.target.closest('.tool-item');
      if(ti){this.select(ti.dataset.tool);if(innerWidth<=900)closeSidebar();return}
      const ch=e.target.closest('.cat-head');
      if(ch){
        const g=ch.parentElement,cid=g.dataset.cat;
        if(!cid)return;
        g.classList.toggle('collapsed');
        const c=Store.state.collapsed;
        g.classList.contains('collapsed')?(c.includes(cid)||c.push(cid)):c.splice(c.indexOf(cid),1);
        Store.save();
      }
    });
    // mode segment
    this.el.seg.addEventListener('click',e=>{
      const b=e.target.closest('button[data-mode]');if(!b)return;
      this.mode=b.dataset.mode;Store.state.toolModes[this.tool.id]=this.mode;Store.save();
      $$('#mode-seg button').forEach(x=>x.classList.toggle('on',x===b));
      b.classList.add('pulse');setTimeout(()=>b.classList.remove('pulse'),400);
      this.run();
    });
    // options
    this.el.opts.addEventListener('input',e=>{
      const el=e.target.closest('[data-opt]');if(!el)return;
      const k=el.dataset.opt;
      this.opts[k]=el.type==='checkbox'?el.checked:el.value;
      if(el.type==='range')el.closest('.range-wrap').querySelector('.rv').textContent=el.value;
      Store.state.opts[this.tool.id]=Object.assign(Store.state.opts[this.tool.id]||{},{[k]:this.opts[k]});
      Store.save();
      this.run();
    });
    // fav
    $('#fav-btn').addEventListener('click',()=>{
      const f=Store.state.favs,id=this.tool.id,i=f.indexOf(id);
      i<0?f.push(id):f.splice(i,1);Store.save();
      $('#fav-btn').classList.toggle('on',i<0);
      $('#fav-btn').setAttribute('aria-pressed',String(i<0));
      this.renderSidebar($('#search-input').value);
      toast(i<0?'Pinned to favorites':'Unpinned');
    });
    // toolbar buttons
    $('#btn-copy').addEventListener('click',async()=>{
      const s=this.el.output.textContent;
      if(!s)return toast('Nothing to copy',true);
      await navigator.clipboard.writeText(s).catch(()=>{});
      const b=$('#btn-copy');b.classList.add('flash');b.textContent='✓ Copied';
      setTimeout(()=>{b.classList.remove('flash');b.innerHTML='⧉ Copy'},1100);
    });
    $('#btn-swap').addEventListener('click',()=>{
      if(this.tool.noInput)return toast('This tool has no input to chain into',true);
      const s=this.el.output.textContent;
      if(!s||this.el.output.classList.contains('err'))return toast('No valid output',true);
      this.el.input.value=s;Store.set({input:s.slice(0,20000)});
      const modes=this.tool.modes||['encode','decode'];
      if(modes.length===2){this.mode=this.mode==='encode'?'decode':'encode';Store.state.toolModes[this.tool.id]=this.mode;Store.save();
        $$('#mode-seg button').forEach(x=>x.classList.toggle('on',x.dataset.mode===this.mode))}
      this.run();toast('Output moved to input'+(modes.length===2?' · mode flipped':''));
    });
    $('#chain-btn').addEventListener('click',()=>$('#btn-swap').click());
    $('#btn-regen').addEventListener('click',()=>this.run());
    $('#btn-paste').addEventListener('click',async()=>{
      try{const s=await navigator.clipboard.readText();this.el.input.value=s;Store.set({input:s.slice(0,20000)});this.run();toast('Pasted')}
      catch(e){toast('Clipboard read blocked — use Ctrl+V',true)}
    });
    $('#btn-sample').addEventListener('click',()=>{
      this.el.input.value=this.tool.sample||'The quick brown fox jumps over the lazy dog.';
      Store.set({input:this.el.input.value});this.run();
    });
    $('#btn-clear').addEventListener('click',()=>{this.el.input.value='';Store.set({input:''});this.run();this.el.input.focus()});
    $('#btn-file').addEventListener('click',()=>$('#file-input').click());
    $('#file-input').addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      if(f.size>1024*1024)return toast('File too large (max 1 MB)',true);
      const r=new FileReader();
      r.onload=()=>{this.el.input.value=r.result;Store.set({input:String(r.result).slice(0,20000)});this.run();toast(`Loaded ${f.name}`)};
      r.readAsText(f);e.target.value='';
    });
    $('#btn-dl').addEventListener('click',()=>{
      const s=this.el.output.textContent;
      if(!s)return toast('Nothing to save',true);
      const ext=guessExt(this.tool,this.mode,s);
      const mime=ext==='json'?'application/json':ext==='csv'?'text/csv':ext==='xml'?'application/xml':'text/plain';
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([s],{type:mime+';charset=utf-8'}));
      a.download=`cipherlab-${this.tool.id}-${this.mode}.${ext}`;a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    });
    // click-to-copy in extra panel
    this.el.extraBody.addEventListener('click',e=>{
      const item=e.target.closest('[data-copy]');if(!item)return;
      navigator.clipboard.writeText(item.dataset.copy).catch(()=>{});
      toast('Copied '+item.querySelector('.k').textContent);
    });
    // search
    const si=$('#search-input');
    si.addEventListener('input',deb(()=>this.renderSidebar(si.value),80));
    si.addEventListener('keydown',e=>{
      if(e.key==='Enter'){const first=this.el.sidebar.querySelector('.tool-item');if(first){this.select(first.dataset.tool);si.blur()}}
      if(e.key==='Escape'){si.value='';this.renderSidebar('');si.blur()}
    });
    // history drawer
    $('#hist-btn').addEventListener('click',()=>{
      const d=$('#drawer'),open=!d.classList.contains('open');
      d.classList.toggle('open',open);
      $('#hist-btn').classList.toggle('active',open);
      $('#hist-btn').setAttribute('aria-expanded',String(open));
      if(open)this.renderHistory();
    });
    $('#hist-clear').addEventListener('click',()=>{Store.state.history=[];Store.save();this.renderHistory();toast('History cleared')});
    $('#history-list').addEventListener('click',e=>{
      const hi=e.target.closest('.hist-item');if(!hi)return;
      const entry=Store.state.history[+hi.dataset.hi];if(!entry)return;
      this.el.input.value=entry.in;
      Store.state.toolModes[entry.tool]=entry.mode;
      Store.set({input:entry.in});
      this.select(entry.tool,false);
      $('#drawer').classList.remove('open');$('#hist-btn').classList.remove('active');$('#hist-btn').setAttribute('aria-expanded','false');
      toast(entry.truncated?'Restored (input was longer — only the first 400 chars were saved)':'Restored from history',entry.truncated?'warn':false);
    });
    // mobile nav
    const closeSidebar=()=>{$('#sidebar').classList.remove('open');$('#scrim').classList.remove('show')};
    $('#menu-btn').addEventListener('click',()=>{$('#sidebar').classList.toggle('open');$('#scrim').classList.toggle('show',$('#sidebar').classList.contains('open'))});
    $('#scrim').addEventListener('click',closeSidebar);
    // keyboard shortcuts
    document.addEventListener('keydown',e=>{
      const typing=/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
      if(e.key==='/'&&!typing){e.preventDefault();si.focus();si.select()}
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();$('#btn-copy').click()}
      if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key.toLowerCase()==='x'){e.preventDefault();$('#btn-swap').click()}
      if(e.key==='Escape'){$('#drawer').classList.remove('open');$('#hist-btn').classList.remove('active');$('#hist-btn').setAttribute('aria-expanded','false');closeSidebar()}
      if(!typing&&(e.key==='e'||e.key==='d')){
        const btn=this.el.seg.querySelector(`[data-mode="${e.key==='e'?'encode':'decode'}"]`);
        if(btn)btn.click();
      }
    });
  }
};
App.init();
</script>
</body>
</html>
