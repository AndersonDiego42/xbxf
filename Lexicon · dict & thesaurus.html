<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lexicon — Dictionary &amp; Thesaurus</title>
<meta name="description" content="Look up definitions, synonyms, antonyms, and audio pronunciations. Powered by the Free Dictionary API." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" />
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  /* Color primitives — dark neutral palette */
  --c-bg-0: #0a0b0e;
  --c-bg-1: #101218;
  --c-bg-2: #161922;
  --c-bg-3: #1d212c;
  --c-bg-4: #252a37;
  --c-border: #262b38;
  --c-border-soft: #1e222d;
  --c-border-strong: #353c4d;

  --c-text-0: #f4f6fb;
  --c-text-1: #c4cad8;
  --c-text-2: #8a92a6;
  --c-text-3: #5c6478;

  --c-accent: #7c8cff;
  --c-accent-bright: #93a0ff;
  --c-accent-dim: #4a55a8;
  --c-accent-glow: rgba(124, 140, 255, 0.18);

  --c-mint: #4fd1b3;
  --c-mint-dim: rgba(79, 209, 179, 0.14);
  --c-rose: #ff7a8a;
  --c-rose-dim: rgba(255, 122, 138, 0.14);
  --c-amber: #f6c177;
  --c-amber-dim: rgba(246, 193, 119, 0.14);
  --c-violet: #c08cff;
  --c-violet-dim: rgba(192, 140, 255, 0.14);

  /* Typography */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Newsreader', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;

  --fs-xs: 0.6875rem;
  --fs-sm: 0.8125rem;
  --fs-base: 0.9375rem;
  --fs-md: 1.0625rem;
  --fs-lg: 1.375rem;
  --fs-xl: 2rem;
  --fs-2xl: 3rem;
  --fs-3xl: 4rem;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;
  --sp-8: 64px;

  /* Radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;
  --r-full: 999px;

  /* Shadows */
  --sh-sm: 0 1px 2px rgba(0,0,0,0.4);
  --sh-md: 0 4px 16px rgba(0,0,0,0.4);
  --sh-lg: 0 12px 40px rgba(0,0,0,0.55);
  --sh-glow: 0 0 0 1px var(--c-accent-glow), 0 8px 30px rgba(124,140,255,0.12);

  /* Motion */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --dur-fast: 120ms;
  --dur: 220ms;
  --dur-slow: 420ms;

  --maxw: 1180px;
}

[data-theme="light"] {
  --c-bg-0: #f4f5f8;
  --c-bg-1: #ffffff;
  --c-bg-2: #f7f8fb;
  --c-bg-3: #eef0f5;
  --c-bg-4: #e3e6ee;
  --c-border: #e2e5ed;
  --c-border-soft: #ebedf2;
  --c-border-strong: #ccd1de;
  --c-text-0: #14161c;
  --c-text-1: #353a47;
  --c-text-2: #6b7385;
  --c-text-3: #99a0b2;
  --c-accent: #5566ee;
  --c-accent-bright: #4252dd;
  --c-accent-dim: #aab2f5;
  --c-accent-glow: rgba(85, 102, 238, 0.12);
  --c-mint: #119e80;
  --c-mint-dim: rgba(17, 158, 128, 0.12);
  --c-rose: #e0455a;
  --c-rose-dim: rgba(224, 69, 90, 0.10);
  --c-amber: #c98a1f;
  --c-amber-dim: rgba(201, 138, 31, 0.12);
  --c-violet: #8b4fe0;
  --c-violet-dim: rgba(139, 79, 224, 0.12);
  --sh-sm: 0 1px 2px rgba(40,50,90,0.08);
  --sh-md: 0 4px 16px rgba(40,50,90,0.08);
  --sh-lg: 0 12px 40px rgba(40,50,90,0.12);
}
[data-theme="light"] body::before {
  background:
    radial-gradient(circle at 12% -5%, rgba(85,102,238,0.10), transparent 42%),
    radial-gradient(circle at 88% 0%, rgba(139,79,224,0.07), transparent 40%);
}

/* ============================================================
   RESET / BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: 1.55;
  color: var(--c-text-1);
  background: var(--c-bg-0);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 12% -5%, var(--c-accent-glow), transparent 42%),
    radial-gradient(circle at 88% 0%, rgba(192,140,255,0.10), transparent 40%);
  pointer-events: none;
  z-index: 0;
  opacity: 0.9;
}
button, input { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
::selection { background: var(--c-accent); color: #fff; }
:focus-visible { outline: 2px solid var(--c-accent); outline-offset: 2px; border-radius: var(--r-sm); }
.search-bar input:focus-visible { outline: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-bg-4); border-radius: 99px; border: 2px solid var(--c-bg-0); }
::-webkit-scrollbar-thumb:hover { background: var(--c-border-strong); }

/* ============================================================
   LAYOUT
   ============================================================ */
.app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

/* Topbar */
.topbar {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(18px) saturate(140%);
  background: color-mix(in srgb, var(--c-bg-0) 78%, transparent);
  border-bottom: 1px solid var(--c-border-soft);
}
.topbar-inner {
  max-width: var(--maxw); margin: 0 auto;
  padding: var(--sp-3) var(--sp-5);
  display: flex; align-items: center; gap: var(--sp-4);
}
.brand { display: flex; align-items: center; gap: var(--sp-3); flex-shrink: 0; background: none; border: none; padding: 0; cursor: pointer; transition: opacity var(--dur) var(--ease); }
.brand:hover { opacity: 0.82; }
.brand:active { transform: scale(0.98); }
.brand-mark {
  width: 36px; height: 36px; border-radius: var(--r-md);
  background: linear-gradient(135deg, var(--c-accent), var(--c-violet));
  display: grid; place-items: center; color: #fff; font-size: 1.05rem;
  box-shadow: 0 4px 14px var(--c-accent-glow);
}
.brand-name { font-size: var(--fs-md); font-weight: 700; letter-spacing: -0.02em; color: var(--c-text-0); }
.brand-name span { color: var(--c-text-3); font-weight: 400; }
.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: var(--sp-2); }

.icon-btn {
  width: 38px; height: 38px; border-radius: var(--r-md);
  display: grid; place-items: center; color: var(--c-text-2);
  border: 1px solid var(--c-border); background: var(--c-bg-2);
  transition: all var(--dur) var(--ease);
}
.icon-btn:hover { color: var(--c-text-0); background: var(--c-bg-3); border-color: var(--c-border-strong); transform: translateY(-1px); }
.icon-btn:active { transform: translateY(0) scale(0.95); }

.seg {
  display: flex; background: var(--c-bg-2); border: 1px solid var(--c-border);
  border-radius: var(--r-md); padding: 3px;
}
.seg button {
  padding: 6px 12px; border-radius: 7px; font-size: var(--fs-sm); font-weight: 500;
  color: var(--c-text-2); transition: all var(--dur) var(--ease);
}
.seg button.active { background: var(--c-bg-4); color: var(--c-text-0); box-shadow: var(--sh-sm); }

/* Main */
.main { flex: 1; max-width: var(--maxw); width: 100%; margin: 0 auto; padding: var(--sp-6) var(--sp-5) var(--sp-8); }

/* Hero / Search */
.hero { text-align: center; padding: var(--sp-7) 0 var(--sp-6); }
.hero.compact { padding: var(--sp-4) 0 var(--sp-5); }
.hero h1 {
  font-family: var(--font-serif); font-weight: 500; letter-spacing: -0.02em;
  font-size: var(--fs-3xl); line-height: 1.05; color: var(--c-text-0); margin-bottom: var(--sp-3);
  transition: font-size var(--dur) var(--ease);
}
.hero.compact h1 { font-size: var(--fs-xl); }
.hero .lede { color: var(--c-text-2); font-size: var(--fs-md); max-width: 540px; margin: 0 auto var(--sp-5); }
.hero.compact .lede { display: none; }

.search-wrap { max-width: 620px; margin: 0 auto; position: relative; }
.search-bar {
  display: flex; align-items: center; gap: var(--sp-3);
  background: var(--c-bg-2); border: 1px solid var(--c-border);
  border-radius: var(--r-xl); padding: var(--sp-2) var(--sp-2) var(--sp-2) var(--sp-4);
  transition: all var(--dur) var(--ease); box-shadow: var(--sh-md);
}
.search-bar:focus-within { border-color: var(--c-accent-dim); box-shadow: var(--sh-glow); transform: translateY(-1px); }
.search-bar i.search-ic { color: var(--c-text-3); font-size: 1.05rem; }
.search-bar input {
  flex: 1; border: none; background: none; outline: none;
  font-size: var(--fs-md); color: var(--c-text-0); padding: var(--sp-3) 0;
}
.search-bar input::placeholder { color: var(--c-text-3); }
.search-clear {
  width: 30px; height: 30px; border-radius: var(--r-full); color: var(--c-text-3);
  display: none; place-items: center; transition: all var(--dur) var(--ease);
}
.search-clear:hover { color: var(--c-text-0); background: var(--c-bg-3); }
.search-clear.show { display: grid; }
.kbd-hint {
  font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--c-text-3);
  border: 1px solid var(--c-border); background: var(--c-bg-1); border-radius: var(--r-sm);
  padding: 2px 8px; line-height: 1.4; flex-shrink: 0;
}
.search-bar:focus-within .kbd-hint { display: none; }
@media (max-width: 600px) { .kbd-hint { display: none; } }
.search-btn {
  background: var(--c-accent); color: #fff; padding: 10px 20px; border-radius: var(--r-lg);
  font-weight: 600; font-size: var(--fs-base); display: flex; align-items: center; gap: 7px;
  transition: all var(--dur) var(--ease);
}
.search-btn:hover { background: var(--c-accent-bright); transform: translateY(-1px); }
.search-btn:active { transform: scale(0.97); }

/* Suggestions dropdown */
.suggestions {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0; z-index: 30;
  background: var(--c-bg-2); border: 1px solid var(--c-border); border-radius: var(--r-lg);
  box-shadow: var(--sh-lg); overflow: hidden; max-height: 300px; overflow-y: auto;
  opacity: 0; transform: translateY(-6px); pointer-events: none;
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.suggestions.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.suggestion {
  display: flex; align-items: center; gap: var(--sp-3); padding: 10px var(--sp-4);
  cursor: pointer; transition: background var(--dur-fast) var(--ease); text-align: left;
}
.suggestion:hover, .suggestion.active { background: var(--c-bg-3); }
.suggestion i { color: var(--c-text-3); font-size: 0.8rem; width: 16px; }
.suggestion .s-word { color: var(--c-text-0); font-weight: 500; }
.suggestion .s-tag { margin-left: auto; font-size: var(--fs-xs); color: var(--c-text-3); }

/* Quick chips */
.chips { display: flex; flex-wrap: wrap; gap: var(--sp-2); justify-content: center; margin-top: var(--sp-5); }
.chip {
  font-size: var(--fs-sm); color: var(--c-text-2); padding: 6px 14px; border-radius: var(--r-full);
  border: 1px solid var(--c-border); background: var(--c-bg-1); transition: all var(--dur) var(--ease);
  display: inline-flex; align-items: center; gap: 6px;
}
.chip:hover { color: var(--c-text-0); border-color: var(--c-accent-dim); background: var(--c-bg-3); transform: translateY(-1px); }
.chip i { font-size: 0.7rem; color: var(--c-text-3); }

/* ============================================================
   RESULTS GRID
   ============================================================ */
.results { margin-top: var(--sp-6); display: none; }
.results.show { display: block; animation: fadeUp var(--dur-slow) var(--ease-out); }

.layout {
  display: grid; grid-template-columns: 1fr 300px; gap: var(--sp-5); align-items: start;
}

/* Word header card */
.word-card {
  background: var(--c-bg-1); border: 1px solid var(--c-border); border-radius: var(--r-xl);
  padding: var(--sp-6); position: relative; overflow: hidden;
}
.word-card::after {
  content: ''; position: absolute; top: -40%; right: -10%; width: 280px; height: 280px;
  background: radial-gradient(circle, var(--c-accent-glow), transparent 70%); pointer-events: none;
}
.word-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--sp-4); flex-wrap: wrap; }
.word-title { font-family: var(--font-serif); font-size: var(--fs-2xl); font-weight: 500; color: var(--c-text-0); letter-spacing: -0.02em; line-height: 1; }
.word-phonetic { font-family: var(--font-mono); font-size: var(--fs-md); color: var(--c-accent-bright); margin-top: var(--sp-3); }
.word-meta { display: flex; flex-wrap: wrap; gap: var(--sp-3); margin-top: var(--sp-4); }
.audio-pill {
  display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: var(--r-full);
  background: var(--c-accent); color: #fff; font-weight: 600; font-size: var(--fs-sm);
  transition: all var(--dur) var(--ease); position: relative;
}
.audio-pill:hover { background: var(--c-accent-bright); transform: translateY(-1px); }
.audio-pill:active { transform: scale(0.96); }
.audio-pill.playing i { animation: pulse 0.8s var(--ease) infinite; }
.audio-pill.no-audio { background: var(--c-bg-3); color: var(--c-text-3); cursor: not-allowed; }
.audio-pill.no-audio:hover { transform: none; background: var(--c-bg-3); }
.audio-label { font-family: var(--font-mono); }

.word-actions { display: flex; gap: var(--sp-2); }
.wa-btn {
  width: 40px; height: 40px; border-radius: var(--r-md); border: 1px solid var(--c-border);
  background: var(--c-bg-2); color: var(--c-text-2); display: grid; place-items: center;
  transition: all var(--dur) var(--ease);
}
.wa-btn:hover { color: var(--c-text-0); background: var(--c-bg-3); transform: translateY(-1px); }
.wa-btn.active { color: var(--c-amber); border-color: var(--c-amber); background: var(--c-amber-dim); }

/* origin */
.word-origin {
  margin-top: var(--sp-5); padding-top: var(--sp-4); border-top: 1px solid var(--c-border-soft);
  font-family: var(--font-serif); font-style: italic; color: var(--c-text-2); font-size: var(--fs-base);
}

/* Meaning blocks */
.meanings { margin-top: var(--sp-5); display: flex; flex-direction: column; gap: var(--sp-4); }
.meaning {
  background: var(--c-bg-1); border: 1px solid var(--c-border); border-radius: var(--r-lg);
  padding: var(--sp-5); animation: fadeUp var(--dur-slow) var(--ease-out) backwards;
}
.meaning-head { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-4); }
.pos-badge {
  font-style: italic; font-family: var(--font-serif); font-size: var(--fs-md); color: var(--c-accent-bright);
  font-weight: 500; padding: 3px 12px; border-radius: var(--r-full); background: var(--c-accent-glow);
}
.meaning-head .line { flex: 1; height: 1px; background: var(--c-border-soft); }
.meaning-head .count { font-size: var(--fs-xs); color: var(--c-text-3); font-family: var(--font-mono); }

.def-list { display: flex; flex-direction: column; gap: var(--sp-4); counter-reset: def; }
.def-item { display: flex; gap: var(--sp-3); }
.def-num {
  counter-increment: def; flex-shrink: 0; width: 24px; height: 24px; border-radius: 7px;
  background: var(--c-bg-3); color: var(--c-text-2); font-size: var(--fs-xs); font-weight: 600;
  display: grid; place-items: center; font-family: var(--font-mono); margin-top: 2px;
}
.def-num::before { content: counter(def); }
.def-body { flex: 1; }
.def-text { color: var(--c-text-0); font-size: var(--fs-md); line-height: 1.6; }
.def-example {
  margin-top: 6px; font-family: var(--font-serif); font-style: italic; color: var(--c-text-2);
  font-size: var(--fs-base); padding-left: var(--sp-3); border-left: 2px solid var(--c-border-strong);
}
.def-rel { display: flex; flex-wrap: wrap; gap: var(--sp-4); margin-top: var(--sp-3); }
.rel-group { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.rel-label { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.rel-label.syn { color: var(--c-mint); }
.rel-label.ant { color: var(--c-rose); }

/* synonym/antonym section in meaning */
.meaning-rels {
  margin-top: var(--sp-4); padding-top: var(--sp-4); border-top: 1px solid var(--c-border-soft);
  display: flex; flex-direction: column; gap: var(--sp-3);
}
.rel-row { display: flex; flex-wrap: wrap; align-items: flex-start; gap: var(--sp-2); }
.rel-row .rel-label { flex-shrink: 0; padding-top: 5px; min-width: 78px; }
.word-tag {
  font-size: var(--fs-sm); padding: 4px 11px; border-radius: var(--r-full); border: 1px solid var(--c-border);
  background: var(--c-bg-2); color: var(--c-text-1); transition: all var(--dur) var(--ease); cursor: pointer;
}
.word-tag.syn:hover { color: var(--c-mint); border-color: var(--c-mint); background: var(--c-mint-dim); transform: translateY(-1px); }
.word-tag.ant:hover { color: var(--c-rose); border-color: var(--c-rose); background: var(--c-rose-dim); transform: translateY(-1px); }

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar { display: flex; flex-direction: column; gap: var(--sp-4); position: sticky; top: 80px; }
.panel {
  background: var(--c-bg-1); border: 1px solid var(--c-border); border-radius: var(--r-lg);
  overflow: hidden;
}
.panel-head {
  display: flex; align-items: center; gap: var(--sp-2); padding: var(--sp-4) var(--sp-4) var(--sp-3);
  font-size: var(--fs-sm); font-weight: 600; color: var(--c-text-1); text-transform: uppercase; letter-spacing: 0.05em;
}
.panel-head i { color: var(--c-text-3); }
.panel-head .pcount { margin-left: auto; font-size: var(--fs-xs); color: var(--c-text-3); font-weight: 500; font-family: var(--font-mono); }
.panel-head .pcount + .panel-clear { margin-left: var(--sp-3); }
.panel-clear {
  margin-left: auto; font-size: var(--fs-xs); font-weight: 600; text-transform: none; letter-spacing: 0;
  color: var(--c-text-3); padding: 3px 9px; border-radius: var(--r-full); border: 1px solid var(--c-border);
  transition: all var(--dur) var(--ease);
}
.panel-head .pcount ~ .panel-clear { margin-left: var(--sp-2); }
.panel-clear:hover { color: var(--c-rose); border-color: var(--c-rose); background: var(--c-rose-dim); }
.panel-body { padding: 0 var(--sp-3) var(--sp-3); }
.cloud-label { padding: var(--sp-3) var(--sp-2) var(--sp-1); }
.cloud-label:first-child { padding-top: var(--sp-2); }

/* thesaurus cloud */
.cloud { display: flex; flex-wrap: wrap; gap: 6px; padding: var(--sp-2); }
.cloud .word-tag { font-size: var(--fs-sm); }
.empty-mini { padding: var(--sp-4); text-align: center; color: var(--c-text-3); font-size: var(--fs-sm); }

/* list items (history / favorites) */
.list-item {
  display: flex; align-items: center; gap: var(--sp-3); padding: 9px var(--sp-3); border-radius: var(--r-sm);
  cursor: pointer; transition: background var(--dur-fast) var(--ease);
}
.list-item:hover { background: var(--c-bg-2); }
.list-item i.li-ic { color: var(--c-text-3); font-size: 0.78rem; width: 14px; }
.list-item .li-word { flex: 1; color: var(--c-text-1); font-weight: 500; font-size: var(--fs-base); }
.list-item .li-del { color: var(--c-text-3); opacity: 0; transition: opacity var(--dur) var(--ease); padding: 4px; }
.list-item:hover .li-del { opacity: 1; }
.list-item .li-del:hover { color: var(--c-rose); }

/* word of the day */
.wotd { padding: var(--sp-4); }
.wotd-word { font-family: var(--font-serif); font-size: var(--fs-lg); color: var(--c-text-0); cursor: pointer; text-align: left; display: block; transition: color var(--dur) var(--ease); }
.wotd-word:hover { color: var(--c-accent-bright); }
.wotd-pos { font-style: italic; color: var(--c-accent-bright); font-size: var(--fs-sm); margin: 2px 0 6px; font-family: var(--font-serif); }
.wotd-def { color: var(--c-text-2); font-size: var(--fs-sm); line-height: 1.5; }

/* ============================================================
   STATES: loading / error / empty
   ============================================================ */
.state { text-align: center; padding: var(--sp-8) var(--sp-4); animation: fadeUp var(--dur-slow) var(--ease-out); }
.state-icon {
  width: 72px; height: 72px; border-radius: var(--r-xl); margin: 0 auto var(--sp-5);
  display: grid; place-items: center; font-size: 1.8rem;
}
.state-icon.err { background: var(--c-rose-dim); color: var(--c-rose); }
.state-icon.empty { background: var(--c-bg-2); color: var(--c-text-3); border: 1px solid var(--c-border); }
.state h3 { font-size: var(--fs-lg); color: var(--c-text-0); margin-bottom: var(--sp-2); font-weight: 600; }
.state p { color: var(--c-text-2); max-width: 420px; margin: 0 auto; }
.state .chips { margin-top: var(--sp-5); }

/* skeleton */
.skeleton { display: none; }
.skeleton.show { display: block; animation: fadeUp var(--dur) var(--ease-out); }
.sk {
  background: linear-gradient(90deg, var(--c-bg-2) 25%, var(--c-bg-3) 50%, var(--c-bg-2) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--r-sm);
}
.sk-card { background: var(--c-bg-1); border: 1px solid var(--c-border); border-radius: var(--r-xl); padding: var(--sp-6); }
.sk-line { height: 14px; margin-bottom: 12px; }

/* ============================================================
   TOAST
   ============================================================ */
.toast-wrap { position: fixed; bottom: var(--sp-5); left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: var(--sp-2); align-items: center; }
.toast {
  background: var(--c-bg-4); border: 1px solid var(--c-border-strong); color: var(--c-text-0);
  padding: 11px 18px; border-radius: var(--r-md); box-shadow: var(--sh-lg); font-size: var(--fs-sm);
  display: flex; align-items: center; gap: 10px; animation: toastIn var(--dur) var(--ease-out);
}
.toast i { color: var(--c-mint); }
.toast.err i { color: var(--c-rose); }

/* ============================================================
   FOOTER
   ============================================================ */
.footer {
  border-top: 1px solid var(--c-border-soft); margin-top: var(--sp-8);
  padding: var(--sp-5); text-align: center; color: var(--c-text-3); font-size: var(--fs-sm);
}
.footer a { color: var(--c-text-2); text-decoration: none; }
.footer a:hover { color: var(--c-accent-bright); }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { to { background-position: -200% 0; } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.25); } }
@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 40px; height: 40px; border: 3px solid var(--c-border); border-top-color: var(--c-accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto var(--sp-4); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; flex-direction: column; }
  :root { --fs-3xl: 3rem; --fs-2xl: 2.4rem; }
}
@media (max-width: 600px) {
  .main { padding: var(--sp-4) var(--sp-4) var(--sp-7); }
  .topbar-inner { padding: var(--sp-3); gap: var(--sp-2); }
  .brand-name { font-size: var(--fs-base); }
  .seg button span { display: none; }
  :root { --fs-3xl: 2.4rem; --fs-2xl: 2rem; --fs-xl: 1.5rem; }
  .search-btn span { display: none; }
  .search-btn { padding: 10px 14px; }
  .word-card, .meaning { padding: var(--sp-4); }
  .chips { gap: 6px; }
}
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>
<div class="app">
  <!-- ===== TOPBAR ===== -->
  <header class="topbar">
    <div class="topbar-inner">
      <button class="brand" id="brand-home" title="Back to home" aria-label="Lexicon home">
        <span class="brand-mark"><i class="fa-solid fa-book-open"></i></span>
        <span class="brand-name">Lexicon <span>· dict & thesaurus</span></span>
      </button>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <div class="seg" id="lang-seg" role="tablist" aria-label="Dictionary language">
          <button class="active" data-lang="en" role="tab"><span>EN</span> English</button>
          <button data-lang="es" role="tab"><span>ES</span> Español</button>
          <button data-lang="fr" role="tab"><span>FR</span> Français</button>
        </div>
        <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- ===== HERO + SEARCH ===== -->
    <section class="hero" id="hero">
      <h1>Define anything.</h1>
      <p class="lede">Definitions, pronunciations, synonyms &amp; antonyms — beautifully presented and instantly searchable.</p>
      <div class="search-wrap" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-owns="suggestions">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass search-ic" aria-hidden="true"></i>
          <input type="text" id="search-input" placeholder="Search a word…" autocomplete="off" spellcheck="false" aria-label="Search word" aria-autocomplete="list" aria-controls="suggestions" aria-activedescendant="" />
          <kbd class="kbd-hint" aria-hidden="true">/</kbd>
          <button class="search-clear" id="search-clear" aria-label="Clear search"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
          <button class="search-btn" id="search-btn" aria-label="Search"><i class="fa-solid fa-arrow-right" aria-hidden="true"></i><span>Search</span></button>
        </div>
        <ul class="suggestions" id="suggestions" role="listbox" aria-label="Suggestions"></ul>
      </div>
      <div class="chips" id="trending-chips"></div>
    </section>

    <!-- ===== SKELETON ===== -->
    <section class="skeleton" id="skeleton">
      <div class="layout">
        <div>
          <div class="sk-card" style="margin-bottom:24px">
            <div class="sk sk-line" style="width:40%;height:42px"></div>
            <div class="sk sk-line" style="width:25%;height:18px;margin-top:14px"></div>
          </div>
          <div class="sk-card">
            <div class="sk sk-line" style="width:20%"></div>
            <div class="sk sk-line" style="width:90%"></div>
            <div class="sk sk-line" style="width:80%"></div>
            <div class="sk sk-line" style="width:60%;margin-bottom:0"></div>
          </div>
        </div>
        <div>
          <div class="sk-card"><div class="sk sk-line" style="width:50%"></div><div class="sk sk-line" style="width:90%"></div><div class="sk sk-line" style="width:70%;margin-bottom:0"></div></div>
        </div>
      </div>
    </section>

    <!-- ===== ERROR / EMPTY STATE ===== -->
    <section class="state" id="state-view" style="display:none"></section>

    <!-- ===== RESULTS ===== -->
    <section class="results" id="results">
      <div class="layout">
        <div id="result-main"></div>
        <aside class="sidebar" id="sidebar"></aside>
      </div>
    </section>
  </main>

  <footer class="footer">
    Built with the <a href="https://dictionaryapi.dev" target="_blank" rel="noopener">Free Dictionary API</a> · Data &amp; audio © respective sources · <span id="year"></span> Lexicon
  </footer>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
/* ============================================================
   LEXICON — Dictionary & Thesaurus
   State management + Free Dictionary API integration
   ============================================================ */
(() => {
  'use strict';

  const API = 'https://api.dictionaryapi.dev/api/v2/entries';

  // ---------- State Store ----------
  const Store = {
    state: {
      lang: 'en',
      query: '',
      current: null,        // last fetched entry array
      currentWord: '',
      status: 'idle',       // idle | loading | success | error
      history: [],
      favorites: [],
      theme: 'dark',
      wotd: null,
    },
    listeners: [],
    set(patch) { Object.assign(this.state, patch); this.listeners.forEach(fn => fn(this.state)); },
    subscribe(fn) { this.listeners.push(fn); },
  };

  // ---------- Persistence ----------
  const LS = {
    get(k, d) { try { return JSON.parse(localStorage.getItem('lex_' + k)) ?? d; } catch { return d; } },
    set(k, v) { try { localStorage.setItem('lex_' + k, JSON.stringify(v)); } catch {} },
  };

  // ---------- DOM ----------
  const $ = sel => document.querySelector(sel);
  const el = {
    hero: $('#hero'), input: $('#search-input'), clear: $('#search-clear'), btn: $('#search-btn'),
    sugg: $('#suggestions'), searchWrap: $('.search-wrap'), chips: $('#trending-chips'), skeleton: $('#skeleton'),
    state: $('#state-view'), results: $('#results'), resultMain: $('#result-main'),
    sidebar: $('#sidebar'), themeBtn: $('#theme-toggle'), langSeg: $('#lang-seg'),
    toastWrap: $('#toast-wrap'),
  };

  // ---------- Data: trending + WOTD pool ----------
  const TRENDING = ['serendipity', 'ephemeral', 'eloquent', 'resilience', 'paradox', 'nostalgia', 'wanderlust', 'quintessential'];
  const WOTD_POOL = ['lucid', 'tenacious', 'sonder', 'mellifluous', 'petrichor', 'halcyon', 'limerence', 'effervescent', 'ethereal', 'aurora', 'verdant', 'cascade', 'luminous', 'nebulous', 'zephyr', 'solitude'];

  // ---------- Audio ----------
  let audioEl = null;
  function normalizeUrl(u) { return u && u.startsWith('//') ? 'https:' + u : u; }
  function playAudio(url, pill) {
    url = normalizeUrl(url);
    if (!url) return;
    const stop = () => pill && pill.classList.remove('playing');
    try {
      if (audioEl) { audioEl.pause(); }
      audioEl = new Audio(url);
      if (pill) pill.classList.add('playing');
      audioEl.play().catch(() => { toast('Audio unavailable', true); stop(); });
      audioEl.onended = stop;
      audioEl.onerror = () => { toast('Audio failed to load', true); stop(); };
    } catch { toast('Cannot play audio', true); stop(); }
  }

  // ---------- Toast ----------
  function toast(msg, isErr) {
    const t = document.createElement('div');
    t.className = 'toast' + (isErr ? ' err' : '');
    t.innerHTML = `<i class="fa-solid ${isErr ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i>${msg}`;
    el.toastWrap.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; t.style.transition = 'all .3s'; setTimeout(() => t.remove(), 300); }, 2400);
  }

  // ---------- Helpers ----------
  function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
  function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

  function pickPhonetic(entry) {
    if (entry.phonetic) return entry.phonetic;
    const p = (entry.phonetics || []).find(x => x.text);
    return p ? p.text : '';
  }
  function pickAudio(entries) {
    for (const e of entries) {
      for (const p of (e.phonetics || [])) {
        if (p.audio) return { url: p.audio, text: p.text || '' };
      }
    }
    return null;
  }

  // Collect all synonyms / antonyms across the entry
  function collectRels(entries) {
    const syn = new Set(), ant = new Set();
    entries.forEach(e => (e.meanings || []).forEach(m => {
      (m.synonyms || []).forEach(s => syn.add(s));
      (m.antonyms || []).forEach(a => ant.add(a));
      (m.definitions || []).forEach(d => {
        (d.synonyms || []).forEach(s => syn.add(s));
        (d.antonyms || []).forEach(a => ant.add(a));
      });
    }));
    return { syn: [...syn], ant: [...ant] };
  }

  // ---------- Render ----------
  function showView(view) {
    el.skeleton.classList.toggle('show', view === 'loading');
    el.results.classList.toggle('show', view === 'success');
    el.state.style.display = (view === 'error' || view === 'empty') ? 'block' : 'none';
    if (view === 'loading' || view === 'success' || view === 'error') {
      el.hero.classList.add('compact');
    }
  }

  function renderResult(entries, word) {
    const phonetic = entries.map(pickPhonetic).find(Boolean) || '';
    const audio = pickAudio(entries);
    const rels = collectRels(entries);
    const isFav = Store.state.favorites.includes(word.toLowerCase());

    // Word card
    let html = `<div class="word-card">
      <div class="word-head">
        <div>
          <div class="word-title">${esc(word)}</div>
          ${phonetic ? `<div class="word-phonetic">${esc(phonetic)}</div>` : ''}
          <div class="word-meta">
            ${audio
              ? `<button class="audio-pill" data-audio="${esc(audio.url)}"><i class="fa-solid fa-volume-high"></i><span class="audio-label">${esc(audio.text || 'Listen')}</span></button>`
              : `<span class="audio-pill no-audio"><i class="fa-solid fa-volume-xmark"></i><span class="audio-label">No audio</span></span>`}
          </div>
        </div>
        <div class="word-actions">
          <button class="wa-btn ${isFav ? 'active' : ''}" id="fav-btn" title="Save to favorites" aria-label="Favorite"><i class="fa-${isFav ? 'solid' : 'regular'} fa-bookmark"></i></button>
          <button class="wa-btn" id="copy-btn" title="Copy word" aria-label="Copy"><i class="fa-regular fa-copy"></i></button>
          <button class="wa-btn" id="speak-btn" title="Speak (TTS)" aria-label="Speak"><i class="fa-solid fa-comment-dots"></i></button>
        </div>
      </div>`;

    const origin = entries.map(e => e.origin).find(Boolean);
    if (origin) html += `<div class="word-origin"><i class="fa-solid fa-clock-rotate-left" style="margin-right:8px;opacity:.6"></i>${esc(origin)}</div>`;
    html += `</div>`;

    // Meanings
    html += `<div class="meanings">`;
    let mi = 0;
    entries.forEach(entry => {
      (entry.meanings || []).forEach(m => {
        const delay = (mi * 60) + 'ms';
        html += `<div class="meaning" style="animation-delay:${delay}">
          <div class="meaning-head">
            <span class="pos-badge">${esc(m.partOfSpeech || 'other')}</span>
            <span class="line"></span>
            <span class="count">${(m.definitions || []).length} def</span>
          </div>
          <div class="def-list">`;
        (m.definitions || []).forEach(d => {
          html += `<div class="def-item"><div class="def-num"></div><div class="def-body">
            <div class="def-text">${esc(d.definition)}</div>
            ${d.example ? `<div class="def-example">“${esc(d.example)}”</div>` : ''}`;
          if ((d.synonyms || []).length || (d.antonyms || []).length) {
            html += `<div class="def-rel">`;
            if ((d.synonyms || []).length) html += `<div class="rel-group"><span class="rel-label syn">syn</span>${d.synonyms.slice(0, 6).map(s => tag(s, 'syn')).join('')}</div>`;
            if ((d.antonyms || []).length) html += `<div class="rel-group"><span class="rel-label ant">ant</span>${d.antonyms.slice(0, 6).map(s => tag(s, 'ant')).join('')}</div>`;
            html += `</div>`;
          }
          html += `</div></div>`;
        });
        html += `</div>`;
        // meaning-level rels
        if ((m.synonyms || []).length || (m.antonyms || []).length) {
          html += `<div class="meaning-rels">`;
          if ((m.synonyms || []).length) html += `<div class="rel-row"><span class="rel-label syn">Synonyms</span>${m.synonyms.map(s => tag(s, 'syn')).join('')}</div>`;
          if ((m.antonyms || []).length) html += `<div class="rel-row"><span class="rel-label ant">Antonyms</span>${m.antonyms.map(s => tag(s, 'ant')).join('')}</div>`;
          html += `</div>`;
        }
        html += `</div>`;
        mi++;
      });
    });
    html += `</div>`;
    el.resultMain.innerHTML = html;

    // Sidebar
    renderSidebar(rels);

    // Wire result actions
    el.resultMain.querySelectorAll('.audio-pill[data-audio]').forEach(b => b.addEventListener('click', () => playAudio(b.dataset.audio, b)));
    el.resultMain.querySelectorAll('.word-tag').forEach(t => t.addEventListener('click', () => search(t.dataset.word)));
    const favBtn = $('#fav-btn'); if (favBtn) favBtn.addEventListener('click', () => toggleFav(word));
    const copyBtn = $('#copy-btn'); if (copyBtn) copyBtn.addEventListener('click', () => { navigator.clipboard.writeText(word).then(() => toast('Word copied')); });
    const speakBtn = $('#speak-btn'); if (speakBtn) speakBtn.addEventListener('click', () => ttsSpeak(word));
  }

  function tag(word, type) { return `<button class="word-tag ${type}" data-word="${esc(word)}">${esc(word)}</button>`; }

  /* Unified sidebar — single source of truth.
     Top panel is either the Thesaurus (when a word is showing) or
     Word of the Day (idle). Favorites + Recent always follow. */
  function thesaurusPanel(rels) {
    let body = '';
    if (rels && (rels.syn.length || rels.ant.length)) {
      if (rels.syn.length) body += `<div class="cloud-label"><span class="rel-label syn">Synonyms</span></div><div class="cloud">${rels.syn.slice(0, 30).map(s => tag(s, 'syn')).join('')}</div>`;
      if (rels.ant.length) body += `<div class="cloud-label"><span class="rel-label ant">Antonyms</span></div><div class="cloud">${rels.ant.slice(0, 30).map(s => tag(s, 'ant')).join('')}</div>`;
    } else {
      body = `<div class="empty-mini">No synonyms or antonyms found for this word.</div>`;
    }
    const count = rels ? (rels.syn.length + rels.ant.length) : 0;
    return `<section class="panel"><div class="panel-head"><i class="fa-solid fa-arrows-left-right-to-line"></i> Thesaurus <span class="pcount">${count}</span></div><div class="panel-body">${body}</div></section>`;
  }

  function wotdPanel() {
    const w = Store.state.wotd;
    if (!w) return '';
    return `<section class="panel"><div class="panel-head"><i class="fa-solid fa-star"></i> Word of the Day</div>
      <div class="wotd">
        <button class="wotd-word" data-word="${esc(w.word)}">${esc(w.word)}</button>
        <div class="wotd-pos">${esc(w.pos)}</div>
        <div class="wotd-def">${esc(w.def)}</div>
      </div></section>`;
  }

  function listPanel(title, icon, items, isFav, emptyMsg) {
    let body;
    if (items.length) body = items.map(w => listItem(w, icon, isFav)).join('');
    else body = `<div class="empty-mini">${emptyMsg}</div>`;
    const clearBtn = items.length ? `<button class="panel-clear" data-clear="${isFav ? 'fav' : 'hist'}" title="Clear all">Clear</button>` : '';
    return `<section class="panel"><div class="panel-head"><i class="fa-solid ${icon}"></i> ${title} <span class="pcount">${items.length}</span>${clearBtn}</div><div class="panel-body">${body}</div></section>`;
  }

  function renderSidebar(rels) {
    const topPanel = rels ? thesaurusPanel(rels) : wotdPanel();
    const favItems = Store.state.favorites.slice().reverse();
    const histItems = Store.state.history.slice(0, 12);
    el.sidebar.innerHTML =
      topPanel +
      listPanel('Favorites', 'fa-bookmark', favItems, true, 'Bookmark words to save them here.') +
      listPanel('Recent', 'fa-clock-rotate-left', histItems, false, 'Your searches appear here.');
    wireSidebar(rels);
  }

  function wireSidebar(rels) {
    el.sidebar.querySelectorAll('.word-tag, .wotd-word').forEach(t => t.addEventListener('click', () => search(t.dataset.word)));
    el.sidebar.querySelectorAll('.list-item .li-word').forEach(n => n.addEventListener('click', () => search(n.textContent)));
    el.sidebar.querySelectorAll('.list-item .li-del').forEach(b => b.addEventListener('click', e => {
      e.stopPropagation();
      const w = b.dataset.word, fav = b.dataset.fav === '1';
      if (fav) { Store.state.favorites = Store.state.favorites.filter(x => x !== w); LS.set('favorites', Store.state.favorites); toast('Removed from favorites'); }
      else { Store.state.history = Store.state.history.filter(x => x !== w); LS.set('history', Store.state.history); }
      renderSidebar(rels);
    }));
    el.sidebar.querySelectorAll('.panel-clear').forEach(b => b.addEventListener('click', e => {
      e.stopPropagation();
      if (b.dataset.clear === 'fav') { Store.state.favorites = []; LS.set('favorites', []); toast('Favorites cleared'); }
      else { Store.state.history = []; LS.set('history', []); toast('History cleared'); }
      renderSidebar(rels);
    }));
  }

  function listItem(word, icon, isFav) {
    return `<div class="list-item">
      <i class="fa-solid ${icon} li-ic"></i>
      <span class="li-word">${esc(word)}</span>
      <button class="li-del" data-word="${esc(word)}" data-fav="${isFav ? '1' : '0'}" aria-label="Remove"><i class="fa-solid fa-xmark"></i></button>
    </div>`;
  }

  function renderError(word, message) {
    const body = word
      ? `${message ? esc(message) + ' ' : ''}We couldn't find <strong style="color:var(--c-text-0)">“${esc(word)}”</strong> in the ${esc(Store.state.lang.toUpperCase())} dictionary. Check the spelling or try another word.`
      : `${esc(message) || 'Something went wrong. Please try again.'}`;
    el.state.innerHTML = `
      <div class="state-icon err"><i class="fa-solid fa-magnifying-glass-minus"></i></div>
      <h3>No definitions found</h3>
      <p>${body}</p>
      <div class="chips">${TRENDING.slice(0, 5).map(w => `<button class="chip" data-word="${esc(w)}"><i class="fa-solid fa-arrow-trend-up" aria-hidden="true"></i>${esc(w)}</button>`).join('')}</div>`;
    el.state.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => search(c.dataset.word)));
  }

  // ---------- TTS fallback ----------
  function ttsSpeak(word) {
    if (!('speechSynthesis' in window)) { toast('Speech not supported', true); return; }
    const u = new SpeechSynthesisUtterance(word);
    u.lang = Store.state.lang === 'es' ? 'es-ES' : Store.state.lang === 'fr' ? 'fr-FR' : 'en-US';
    u.rate = 0.92;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }

  // ---------- Favorites ----------
  function toggleFav(word) {
    const w = word.toLowerCase();
    const i = Store.state.favorites.indexOf(w);
    if (i >= 0) { Store.state.favorites.splice(i, 1); toast('Removed from favorites'); }
    else { Store.state.favorites.push(w); toast('Saved to favorites'); }
    LS.set('favorites', Store.state.favorites);
    const favBtn = $('#fav-btn');
    if (favBtn) {
      const active = Store.state.favorites.includes(w);
      favBtn.classList.toggle('active', active);
      favBtn.querySelector('i').className = `fa-${active ? 'solid' : 'regular'} fa-bookmark`;
    }
    if (Store.state.current) renderSidebar(collectRels(Store.state.current));
  }

  // ---------- History ----------
  function addHistory(word) {
    const w = word.toLowerCase();
    Store.state.history = [w, ...Store.state.history.filter(x => x !== w)].slice(0, 30);
    LS.set('history', Store.state.history);
  }

  // ---------- Search / Fetch ----------
  let reqId = 0;
  async function search(word) {
    word = (word || '').trim();
    if (!word) return;
    el.input.value = word;
    updateClear();
    closeSuggestions();
    Store.set({ status: 'loading', currentWord: word });
    showView('loading');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    const myReq = ++reqId;
    try {
      const res = await fetch(`${API}/${Store.state.lang}/${encodeURIComponent(word.toLowerCase())}`);
      if (myReq !== reqId) return; // stale
      if (!res.ok) {
        Store.set({ status: 'error', current: null });
        showView('error');
        renderError(word, '');
        return;
      }
      const data = await res.json();
      if (myReq !== reqId) return;
      if (!Array.isArray(data) || !data.length) {
        Store.set({ status: 'error', current: null });
        showView('error'); renderError(word, '');
        return;
      }
      addHistory(word);
      Store.set({ status: 'success', current: data, currentWord: data[0].word || word });
      renderResult(data, data[0].word || word);
      showView('success');
      // update URL hash (push so browser back/forward navigates words)
      const newHash = '#' + encodeURIComponent((data[0].word || word).toLowerCase());
      if (location.hash !== newHash) history.pushState(null, '', newHash);
    } catch (err) {
      if (myReq !== reqId) return;
      Store.set({ status: 'error', current: null });
      showView('error');
      renderError(word, 'Network error —');
      toast('Network error. Check your connection.', true);
    }
  }

  // ---------- Suggestions (from history + trending + pool) ----------
  function buildSuggestions(q) {
    q = q.toLowerCase();
    if (!q) return [];
    const pool = [...new Set([...Store.state.history, ...Store.state.favorites, ...TRENDING, ...WOTD_POOL])];
    const starts = pool.filter(w => w.startsWith(q));
    const contains = pool.filter(w => !w.startsWith(q) && w.includes(q));
    return [...starts, ...contains].slice(0, 7);
  }
  let suggIdx = -1;
  function renderSuggestions(q) {
    const items = buildSuggestions(q);
    if (!items.length || !q) { closeSuggestions(); return; }
    suggIdx = -1;
    el.sugg.innerHTML = items.map((w, i) => {
      const isHist = Store.state.history.includes(w);
      const isFav = Store.state.favorites.includes(w);
      const icon = isFav ? 'fa-bookmark' : isHist ? 'fa-clock-rotate-left' : 'fa-arrow-trend-up';
      const t = isFav ? 'saved' : isHist ? 'recent' : 'trending';
      return `<li class="suggestion" id="sugg-${i}" role="option" aria-selected="false" data-word="${esc(w)}"><i class="fa-solid ${icon}" aria-hidden="true"></i><span class="s-word">${esc(w)}</span><span class="s-tag">${t}</span></li>`;
    }).join('');
    el.sugg.classList.add('show');
    el.searchWrap.setAttribute('aria-expanded', 'true');
    el.sugg.querySelectorAll('.suggestion').forEach(s => s.addEventListener('click', () => search(s.dataset.word)));
  }
  function closeSuggestions() {
    el.sugg.classList.remove('show'); suggIdx = -1;
    el.searchWrap.setAttribute('aria-expanded', 'false');
    el.input.setAttribute('aria-activedescendant', '');
  }

  // ---------- Trending chips ----------
  function renderChips() {
    el.chips.innerHTML = TRENDING.map(w => `<button class="chip" data-word="${w}"><i class="fa-solid fa-arrow-trend-up"></i>${w}</button>`).join('');
    el.chips.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => search(c.dataset.word)));
  }

  // ---------- Word of the day (initial / idle sidebar) ----------
  async function loadWotd() {
    const today = new Date().toISOString().slice(0, 10);
    const cached = LS.get('wotd', null);
    let word;
    if (cached && cached.date === today && cached.def) {
      Store.state.wotd = cached;
      renderHomeSidebar();
      return;
    }
    if (cached && cached.date === today) word = cached.word;
    else {
      const seed = [...today].reduce((a, c) => a + c.charCodeAt(0), 0);
      word = WOTD_POOL[seed % WOTD_POOL.length];
    }
    // Render sidebar immediately (Favorites/Recent) even before fetch resolves
    renderHomeSidebar();
    try {
      const res = await fetch(`${API}/en/${word}`);
      if (!res.ok) return;
      const data = await res.json();
      const m = data[0].meanings[0];
      const wotd = { date: today, word: data[0].word || word, pos: m.partOfSpeech, def: m.definitions[0].definition };
      LS.set('wotd', wotd);
      Store.state.wotd = wotd;
      if (Store.state.status === 'idle') renderHomeSidebar();
    } catch {}
  }

  // Renders the idle "home" layout: empty main + sidebar with WOTD on top
  function renderHomeSidebar() {
    el.results.classList.add('show');
    el.resultMain.innerHTML = '';
    renderSidebar(null);
  }

  // ---------- Theme ----------
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    el.themeBtn.querySelector('i').className = t === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    Store.state.theme = t; LS.set('theme', t);
  }

  // ---------- Clear button ----------
  function updateClear() { el.clear.classList.toggle('show', el.input.value.length > 0); }

  // ---------- Reset to home / idle ----------
  function goHome() {
    ++reqId; // cancel any in-flight request
    Store.set({ status: 'idle', current: null, currentWord: '' });
    el.input.value = '';
    updateClear();
    closeSuggestions();
    el.skeleton.classList.remove('show');
    el.state.style.display = 'none';
    el.hero.classList.remove('compact');
    history.replaceState(null, '', location.pathname + location.search);
    renderHomeSidebar();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    el.input.focus();
  }

  // ---------- Init / Events ----------
  function init() {
    Store.state.history = LS.get('history', []);
    Store.state.favorites = LS.get('favorites', []);
    Store.state.theme = LS.get('theme', 'dark');
    applyTheme(Store.state.theme);
    $('#year').textContent = new Date().getFullYear();
    renderChips();

    el.btn.addEventListener('click', () => search(el.input.value));
    el.input.addEventListener('keydown', e => {
      const items = el.sugg.querySelectorAll('.suggestion');
      if (e.key === 'Enter') {
        if (suggIdx >= 0 && items[suggIdx]) { search(items[suggIdx].dataset.word); }
        else search(el.input.value);
      } else if (e.key === 'ArrowDown' && items.length) {
        e.preventDefault(); suggIdx = (suggIdx + 1) % items.length; highlightSugg(items);
      } else if (e.key === 'ArrowUp' && items.length) {
        e.preventDefault(); suggIdx = (suggIdx - 1 + items.length) % items.length; highlightSugg(items);
      } else if (e.key === 'Escape') { closeSuggestions(); }
    });
    const debouncedSugg = debounce(v => renderSuggestions(v), 110);
    el.input.addEventListener('input', () => { updateClear(); debouncedSugg(el.input.value); });
    el.input.addEventListener('focus', () => { if (el.input.value) renderSuggestions(el.input.value); });
    el.clear.addEventListener('click', () => { el.input.value = ''; updateClear(); closeSuggestions(); el.input.focus(); });
    document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) closeSuggestions(); });

    el.themeBtn.addEventListener('click', () => applyTheme(Store.state.theme === 'dark' ? 'light' : 'dark'));
    $('#brand-home').addEventListener('click', goHome);

    el.langSeg.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      el.langSeg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      Store.set({ lang: b.dataset.lang });
      if (Store.state.currentWord && Store.state.status === 'success') search(Store.state.currentWord);
    });

    // Global keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement !== el.input) { e.preventDefault(); el.input.focus(); el.input.select(); }
      else if (e.key === 'Escape' && document.activeElement !== el.input && Store.state.status !== 'idle') { goHome(); }
    });

    // Respond to back/forward navigation
    window.addEventListener('hashchange', () => {
      const h = decodeURIComponent(location.hash.replace('#', ''));
      if (h && h !== Store.state.currentWord.toLowerCase()) search(h);
      else if (!h && Store.state.status !== 'idle') goHome();
    });

    // Deep link
    const hash = decodeURIComponent(location.hash.replace('#', ''));
    if (hash) { search(hash); }
    else { loadWotd(); }
  }
  function highlightSugg(items) {
    items.forEach((it, i) => {
      const on = i === suggIdx;
      it.classList.toggle('active', on);
      it.setAttribute('aria-selected', on ? 'true' : 'false');
      if (on) { el.input.setAttribute('aria-activedescendant', it.id); it.scrollIntoView({ block: 'nearest' }); }
    });
  }

  init();
})();
</script>
</body>
