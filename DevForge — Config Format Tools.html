    det.classList.toggle('on',dec&&cfg.detect);
  }
  syncMode();

  // Encode/decode a string using a specific encoding kind.
  function encodeWith(kind,src){
    if(kind==='url')return encodeURIComponent(src);
    if(kind==='hex')return hexEncodeUtf8(src);
    if(kind==='html')return htmlEncode(src);
    let r=b64encodeUtf8(src);return kind==='b64url'?toBase64Url(r):r;
  }
  function decodeWith(kind,src){
    if(kind==='url')return decodeURIComponent(src);
    if(kind==='hex')return hexDecodeUtf8(src);
    if(kind==='html')return htmlDecode(src);
    return b64decodeUtf8(kind==='b64url'?fromBase64Url(src.trim()):src.trim());
  }
  // Heuristically guess the encoding of a string to be decoded.
  function detectKind(src){
    const s=src.trim();
    // HTML entities present → html
    if(/&(#x?[0-9a-fA-F]+|[a-zA-Z][a-zA-Z0-9]*);/.test(s))return 'html';
    // percent-escapes present → url
    if(/%[0-9a-fA-F]{2}/.test(s))return 'url';
    // pure hex pairs (optional 0x/\x prefix + separators) → hex
    if(/^(0x|\\x)?\s*([0-9a-fA-F]{2}[\s:,\-]*)+$/.test(s)&&/[a-fA-F]/.test(s))return 'hex';
    // base64url alphabet (has -_ , no +/) → b64url
    if(/[-_]/.test(s)&&!/[+/]/.test(s)&&/^[A-Za-z0-9\-_]+={0,2}$/.test(s))return 'b64url';
    return 'b64';
  }
  const KIND_LABEL={b64:'Base64',b64url:'Base64URL',url:'URL',hex:'Hex',html:'HTML'};
  const KIND_ICON={b64:'hashtag',b64url:'hashtag',url:'link',hex:'wave-square',html:'code'};

  function run(){
    const cfg=Store.getTool('base64');const src=cfg.input;updStats(src);
    let activeKind=cfg.kind;
    if(cfg.mode==='decode'&&cfg.detect&&src.trim())activeKind=detectKind(src);
    const detected=cfg.mode==='decode'&&cfg.detect&&src.trim();
    $('[data-slot=info]',root).innerHTML=`<i class="fa-solid fa-${KIND_ICON[activeKind]||'hashtag'}"></i> ${KIND_LABEL[activeKind]||'Base64'}${detected?' <span style="opacity:.7">(auto)</span>':''}`;
    if(!src){setStatus('idle','Idle');out.textContent='';lastOut='';$('[data-mini=out]',root).textContent='';return;}
    try{
      const result=cfg.mode==='encode'?encodeWith(activeKind,src):decodeWith(activeKind,src);
      lastOut=result;
      out.innerHTML=`<span class="copyable" data-copy title="Click to copy" style="display:inline-block;min-width:100%"></span>`;
      out.firstChild.textContent=result; // textContent assignment avoids escaping issues
      out.firstChild.dataset.copy=result;
      $('[data-mini=out]',root).textContent=result.length+' ch';
      setStatus('ok',(cfg.mode==='encode'?'Encoded':'Decoded')+(detected?' · '+KIND_LABEL[activeKind]:''));
    }catch(e){
      lastOut='';out.innerHTML=`<span class="tk-null">${esc('Cannot '+cfg.mode+': '+e.message)}</span>`;
      setStatus('err',cfg.mode==='decode'?'Invalid input for decode':'Encode failed');
    }
  }

  // Click the output to copy it.
  out.addEventListener('click',e=>{const c=e.target.closest('[data-copy]');if(c&&c.dataset.copy)copy(c.dataset.copy);});
  root.addEventListener('click',e=>{
    const m=e.target.closest('[data-mode]');
    if(m){Store.patch('base64','mode',m.dataset.mode);syncMode();run();return;}
    const b=e.target.closest('[data-act]');if(!b)return;
    const cfg=Store.getTool('base64');
    if(b.dataset.act==='run')run();
    else if(b.dataset.act==='detect'){const next=!cfg.detect;Store.patch('base64','detect',next);b.classList.toggle('on',next);run();}
    else if(b.dataset.act==='swap'){
      // Move output into input and flip direction (handy for round-trips).
      const next=cfg.mode==='encode'?'decode':'encode';
      const newInput=lastOut||'';
      Store.update('base64',{mode:next,input:newInput});
      input._ta.value=newInput;input._upd();syncMode();run();
    }
    else if(b.dataset.act==='copy')copy(cfg.input);
    else if(b.dataset.act==='copyout')copy(lastOut);
    else if(b.dataset.act==='wrap'){out.classList.toggle('wrap');b.classList.toggle('on');}
    else if(b.dataset.act==='download')download(lastOut||cfg.input,'output.txt');
    else if(b.dataset.act==='clear'){Store.patch('base64','input','');input._ta.value='';input._upd();run();}
    else if(b.dataset.act==='sample'){
      const plain='DevForge ⚡ 100% local';
      let s=plain;
      if(cfg.mode==='decode'){
        // produce a sample already encoded in the current kind so decode has something to chew on
        try{s=encodeWith(cfg.detect?'b64':cfg.kind,plain);}catch(_){s='RGV2Rm9yZ2Ug4pqhIDEwMCUgbG9jYWw=';}
      }
      Store.patch('base64','input',s);input._ta.value=s;input._upd();run();
    }
  });
  root.addEventListener('change',e=>{const s=e.target.closest('[data-set]');if(s){Store.patch('base64',s.dataset.set,s.value);run();}});
  setTimeout(run,30);
  return root;
}

/* ---------- JWT DECODER ----------
   Decodes (does NOT verify) a JSON Web Token: splits the three base64url
   segments, pretty-prints header + payload, and surfaces standard claims with
   human-readable timestamps and an expiry verdict. Verification needs the
   signing secret/key, which is out of scope for a client-side inspector. */
function renderJWT(){
  const st=Store.getTool('jwt');
  const root=el('section','tool');root.dataset.tool='jwt';
  root.innerHTML=`
    <div class="toolbar">
      <button class="btn primary" data-act="decode"><i class="fa-solid fa-unlock-keyhole"></i><span class="lbl">Decode</span></button>
      <div class="sep"></div>
      <span class="field">Times
        <select data-set="tz" title="Timezone for timestamp claims"><option value="utc">UTC</option><option value="local">Local</option></select>
      </span>
      <span class="field"><i class="fa-solid fa-circle-info" style="color:var(--accent)"></i> Decode-only — signature is not verified</span>
      <div class="spacer"></div>
      <button class="btn ghost sm" data-act="sample" title="Load sample"><i class="fa-solid fa-flask"></i><span class="lbl">Sample</span></button>
      <button class="btn ghost sm" data-act="copy" title="Copy input JWT"><i class="fa-solid fa-clipboard"></i></button>
      <button class="btn ghost sm" data-act="copyout" title="Copy payload JSON"><i class="fa-solid fa-copy"></i></button>
      <button class="btn ghost sm danger" data-act="clear"><i class="fa-solid fa-trash"></i></button>
    </div>
    <div class="editor-grid">
      <div class="pane">
        <div class="pane-head"><span class="dot"></span>Encoded JWT<span class="spacer"></span><span class="mini" data-mini="in"></span></div>
        <div class="pane-body" data-slot="input"></div>
      </div>
      <div class="pane">
        <div class="pane-head"><span class="dot out"></span>Decoded<span class="spacer"></span><span class="mini" data-mini="out"></span></div>
        <div class="pane-body"><div class="code-output wrap" data-slot="output" data-empty="Decoded header & payload appear here…" style="white-space:normal"></div></div>
      </div>
    </div>
    <div class="statusbar">
      <span class="status-pill idle" data-slot="status"><i class="fa-solid fa-circle-notch"></i> Idle</span>
      <span class="status-stat" data-slot="alg"></span>
      <div class="spacer"></div>
      <span class="status-stat" data-slot="exp"></span>
    </div>`;

  const out=$('[data-slot=output]',root);
  let payloadJSON='';
  const setStatus=makeStatusSetter(root);

  const runDebounced=debounce(()=>run(),220);
  const input=buildCodeInput(st.input,v=>{Store.patch('jwt','input',v);$('[data-mini=in]',root).textContent=v.trim()?v.trim().length+' ch':'';runDebounced();},'Paste a JWT (eyJ…) here');
  $('[data-slot=input]',root).appendChild(input);
  $('[data-set=tz]',root).value=st.tz||'utc';

  // Absolute timestamp formatter, respecting the UTC / Local timezone choice.
  function fmtTime(secs){
    const d=new Date(secs*1000);if(isNaN(d))return String(secs);
    const tz=(Store.getTool('jwt').tz)||'utc';
    if(tz==='local'){
      const s=d.toLocaleString(undefined,{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
      return `${s} (${secs})`;
    }
    return `${d.toISOString().replace('T',' ').replace(/\.\d+Z$/,' UTC')} (${secs})`;
  }
  // Human-readable relative span, e.g. "in 2 days" / "3 hours ago".
  function relTime(secs){
    const diff=secs-Math.floor(Date.now()/1000);const abs=Math.abs(diff);
    const units=[[31536000,'year'],[2592000,'month'],[86400,'day'],[3600,'hour'],[60,'minute'],[1,'second']];
    let label='just now';
    for(const [s,name] of units){if(abs>=s){const n=Math.floor(abs/s);label=`${n} ${name}${n>1?'s':''}`;break;}}
    if(label==='just now')return label;
    return diff>0?`in ${label}`:`${label} ago`;
  }
  const CLAIMS={iss:'Issuer',sub:'Subject',aud:'Audience',exp:'Expires',nbf:'Not before',iat:'Issued at',jti:'JWT ID'};

  // Build a labelled JSON block (header / payload) with syntax highlighting + per-section copy.
  function block(title,obj){
    const json=JSON.stringify(obj,null,2);
    return `<div class="jwt-part"><div class="jwt-part__h"><span>${esc(title)}</span><button class="jwt-part__copy" data-copysection="${esc(json)}" title="Copy ${esc(title)} JSON"><i class="fa-solid fa-copy"></i> copy</button></div><pre class="jwt-json">${hlJSON(json)}</pre></div>`;
  }
  function claimsTable(p){
    const now=Math.floor(Date.now()/1000);
    const rows=Object.keys(CLAIMS).filter(k=>k in p).map(k=>{
      const isTime=['exp','nbf','iat'].includes(k)&&typeof p[k]==='number';
      let cls='',rel='';
      if(isTime){
        rel=`<span class="jwt-claimrel">${esc(relTime(p[k]))}</span>`;
        cls=' jwt-claim-time';
        if(k==='exp'&&p[k]<now)cls=' jwt-claim-warn';
        if(k==='nbf'&&p[k]>now)cls=' jwt-claim-warn';
      }
      const val=isTime?fmtTime(p[k]):(typeof p[k]==='object'?JSON.stringify(p[k]):String(p[k]));
      return `<tr class="${cls.trim()}"><td class="jwt-claim">${k}</td><td class="jwt-claimname">${CLAIMS[k]}</td><td class="jwt-claimval">${esc(val)}${rel}</td></tr>`;
    }).join('');
    return rows?`<div class="jwt-part"><div class="jwt-part__h"><span>Registered claims</span></div><table class="jwt-table">${rows}</table></div>`:'';
  }
  // Prominent header chips (alg / typ) + expiry/validity badge.
  function metaChips(header){
    let h=`<span class="jwt-chip alg"><i class="fa-solid fa-shield-halved"></i> alg: ${esc(header.alg||'?')}</span>`;
    if(header.typ)h+=`<span class="jwt-chip"><i class="fa-solid fa-tag"></i> typ: ${esc(header.typ)}</span>`;
    if(header.kid)h+=`<span class="jwt-chip"><i class="fa-solid fa-key"></i> kid: ${esc(String(header.kid))}</span>`;
    return `<div class="jwt-meta">${h}</div>`;
  }
  function statusBadge(payload){
    const now=Math.floor(Date.now()/1000);
    if(typeof payload.nbf==='number'&&payload.nbf>now)
      return `<div class="jwt-badge warn"><i class="fa-solid fa-hourglass-start"></i> Not yet valid — active ${esc(relTime(payload.nbf))}</div>`;
    if(typeof payload.exp==='number'){
      if(payload.exp<now)return `<div class="jwt-badge err"><i class="fa-solid fa-circle-xmark"></i> Expired ${esc(relTime(payload.exp))}</div>`;
      return `<div class="jwt-badge ok"><i class="fa-solid fa-circle-check"></i> Active — expires ${esc(relTime(payload.exp))}</div>`;
    }
    return `<div class="jwt-badge muted"><i class="fa-solid fa-infinity"></i> No expiry (exp) claim</div>`;
  }

  function run(){
    const cfg=Store.getTool('jwt');const tok=(cfg.input||'').trim();
    const setMeta=(alg,exp)=>{$('[data-slot=alg]',root).innerHTML=alg;$('[data-slot=exp]',root).innerHTML=exp;};
    if(!tok){setStatus('idle','Idle');out.innerHTML='';payloadJSON='';setMeta('','');return;}
    const parts=tok.split('.');
    if(parts.length<2||parts.length>3){setStatus('err','Not a JWT (need 2–3 dot-separated parts)');out.innerHTML=`<span class="tk-null">A JWT has the form header.payload.signature</span>`;payloadJSON='';setMeta('','');return;}
    let header,payload;
    try{header=JSON.parse(b64decodeUtf8(fromBase64Url(parts[0])));}
    catch(e){setStatus('err','Invalid header segment');out.innerHTML=`<span class="tk-null">Header is not valid base64url JSON</span>`;payloadJSON='';setMeta('','');return;}
    try{payload=JSON.parse(b64decodeUtf8(fromBase64Url(parts[1])));}
    catch(e){setStatus('err','Invalid payload segment');out.innerHTML=`<span class="tk-null">Payload is not valid base64url JSON</span>`;payloadJSON='';setMeta('','');return;}
    payloadJSON=JSON.stringify(payload,null,2);
    let html=metaChips(header)+statusBadge(payload)+block('Header',header)+block('Payload',payload)+claimsTable(payload);
    if(parts.length===3)html+=`<div class="jwt-part"><div class="jwt-part__h"><span>Signature</span><button class="jwt-part__copy" data-copysection="${esc(parts[2])}" title="Copy signature"><i class="fa-solid fa-copy"></i> copy</button></div><pre class="jwt-json"><span class="tk-str" style="word-break:break-all">${esc(parts[2])}</span></pre></div>`;
    out.innerHTML=html;
    $('[data-mini=out]',root).textContent=Object.keys(payload).length+' claims';
    setMeta(`<i class="fa-solid fa-shield-halved"></i> alg ${esc(header.alg||'?')}${header.typ?' · '+esc(header.typ):''}`,'');
    // Expiry / validity verdict
    const now=Math.floor(Date.now()/1000);
    if(typeof payload.nbf==='number'&&payload.nbf>now){
      setStatus('warn','Token NOT YET VALID');$('[data-slot=exp]',root).innerHTML=`<i class="fa-solid fa-hourglass-start" style="color:var(--warn)"></i> active ${esc(relTime(payload.nbf))}`;
    }else if(typeof payload.exp==='number'){
      if(payload.exp<now){setStatus('warn','Token EXPIRED');$('[data-slot=exp]',root).innerHTML=`<i class="fa-solid fa-triangle-exclamation" style="color:var(--warn)"></i> expired ${esc(relTime(payload.exp))}`;}
      else{setStatus('ok','Decoded · active');$('[data-slot=exp]',root).innerHTML=`<i class="fa-solid fa-clock" style="color:var(--ok)"></i> expires ${esc(relTime(payload.exp))}`;}
    }else{setStatus('ok','Decoded');$('[data-slot=exp]',root).innerHTML='<i class="fa-solid fa-infinity"></i> no exp claim';}
  }

  // Click a section "copy" button to copy just that part's JSON / signature.
  out.addEventListener('click',e=>{const c=e.target.closest('[data-copysection]');if(c){copy(c.dataset.copysection);}});
  root.addEventListener('click',e=>{
    const b=e.target.closest('[data-act]');if(!b)return;const cfg=Store.getTool('jwt');
    if(b.dataset.act==='decode')run();
    else if(b.dataset.act==='copy')copy(cfg.input);
    else if(b.dataset.act==='copyout')copy(payloadJSON);
    else if(b.dataset.act==='clear'){Store.patch('jwt','input','');input._ta.value='';input._upd();run();}
    else if(b.dataset.act==='sample'){const s='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJEZXZGb3JnZSIsIm5hbWUiOiJBbGljZSIsImFkbWluIjp0cnVlLCJpYXQiOjE1MTYyMzkwMjIsImV4cCI6MTkwMDAwMDAwMH0.K2Q1l9oXJ8nQmVn0c4mC0d3e9wXyZ9aBcD1eFgHiJkL';Store.patch('jwt','input',s);input._ta.value=s;input._upd();run();}
  });
  // Timezone toggle re-renders timestamps.
  root.addEventListener('change',e=>{const s=e.target.closest('[data-set]');if(s){Store.patch('jwt',s.dataset.set,s.value);run();}});
  setTimeout(run,30);
  return root;
}

/* ---------- HASH GENERATOR ----------
   Cryptographic digests + HMAC via the native Web Crypto SubtleCrypto API (async).
   Algorithms: SHA-1/256/384/512. Input: UTF-8 text or raw hex bytes. Output encoding:
   hex / Base64 / Base64URL. Optional HMAC keyed hashing, plus an encoding-agnostic
   "verify against" digest comparison. No third-party crypto. */
function renderHash(){
  const st=Store.getTool('hash');
  const root=el('section','tool');root.dataset.tool='hash';
  const ALGOS=['SHA-1','SHA-256','SHA-384','SHA-512'];
  const BITS={'SHA-1':160,'SHA-256':256,'SHA-384':384,'SHA-512':512};
  root.innerHTML=`
    <div class="toolbar">
      <button class="btn primary" data-act="hash"><i class="fa-solid fa-fingerprint"></i><span class="lbl">Hash</span></button>
      <button class="btn" data-act="all"><i class="fa-solid fa-layer-group"></i><span class="lbl">All algorithms</span></button>
      <div class="sep"></div>
      <span class="field">Algorithm
        <select data-set="algo">${ALGOS.map(a=>`<option value="${a}">${a}</option>`).join('')}</select>
      </span>
      <span class="field">Output
        <select data-set="encoding" title="Digest output encoding"><option value="hex">Hex</option><option value="base64">Base64</option><option value="base64url">Base64URL</option></select>
      </span>
      <span class="field" data-slot="casefield">Case
        <select data-set="casing"><option value="lower">lower</option><option value="upper">UPPER</option></select>
      </span>
      <div class="sep"></div>
      <span class="field">Input
        <select data-set="inputMode" title="Treat input as UTF-8 text or raw hex bytes"><option value="text">Text</option><option value="hex">Hex bytes</option></select>
      </span>
      <button class="btn sm toggle" data-act="hmactoggle" title="HMAC mode — keyed hash with a secret"><i class="fa-solid fa-key"></i><span class="lbl">HMAC</span></button>
      <span class="field" data-slot="keyfield" style="display:none"><i class="fa-solid fa-lock" style="color:var(--warn)"></i>
        <input type="text" class="search" data-key placeholder="HMAC secret key" value="${esc(st.hmacKey||'')}">
      </span>
      <div class="spacer"></div>
      <button class="btn ghost sm" data-act="sample"><i class="fa-solid fa-flask"></i><span class="lbl">Sample</span></button>
      <button class="btn ghost sm" data-act="copyout" title="Copy digest"><i class="fa-solid fa-copy"></i></button>
      <button class="btn ghost sm danger" data-act="clear" title="Clear input"><i class="fa-solid fa-trash"></i></button>
    </div>
    <div class="editor-grid">
      <div class="pane">
        <div class="pane-head"><span class="dot"></span><span data-inlabel>Input text</span><span class="spacer"></span><span class="mini" data-mini="in"></span></div>
        <div class="pane-body" data-slot="input"></div>
      </div>
      <div class="pane">
        <div class="pane-head"><span class="dot out"></span>Digest<span class="spacer"></span><span class="mini" data-mini="out"></span></div>
        <div class="pane-body"><div class="code-output wrap" data-slot="output" data-empty="Digest appears here…" style="white-space:normal"></div></div>
      </div>
    </div>
    <div class="hash-verify">
      <i class="fa-solid fa-shield-halved" style="color:var(--txt-2)"></i>
      <span class="hash-verify__lbl">Verify against</span>
      <input type="text" class="search" data-expected placeholder="Paste an expected digest (hex / base64 / base64url)" value="${esc(st.expected||'')}">
      <span class="hash-verify__badge" data-slot="verify"></span>
    </div>
    <div class="statusbar">
      <span class="status-pill idle" data-slot="status"><i class="fa-solid fa-circle-notch"></i> Idle</span>
      <span class="status-stat"><i class="fa-solid fa-keyboard"></i> <b data-slot="chars">0</b> chars</span>
      <span class="status-stat"><i class="fa-solid fa-database"></i> <b data-slot="bytes">0</b> B</span>
      <span class="status-stat" data-slot="outlen"></span>
      <div class="spacer"></div>
      <span class="status-stat" data-slot="info"></span>
    </div>`;

  const out=$('[data-slot=output]',root);
  let lastOut='';            // the primary digest string (current algo) for copy/verify
  let lastOutHex='';         // canonical lowercase-hex of the single-algo digest, for verify
  let lastResults=null;      // [[algo, digestString, canonicalHex], …] when "All algorithms" was last run
  const setStatus=makeStatusSetter(root);
  const updStats=text=>updateStats(root,text);
  const runDebounced=debounce(()=>run(),250);

  const input=buildCodeInput(st.input,v=>{Store.patch('hash','input',v);updStats(v);runDebounced();},'Type or paste text to hash…');
  $('[data-slot=input]',root).appendChild(input);
  input._setWrap(true);
  $('[data-set=algo]',root).value=st.algo;
  $('[data-set=casing]',root).value=st.casing;
  $('[data-set=encoding]',root).value=st.encoding||'hex';
  $('[data-set=inputMode]',root).value=st.inputMode||'text';

  const enc=new TextEncoder();

  // Resolve the input into raw bytes per the selected input mode (text vs hex).
  function inputBytes(cfg){
    if((cfg.inputMode||'text')==='hex')return hexToBytes(cfg.input);
    return enc.encode(cfg.input);
  }
  // Compute one digest (plain SHA or HMAC) and encode it per the chosen encoding.
  async function digest(algo,cfg){
    const data=inputBytes(cfg);
    let buf;
    if(cfg.hmac){
      const key=await crypto.subtle.importKey('raw',enc.encode(cfg.hmacKey||''),{name:'HMAC',hash:algo},false,['sign']);
      buf=await crypto.subtle.sign('HMAC',key,data);
    }else{
      buf=await crypto.subtle.digest(algo,data);
    }
    return {buf,str:bufEncode(buf,cfg.encoding||'hex',cfg.casing==='upper')};
  }

  // Sync UI affordances that depend on config (key field, case field, labels, info).
  function syncUI(){
    const cfg=Store.getTool('hash');
    // HMAC key field only relevant in HMAC mode
    $('[data-slot=keyfield]',root).style.display=cfg.hmac?'':'none';
    $('[data-act=hmactoggle]',root).classList.toggle('on',cfg.hmac);
    // Case selector only matters for hex output
    $('[data-slot=casefield]',root).style.opacity=(cfg.encoding||'hex')==='hex'?'1':'.4';
    $('[data-set=casing]',root).disabled=(cfg.encoding||'hex')!=='hex';
    // Input pane label reflects mode
    $('[data-inlabel]',root).textContent=(cfg.inputMode||'text')==='hex'?'Input hex bytes':(cfg.hmac?'Message text':'Input text');
    const enc2=(cfg.encoding||'hex'),encLbl={hex:'Hex',base64:'Base64',base64url:'Base64URL'}[enc2];
    $('[data-slot=info]',root).innerHTML=`<i class="fa-solid fa-${cfg.hmac?'key':'shield-halved'}"></i> ${cfg.hmac?'HMAC-':''}${esc(cfg.algo)} · ${encLbl}`;
  }

  // Compare lastOut / lastResults against the expected digest (encoding-agnostic).
  // Normalises hex by lowercasing; for base64 we compare the raw bytes via the buffer.
  function runVerify(){
    const cfg=Store.getTool('hash');
    const badge=$('[data-slot=verify]',root);
    const exp=(cfg.expected||'').trim();
    if(!exp||!cfg.input){badge.className='hash-verify__badge';badge.textContent='';return;}
    // Normalise a digest string to a canonical lowercase-hex form for robust comparison.
    const canon=s=>{
      s=s.trim();
      if(/^[0-9a-fA-F\s:,\-]+$/.test(s)&&s.replace(/[\s:,\-]/g,'').length%2===0){
        return s.replace(/0x/gi,'').replace(/\\x/gi,'').replace(/[\s:,\-]/g,'').toLowerCase();
      }
      // assume base64 / base64url → decode to bytes → hex
      try{const b=atob(fromBase64Url(s));let h='';for(let i=0;i<b.length;i++)h+=b.charCodeAt(i).toString(16).padStart(2,'0');return h;}
      catch(e){return s.toLowerCase();}
    };
    const want=canon(exp);
    // Compare against whichever digests we currently have (single or all-algos table).
    const candidates=lastResults?lastResults.map(r=>[r[0],r[2]]):(lastOut?[[cfg.algo,lastOutHex]]:[]);
    const hit=candidates.find(([,hex])=>hex===want);
    if(hit){badge.className='hash-verify__badge ok';badge.innerHTML=`<i class="fa-solid fa-circle-check"></i> Match (${esc(hit[0])})`;}
    else{badge.className='hash-verify__badge err';badge.innerHTML=`<i class="fa-solid fa-circle-xmark"></i> No match`;}
  }

  async function run(){
    const cfg=Store.getTool('hash');const src=cfg.input;updStats(src);syncUI();
    lastResults=null;
    if(!src){setStatus('idle','Idle');out.innerHTML='';lastOut='';lastOutHex='';$('[data-mini=out]',root).textContent='';$('[data-slot=outlen]',root).textContent='';runVerify();return;}
    try{
      const {buf,str}=await digest(cfg.algo,cfg);
      lastOut=str;lastOutHex=bufToHex(buf,false);
      out.innerHTML=`<span class="tk-str copyable" data-copy="${esc(str)}" title="Click to copy" style="word-break:break-all;display:inline-block">${esc(str)}</span>`;
      const bytes=buf.byteLength;
      $('[data-mini=out]',root).textContent=bytes+' B';
      $('[data-slot=outlen]',root).innerHTML=`<i class="fa-solid fa-ruler"></i> ${BITS[cfg.algo]} bit · ${str.length} ch`;
      setStatus('ok',(cfg.hmac?'HMAC-':'')+cfg.algo+' computed');
      runVerify();
    }catch(e){setStatus('err',(cfg.inputMode==='hex'?'Invalid hex input — ':'Hashing failed — ')+e.message);out.innerHTML=`<span class="tk-null">${esc(e.message)}</span>`;lastOut='';lastOutHex='';runVerify();}
  }
  // Compute every algorithm at once for quick comparison.
  async function runAll(){
    const cfg=Store.getTool('hash');const src=cfg.input;updStats(src);syncUI();
    if(!src){setStatus('idle','Idle');out.innerHTML='';lastOut='';lastResults=null;runVerify();return;}
    try{
      // results: [algo, displayString, canonicalHex]
      const results=await Promise.all(ALGOS.map(async a=>{const {buf,str}=await digest(a,cfg);return [a,str,bufToHex(buf,false)];}));
      lastResults=results;
      lastOut=results.map(([a,s])=>`${a}: ${s}`).join('\n');
      out.innerHTML=results.map(([a,s])=>`<div class="hash-row"><span class="hash-algo">${cfg.hmac?'H-':''}${a}</span><span class="tk-str copyable" data-copy="${esc(s)}" title="Click to copy" style="word-break:break-all">${esc(s)}</span></div>`).join('');
      $('[data-mini=out]',root).textContent=results.length+' digests';
      $('[data-slot=outlen]',root).textContent='';
      setStatus('ok','All digests computed');
      runVerify();
    }catch(e){setStatus('err',(cfg.inputMode==='hex'?'Invalid hex input — ':'Hashing failed — ')+e.message);out.innerHTML=`<span class="tk-null">${esc(e.message)}</span>`;lastResults=null;runVerify();}
  }

  // Click any rendered digest to copy just that value.
  out.addEventListener('click',e=>{const c=e.target.closest('[data-copy]');if(c)copy(c.dataset.copy);});
  root.addEventListener('click',e=>{
    const b=e.target.closest('[data-act]');if(!b)return;const cfg=Store.getTool('hash');
    if(b.dataset.act==='hash')run();
    else if(b.dataset.act==='all')runAll();
    else if(b.dataset.act==='hmactoggle'){const next=!cfg.hmac;Store.patch('hash','hmac',next);syncUI();run();}
    else if(b.dataset.act==='copyout')copy(lastOut);
    else if(b.dataset.act==='clear'){Store.patch('hash','input','');input._ta.value='';input._upd();run();}
    else if(b.dataset.act==='sample'){const s=cfg.inputMode==='hex'?'48 65 6c 6c 6f':'DevForge';Store.patch('hash','input',s);input._ta.value=s;input._upd();run();}
  });
  root.addEventListener('change',e=>{const s=e.target.closest('[data-set]');if(s){Store.patch('hash',s.dataset.set,s.value);if(lastResults)runAll();else run();}});
  // HMAC key + expected-digest inputs (debounced re-run / re-verify)
  const keyDebounced=debounce(()=>{if(lastResults)runAll();else run();},250);
  root.addEventListener('input',e=>{
    const k=e.target.closest('[data-key]');if(k){Store.patch('hash','hmacKey',k.value);keyDebounced();return;}
    const x=e.target.closest('[data-expected]');if(x){Store.patch('hash','expected',x.value);runVerify();}
  });
  // reflect persisted hmac state on the toolbar before first run
  $('[data-act=hmactoggle]',root).classList.toggle('on',st.hmac);
  setTimeout(run,30);
  return root;
}

/* ---------- SQL FORMATTER ----------
   A dependency-free SQL pretty-printer / minifier. Tokenises the query (strings,
   comments, identifiers, punctuation), then re-emits with newlines before major
   clauses and indentation inside parentheses. Optionally upper-cases keywords. */
function renderSQL(){
  const st=Store.getTool('sql');
  const root=el('section','tool');root.dataset.tool='sql';
  root.innerHTML=`
    <div class="toolbar">
      <button class="btn primary" data-act="format"><i class="fa-solid fa-wand-magic-sparkles"></i><span class="lbl">Format</span></button>
      <button class="btn" data-act="minify"><i class="fa-solid fa-compress"></i><span class="lbl">Minify</span></button>
      <div class="sep"></div>
      <span class="field">Indent
        <select data-set="indent"><option value="2">2</option><option value="4">4</option><option value="8">8</option><option value="0">Tab</option></select>
      </span>
      <span class="field">Keywords
        <select data-set="keywordCase"><option value="upper">UPPER</option><option value="lower">lower</option><option value="preserve">Preserve</option></select>
      </span>
      <div class="spacer"></div>
      <button class="btn ghost sm" data-act="sample"><i class="fa-solid fa-flask"></i><span class="lbl">Sample</span></button>
      <button class="btn ghost sm" data-act="copy" title="Copy input"><i class="fa-solid fa-clipboard"></i></button>
      <button class="btn ghost sm" data-act="copystr" title="Copy output as escaped string"><i class="fa-solid fa-quote-right"></i></button>
      <button class="btn ghost sm" data-act="download" title="Download output"><i class="fa-solid fa-download"></i></button>
      <button class="btn ghost sm danger" data-act="clear" title="Clear input"><i class="fa-solid fa-trash"></i></button>
    </div>
    <div class="editor-grid">
      <div class="pane">
        <div class="pane-head"><span class="dot"></span>Input SQL<span class="spacer"></span><span class="mini" data-mini="in"></span></div>
        <div class="pane-body" data-slot="input"></div>
      </div>
      <div class="pane">
        <div class="pane-head"><span class="dot out"></span><span data-outlabel>Formatted</span><span class="spacer"></span>
          <span class="mini" data-mini="out"></span>
          <button class="btn ghost sm" data-act="wrap" title="Toggle line wrap"><i class="fa-solid fa-text-width"></i></button>
          <button class="btn ghost sm" data-act="copyout" title="Copy output"><i class="fa-solid fa-copy"></i></button></div>
        <div class="pane-body"><pre class="code-output copyable" data-slot="output" data-empty="Formatted SQL…" title="Click to copy"></pre></div>
      </div>
    </div>
    <div class="statusbar">
      <span class="status-pill idle" data-slot="status"><i class="fa-solid fa-circle-notch"></i> Idle</span>
      <span class="status-stat"><i class="fa-solid fa-bars-staggered"></i> <b data-slot="lines">0</b> lines</span>
      <span class="status-stat"><i class="fa-solid fa-keyboard"></i> <b data-slot="chars">0</b> chars</span>
      <span class="status-stat"><i class="fa-solid fa-database"></i> <b data-slot="bytes">0</b> B</span>
      <div class="spacer"></div>
      <span class="status-stat" data-slot="info"></span>
    </div>`;

  const out=$('[data-slot=output]',root),outLabel=$('[data-outlabel]',root);
  let lastOut='';
  const setStatus=makeStatusSetter(root);
  const updStats=text=>updateStats(root,text);
  const runDebounced=debounce(()=>run(),220);
  const input=buildCodeInput(st.input,v=>{Store.patch('sql','input',v);updStats(v);runDebounced();},'SELECT * FROM users WHERE id = 1;');
  $('[data-slot=input]',root).appendChild(input);
  $('[data-set=indent]',root).value=st.indent;
  // Back-compat: derive keywordCase from the legacy `uppercase` flag if unset.
  if(!st.keywordCase){const kc=st.uppercase===false?'lower':'upper';Store.patch('sql','keywordCase',kc);st.keywordCase=kc;}
  $('[data-set=keywordCase]',root).value=st.keywordCase;

  const KW=new Set(SQL_KEYWORDS);
  // Clauses that begin a new line at the current indent level.
  const NEWLINE_KW=new Set(['SELECT','FROM','WHERE','GROUP','ORDER','HAVING','LIMIT','OFFSET','UNION','VALUES','SET','INSERT','UPDATE','DELETE','INNER','LEFT','RIGHT','FULL','CROSS','JOIN','ON','AND','OR','RETURNING']);

  // Tokenise into strings / comments / dotted-identifiers / numbers / multi-char
  // operators / single punctuation. Dotted identifiers (e.g. u.id, schema.tbl.col)
  // and multi-char operators (>=, <=, <>, !=, ||, ::) are kept as single tokens so
  // they never get split apart during emit.
  function tokenize(sql){
    const toks=[];
    const re=/\s+|--[^\n]*|\/\*[\s\S]*?\*\/|'(?:''|[^'])*'|"(?:[^"])*"|`(?:[^`])*`|[A-Za-z_][\w$]*(?:\.[A-Za-z_*][\w$]*)*|\d+\.?\d*|>=|<=|<>|!=|\|\||::|[(),;.*]|[=<>+\-/%]|[^\s]/g;
    let m;
    while((m=re.exec(sql))!==null){
      const t=m[0];
      if(/^\s+$/.test(t))continue;            // drop whitespace (re-added on emit)
      toks.push(t);
    }
    return toks;
  }
  const isKw=t=>KW.has(t.toUpperCase());
  const isComment=t=>/^--/.test(t)||/^\/\*/.test(t);
  const norm=t=>{
    if(!isKw(t))return t;
    const mode=Store.getTool('sql').keywordCase||'upper';
    if(mode==='lower')return t.toLowerCase();
    if(mode==='preserve')return t;
    return t.toUpperCase();
  };
  const indentUnit=()=>{const n=+Store.getTool('sql').indent;return n>0?' '.repeat(n):'\t';};
  // Aggregate / scalar functions: their "(" hugs the name → COUNT(*), not COUNT (*).
  const FUNCS=new Set(['COUNT','SUM','AVG','MIN','MAX','COALESCE','LENGTH','UPPER','LOWER','ROUND','ABS','NOW','CAST','CONCAT','SUBSTRING','TRIM']);
  // Count statements by tokenising (so ";" inside strings/comments is ignored) and
  // counting top-level ";" terminators, plus any trailing non-empty statement.
  function countStatements(sql){
    const toks=tokenize(sql).filter(t=>!isComment(t));
    let terminators=0,sinceLast=0;
    for(const t of toks){if(t===';'){terminators++;sinceLast=0;}else sinceLast++;}
    return Math.max(1,terminators+(sinceLast>0?1:0));
  }

  // Append a token to a line buffer with correct spacing rules. `prev` is the
  // previous emitted token (for function-call "(" tightness).
  function appendTok(line,t,prev){
    let noSpaceBefore=/^[,;).]/.test(t);                    // tight before , ; ) .
    // "(" hugs an identifier or known function name (a function call); keeps a
    // space after a clause keyword like IN / VALUES / ON.
    if(t==='('&&prev!=null){
      const isFnCall=FUNCS.has(prev.toUpperCase())||(/^[A-Za-z_]/.test(prev)&&!isKw(prev));
      if(isFnCall)noSpaceBefore=true;
    }
    const prevNoSpaceAfter=/[(.]$/.test(line)||line==='';   // tight after ( .
    return line+((noSpaceBefore||prevNoSpaceAfter)?'':' ')+t;
  }

  function format(sql){
    const toks=tokenize(sql);
    let line='',outArr=[];
    const unit=indentUnit();
    // Indentation is driven by an explicit stack rather than raw paren count so we
    // can give subqueries (a "(" that opens a SELECT) and CASE blocks their own
    // visual nesting level, while plain grouping parens add no extra indent.
    let depth=0;                  // current base indent level (clause body)
    const stack=[];               // entries: 'subquery' | 'paren' | 'case'
    const pushLine=(extra=0)=>{if(line.trim())outArr.push(unit.repeat(Math.max(0,depth)+extra)+line.trim());line='';};
    // Does the "(" at index i open a subquery? → next non-comment token is SELECT/WITH.
    const opensSubquery=i=>{for(let j=i+1;j<toks.length;j++){if(isComment(toks[j]))continue;return /^(SELECT|WITH)$/i.test(toks[j]);}return false;};
    for(let i=0;i<toks.length;i++){
      const t=toks[i],U=t.toUpperCase(),n=norm(t),prev=i>0?toks[i-1]:null;
      // Comments are preserved verbatim, each on its own line.
      if(isComment(t)){pushLine();outArr.push(unit.repeat(Math.max(0,depth))+t.replace(/\s+$/,''));continue;}
      if(t==='('){
        line=appendTok(line,'(',prev);
        if(opensSubquery(i)){stack.push('subquery');depth++;pushLine();}
        else stack.push('paren');
        continue;
      }
      if(t===')'){
        const kind=stack.pop();
        if(kind==='subquery'){pushLine();depth=Math.max(0,depth-1);}
        line=appendTok(line,')',prev);continue;
      }
      if(t===';'){line=appendTok(line,';',prev);pushLine();outArr.push('');continue;}
      if(t===','){
        line=appendTok(line,',',prev);
        if(!stack.includes('paren')){pushLine(1);}           // break list items when not inside a plain ()-group
        continue;
      }
      // CASE … WHEN … THEN … ELSE … END expression formatting.
      if(U==='CASE'){line=appendTok(line,n,prev);stack.push('case');depth++;continue;}
      if(U==='END'&&stack[stack.length-1]==='case'){stack.pop();depth=Math.max(0,depth-1);pushLine();line=appendTok(line,n,prev);continue;}
      if((U==='WHEN'||U==='ELSE')&&stack[stack.length-1]==='case'){pushLine();line=appendTok(line,n,prev);continue;}
      // Major clause keyword at the top level (not inside a plain paren group) → new line.
      if(!stack.includes('paren')&&isKw(t)&&NEWLINE_KW.has(U)){
        const prevU=(prev?prev.toUpperCase():'');
        const isJoinModifier=U==='JOIN'&&['INNER','LEFT','RIGHT','FULL','CROSS','OUTER'].includes(prevU);
        if(!isJoinModifier)pushLine();
        line=appendTok(line,n,prev);continue;
      }
      line=appendTok(line,n,prev);
    }
    pushLine();
    return outArr.join('\n').replace(/\n{3,}/g,'\n\n').trim();
  }
  function minify(sql){
    const toks=tokenize(sql).filter(t=>!isComment(t));      // strip comments
    let out='',prev=null;
    for(const t of toks){out=appendTok(out,norm(t),prev);prev=t;}
    return out.replace(/\s*;\s*/g,'; ').trim();
  }

  function run(){
    const cfg=Store.getTool('sql');const src=cfg.input;updStats(src);
    if(!src.trim()){setStatus('idle','Idle');out.innerHTML='';lastOut='';$('[data-mini=out]',root).textContent='';$('[data-slot=info]',root).textContent='';return;}
    try{
      const res=format(src);lastOut=res;
      out.innerHTML=hlSQL(res);
      outLabel.textContent='Formatted';   // run() always formats → keep label in sync (fixes stale "Minified")
      $('[data-mini=out]',root).textContent=stats(res).lines+' ln';
      const stmts=countStatements(src);
      $('[data-slot=info]',root).innerHTML=`<i class="fa-solid fa-list-ol"></i> ${stmts} statement${stmts!==1?'s':''}`;
      setStatus('ok','Formatted');
    }catch(e){setStatus('err','Format failed — '+e.message);out.innerHTML=`<span class="tk-null">${esc(e.message)}</span>`;}
  }

  root.addEventListener('click',e=>{
    const b=e.target.closest('[data-act]');if(!b)return;const cfg=Store.getTool('sql');
    if(b.dataset.act==='format'){run();outLabel.textContent='Formatted';toast('Formatted','ok');}
    else if(b.dataset.act==='minify'){if(!cfg.input.trim())return;const mn=minify(cfg.input);lastOut=mn;out.classList.remove('wrap');out.innerHTML=hlSQL(mn);outLabel.textContent='Minified';$('[data-mini=out]',root).textContent=mn.length+' ch';setStatus('ok',`Minified · ${cfg.input.length-mn.length} chars saved`);toast('Minified','ok');}
    else if(b.dataset.act==='copy')copy(cfg.input);
    else if(b.dataset.act==='copyout')copy(lastOut);
    else if(b.dataset.act==='copystr'){
      const src=lastOut||cfg.input;if(!src.trim())return;
      // Escape into a single-quoted, single-line string literal for embedding in code.
      const escd="'"+src.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')+"'";
      copy(escd);toast('Copied as string','ok');
    }
    else if(b.dataset.act==='wrap'){out.classList.toggle('wrap');b.classList.toggle('on');}
    else if(b.dataset.act==='download')download(lastOut||cfg.input,'query.sql');
    else if(b.dataset.act==='clear'){Store.patch('sql','input','');input._ta.value='';input._upd();run();}
    else if(b.dataset.act==='sample'){Store.patch('sql','input',SQL_SAMPLE);input._ta.value=SQL_SAMPLE;input._upd();run();}
  });
  root.addEventListener('change',e=>{const s=e.target.closest('[data-set]');if(!s)return;
    const key=s.dataset.set;
    const val=key==='indent'?+s.value:s.value;   // indent is numeric; keywordCase is a string
    Store.patch('sql',key,val);run();
  });
  setTimeout(run,30);
  return root;
}

/* ---------- CSS FORMATTER ----------
   Dependency-free CSS beautifier / minifier. Parses block structure (selectors,
   declarations, nested at-rules) and re-emits with consistent indentation, or
   strips all non-essential whitespace + comments for minification. */
function renderCSS(){
  const st=Store.getTool('css');
  const root=el('section','tool');root.dataset.tool='css';
  root.innerHTML=`
    <div class="toolbar">
      <button class="btn primary" data-act="format"><i class="fa-solid fa-wand-magic-sparkles"></i><span class="lbl">Beautify</span></button>
      <button class="btn" data-act="minify"><i class="fa-solid fa-compress"></i><span class="lbl">Minify</span></button>
      <div class="sep"></div>
      <span class="field">Style
        <select data-set="styleMode"><option value="expanded">Expanded</option><option value="compact">Compact</option></select>
      </span>
      <span class="field">Indent
        <select data-set="indent"><option value="2">2</option><option value="4">4</option><option value="8">8</option><option value="0">Tab</option></select>
      </span>
      <span class="opt-grp" title="Output options">
        <span class="field"><span class="switch" data-toggle="sortProps"></span> Sort</span>
        <span class="field"><span class="switch" data-toggle="lowerHex"></span> Lower hex</span>
        <span class="field"><span class="switch" data-toggle="shortHex"></span> Short hex</span>
      </span>
      <div class="spacer"></div>
      <button class="btn ghost sm" data-act="sample"><i class="fa-solid fa-flask"></i><span class="lbl">Sample</span></button>
      <button class="btn ghost sm" data-act="copy" title="Copy input"><i class="fa-solid fa-clipboard"></i></button>
      <button class="btn ghost sm" data-act="download" title="Download output"><i class="fa-solid fa-download"></i></button>
      <button class="btn ghost sm danger" data-act="clear" title="Clear input"><i class="fa-solid fa-trash"></i></button>
    </div>
    <div class="editor-grid">
      <div class="pane">
        <div class="pane-head"><span class="dot"></span>Input CSS<span class="spacer"></span><span class="mini" data-mini="in"></span></div>
        <div class="pane-body" data-slot="input"></div>
      </div>
      <div class="pane">
        <div class="pane-head"><span class="dot out"></span><span data-outlabel>Beautified</span><span class="spacer"></span>
          <span class="mini" data-mini="out"></span>
          <button class="btn ghost sm" data-act="wrap" title="Toggle line wrap"><i class="fa-solid fa-text-width"></i></button>
          <button class="btn ghost sm" data-act="copyout" title="Copy output"><i class="fa-solid fa-copy"></i></button></div>
        <div class="pane-body"><pre class="code-output copyable" data-slot="output" data-empty="Beautified CSS…" title="Click to copy"></pre></div>
      </div>
    </div>
    <div class="statusbar">
      <span class="status-pill idle" data-slot="status"><i class="fa-solid fa-circle-notch"></i> Idle</span>
      <span class="status-stat"><i class="fa-solid fa-bars-staggered"></i> <b data-slot="lines">0</b> lines</span>
      <span class="status-stat"><i class="fa-brands fa-css3-alt"></i> <b data-slot="rules">0</b> rules</span>
      <span class="status-stat"><i class="fa-solid fa-database"></i> <b data-slot="bytes">0</b> B</span>
      <div class="spacer"></div>
      <span class="status-stat" data-slot="info"></span>
    </div>`;

  const out=$('[data-slot=output]',root),outLabel=$('[data-outlabel]',root);
  let lastOut='';
  const setStatus=makeStatusSetter(root);
  const updStats=text=>updateStats(root,text);
  const runDebounced=debounce(()=>run(),220);
  const input=buildCodeInput(st.input,v=>{Store.patch('css','input',v);updStats(v);runDebounced();},'.box { color: red; padding: 8px; }');
  $('[data-slot=input]',root).appendChild(input);
  $('[data-set=indent]',root).value=st.indent;
  $('[data-set=styleMode]',root).value=st.styleMode||'expanded';
  if(st.sortProps)$('[data-toggle=sortProps]',root).classList.add('on');
  if(st.lowerHex)$('[data-toggle=lowerHex]',root).classList.add('on');
  if(st.shortHex)$('[data-toggle=shortHex]',root).classList.add('on');

  const indentUnit=()=>{const n=+Store.getTool('css').indent;return n>0?' '.repeat(n):'\t';};

  // Normalise hex colours inside a declaration value (respecting toggles).
  function normColors(text){
    const cfg=Store.getTool('css');
    if(!cfg.lowerHex&&!cfg.shortHex)return text;
    return text.replace(/#([0-9a-fA-F]{3,8})\b/g,(m,hex)=>{
      let h=hex;
      if(cfg.lowerHex)h=h.toLowerCase();
      // shorten #aabbcc → #abc (and #aabbccdd → #abcd) when each pair repeats
      if(cfg.shortHex&&(h.length===6||h.length===8)){
        let canShort=true,short='';
        for(let i=0;i<h.length;i+=2){if(h[i]!==h[i+1]){canShort=false;break;}short+=h[i];}
        if(canShort)h=short;
      }
      return '#'+h;
    });
  }

  // Minify: drop comments, collapse whitespace, trim around punctuation.
  function minify(css){
    let out=css
      .replace(/\/\*[\s\S]*?\*\//g,'')          // comments
      .replace(/\s+/g,' ')                       // collapse whitespace
      .replace(/\s*([{}:;,>~+])\s*/g,'$1')       // tighten around punctuation
      .replace(/;}/g,'}')                        // drop last semicolon in a block
      .trim();
    return normColors(out);                      // apply hex colour normalisation
  }
  // Format one declaration "prop : value" → "prop: value" (+ colour normalisation).
  function fmtDecl(d){
    d=d.trim();if(!d)return '';
    const ci=d.indexOf(':');
    if(ci<0)return normColors(d);
    const prop=d.slice(0,ci).trim();
    let val=d.slice(ci+1).trim().replace(/\s+/g,' ');
    val=normColors(val);
    return prop+': '+val;
  }
  // Beautify: walk source char-by-char, PRESERVING comments, emitting indented blocks.
  // Supports "expanded" (one decl per line) and "compact" (decls inline on one line) styles.
  function format(css){
    const unit=indentUnit();
    const cfg=Store.getTool('css');
    const compact=cfg.styleMode==='compact';
    const src=css.trim();
    let outArr=[],depth=0,buf='';
    const pad=()=>unit.repeat(depth);
    // collected declarations + comments for the CURRENT block (for compact + sorting)
    let pending=[];
    const pushDecl=d=>{const t=d.trim();if(t)pending.push({type:'decl',text:fmtDecl(t)});};
    const pushComment=c=>{pending.push({type:'comment',text:c.trim()});};
    const flushBlock=()=>{
      let items=pending;pending=[];
      if(cfg.sortProps){
        // sort only declaration items alphabetically by property name; keep comments anchored after their preceding item
        const decls=items.filter(x=>x.type==='decl');
        const others=items.filter(x=>x.type!=='decl');
        decls.sort((a,b)=>a.text.localeCompare(b.text));
        items=others.concat(decls); // comments first, then sorted decls
      }
      if(compact){
        const inline=items.map(x=>x.type==='decl'?x.text+';':x.text).join(' ');
        if(inline)outArr.push(pad()+inline);
      }else{
        items.forEach(x=>{outArr.push(pad()+(x.type==='decl'?x.text+';':x.text));});
      }
    };
    for(let i=0;i<src.length;i++){
      const c=src[i];
      if(c==='/'&&src[i+1]==='*'){
        const end=src.indexOf('*/',i+2);
        const comment=src.slice(i,end<0?src.length:end+2);
        i=(end<0?src.length:end+1);
        // top-level comment vs inside a block
        if(buf.trim()===''){
          flushBlock();outArr.push(pad()+comment.trim());
        }else{pushComment(comment);}
        continue;
      }
      if(c==='{'){
        const sel=buf.trim().replace(/\s+/g,' ').replace(/\s*,\s*/g,',\n'+pad());
        flushBlock();
        outArr.push(pad()+sel+' {');buf='';depth++;
      }else if(c==='}'){
        pushDecl(buf);buf='';flushBlock();
        depth=Math.max(0,depth-1);outArr.push(pad()+'}');
      }else if(c===';'){
        pushDecl(buf);buf='';
      }else{
        buf+=c;
      }
    }
    pushDecl(buf);flushBlock();
    return outArr.join('\n');
  }
  // Count selector/at-rule blocks (each "{" opens a rule block).
  function countRules(css){
    const noComments=css.replace(/\/\*[\s\S]*?\*\//g,'');
    return (noComments.match(/\{/g)||[]).length;
  }

  function run(){
    const cfg=Store.getTool('css');const src=cfg.input;updStats(src);
    const set=(sel,v)=>{const e=$(sel,root);if(e)e.textContent=v;};
    set('[data-slot=rules]',countRules(src));
    if(!src.trim()){setStatus('idle','Idle');out.innerHTML='';lastOut='';$('[data-mini=out]',root).textContent='';$('[data-slot=info]',root).textContent='';return;}
    try{
      const res=format(src);lastOut=res;
      out.innerHTML=hlCSS(res);
      outLabel.textContent='Beautified';   // run() always beautifies → keep label in sync (fixes stale "Minified")
      $('[data-mini=out]',root).textContent=stats(res).lines+' ln';
      const mode=(cfg.styleMode||'expanded');
      $('[data-slot=info]',root).innerHTML=`<i class="fa-solid fa-layer-group"></i> ${countRules(src)} rule${countRules(src)!==1?'s':''} · ${mode}`;
      setStatus('ok','Beautified · '+mode);
    }catch(e){setStatus('err','Format failed — '+e.message);out.innerHTML=`<span class="tk-null">${esc(e.message)}</span>`;}
  }

  root.addEventListener('click',e=>{
    // Toggle switches (Sort / Lower hex / Short hex) have no [data-act] ancestor, so they
    // MUST be handled before the [data-act] early-return below (previously they were dead).
    const tog=e.target.closest('[data-toggle]');
    if(tog){tog.classList.toggle('on');Store.patch('css',tog.dataset.toggle,tog.classList.contains('on'));run();return;}
    const b=e.target.closest('[data-act]');if(!b)return;const cfg=Store.getTool('css');
    if(b.dataset.act==='format'){run();toast('Beautified','ok');}
    else if(b.dataset.act==='minify'){if(!cfg.input.trim())return;const mn=minify(cfg.input);lastOut=mn;out.classList.add('wrap');$('[data-act=wrap]',root).classList.add('on');out.innerHTML=hlCSS(mn);outLabel.textContent='Minified';$('[data-mini=out]',root).textContent=mn.length+' ch';const saved=cfg.input.length-mn.length;setStatus('ok',saved>0?`Minified · ${saved} chars saved`:'Minified');toast('Minified','ok');}
    else if(b.dataset.act==='copy')copy(cfg.input);
    else if(b.dataset.act==='copyout')copy(lastOut);
    else if(b.dataset.act==='wrap'){out.classList.toggle('wrap');b.classList.toggle('on');}
    else if(b.dataset.act==='download')download(lastOut||cfg.input,'styles.css');
    else if(b.dataset.act==='clear'){Store.patch('css','input','');input._ta.value='';input._upd();run();}
    else if(b.dataset.act==='sample'){Store.patch('css','input',CSS_SAMPLE);input._ta.value=CSS_SAMPLE;input._upd();run();}
  });
  root.addEventListener('change',e=>{const s=e.target.closest('[data-set]');if(s){const val=s.dataset.set==='indent'?+s.value:s.value;Store.patch('css',s.dataset.set,val);run();}});
  setTimeout(run,30);
  return root;
}

/* ============================================================
   APP CONTROLLER (UI layer)
   ------------------------------------------------------------
   The only place that touches the DOM-as-view. It SUBSCRIBES to the
   store and re-renders reactively when `active` changes, keeping a
   clean separation: state changes flow one direction → store → App.render.
   ============================================================ */
const App = (()=>{
  const renderers={json:renderJSON,yaml:renderYAML,xml:renderXML,toml:renderTOML,ini:renderINI,base64:renderBase64,jwt:renderJWT,hash:renderHash,sql:renderSQL,css:renderCSS};
  let mountedTool=null; // which tool's DOM is currently mounted

  // Pure-ish render: rebuild the main view + chrome for the active tool.
  function paint(){
    const name=Store.getActive();
    const main=$('#main');
    main.innerHTML='';
    const node=renderers[name]();
    node.classList.add('active'); // every tool section becomes visible once mounted
    main.appendChild(node);
    mountedTool=name;
    // sync chrome (nav highlight, breadcrumb, title)
    $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tool===name));
    const t=TOOLS[name];
    $('#crumb-title').textContent=t.title;
    $('#crumb-sub').textContent=t.sub;
    $('#crumb-icon').className=(t.iconStyle||'fa-solid')+' '+t.icon;
    document.title='DevForge — '+t.title;
  }

  return {
    // Imperative API used by callers/boot.
    render(){paint();},                 // force re-render of current active tool
    show(name){Store.setActive(name);}, // request a tool switch (state-driven)
    // React to store changes: only re-render when the active tool actually changes.
    onChange(state,change){ if(change&&change.type==='active' && state.active!==mountedTool) paint(); },
    init(){ Store.subscribe(this.onChange.bind(this)); paint(); }
  };
})();

// Navigation → request a tool switch through state (store drives the re-render).
// Make nav items keyboard-accessible (focusable + Enter/Space activation).
$$('.nav-item').forEach(it=>{it.setAttribute('role','button');it.tabIndex=0;});
$('#nav').addEventListener('click',e=>{const it=e.target.closest('.nav-item');if(it)App.show(it.dataset.tool);});
$('#nav').addEventListener('keydown',e=>{
  const it=e.target.closest('.nav-item');if(!it)return;
  if(e.key==='Enter'||e.key===' '){e.preventDefault();App.show(it.dataset.tool);}
});

// Open file → load into active tool's input, then re-render to reflect it.
$('#open-file').addEventListener('click',()=>$('#file-input').click());
$('#file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    const tool=Store.getActive();
    Store.patch(tool,'input',r.result);
    App.render(); // input changed for the already-active tool → explicit refresh
    toast('Loaded '+f.name,'ok');
  };
  r.readAsText(f);
  e.target.value='';
});

// keyboard shortcuts
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
    // Trigger the active tool's PRIMARY action (Format/Run/Decode/Hash/…).
    // Targeting `.btn.primary` works for every tool, not just formatters.
    const btn=$(`.tool.active .btn.primary`);if(btn){btn.click();e.preventDefault();}
  }
  if((e.altKey||e.metaKey)&&['1','2','3','4','5','6','7','8','9','0'].includes(e.key)){
    const map={1:'json',2:'yaml',3:'xml',4:'toml',5:'ini',6:'base64',7:'jwt',8:'hash',9:'sql',0:'css'};App.show(map[e.key]);e.preventDefault();
  }
});

/* Global click-to-copy: clicking any formatted output pane copies its text.
   One delegated handler covers every tool's output (consistent UX) without
   each render fn wiring its own listener. Ignores error-jump buttons and
   empty panes; tool-specific panes (e.g. JSON path-copy in tree) handle their
   own clicks and are excluded by the `.code-output.copyable` selector. */
document.addEventListener('click',e=>{
  const pane=e.target.closest('.code-output.copyable');
  if(!pane)return;
  if(e.target.closest('.err-jump'))return;       // let the jump-to-error button work
  const text=pane.textContent.trim();
  if(text)copy(text);                            // copy() shows its own toast
});

/* ============================================================
   SHAREABLE LINKS — encode {tool,input} into the URL hash
   Format: #s=<base64(JSON)>  (Unicode-safe base64)
   Reuses the shared b64encodeUtf8/b64decodeUtf8 helpers (no duplicate impls).
   ============================================================ */
function buildShareHash(){
  const tool=Store.getActive();
  const cfg=Store.getTool(tool);
  const payload={t:tool,i:cfg.input||''};
  if(tool==='ini'&&cfg.mode==='diff'){payload.b=cfg.inputB||'';payload.m='diff';}
  return 's='+b64encodeUtf8(JSON.stringify(payload));
}
function shareLink(){
  const tool=Store.getActive();
  if(!Store.getTool(tool).input){toast('Nothing to share — input is empty','info');return;}
  const hash=buildShareHash();
  const url=location.origin+location.pathname+location.search+'#'+hash;
  if(url.length>16000){toast('Content too large to share via link','err');return;}
  history.replaceState(null,'',url);
  copy(url); // copy() shows its own success/fallback toast
}
function loadFromHash(){
  const h=location.hash.replace(/^#/,'');
  const m=h.match(/(?:^|&)s=([^&]+)/);
  if(!m)return false;
  try{
    const data=JSON.parse(b64decodeUtf8(m[1]));
    if(!data||!data.t||!Store.tools.includes(data.t))return false;
    Store.update(data.t,{input:data.i||''});
    if(data.t==='ini'&&data.m==='diff')Store.update('ini',{inputB:data.b||'',mode:'diff'});
    Store.setActive(data.t);
    toast('Loaded shared content','ok');
    return true;
  }catch(err){console.warn('Bad share hash',err);return false;}
}
$('#share-link').addEventListener('click',shareLink);

// boot — load any shared link into state first, then start the reactive UI.
loadFromHash();
App.init();
