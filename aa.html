                if (!navigator.onLine) {
                    throw new Error('No internet connection');
                }

                if (model.startsWith('models/')) {
                    if (!settings.geminiApiKey) {
                        showToast('Please set your Google Gemini API key', 'error');
                        openSettings();
                        switchTab('apiTab');
                        isStreaming = false;
                        updateSendButton();
                        updateInputInfo('Ready');
                        return;
                    }
                    await getGeminiResponse();
                } else {
                    if (!settings.apiKey) {
                        showToast('Please set your OpenRouter API key', 'error');
                        openSettings();
                        switchTab('apiTab');
                        isStreaming = false;
                        updateSendButton();
                        updateInputInfo('Ready');
                        return;
                    }
                    await getOpenRouterResponse();
                }

                if (settings.soundEnabled) playNotificationSound();
            } catch (e) {
                if (e.name === 'AbortError') {
                    updateInputInfo('Stopped');
                } else {
                    removeTypingIndicator();
                    const isRetryable = retryCount < MAX_RETRIES &&
                        !e.message.includes('401') && !e.message.includes('403') &&
                        !e.message.includes('API key');
                    if (isRetryable) {
                        showToast(`Retrying... (${retryCount + 1}/${MAX_RETRIES})`, 'warning');
                        await new Promise(r => setTimeout(r, 1000 * (retryCount + 1)));
                        return getAIResponse(userMessage, retryCount + 1);
                    }
                    showChatError(e.message, () => getAIResponse(userMessage, 0));
                    lastFailedMessage = userMessage;
                }
            }

            // Auto-title generation
            if (settings.autoTitle && currentMessages.length >= 2 && currentConversation.title === 'New Chat') {
                currentConversation.title = userMessage.substring(0, 60).replace(/\s+/g, ' ').trim() +
                    (userMessage.length > 60 ? '...' : '');
            }

            saveCurrentConversation();
            updateConversationList();
            isStreaming = false;
            updateSendButton();
            updateInputInfo(`${currentMessages.length} message${currentMessages.length !== 1 ? 's' : ''}`);
            abortController = null;
        }

        async function getOpenRouterResponse() {
            addTypingIndicator();
            const model = currentConversation.model;

            const messages = [];
            if (settings.systemPrompt && settings.systemPrompt.trim()) {
                messages.push({ role: 'system', content: settings.systemPrompt });
            }
            messages.push(...currentMessages.map(m => ({ role: m.role, content: m.content })));

            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${settings.apiKey}`,
                    'Content-Type': 'application/json',
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'AI Chat Pro'
                },
                body: JSON.stringify({
                    model,
                    messages,
                    temperature: parseFloat(settings.temperature),
                    max_tokens: parseInt(settings.maxTokens),
                    top_p: parseFloat(settings.topP),
                    stream: settings.streamMode
                }),
                signal: abortController.signal
            });

            removeTypingIndicator();

            if (!response.ok) {
                let errMsg = `API Error ${response.status}`;
                try {
                    const errorData = await response.json();
                    errMsg = errorData.error?.message || errMsg;
                } catch (_) {}
                throw new Error(errMsg);
            }

            if (settings.streamMode) {
                await handleOpenRouterStream(response);
            } else {
                const data = await response.json();
                const content = data.choices?.[0]?.message?.content || '';
                currentMessages.push({
                    id: generateId(),
                    role: 'assistant',
                    content,
                    timestamp: new Date().toISOString(),
                    model
                });
                renderChat();
            }
        }

        async function getGeminiResponse() {
            addTypingIndicator();
            const model = currentConversation.model;

            const contents = currentMessages.map(m => ({
                role: m.role === 'assistant' ? 'model' : 'user',
                parts: [{ text: m.content }]
            }));

            const body = {
                contents,
                generationConfig: {
                    temperature: parseFloat(settings.temperature),
                    topP: parseFloat(settings.topP),
                    maxOutputTokens: parseInt(settings.maxTokens)
                }
            };

            if (settings.systemPrompt && settings.systemPrompt.trim()) {
                body.systemInstruction = { parts: [{ text: settings.systemPrompt }] };
            }

            const endpoint = settings.streamMode ? 'streamGenerateContent?alt=sse' : 'generateContent';
            const url = `https://generativelanguage.googleapis.com/v1beta/${model}:${endpoint}${settings.streamMode ? '&' : '?'}key=${settings.geminiApiKey}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal: abortController.signal
            });

            removeTypingIndicator();

            if (!response.ok) {
                let errMsg = `Gemini API Error ${response.status}`;
                try {
                    const errorData = await response.json();
                    errMsg = errorData.error?.message || errMsg;
                } catch (_) {}
                throw new Error(errMsg);
            }

            if (settings.streamMode) {
                await handleGeminiStream(response);
            } else {
                const data = await response.json();
                const content = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                currentMessages.push({
                    id: generateId(),
                    role: 'assistant',
                    content,
                    timestamp: new Date().toISOString(),
                    model
                });
                renderChat();
            }
        }

        async function handleOpenRouterStream(response) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            const aiMessage = {
                id: generateId(),
                role: 'assistant',
                content: '',
                timestamp: new Date().toISOString(),
                model: currentConversation.model
            };
            currentMessages.push(aiMessage);

            const container = document.getElementById('chatContainer');
            const messageEl = createMessageElement(aiMessage, currentMessages.length - 1);
            container.appendChild(messageEl);
            const textEl = messageEl.querySelector('.message-text');
            scrollToBottom();

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith('data: ')) continue;
                        const data = trimmed.slice(6);
                        if (data === '[DONE]') continue;

                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices?.[0]?.delta?.content;
                            if (delta) {
                                aiMessage.content += delta;
                                renderStreamContent(textEl, aiMessage.content);
                                conditionalScroll();
                            }
                        } catch (_) {}
                    }
                }
            } catch (e) {
                if (e.name !== 'AbortError') throw e;
            }

            finalizeStreamedMessage(textEl, aiMessage);
        }

        async function handleGeminiStream(response) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            const aiMessage = {
                id: generateId(),
                role: 'assistant',
                content: '',
                timestamp: new Date().toISOString(),
                model: currentConversation.model
            };
            currentMessages.push(aiMessage);

            const container = document.getElementById('chatContainer');
            const messageEl = createMessageElement(aiMessage, currentMessages.length - 1);
            container.appendChild(messageEl);
            const textEl = messageEl.querySelector('.message-text');
            scrollToBottom();

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed.startsWith('data: ')) continue;
                        const data = trimmed.slice(6);

                        try {
                            const parsed = JSON.parse(data);
                            const text = parsed.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (text) {
                                aiMessage.content += text;
                                renderStreamContent(textEl, aiMessage.content);
                                conditionalScroll();
                            }
                        } catch (_) {}
                    }
                }
            } catch (e) {
                if (e.name !== 'AbortError') throw e;
            }

            finalizeStreamedMessage(textEl, aiMessage);
        }

        let renderTimeout = null;
        function renderStreamContent(el, content) {
            if (renderTimeout) return;
            renderTimeout = requestAnimationFrame(() => {
                el.innerHTML = formatMessage(content);
                renderTimeout = null;
            });
        }

        function finalizeStreamedMessage(el, msg) {
            if (renderTimeout) {
                cancelAnimationFrame(renderTimeout);
                renderTimeout = null;
            }
            el.innerHTML = formatMessage(msg.content);
            el.querySelectorAll('pre code').forEach(block => {
                try { hljs.highlightElement(block); } catch (e) {}
            });
            enhanceCodeBlocks(el);
        }

        function conditionalScroll() {
            const container = document.getElementById('chatContainer');
            const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 200;
            if (atBottom) scrollToBottom();
        }

        function scrollToBottom(force = false) {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        // ===== Rendering =====
        function renderChat() {
            const container = document.getElementById('chatContainer');
            // Keep scroll-to-bottom button
            const scrollBtn = document.getElementById('scrollToBottomBtn');
            container.innerHTML = '';
            if (scrollBtn) container.appendChild(scrollBtn);

            if (currentMessages.length === 0) {
                renderEmptyState(container);
                return;
            }

            const fragment = document.createDocumentFragment();
            currentMessages.forEach((msg, index) => {
                fragment.appendChild(createMessageElement(msg, index));
            });
            container.appendChild(fragment);
            scrollToBottom();
        }

        function createMessageElement(message, index) {
            const div = document.createElement('div');
            div.className = 'message';
            div.dataset.messageIndex = index;

            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${message.role === 'user' ? 'user-avatar' : 'ai-avatar'}`;
            avatar.innerHTML = message.role === 'user'
                ? '<i class="fas fa-user" aria-hidden="true"></i>'
                : '<i class="fas fa-robot" aria-hidden="true"></i>';

            const content = document.createElement('div');
            content.className = 'message-content';

            const header = document.createElement('div');
            header.className = 'message-header';

            const roleSpan = document.createElement('span');
            roleSpan.className = 'msg-role';
            roleSpan.textContent = message.role === 'user' ? 'You' : 'Assistant';
            header.appendChild(roleSpan);

            if (message.model) {
                const modelSpan = document.createElement('span');
                modelSpan.style.cssText = 'font-size:0.75rem; opacity:0.6;';
                const parts = message.model.split('/');
                modelSpan.textContent = parts[parts.length - 1].split(':')[0];
                header.appendChild(modelSpan);
            }

            const timeSpan = document.createElement('span');
            timeSpan.title = new Date(message.timestamp).toLocaleString();
            timeSpan.textContent = formatRelativeTime(message.timestamp);
            header.appendChild(timeSpan);

            const tokenSpan = document.createElement('span');
            tokenSpan.className = 'msg-token-count';
            tokenSpan.textContent = `~${estimateTokens(message.content)} tok`;
            tokenSpan.title = 'Approximate token count';
            header.appendChild(tokenSpan);

            const text = document.createElement('div');
            text.className = 'message-text';
            text.innerHTML = formatMessage(message.content);

            const actions = document.createElement('div');
            actions.className = 'message-actions';

            actions.appendChild(createActionButton('fa-copy', 'Copy', () => copyMessage(index)));

            if (message.role === 'assistant') {
                actions.appendChild(createActionButton('fa-redo', 'Regenerate', () => regenerateMessage(index)));
            }

            actions.appendChild(createActionButton('fa-edit', 'Edit', () => editMessage(index)));
            actions.appendChild(createActionButton('fa-quote-right', 'Quote', () => quoteMessage(index)));

            const deleteBtn = createActionButton('fa-trash', 'Delete', () => deleteMessage(index));
            deleteBtn.classList.add('danger');
            actions.appendChild(deleteBtn);

            content.appendChild(header);
            content.appendChild(text);
            content.appendChild(actions);

            div.appendChild(avatar);
            div.appendChild(content);

            requestAnimationFrame(() => {
                text.querySelectorAll('pre code').forEach(block => {
                    try { hljs.highlightElement(block); } catch (e) {}
                });
                enhanceCodeBlocks(text);
            });

            return div;
        }

        function createActionButton(iconClass, label, handler) {
            const btn = document.createElement('button');
            btn.className = 'message-btn';
            btn.innerHTML = `<i class="fas ${iconClass}" aria-hidden="true"></i> ${label}`;
            btn.title = label;
            btn.setAttribute('aria-label', label);
            btn.onclick = handler;
            return btn;
        }

        function enhanceCodeBlocks(container) {
            container.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.code-toolbar')) return;
                const code = pre.querySelector('code');

                // Language label
                if (code) {
                    const langClass = Array.from(code.classList).find(c => c.startsWith('language-'));
                    if (langClass) {
                        const lang = langClass.replace('language-', '');
                        const label = document.createElement('span');
                        label.className = 'code-lang-label';
                        label.textContent = lang;
                        pre.style.position = 'relative';
                        pre.style.paddingTop = '24px';
                        pre.appendChild(label);
                    }
                }

                const toolbar = document.createElement('div');
                toolbar.className = 'code-toolbar';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'code-tool-btn';
                copyBtn.textContent = 'Copy';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    const text = code ? code.textContent : pre.textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.textContent = 'Copied!';
                        setTimeout(() => copyBtn.textContent = 'Copy', 1500);
                    }).catch(() => showToast('Copy failed', 'error'));
                };

                const wrapBtn = document.createElement('button');
                wrapBtn.className = 'code-tool-btn';
                wrapBtn.textContent = 'Wrap';
                wrapBtn.onclick = (e) => {
                    e.stopPropagation();
                    const isWrapped = pre.style.whiteSpace === 'pre-wrap';
                    pre.style.whiteSpace = isWrapped ? 'pre' : 'pre-wrap';
                    wrapBtn.textContent = isWrapped ? 'Wrap' : 'No wrap';
                };

                toolbar.appendChild(wrapBtn);
                toolbar.appendChild(copyBtn);
                pre.style.position = 'relative';
                pre.appendChild(toolbar);
            });
        }

        function formatMessage(content) {
            if (!content) return '';
            try {
                const html = marked.parse(content);
                return DOMPurify.sanitize(html, {
                    ADD_ATTR: ['target', 'rel']
                });
            } catch (e) {
                return escapeHtml(content);
            }
        }

        function formatRelativeTime(iso) {
            const now = Date.now();
            const t = new Date(iso).getTime();
            const diff = Math.floor((now - t) / 1000);
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return new Date(iso).toLocaleDateString();
        }

        function estimateTokens(text) {
            if (!text) return 0;
            return Math.ceil(text.length / 4);
        }

        // ===== Message Actions =====
        async function copyMessage(index) {
            try {
                await navigator.clipboard.writeText(currentMessages[index].content);
                showToast('Copied to clipboard', 'success');
            } catch {
                showToast('Failed to copy', 'error');
            }

        function quoteMessage(index) {
            const input = document.getElementById('messageInput');
            const content = currentMessages[index].content;
            const quoted = content.split('\n').map(l => '> ' + l).join('\n');
            input.value = (input.value ? input.value + '\n\n' : '') + quoted + '\n\n';
            autoResizeTextarea(input);
            updateCharCount();
            input.focus();
        }

        async function regenerateMessage(index) {
            if (isStreaming) return;
            let lastUserIdx = -1;
            for (let i = index - 1; i >= 0; i--) {
                if (currentMessages[i].role === 'user') {
                    lastUserIdx = i;
                    break;
                }
            }
            if (lastUserIdx < 0) return;

            currentMessages = currentMessages.slice(0, lastUserIdx + 1);
            renderChat();
            await getAIResponse(currentMessages[lastUserIdx].content);
        }

        function deleteMessage(index) {
            showConfirm('Delete Message', 'Delete this message?', () => {
                currentMessages.splice(index, 1);
                renderChat();
                saveCurrentConversation();
                showToast('Message deleted', 'success');
            });
        }

        function editMessage(index) {
            const message = currentMessages[index];
            const messageEl = document.querySelector(`[data-message-index="${index}"]`);
            if (!messageEl) return;
            const textEl = messageEl.querySelector('.message-text');
            const originalHTML = textEl.innerHTML;

            const editArea = document.createElement('textarea');
            editArea.className = 'message-edit-area';
            editArea.value = message.content;

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-edit-actions';

            const saveBtn = document.createElement('button');
            saveBtn.className = 'send-btn';
            saveBtn.style.padding = '6px 14px';
            saveBtn.style.minHeight = 'auto';
            saveBtn.innerHTML = '<i class="fas fa-check"></i> Save';
            saveBtn.onclick = async () => {
                const newContent = editArea.value.trim();
                if (!newContent || newContent === message.content) {
                    cancel();
                    return;
                }
                message.content = newContent;
                if (message.role === 'user') {
                    currentMessages = currentMessages.slice(0, index + 1);
                    renderChat();
                    await getAIResponse(newContent);
                } else {
                    renderChat();
                }
                saveCurrentConversation();
            };

            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'icon-btn';
            cancelBtn.innerHTML = '<i class="fas fa-times"></i> Cancel';
            const cancel = () => { textEl.innerHTML = originalHTML; enhanceCodeBlocks(textEl); };
            cancelBtn.onclick = cancel;

            actionsDiv.appendChild(saveBtn);
            actionsDiv.appendChild(cancelBtn);

            textEl.innerHTML = '';
            textEl.appendChild(editArea);
            textEl.appendChild(actionsDiv);
            editArea.focus();
            editArea.select();

            editArea.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') cancel();
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) saveBtn.click();
            });
        }

        function persistSettings() {
            try {
                localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(settings));
            } catch (e) {
                showToast('Failed to save settings (storage full?)', 'error');
            }
        }

        function loadSettings() {
            try {
                const saved = localStorage.getItem(STORAGE_KEYS.SETTINGS);
                if (saved) settings = { ...settings, ...JSON.parse(saved) };
                // Migrate from old key
                const oldSaved = localStorage.getItem('aiChatSettings');
                if (oldSaved && !saved) {
                    settings = { ...settings, ...JSON.parse(oldSaved) };
                    persistSettings();
                }
            } catch (e) {
                console.error('Failed to load settings', e);
            }
        }

            applyTheme();

                btn.innerHTML = '<i class="fas fa-sun"></i>';

        // ===== Storage =====
        function saveCurrentConversation() {
            if (!settings.autoSave || !currentConversation) return;
            currentConversation.messages = currentMessages;
            currentConversation.model = document.getElementById('modelSelector').value;
            currentConversation.timestamp = new Date().toISOString();

            const idx = conversations.findIndex(c => c.id === currentConversation.id);
            if (idx >= 0) {
                conversations[idx] = currentConversation;
            } else if (currentMessages.length > 0) {
                conversations.unshift(currentConversation);
            }
            saveConversations();
        }

        function saveConversations() {
            try {
                localStorage.setItem(STORAGE_KEYS.CONVERSATIONS, JSON.stringify(conversations));
            } catch (e) {
                console.error('Failed to save conversations', e);
                showToast('Storage full. Consider exporting and clearing old chats.', 'error');
            }
        }

        function loadConversations() {
            try {
                const saved = localStorage.getItem(STORAGE_KEYS.CONVERSATIONS);
                if (saved) {
                    conversations = JSON.parse(saved);
                    conversations.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                } else {
                    // Migrate
                    const old = localStorage.getItem('aiChatConversations');
                    if (old) {
                        conversations = JSON.parse(old);
                        saveConversations();
                    }
                }
            } catch (e) {
                console.error('Failed to load conversations', e);
                conversations = [];
            }
        }

        function updateStorageInfo() {
            try {
                const sizes = {
                    settings: (localStorage.getItem(STORAGE_KEYS.SETTINGS) || '').length,
                    conversations: (localStorage.getItem(STORAGE_KEYS.CONVERSATIONS) || '').length,
                    models: (localStorage.getItem(STORAGE_KEYS.MODELS_CACHE) || '').length
                };
                const total = sizes.settings + sizes.conversations + sizes.models;
                const el = document.getElementById('storageInfo');
                if (el) {
                    el.innerHTML = `
                        <div>Conversations: ${conversations.length}</div>
                        <div>Storage used: ${formatBytes(total * 2)} ${total * 2 > STORAGE_QUOTA_WARN ? '⚠️' : ''}</div>
                    `;
                }
            } catch (e) {}
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        // ===== Utilities =====
        function clearChat() {

        function exportChat() {
            if (currentMessages.length === 0) {
                showToast('Nothing to export', 'warning');
                return;
            }

            showPrompt('Export Format', 'Choose format: json, markdown, or txt', 'markdown', (format) => {
                const fmt = (format || 'markdown').toLowerCase().trim();
                let content, mime, ext;
                const safeName = currentConversation.title.replace(/[^a-z0-9]/gi, '_').substring(0, 50);
                const date = new Date().toISOString().split('T')[0];

                if (fmt === 'json') {
                    content = JSON.stringify({
                        title: currentConversation.title,
                        model: currentConversation.model,
                        messages: currentMessages,
                        exportDate: new Date().toISOString()
                    }, null, 2);
                    mime = 'application/json';
                    ext = 'json';
                } else if (fmt === 'txt') {
                    content = `${currentConversation.title}\n${'='.repeat(40)}\n\n` +
                        currentMessages.map(m => `[${m.role.toUpperCase()}]\n${m.content}\n`).join('\n');
                    mime = 'text/plain';
                    ext = 'txt';
                } else {
                    content = `# ${currentConversation.title}\n\n*Model: ${currentConversation.model}*\n*Exported: ${new Date().toLocaleString()}*\n\n---\n\n` +
                        currentMessages.map(m => `### ${m.role === 'user' ? '👤 You' : '🤖 Assistant'}\n\n${m.content}\n`).join('\n---\n\n');
                    mime = 'text/markdown';
                    ext = 'md';
                }

                downloadFile(content, `chat-${safeName}-${date}.${ext}`, mime);
                showToast(`Exported as ${ext.toUpperCase()}`, 'success');
            });
        }

        function exportAllData() {
            if (conversations.length === 0) {
                showToast('No conversations to export', 'warning');
                return;
            }
            const data = {
                version: 2,
                exportDate: new Date().toISOString(),
                conversations,
                settings: { ...settings, apiKey: '', geminiApiKey: '' } // Strip keys
            };
            downloadFile(JSON.stringify(data, null, 2), `aichatpro-backup-${Date.now()}.json`, 'application/json');
            showToast('All data exported (API keys excluded)', 'success');
        }

        function importData() {
            document.getElementById('importFileInput').click();
        }

        async function handleImportFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const text = await file.text();
                const data = JSON.parse(text);
                let imported = 0;

                if (Array.isArray(data)) {
                    // Bare conversation array
                    data.forEach(c => {
                        if (c.id && c.messages) {
                            if (!conversations.find(x => x.id === c.id)) {
                                conversations.push(c);
                                imported++;
                            }
                        }
                    });
                } else if (data.conversations) {
                    data.conversations.forEach(c => {
                        if (c.id && c.messages) {
                            if (!conversations.find(x => x.id === c.id)) {
                                conversations.push(c);
                                imported++;
                            }
                        }
                    });
                } else if (data.messages) {
                    // Single chat export
                    const conv = {
                        id: generateId(),
                        title: data.title || 'Imported Chat',
                        model: data.model || 'unknown',
                        messages: data.messages,
                        timestamp: data.exportDate || new Date().toISOString()
                    };
                    conversations.unshift(conv);
                    imported = 1;
                } else {
                    throw new Error('Unrecognized format');
                }

                conversations.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                saveConversations();
                updateConversationList();
                showToast(`Imported ${imported} conversation${imported !== 1 ? 's' : ''}`, 'success');
            } catch (err) {
                showToast('Import failed: ' + err.message, 'error');
            } finally {
                e.target.value = '';
            }
        }

        function deleteAllData() {
            showConfirm('Delete All Data', 'This will delete ALL conversations and settings. Continue?', () => {
                showConfirm('Are you really sure?', 'This action cannot be undone!', () => {
                    localStorage.removeItem(STORAGE_KEYS.CONVERSATIONS);
                    localStorage.removeItem(STORAGE_KEYS.SETTINGS);
                    localStorage.removeItem(STORAGE_KEYS.MODELS_CACHE);
                    location.reload();
                });
            });
        }

        function downloadFile(content, filename, mime) {
            const blob = new Blob([content], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function showChatError(message, retryFn) {
            const container = document.getElementById('chatContainer');
            const el = document.createElement('div');
            el.className = 'chat-error';
            el.innerHTML = `<i class="fas fa-exclamation-circle"></i><span>${escapeHtml(message)}</span>`;
            if (retryFn) {
                const btn = document.createElement('button');
                btn.className = 'retry-btn';
                btn.textContent = 'Retry';
                btn.onclick = () => { el.remove(); retryFn(); };
                el.appendChild(btn);
            }
            container.appendChild(el);
            scrollToBottom();
            setTimeout(() => { if (el.parentNode) el.remove(); }, 12000);
        }

        function showToast(message, type = 'success', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.setAttribute('role', type === 'error' ? 'alert' : 'status');

            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i><span>${escapeHtml(message)}</span>`;

            const dur = type === 'error' ? Math.max(duration, 5000) : duration;
            toast.style.animation = `toastIn 0.3s ease, toastOut 0.3s ease ${(dur - 300) / 1000}s forwards`;

            const dismiss = () => { if (toast.parentNode) toast.remove(); };
            toast.addEventListener('click', dismiss);

            container.appendChild(toast);
            setTimeout(dismiss, dur);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        }

        function playNotificationSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 600;
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch (e) {}
        }

        // ===== Models =====
        function loadCachedModels() {
            try {
                const cached = localStorage.getItem(STORAGE_KEYS.MODELS_CACHE);
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < MODELS_CACHE_TTL) {
                        fetchedModels = data;
                        updateModelSelector();
                    }
                }
            } catch (e) {}
        }

        function cacheModels() {
            try {
                localStorage.setItem(STORAGE_KEYS.MODELS_CACHE, JSON.stringify({
                    data: fetchedModels,
                    timestamp: Date.now()
                }));
            } catch (e) {}
        }

        async function refreshModels(silent = false) {
            const icon = document.getElementById('refreshIcon');
            if (icon) icon.classList.add('fa-spin');

            try {
                const [orModels, gemModels] = await Promise.allSettled([
                    fetchOpenRouterModels(),
                    fetchGeminiModels()
                ]);

                if (orModels.status === 'fulfilled') fetchedModels.openrouter = orModels.value;
                if (gemModels.status === 'fulfilled') fetchedModels.gemini = gemModels.value;

                if (fetchedModels.openrouter.length || fetchedModels.gemini.length) {
                    updateModelSelector();
                    cacheModels();
                }
                if (!silent) showToast(`${fetchedModels.openrouter.length + fetchedModels.gemini.length} models loaded`, 'success');
            } catch (e) {
                if (!silent) showToast('Failed to refresh models', 'error');
            } finally {
                if (icon) icon.classList.remove('fa-spin');
            }
        }

        async function fetchOpenRouterModels() {
            const headers = {
                'Content-Type': 'application/json',
                'HTTP-Referer': window.location.href,
                'X-Title': 'AI Chat Pro'
            };
            if (settings.apiKey) headers['Authorization'] = `Bearer ${settings.apiKey}`;
            const resp = await fetch('https://openrouter.ai/api/v1/models', { headers });
            if (!resp.ok) throw new Error(`OpenRouter ${resp.status}`);
            const data = await resp.json();
            return (data.data || []).map(m => ({ id: m.id, label: m.name || m.id }));
        }

        async function fetchGeminiModels() {
            if (!settings.geminiApiKey) return fetchedModels.gemini || [];
            const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${settings.geminiApiKey}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Gemini ${resp.status}`);
            const data = await resp.json();
            return (data.models || [])
                .filter(m => m.supportedGenerationMethods?.some(method =>
                    ['generateContent', 'streamGenerateContent'].includes(method)))
                .map(m => ({ id: m.name, label: m.displayName || m.name }));
        }

        function updateModelSelector() {
            const sel = document.getElementById('modelSelector');
            const previous = sel.value;
            sel.innerHTML = '';

            const addGroup = (label, models) => {
                if (!models.length) return;
                const og = document.createElement('optgroup');
                og.label = label;
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.label;
                    og.appendChild(opt);
                });
                sel.appendChild(og);
            };

            addGroup('Google Gemini (Direct API)', fetchedModels.gemini);
            addGroup('OpenRouter', fetchedModels.openrouter);

            if (Array.from(sel.options).some(o => o.value === previous)) {
                sel.value = previous;
            }
            if (currentConversation) currentConversation.model = sel.value;
        }

        function openModelsBrowser() {
            renderModelsList();
            document.getElementById('modelsModal').classList.add('active');
            const search = document.getElementById('modelsSearch');
            search.value = '';
            requestAnimationFrame(() => search.focus());
        }

        function closeModelsBrowser() {
            document.getElementById('modelsModal').classList.remove('active');
        }

        function renderModelsList() {
            const q = (document.getElementById('modelsSearch')?.value || '').toLowerCase();
            const list = document.getElementById('modelsList');
            list.innerHTML = '';

            const filterModels = (models) => q
                ? models.filter(m => m.id.toLowerCase().includes(q) || m.label.toLowerCase().includes(q))
                : models;

            const addSection = (title, items) => {
                if (!items.length) return;
                const header = document.createElement('div');
                header.style.cssText = 'padding:10px 14px; background:var(--bg-tertiary); border-bottom:1px solid var(--border-color); font-weight:600; font-size:0.85rem; color:var(--text-secondary); position:sticky; top:0; z-index:1;';
                header.textContent = `${title} (${items.length})`;
                list.appendChild(header);

                items.forEach(m => {
                    const row = document.createElement('div');
                    row.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border-color); gap:12px;';

                    const info = document.createElement('div');
                    info.style.cssText = 'min-width:0; flex:1;';
                    info.innerHTML = `<div style="font-weight:600; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(m.label)}</div>
                                     <div style="opacity:.6; font-size:0.8rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(m.id)}</div>`;

                    const btn = document.createElement('button');
                    btn.className = 'icon-btn';
                    btn.textContent = 'Use';
                    btn.style.cssText = 'padding:6px 14px; font-size:0.8rem;';
                    btn.onclick = () => selectModelFromBrowser(m.id);

                    row.appendChild(info);
                    row.appendChild(btn);
                    list.appendChild(row);
                });
            };

            addSection('Google Gemini', filterModels(fetchedModels.gemini));
            addSection('OpenRouter', filterModels(fetchedModels.openrouter));

            if (!list.children.length) {
                list.innerHTML = '<div style="padding:30px; text-align:center; color:var(--text-secondary);">No models found</div>';
            }
        }

        function selectModelFromBrowser(modelId) {
            const sel = document.getElementById('modelSelector');
            if (!Array.from(sel.options).some(o => o.value === modelId)) {
                const opt = document.createElement('option');
                opt.value = modelId;
                opt.textContent = modelId;
                sel.appendChild(opt);
            }
            sel.value = modelId;
            if (currentConversation) currentConversation.model = modelId;
            closeModelsBrowser();
            showToast('Model: ' + modelId, 'success');
        }

        // ===== Shortcuts =====
        function showShortcuts() {
            const list = document.getElementById('shortcutsList');
            const shortcuts = [
                ['Ctrl+B', 'Toggle sidebar'],
                ['Ctrl+N', 'New chat'],
                ['Ctrl+K', 'Search conversations'],
                ['Ctrl+L', 'Clear current chat'],
                ['Ctrl+E', 'Export chat'],
                ['Ctrl+,', 'Open settings'],
                ['Ctrl+/', 'Show this help'],
                ['Enter', 'Send message'],
                ['Shift+Enter', 'New line in input'],
                ['Esc', 'Close modal / sidebar'],
                ['Ctrl+Enter', 'Save message edit']
            ];
            list.innerHTML = shortcuts.map(([key, desc]) => `
                <div class="shortcut-row">
                    <span>${desc}</span>
                    <kbd class="keyboard-shortcut">${key}</kbd>
                </div>
            `).join('');
            document.getElementById('shortcutsModal').classList.add('active');
        }

        function closeShortcuts() {
            document.getElementById('shortcutsModal').classList.remove('active');
        }
    })();
    </script>
</body>
</html>
