  const setStatus=makeStatusSetter(root);
  const updStats=text=>updateStats(root,text);

  // Robust DOM-based pretty printer (handles comments, CDATA, text, attrs, self-closing)
  function prettyXML(doc,indent){
    const PAD=' '.repeat(indent);
    const out=[];
    // preserve XML declaration if present in source
    const decl=(Store.getTool('xml').input.match(/^\s*<\?xml[^?]*\?>/)||[])[0];
    if(decl)out.push(decl.trim());
    function attrs(node){return [...node.attributes].map(a=>` ${a.name}="${a.value.replace(/"/g,'&quot;')}"`).join('');}
    function walk(node,depth){
      const ind=PAD.repeat(depth);
      node.childNodes.forEach(ch=>{
        if(ch.nodeType===1){ // element
          const elemKids=[...ch.childNodes];
          const onlyText=elemKids.length>0&&elemKids.every(n=>n.nodeType===3||n.nodeType===4);
          const txt=onlyText?elemKids.map(n=>n.textContent).join('').trim():'';
          if(elemKids.length===0){
            out.push(`${ind}<${ch.nodeName}${attrs(ch)}/>`);
          }else if(onlyText){
            out.push(`${ind}<${ch.nodeName}${attrs(ch)}>${esc(txt)}</${ch.nodeName}>`);
          }else{
            out.push(`${ind}<${ch.nodeName}${attrs(ch)}>`);
            walk(ch,depth+1);
            out.push(`${ind}</${ch.nodeName}>`);
          }
        }else if(ch.nodeType===3){ // text
          const t=ch.textContent.trim();if(t)out.push(`${ind}${esc(t)}`);
        }else if(ch.nodeType===4){ // CDATA
          out.push(`${ind}<![CDATA[${ch.textContent}]]>`);
        }else if(ch.nodeType===8){ // comment
          out.push(`${ind}<!--${ch.textContent}-->`);
        }else if(ch.nodeType===7){ // processing instruction
          out.push(`${ind}<?${ch.target} ${ch.data}?>`);
        }
      });
    }
    walk(doc,0);
    return out.join('\n');
  }

  function parse(src){
    const p=new DOMParser();
    const doc=p.parseFromString(src,'application/xml');
    const errNode=doc.querySelector('parsererror');
    if(errNode){
      const t=errNode.textContent.replace(/\s+/g,' ').trim();
      // Extract line/column across browser formats (Firefox: "line N column M"; Chrome: "error on line N at column M")
      const lm=t.match(/line[:\s]+(\d+)/i), cm=t.match(/column[:\s]+(\d+)/i);
      const err=new Error(t);
      if(lm)err.line=+lm[1];if(cm)err.column=+cm[1];
      throw err;
    }
    return doc;
  }
  function countNodes(node){let c=0;function walk(n){if(n.nodeType===1)c++;n.childNodes&&n.childNodes.forEach(walk);}walk(node);return c;}

  // Convert an XML element to a plain JS object. Attributes → "@name", repeated
  // children → arrays, text-only elements → their string value, mixed → "#text".
  function xmlToObj(elem){
    const attrs=[...elem.attributes];
    const kids=[...elem.childNodes].filter(n=>n.nodeType===1);
    const text=[...elem.childNodes].filter(n=>n.nodeType===3||n.nodeType===4).map(n=>n.textContent).join('').trim();
    // Leaf with no attributes → just its text value.
    if(!kids.length&&!attrs.length)return text;
    const obj={};
    attrs.forEach(a=>obj['@'+a.name]=a.value);
    kids.forEach(ch=>{
      const v=xmlToObj(ch);
      if(ch.tagName in obj){if(!Array.isArray(obj[ch.tagName]))obj[ch.tagName]=[obj[ch.tagName]];obj[ch.tagName].push(v);}
      else obj[ch.tagName]=v;
    });
    if(text&&!kids.length)obj['#text']=text; // attributes + text, no element children
    return obj;
  }

  function buildTree(node,parentPath){
    const ul=el('ul');
    node.childNodes.forEach(ch=>{
      if(ch.nodeType===1){
        const li=el('li');
        const hasKids=[...ch.childNodes].some(n=>n.nodeType===1);
        const textOnly=!hasKids?[...ch.childNodes].filter(n=>n.nodeType===3).map(n=>n.textContent.trim()).join(''):'';
        const attrs=[...ch.attributes].map(a=>` <span class="tk-attr">${esc(a.name)}</span>=<span class="tk-str">"${esc(a.value)}"</span>`).join('');
        // Compute the node's XPath-style position (1-based, sibling-aware) for click-to-copy.
        let idx=1,sib=ch.previousElementSibling;while(sib){if(sib.tagName===ch.tagName)idx++;sib=sib.previousElementSibling;}
        const path=`${parentPath||''}/${ch.tagName}${idx>1?`[${idx}]`:''}`;
        const row=el('div','row');
        row.innerHTML=`<span class="tw ${hasKids?'':'empty'}">${hasKids?'▾':''}</span><span class="tk-tag" data-path="${esc(path)}" title="Click to copy path">${esc(ch.tagName)}</span>${attrs}${textOnly?` <span class="tk-str">${esc(textOnly.slice(0,60))}</span>`:''}${hasKids?`<span class="badge">${ch.children.length}</span>`:''}`;
        li.appendChild(row);
        if(hasKids){li.appendChild(buildTree(ch,path));row.querySelector('.tw').addEventListener('click',()=>{li.classList.toggle('collapsed');row.querySelector('.tw').textContent=li.classList.contains('collapsed')?'▸':'▾';});}
        ul.appendChild(li);
      }
    });
    return ul;
  }

  function run(){
    const src=Store.getTool('xml').input;updStats(src);
    if(!src.trim()){setStatus('idle','Idle');out.innerHTML='';treeEl.innerHTML='';$('[data-slot=nodes]',root).textContent='0';lastDoc=null;return;}
    try{
      const doc=parse(src);lastDoc=doc;
      const n=countNodes(doc.documentElement);$('[data-slot=nodes]',root).textContent=n;
      const pretty=prettyXML(doc,+Store.getTool('xml').indent);
      lastOut=pretty;out.innerHTML=hlXML(pretty);
      treeEl.innerHTML='';treeEl.appendChild(buildTree(doc));
      setStatus('ok','Well-formed XML');
    }catch(e){
      setStatus('err',e.line?`Parse error at line ${e.line}`:'Parse error');
      renderError(out,e.message,input,e.line!=null?e.line:null,e.column!=null?e.column:null);
      treeEl.innerHTML=`<div class="empty-state"><i class="fa-solid fa-bug"></i>Cannot build tree</div>`;
      lastDoc=null;
    }
  }
  function runXPath(){
    const q=$('[data-xpath]',root).value.trim();Store.patch('xml','xpath',q);
    if(!lastDoc){toast('Parse valid XML first','err');return;}
    if(!q){toast('Enter an XPath expression','info');return;}
    showResults=true;treeEl.style.display='none';resEl.style.display='block';rightLabel.textContent='XPath Results';
    try{
      const res=lastDoc.evaluate(q,lastDoc,null,XPathResult.ANY_TYPE,null);
      resEl.innerHTML='';let count=0;
      const type=res.resultType;
      if(type===XPathResult.NUMBER_TYPE){resEl.appendChild(itemNode('(number)',res.numberValue));count=1;}
      else if(type===XPathResult.STRING_TYPE){resEl.appendChild(itemNode('(string)',res.stringValue));count=1;}
      else if(type===XPathResult.BOOLEAN_TYPE){resEl.appendChild(itemNode('(boolean)',res.booleanValue));count=1;}
      else{
        const it=lastDoc.evaluate(q,lastDoc,null,XPathResult.ORDERED_NODE_SNAPSHOT_TYPE,null);
        for(let i=0;i<it.snapshotLength;i++){const node=it.snapshotItem(i);count++;
          let path=getPath(node),val=node.nodeType===1?new XMLSerializer().serializeToString(node):node.textContent;
          resEl.appendChild(itemNode(path,val));}
      }
      if(!count)resEl.innerHTML=`<div class="empty-state"><i class="fa-solid fa-magnifying-glass-minus"></i>No matches</div>`;
      $('[data-slot=xpinfo]',root).innerHTML=`<i class="fa-solid fa-crosshairs"></i> ${count} match${count!==1?'es':''}`;
      setStatus('ok',`XPath: ${count} result(s)`);
    }catch(e){setStatus('err','Invalid XPath');resEl.innerHTML=`<div class="empty-state"><i class="fa-solid fa-circle-xmark" style="color:var(--err)"></i>${esc(e.message)}</div>`;}
  }
  function itemNode(path,val){const d=el('div','result-item');d.innerHTML=`<div class="path">${esc(path)}</div><div class="val">${esc(String(val).trim().slice(0,500))}</div>`;return d;}
  function getPath(node){const parts=[];while(node&&node.nodeType===1){let idx=1,sib=node.previousElementSibling;while(sib){if(sib.tagName===node.tagName)idx++;sib=sib.previousElementSibling;}parts.unshift(node.tagName+(idx>1?`[${idx}]`:''));node=node.parentNode;}return '/'+parts.join('/');}

  root.addEventListener('click',e=>{
    const b=e.target.closest('[data-act]');if(!b)return;const act=b.dataset.act,cfg=Store.getTool('xml');
    if(act==='format'){run();outLabel.textContent='Formatted';toast('Pretty-printed','ok');}
    else if(act==='minify'){try{parse(cfg.input);lastOut=cfg.input.replace(/>\s+</g,'><').replace(/\r?\n\s*/g,'').trim();out.innerHTML=hlXML(lastOut);outLabel.textContent='Minified';toast('Minified','ok');}catch(err){toast('Invalid XML','err');}}
    else if(act==='validate'){run();}
    else if(act==='tojson'){try{const doc=parse(cfg.input);const re=doc.documentElement;const obj={[re.tagName]:xmlToObj(re)};lastOut=JSON.stringify(obj,null,+cfg.indent);out.innerHTML=hlJSONlike(lastOut);outLabel.textContent='JSON';$('[data-mini=out]',root)&&($('[data-mini=out]',root).textContent=stats(lastOut).lines+' ln');setStatus('ok','Converted to JSON');toast('Converted to JSON','ok');}catch(err){setStatus('err','Invalid XML');toast('Invalid XML','err');}}
    else if(act==='xpath')runXPath();
    else if(act==='toggletree'){showResults=!showResults;treeEl.style.display=showResults?'none':'block';resEl.style.display=showResults?'block':'none';rightLabel.textContent=showResults?'XPath Results':'Tree';}
    else if(act==='expand'){if(showResults){showResults=false;treeEl.style.display='block';resEl.style.display='none';rightLabel.textContent='Tree';}treeEl.querySelectorAll('li.collapsed').forEach(li=>{li.classList.remove('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▾';});}
    else if(act==='collapse'){treeEl.querySelectorAll('li').forEach(li=>{if(li.querySelector(':scope>ul')){li.classList.add('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▸';}});}
    else if(act==='wrap'){out.classList.toggle('wrap');b.classList.toggle('on');}
    else if(act==='copy')copy(cfg.input);
    else if(act==='copyout')copy(lastOut);
    else if(act==='download')download(lastOut||cfg.input,'output.xml');
    else if(act==='clear'){Store.patch('xml','input','');input._ta.value='';input._upd();run();}
    else if(act==='sample'){Store.patch('xml','input',XML_SAMPLE);input._ta.value=XML_SAMPLE;input._upd();run();}
  });
  // Tree pane: click a tag to copy its XPath-style path (output copy is via the global handler).
  treeEl.addEventListener('click',e=>{const lab=e.target.closest('[data-path]');if(lab){copy(lab.dataset.path);toast('Path copied: '+lab.dataset.path,'ok');}});
  root.addEventListener('change',e=>{const s=e.target.closest('[data-set]');if(s){Store.patch('xml',s.dataset.set,+s.value);run();}});
  $('[data-xpath]',root).addEventListener('keydown',e=>{if(e.key==='Enter')runXPath();});
  setTimeout(run,30);
  return root;
}

      </div>
      <div class="pane">

      <span class="status-stat"><i class="fa-solid fa-database"></i> <b data-slot="bytes">0</b> B</span>
      <div class="spacer"></div>
      <span class="status-stat" data-slot="keys"></span>
    </div>`;
  const out=$('[data-slot=output]',root),outLabel=$('[data-outlabel]',root);
  const treeEl=$('[data-slot=tree]',root);
  let lastOut='',lastData;
  const runDebounced=debounce(()=>run(),220);

  const setStatus=makeStatusSetter(root);
  const updStats=text=>updateStats(root,text);

  // Show either the formatted text pane or the collapsible tree pane.
  function syncView(){
    const tree=Store.getTool('toml').view==='tree';
    out.style.display=tree?'none':'';
    treeEl.style.display=tree?'':'none';

    $$('[data-slot=treebtns]',root).forEach(b=>b.style.display=tree?'':'none');
    $('[data-act=wrap]',root).style.display=tree?'none':'';
  }

  // Safe path query: dot + [index] / ["key"] notation, no eval. Returns {ok,value}.
  function queryPath(obj,path){
    const tokens=[];const re=/\.?([A-Za-z_$][\w$-]*)|\[\s*(\d+)\s*\]|\[\s*"((?:\\.|[^"\\])*)"\s*\]|\[\s*'((?:\\.|[^'\\])*)'\s*\]/g;
    let last=0,m;
    while((m=re.exec(path))!==null){
      if(m.index!==last)return {ok:false,err:`Unexpected token at position ${last+1}`};
      tokens.push(m[1]!=null?m[1]:m[2]!=null?+m[2]:m[3]!=null?m[3]:m[4]);
      last=re.lastIndex;
    }
    if(last!==path.length)return {ok:false,err:`Unexpected token at position ${last+1}`};
    let cur=obj;
    for(const t of tokens){
      if(cur==null||typeof cur!=='object')return {ok:false,err:`Cannot read "${t}" — value is ${cur===null?'null':typeof cur}`};
      if(!(t in cur))return {ok:false,err:`Key "${t}" not found`};
      cur=cur[t];
    }
    return {ok:true,value:cur};
  }

  // Build a collapsible tree (reuses the .tree styles shared with the JSON/YAML/XML tools).
  function buildTree(value){
    const rootUl=el('ul');
    const node=(key,val,parentPath)=>{
      const li=el('li');
      const row=el('div','row');
      const isDate=val instanceof Date;
      const isObj=val&&typeof val==='object'&&!isDate;
      const path=key==null?'$':(typeof key==='number'?`${parentPath}[${key}]`:parentPath==='$'?key:`${parentPath}.${key}`);
      const tw=el('span','tw'+(isObj&&Object.keys(val).length?'':' empty'),isObj&&Object.keys(val).length?'▸':'');
      row.appendChild(tw);
      let label='';
      if(key!=null)label+=`<span class="k">${esc(String(key))}</span><span class="tk-punct">: </span>`;
      if(isObj){
        const count=Object.keys(val).length;
        label+=`<span class="tk-punct">${Array.isArray(val)?'[':'{'}</span><span class="badge">${count}</span>`;
      }else{
        let cls,disp;
        if(isDate){cls='tk-str';disp=`"${val.toISOString()}"`;}
        else if(val===null){cls='tk-null';disp='null';}
        else if(typeof val==='number'){cls='tk-num';disp=String(val);}
        else if(typeof val==='boolean'){cls='tk-bool';disp=String(val);}
        else{cls='tk-str';disp=`"${val}"`;}
        label+=`<span class="${cls}">${esc(disp)}</span>`;
      }
      const lab=el('span',null,label);
      lab.dataset.path=path; // click-to-copy path
      row.appendChild(lab);
      li.appendChild(row);
      if(isObj&&Object.keys(val).length){
        const ul=el('ul');
        const entries=Array.isArray(val)?val.map((v,idx)=>[idx,v]):Object.entries(val);
        entries.forEach(([k,v])=>ul.appendChild(node(k,v,path)));
        li.appendChild(ul);
        li.classList.add('collapsed'); // collapsed by default for big trees
        tw.addEventListener('click',()=>{li.classList.toggle('collapsed');tw.textContent=li.classList.contains('collapsed')?'▸':'▾';});
        tw.textContent='▸';
      }
      return li;
    };
    rootUl.appendChild(node(null,value,'$'));
    return rootUl;
  }

  // Compact (single-line-per-key) re-serialization: collapses blank separator lines.
  function tomlMinify(obj){return tomlStringify(obj).replace(/\n{2,}/g,'\n').trim()+'\n';}

  // TOML stringifier (handles nested tables, arrays, datetimes)
  function tomlStringify(obj){
    const lines=[];
    function fmtVal(v){
      if(typeof v==='string')return JSON.stringify(v);
      if(typeof v==='boolean')return v;
      if(typeof v==='number')return v;
      if(v instanceof Date)return v.toISOString();
      if(Array.isArray(v))return '['+v.map(fmtVal).join(', ')+']';
      return JSON.stringify(v);
    }
    function isTable(v){return v&&typeof v==='object'&&!Array.isArray(v)&&!(v instanceof Date);}
    function arrOfTables(v){return Array.isArray(v)&&v.length&&v.every(isTable);}
    function emit(o,prefix){
      // simple keys first
      for(const k in o){const v=o[k];if(!isTable(v)&&!arrOfTables(v))lines.push(`${k} = ${fmtVal(v)}`);}
      for(const k in o){const v=o[k];const path=prefix?prefix+'.'+k:k;
        if(arrOfTables(v)){v.forEach(item=>{lines.push('');lines.push(`[[${path}]]`);emit(item,path);});}
        else if(isTable(v)){lines.push('');lines.push(`[${path}]`);emit(v,path);}
      }
    }
    emit(obj,'');
    return lines.join('\n').trim()+'\n';
  }
  function countTables(o,c={t:0,k:0}){for(const k in o){const v=o[k];if(v&&typeof v==='object'&&!Array.isArray(v)&&!(v instanceof Date)){c.t++;countTables(v,c);}else if(Array.isArray(v)&&v.every(x=>x&&typeof x==='object')){c.t+=v.length;v.forEach(x=>countTables(x,c));}else c.k++;}return c;}

  function tomlParse(src){
    if(!window.TOML||typeof window.TOML.parse!=='function')throw new Error('TOML parser still loading… please retry in a moment.');
    return window.TOML.parse(src);
  }
  function run(){
    const cfg=Store.getTool('toml');const src=cfg.input;updStats(src);
    if(!window.TOML){setStatus('warn','Loading TOML parser…');out.innerHTML='<span class="tk-comment"># Loading TOML parser from CDN…</span>';return;}
    if(!src.trim()){setStatus('idle','Idle');out.innerHTML='';treeEl.innerHTML='';$('[data-slot=tables]',root).textContent='0';$('[data-slot=keys]',root).textContent='';$('[data-mini=out]',root).textContent='';lastData=undefined;return;}
    try{
      const obj=tomlParse(src);lastData=obj;
      const c=countTables(obj);$('[data-slot=tables]',root).textContent=c.t;$('[data-slot=keys]',root).innerHTML=`<i class="fa-solid fa-key"></i> ${c.k} keys`;
      const res=tomlStringify(obj);lastOut=res;out.innerHTML=hlTOML(res);
      $('[data-mini=out]',root).textContent=stats(res).lines+' ln';
      if(cfg.view==='tree'){treeEl.innerHTML='';treeEl.appendChild(buildTree(obj));}
      syncView();
      setStatus('ok','Valid TOML');
    }catch(e){setStatus('err',e.message.split('\n')[0]);out.style.display='';treeEl.style.display='none';treeEl.innerHTML='';renderError(out,e.message,input,e.line!=null?e.line:null,e.column!=null?e.column:null);$('[data-slot=tables]',root).textContent='0';lastData=undefined;}
  }

  // Run the path query against the current (valid) TOML and show the result.
  function runQuery(){
    const cfg=Store.getTool('toml');const path=(cfg.query||'').trim();
    if(!cfg.input.trim()){toast('Nothing to query','info');return;}
    let data;try{data=tomlParse(cfg.input);}catch(e){setStatus('err','Invalid TOML — fix it before querying');toast('Invalid TOML','err');return;}
    if(!path){run();return;}
    const r=queryPath(data,path);
    if(!r.ok){setStatus('err',r.err);Store.patch('toml','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=`<span class="tk-null">${esc(r.err)}</span>`;outLabel.textContent='Query';syncView();toast('Query failed','err');return;}
    const v=r.value;
    lastOut=(v&&typeof v==='object'&&!(v instanceof Date))?tomlStringify(v).trim():(v instanceof Date?v.toISOString():typeof v==='string'?v:String(v));
    Store.patch('toml','view','output');out.style.display='';treeEl.style.display='none';
    out.innerHTML=(v&&typeof v==='object'&&!(v instanceof Date))?hlTOML(lastOut):esc(lastOut);outLabel.textContent='Query result';
    $('[data-mini=out]',root).textContent=stats(lastOut).lines+' ln';
    setStatus('ok',`Query → ${Array.isArray(v)?'array':v===null?'null':v instanceof Date?'datetime':typeof v}`);syncView();
    toast('Query evaluated','ok');
  }
  root.addEventListener('click',e=>{
    const b=e.target.closest('[data-act]');if(!b)return;const act=b.dataset.act,cfg=Store.getTool('toml');
    if(act==='format'){Store.patch('toml','view','output');run();outLabel.textContent='Formatted';toast('Formatted','ok');}
    else if(act==='validate'){run();}
    else if(act==='minify'){try{const o=tomlParse(cfg.input);lastOut=tomlMinify(o);Store.patch('toml','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlTOML(lastOut);outLabel.textContent='Minified';$('[data-mini=out]',root).textContent=stats(lastOut).lines+' ln';setStatus('ok','Minified');syncView();toast('Minified','ok');}catch(err){setStatus('err',err.message.split('\n')[0]);renderError(out,err.message,input,err.line!=null?err.line:null,err.column!=null?err.column:null);toast('Invalid TOML','err');}}
    else if(act==='tojson'){try{const o=tomlParse(cfg.input);lastOut=JSON.stringify(o,null,2);Store.patch('toml','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlJSONlike(lastOut);outLabel.textContent='JSON';$('[data-mini=out]',root).textContent=stats(lastOut).lines+' ln';setStatus('ok','Converted to JSON');syncView();toast('→ JSON','ok');}catch(err){setStatus('err',err.message.split('\n')[0]);renderError(out,err.message,input,err.line!=null?err.line:null,err.column!=null?err.column:null);toast('Invalid TOML','err');}}
    else if(act==='toyaml'){try{const o=tomlParse(cfg.input);lastOut=jsyaml.dump(o);Store.patch('toml','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=hlYAML(lastOut);outLabel.textContent='YAML';$('[data-mini=out]',root).textContent=stats(lastOut).lines+' ln';setStatus('ok','Converted to YAML');syncView();toast('→ YAML','ok');}catch(err){setStatus('err',err.message.split('\n')[0]);renderError(out,err.message,input,err.line!=null?err.line:null,err.column!=null?err.column:null);toast('Invalid TOML','err');}}
    else if(act==='treetoggle'){const next=cfg.view==='tree'?'output':'tree';Store.patch('toml','view',next);if(next==='tree')run();else syncView();}
    else if(act==='expand'){$$('#main .tree li.collapsed').forEach(li=>{li.classList.remove('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▾';});}
    else if(act==='collapse'){$$('#main .tree li').forEach(li=>{if(li.querySelector(':scope>ul')){li.classList.add('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▸';}});}
    else if(act==='query')runQuery();
    else if(act==='wrap'){out.classList.toggle('wrap');b.classList.toggle('on');}
    else if(act==='copy')copy(cfg.input);
    else if(act==='copyout')copy(lastOut);
    else if(act==='download')download(lastOut||cfg.input,'config.toml');
    else if(act==='clear'){Store.patch('toml','input','');input._ta.value='';input._upd();run();}
    else if(act==='sample'){Store.patch('toml','input',TOML_SAMPLE);input._ta.value=TOML_SAMPLE;input._upd();run();}
  });
  // The tree pane copies a node's path on click (output copy is via the global handler).
  treeEl.addEventListener('click',e=>{const lab=e.target.closest('[data-path]');if(lab){copy(lab.dataset.path);toast('Path copied: '+lab.dataset.path,'ok');}});
  root.addEventListener('input',e=>{const q=e.target.closest('[data-query]');if(q)Store.patch('toml','query',q.value);});
  root.addEventListener('keydown',e=>{const q=e.target.closest('[data-query]');if(q&&e.key==='Enter'){e.preventDefault();runQuery();}});
  syncView();           // reflect persisted view state on the toolbar buttons
  setTimeout(run,30);
  return root;
}

  const inputA=buildCodeInput(st.input,v=>{Store.patch('ini','input',v);runDebounced();},'; INI config\n[server]\nhost = localhost\nport = 8080');
  const inputB=buildCodeInput(st.inputB,v=>{Store.patch('ini','inputB',v);runDebounced();},'; second INI to diff against');
  $('[data-slot=input]',root).appendChild(inputA);
  $('[data-slot=inputB]',root).appendChild(inputB);

  const setStatus=makeStatusSetter(root);

  // INI parser → {sections:{name:{key:val}}, global:{}}
  function parseINI(text){
    const data={__global__:{}};let cur='__global__';const errors=[];
    text.split(/\r?\n/).forEach((line,i)=>{
      const raw=line;line=line.trim();
      if(!line||/^[;#]/.test(line))return;
      const sec=line.match(/^\[(.+?)\]$/);
      if(sec){cur=sec[1].trim();if(!data[cur])data[cur]={};return;}
      const kv=line.match(/^([^=:]+?)\s*[=:]\s*(.*)$/);
      if(kv){let k=kv[1].trim(),v=kv[2].trim();v=v.replace(/^["']|["']$/g,'');data[cur][k]=v;}
      else errors.push({line:i+1,text:raw});
    });
    return {data,errors};
  }
  function normalizeINI(data,cfg){
    const transformK=k=>cfg.lowercase?k.toLowerCase():k;
    let secNames=Object.keys(data).filter(s=>s!=='__global__');
    if(cfg.sortSections)secNames.sort();
    let outp=[];
    const g=data.__global__;
    let gk=Object.keys(g);if(cfg.sortKeys)gk.sort();
    gk.forEach(k=>outp.push(`${transformK(k)} = ${g[k]}`));
    if(gk.length&&secNames.length)outp.push('');
    secNames.forEach((s,idx)=>{
      outp.push(`[${s}]`);
      let ks=Object.keys(data[s]);if(cfg.sortKeys)ks.sort();
      ks.forEach(k=>outp.push(`${transformK(k)} = ${data[s][k]}`));
      if(idx<secNames.length-1)outp.push('');
    });
    return outp.join('\n').trim()+'\n';
  }
  function counts(data){let sec=0,keys=0;for(const s in data){if(s==='__global__'){keys+=Object.keys(data[s]).length;continue;}sec++;keys+=Object.keys(data[s]).length;}return {sec,keys};}

  // Coerce an INI string value into a JS primitive for → JSON / → YAML / tree.
  function inferValue(v){
    if(/^(true|false)$/i.test(v))return v.toLowerCase()==='true';
    if(/^null$/i.test(v))return null;
    if(/^-?\d+$/.test(v))return parseInt(v,10);
    if(/^-?\d*\.\d+$/.test(v))return parseFloat(v);
    return v;
  }
  // Convert parsed INI {__global__:{}, section:{key:val}} → plain object.
  // Global keys are hoisted to the top level; sections become nested objects.
  function iniToObject(data){
    const obj={};
    const g=data.__global__||{};
    for(const k in g)obj[k]=inferValue(g[k]);
    for(const s in data){
      if(s==='__global__')continue;
      const sec={};for(const k in data[s])sec[k]=inferValue(data[s][k]);
      obj[s]=sec;
    }
    return obj;
  }

  // Safe path query: dot + ["key"] notation, no eval. Returns {ok,value}.
  function queryPath(obj,path){
    const tokens=[];const re=/\.?([A-Za-z_$][\w$. -]*?)(?=\.|\[|$)|\[\s*"((?:\\.|[^"\\])*)"\s*\]|\[\s*'((?:\\.|[^'\\])*)'\s*\]/g;
    // simpler tokenizer: split on dots and bracket-quoted keys
    const parts=[];let i=0;
    while(i<path.length){
      if(path[i]==='.'){i++;continue;}
      if(path[i]==='['){
        const q=path[i+1];
        if(q==='"'||q==="'"){const end=path.indexOf(q+']',i+2);if(end<0)return {ok:false,err:'Unterminated bracket'};parts.push(path.slice(i+2,end));i=end+2;}
        else{const end=path.indexOf(']',i);if(end<0)return {ok:false,err:'Unterminated bracket'};parts.push(path.slice(i+1,end).trim());i=end+1;}
        continue;
      }
      let j=i;while(j<path.length&&path[j]!=='.'&&path[j]!=='[')j++;
      parts.push(path.slice(i,j).trim());i=j;
    }
    let cur=obj;
    for(const t of parts){
      if(t==='')continue;
      if(cur==null||typeof cur!=='object')return {ok:false,err:`Cannot read "${t}" — value is ${cur===null?'null':typeof cur}`};
      if(!(t in cur))return {ok:false,err:`Key "${t}" not found`};
      cur=cur[t];
    }
    return {ok:true,value:cur};
  }

  // Build a collapsible tree (reuses the .tree styles shared with the other tools).
  function buildTree(value){
    const rootUl=el('ul');
    const node=(key,val,parentPath)=>{
      const li=el('li');
      const row=el('div','row');
      const isObj=val&&typeof val==='object';
      const path=key==null?'$':(parentPath==='$'?key:`${parentPath}.${key}`);
      const tw=el('span','tw'+(isObj&&Object.keys(val).length?'':' empty'),isObj&&Object.keys(val).length?'▸':'');
      row.appendChild(tw);
      let label='';
      if(key!=null)label+=`<span class="k">${esc(String(key))}</span><span class="tk-punct">: </span>`;
      if(isObj){
        label+=`<span class="tk-punct">{</span><span class="badge">${Object.keys(val).length}</span>`;
      }else{
        let cls,disp;
        if(val===null){cls='tk-null';disp='null';}
        else if(typeof val==='number'){cls='tk-num';disp=String(val);}
        else if(typeof val==='boolean'){cls='tk-bool';disp=String(val);}
        else{cls='tk-str';disp=`"${val}"`;}
        label+=`<span class="${cls}">${esc(disp)}</span>`;
      }
      const lab=el('span',null,label);lab.dataset.path=path;
      row.appendChild(lab);li.appendChild(row);
      if(isObj&&Object.keys(val).length){
        const ul=el('ul');
        Object.entries(val).forEach(([k,v])=>ul.appendChild(node(k,v,path)));
        li.appendChild(ul);li.classList.add('collapsed');
        tw.addEventListener('click',()=>{li.classList.toggle('collapsed');tw.textContent=li.classList.contains('collapsed')?'▸':'▾';});
        tw.textContent='▸';
      }
      return li;
    };
    rootUl.appendChild(node(null,value,'$'));
    return rootUl;
  }

  // Show either the normalized text pane or the collapsible tree pane (format mode).
  function syncView(){
    const tree=Store.getTool('ini').view==='tree';
    out.style.display=tree?'none':'';
    treeEl.style.display=tree?'':'none';
    const tb=$('[data-act=treetoggle]',root);if(tb)tb.classList.toggle('on',tree);
    $$('[data-slot=treebtns]',root).forEach(b=>b.style.display=tree?'':'none');
    $('[data-act=wrap]',root).style.display=tree?'none':'';
  }

  function buildDiff(a,b){
    const la=a.split('\n'),lb=b.split('\n');
    const n=la.length,m=lb.length;
    // guard: fall back to a simple line-by-line diff for very large inputs (avoids O(n·m) blowup)
    if(n*m>4000000){
      const res=[],max=Math.max(n,m);
      for(let i=0;i<max;i++){
        if(i<n&&i<m){if(la[i]===lb[i])res.push({t:'same',tx:la[i]});else{res.push({t:'del',tx:la[i]});res.push({t:'add',tx:lb[i]});}}
        else if(i<n)res.push({t:'del',tx:la[i]});
        else res.push({t:'add',tx:lb[i]});
      }
      return res;
    }
    // optimal LCS diff
    const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
    for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--)dp[i][j]=la[i]===lb[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
    const res=[];let i=0,j=0;
    while(i<n&&j<m){
      if(la[i]===lb[j]){res.push({t:'same',tx:la[i]});i++;j++;}
      else if(dp[i+1][j]>=dp[i][j+1]){res.push({t:'del',tx:la[i]});i++;}
      else{res.push({t:'add',tx:lb[j]});j++;}
    }
    while(i<n){res.push({t:'del',tx:la[i++]});}
    while(j<m){res.push({t:'add',tx:lb[j++]});}
    return res;
  }

  function run(){
    const cfg=Store.getTool('ini');
    $('[data-mini=in]',root).textContent=stats(cfg.input).lines+' ln';
    $('[data-mini=inB]',root).textContent=stats(cfg.inputB).lines+' ln';
    if(cfg.mode==='format'){
      if(!cfg.input.trim()){setStatus('idle','Idle');out.innerHTML='';treeEl.innerHTML='';lastData=undefined;$('[data-slot=sections]',root).textContent='0';$('[data-slot=keys]',root).textContent='0';return;}
      const {data,errors}=parseINI(cfg.input);lastData=data;
      const c=counts(data);$('[data-slot=sections]',root).textContent=c.sec;$('[data-slot=keys]',root).textContent=c.keys;
      const res=normalizeINI(data,cfg);lastOut=res;out.innerHTML=hlINI(res);outLabel.textContent='Normalized';
      if(cfg.view==='tree'){treeEl.innerHTML='';treeEl.appendChild(buildTree(iniToObject(data)));}
      syncView();
      if(errors.length)setStatus('warn',`${errors.length} unparsable line(s)`);
      else setStatus('ok','Valid INI');
    }else{
      // diff mode
      if(!cfg.input.trim()&&!cfg.inputB.trim()){setStatus('idle','Idle');diffEl.innerHTML='';return;}
      const dataA=parseINI(cfg.input).data;
      const na=normalizeINI(dataA,cfg), nb=normalizeINI(parseINI(cfg.inputB).data,cfg);
      const c=counts(dataA);$('[data-slot=sections]',root).textContent=c.sec;$('[data-slot=keys]',root).textContent=c.keys;
      lastOut=nb; // allow download/copy of normalized B
      const d=buildDiff(na.trim(),nb.trim());
      let add=0,del=0,html='';let ln=1;
      d.forEach(row=>{if(row.t==='add')add++;if(row.t==='del')del++;html+=`<div class="diff-line ${row.t}"><span class="ln">${row.t!=='add'?ln:''}</span><span class="tx">${esc(row.tx)}</span></div>`;if(row.t!=='add')ln++;});
      diffEl.innerHTML=html||`<div class="empty-state"><i class="fa-solid fa-equals"></i>No content</div>`;
      $('[data-mini=diff]',root).innerHTML=`<span class="tk-str">+${add}</span> <span class="tk-null">-${del}</span>`;
      $('[data-slot=diffinfo]',root).innerHTML=add+del===0?`<i class="fa-solid fa-equals" style="color:var(--ok)"></i> Identical`:`<i class="fa-solid fa-code-compare"></i> ${add} added, ${del} removed`;
      setStatus(add+del===0?'ok':'warn',add+del===0?'Files identical':`${add+del} differences`);
    }
  }
  function setMode(mode){
    Store.patch('ini','mode',mode);
    if(mode==='diff')Store.patch('ini','view','output'); // tree view only makes sense in format mode
    $$('[data-mode]',root).forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
    $('[data-slot=inputBpane]',root).style.display=mode==='diff'?'flex':'none';
    $('[data-slot=outpane]',root).style.display=mode==='format'?'flex':'none';
    $('[data-slot=diffpane]',root).style.display=mode==='diff'?'flex':'none';
    fmtOnly.style.display=mode==='format'?'contents':'none';
    $('[data-inlabel]',root).textContent=mode==='diff'?'INI A':'Input INI';
    run();
  }

  root.addEventListener('click',e=>{
    const mode=e.target.closest('[data-mode]');if(mode){setMode(mode.dataset.mode);return;}
    const tog=e.target.closest('[data-toggle]');if(tog){tog.classList.toggle('on');Store.patch('ini',tog.dataset.toggle,tog.classList.contains('on'));run();return;}
    const b=e.target.closest('[data-act]');if(!b)return;const act=b.dataset.act,cfg=Store.getTool('ini');
    if(act==='normalize'){Store.patch('ini','view','output');run();toast('Normalized','ok');}
    else if(act==='tojson'){if(!cfg.input.trim()){toast('Nothing to convert','info');return;}const {data}=parseINI(cfg.input);lastData=data;lastOut=JSON.stringify(iniToObject(data),null,2);Store.patch('ini','view','output');out.innerHTML=hlJSONlike(lastOut);outLabel.textContent='JSON';syncView();setStatus('ok','Converted to JSON');toast('→ JSON','ok');}
    else if(act==='toyaml'){if(!cfg.input.trim()){toast('Nothing to convert','info');return;}const {data}=parseINI(cfg.input);lastData=data;lastOut=jsyaml.dump(iniToObject(data));Store.patch('ini','view','output');out.innerHTML=hlYAML(lastOut);outLabel.textContent='YAML';syncView();setStatus('ok','Converted to YAML');toast('→ YAML','ok');}
    else if(act==='treetoggle'){const next=cfg.view==='tree'?'output':'tree';Store.patch('ini','view',next);if(next==='tree')run();else{outLabel.textContent='Normalized';run();}}
    else if(act==='expand'){$$('#main .tree li.collapsed').forEach(li=>{li.classList.remove('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▾';});}
    else if(act==='collapse'){$$('#main .tree li').forEach(li=>{if(li.querySelector(':scope>ul')){li.classList.add('collapsed');const tw=li.querySelector(':scope>.row>.tw');if(tw&&tw.textContent)tw.textContent='▸';}});}
    else if(act==='query')runQuery();
    else if(act==='wrap'){out.classList.toggle('wrap');b.classList.toggle('on');}
    else if(act==='copy')copy(cfg.input);
    else if(act==='copyout')copy(lastOut);
    else if(act==='download')download(lastOut||cfg.input,'config.ini');
    else if(act==='clear'){Store.update('ini',{input:'',inputB:''});inputA._ta.value='';inputB._ta.value='';inputA._upd();inputB._upd();run();}
    else if(act==='sample'){Store.patch('ini','input',INI_SAMPLE_A);inputA._ta.value=INI_SAMPLE_A;inputA._upd();if(cfg.mode==='diff'){Store.patch('ini','inputB',INI_SAMPLE_B);inputB._ta.value=INI_SAMPLE_B;inputB._upd();}run();}
  });
  // Run the path query against the current (valid) INI structure and show the result.
  function runQuery(){
    const cfg=Store.getTool('ini');const path=(cfg.query||'').trim();
    if(!cfg.input.trim()){toast('Nothing to query','info');return;}
    const {data}=parseINI(cfg.input);const obj=iniToObject(data);
    if(!path){Store.patch('ini','view','output');run();return;}
    const r=queryPath(obj,path);
    if(!r.ok){setStatus('err',r.err);Store.patch('ini','view','output');out.style.display='';treeEl.style.display='none';out.innerHTML=`<span class="tk-null">${esc(r.err)}</span>`;outLabel.textContent='Query';syncView();toast('Query failed','err');return;}
    const v=r.value;

    out.innerHTML=(v&&typeof v==='object')?hlJSONlike(lastOut):esc(lastOut);outLabel.textContent='Query result';

  }
  // The tree pane copies a node's path on click (output copy is via the global handler).
  treeEl.addEventListener('click',e=>{const lab=e.target.closest('[data-path]');if(lab){copy(lab.dataset.path);toast('Path copied: '+lab.dataset.path,'ok');}});
  root.addEventListener('input',e=>{const q=e.target.closest('[data-query]');if(q)Store.patch('ini','query',q.value);});
  root.addEventListener('keydown',e=>{const q=e.target.closest('[data-query]');if(q&&e.key==='Enter'){e.preventDefault();runQuery();}});
  setTimeout(run,30);

}

/* ============================================================
   ENCODE / CRYPTO HELPERS (shared by the Base64 / JWT tools)
   ============================================================ */
// Unicode-safe Base64 encode/decode. btoa/atob only handle Latin-1, so we
// round-trip through UTF-8 percent-encoding to support any text.
function b64encodeUtf8(str){return btoa(unescape(encodeURIComponent(str)));}
function b64decodeUtf8(b64){return decodeURIComponent(escape(atob(b64)));}
// base64url ⇄ standard base64 (RFC 4648 §5): -_ instead of +/, no padding.
function toBase64Url(b64){return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function fromBase64Url(u){let s=u.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return s;}
// Parse a hex string into raw bytes (Uint8Array). Tolerates whitespace, 0x/\x prefixes
// and :,- separators. Shared by the Base64/Hex tool and the Hash tool's hex-byte input.
function hexToBytes(hex){let s=hex.trim().replace(/0x/gi,'').replace(/\\x/gi,'').replace(/[\s:,-]/g,'');
  if(s.length%2)throw new Error('hex length must be even');
  if(!/^[0-9a-fA-F]*$/.test(s))throw new Error('invalid hex digit');
  const b=new Uint8Array(s.length/2);for(let i=0;i<b.length;i++)b[i]=parseInt(s.substr(i*2,2),16);
  return b;}
// Hex (Base16) ⇄ text, UTF-8 aware. Decode tolerates whitespace and 0x/\x prefixes.
function hexEncodeUtf8(str){const b=new TextEncoder().encode(str);let o='';for(const x of b)o+=x.toString(16).padStart(2,'0');return o;}
function hexDecodeUtf8(hex){return new TextDecoder('utf-8',{fatal:true}).decode(hexToBytes(hex));} // shares hexToBytes parser
// HTML entity encode/decode. Encode escapes the 5 reserved chars; decode resolves
// named + numeric entities by leveraging the browser's parser.
function htmlEncode(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function htmlDecode(str){const t=document.createElement('textarea');t.innerHTML=str;return t.value;}
// Encode an ArrayBuffer/Uint8Array as hex / base64 / base64url (for digests, HMACs).
function bufToHex(buf,upper){const h=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');return upper?h.toUpperCase():h;}
function bufToBase64(buf){let s='';const b=new Uint8Array(buf);for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
function bufEncode(buf,encoding,upper){
  if(encoding==='base64')return bufToBase64(buf);
  if(encoding==='base64url')return toBase64Url(bufToBase64(buf));
  return bufToHex(buf,upper); // default hex
}

/* ---------- BASE64 / URL TOOL ----------
   Two-way text ⇄ Base64 / Base64URL / URL percent-encoding / Hex (Base16) /
   HTML entities. Unicode-safe (UTF-8). Decode supports auto-detecting the
   encoding. A "swap" action flips encode/decode and moves output→input. */
function renderBase64(){

    </div>
    <div class="editor-grid">
      <div class="pane">
        <div class="pane-head"><span class="dot"></span><span data-inlabel>Plain text</span><span class="spacer"></span><span class="mini" data-mini="in"></span></div>
        <div class="pane-body" data-slot="input"></div>
      </div>
      <div class="pane">
        <div class="pane-head"><span class="dot out"></span><span data-outlabel>Encoded</span><span class="spacer"></span>

          <button class="btn ghost sm" data-act="wrap" title="Toggle line wrap"><i class="fa-solid fa-text-width"></i></button>

      <div class="spacer"></div>
      <span class="status-stat" data-slot="info"></span>
    </div>`;

  const out=$('[data-slot=output]',root), outLabel=$('[data-outlabel]',root), inLabel=$('[data-inlabel]',root), runLabel=$('[data-runlabel]',root);
  let lastOut='';
  const setStatus=makeStatusSetter(root);
  const updStats=text=>updateStats(root,text);
  const runDebounced=debounce(()=>run(),200);

  const input=buildCodeInput(st.input,v=>{Store.patch('base64','input',v);updStats(v);runDebounced();},'Type or paste text to encode…');
  $('[data-slot=input]',root).appendChild(input);
  input._setWrap(true);

  // init controls
  $('[data-set=kind]',root).value=st.kind||'b64';
  function syncMode(){
    const cfg=Store.getTool('base64');
    $$('[data-mode]',root).forEach(b=>b.classList.toggle('on',b.dataset.mode===cfg.mode));
    const dec=cfg.mode==='decode';
    runLabel.textContent=dec?'Decode':'Encode';
    inLabel.textContent=dec?'Encoded':'Plain text';

    // Auto-detect only applies to decode; show & reflect its state accordingly.
    const det=$('[data-act=detect]',root);
